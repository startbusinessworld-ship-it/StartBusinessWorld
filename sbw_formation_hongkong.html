.recap-list{display:flex;flex-direction:column;gap:7px}

.quote-block{text-align:center;padding:32px 20px}

<script>
const LESSONS=[{id:1,title:"🇭🇰 Pourquoi Hong Kong change tout",slides:[{t:'intro',emoji:'🇭🇰',num:'01',title:"Pourquoi Hong Kong\n<em>change tout</em>",sub:"Il existe un endroit sur terre où les entrepreneurs paient légalement 0% d'impôts sur leurs revenus offshore. Cet endroit s'appelle Hong Kong."},{t:'concept',tag:"Le principe offshore",emoji:'🌏',title:"Le principe offshore de Hong Kong 🌏",body:"Hong Kong applique le principe de la <strong>territorialité fiscale.</strong> Concrètement :<br><br>✅ Revenus générés <strong>DEPUIS Hong Kong</strong> → Impôts à HK (16,5%)<br>✅ Revenus générés <strong>EN DEHORS de Hong Kong</strong> → <em>0% d'impôts</em><br><br>Si tu fais du commerce international, de l'e-commerce, de l'import-export — <strong>tes profits ne sont pas imposés.</strong>"},{t:'compare',title:"🌍 France vs Hong Kong — la différence concrète",left:{emoji:'🇫🇷',label:"Société en France",num:'25',unit:'%',desc:"IS à 25% sur les bénéfices. TVA à gérer. Charges sociales lourdes. Déclarations complexes. L'État prend le quart de tout ce que tu gagnes."},right:{emoji:'🇭🇰',label:"Société à Hong Kong",num:'0',unit:'%',desc:"0% d'impôts sur les revenus offshore. Pas de TVA. Comptabilité simple. Banque internationale. Pour les business qui vendent hors de HK.",color:'good'},note:"La légalité est totale — Hong Kong est membre de l'OMC, reconnue par tous les pays. Pas un paradis fiscal exotique : une des places financières les plus réputées au monde."},{t:'stat',val:'0',unit:"% d'impôts sur vos revenus offshore",body:"Ce n'est pas une astuce cachée. C'est <strong>inscrit dans la loi hongkongaise</strong> depuis 1947 — le principe de la <em>territorialité fiscale.</em> Ce que tu génères en dehors de Hong Kong n'est pas imposé. Légalement. Reconnu mondialement."},{t:'warning',emoji:'⚠️',title:"Ce qu'il faut absolument comprendre avant de continuer 🚨",body:"Créer une société à Hong Kong ne te dispense pas automatiquement de payer des impôts en France.<br><br>La société HK paie <strong>0% sur ses bénéfices offshore</strong>. Mais si tu es résident fiscal français et que tu te verses des dividendes ou un salaire depuis cette société, <strong>ces revenus personnels sont imposés en France.</strong><br><br>L'optimisation complète = société HK (IS 0%) + résidence fiscale adaptée (IR 0%). On voit ça en leçon 7."},{t:'recap',title:"Ce qu'il faut retenir",points:["Territorialité fiscale : revenus offshore = 0% d'impôts à HK","100% légal — inscrit dans la loi HK depuis 1947, reconnu mondialement","E-commerce, import-export, services internationaux — tous éligibles","Résidence fiscale française = impôt personnel en France quand même","Société HK = optimisation du business / résidence = optimisation perso","L'optimisation complète = société HK + résidence fiscale adaptée"]}]},{id:2,title:"💎 Les avantages concrets d'une société HK",slides:[{t:'intro',emoji:'💎',num:'02',title:"Les avantages concrets\n<em>d'une société Hong Kong</em>",sub:"0% c'est le principal. Mais c'est loin d'être le seul avantage. Voilà pourquoi Hong Kong est bien plus qu'une simple optimisation fiscale."},{t:'cards',title:"💰 Les avantages fiscaux",items:[{emoji:'0️⃣',name:"0% sur les revenus offshore",sub:"Tes ventes en dehors de Hong Kong ne sont pas imposées. E-commerce, dropshipping, services digitaux, import-export."},{emoji:'🚫',name:"Pas de TVA",sub:"Hong Kong n'a pas de TVA. Tu ne collectes pas, tu ne déclares pas, tu ne reverses pas. Zéro friction administrative."},{emoji:'📊',name:"16,5% si activité locale",sub:"Si ton business génère des revenus depuis Hong Kong même (ventes locales), le taux reste parmi les plus bas du monde."}]},{t:'cards',title:"🌏 Les avantages business",items:[{emoji:'🏦',name:"Accès aux banques mondiales",sub:"HSBC, Standard Chartered, Citibank — les plus grandes banques mondiales. Plus Airwallex, Wise Business."},{emoji:'💳',name:"Multi-devises natif",sub:"Reçois en USD, EUR, GBP, AUD, HKD, CNY. Paie tes fournisseurs dans leur devise. Zéro friction de change."},{emoji:'🤝',name:"Crédibilité internationale",sub:"Une société HK inspire confiance auprès des fournisseurs asiatiques, des clients internationaux, des partenaires."}]},{t:'cards',title:"⚡ Les avantages opérationnels",items:[{emoji:'📋',name:"Création simple et rapide",sub:"Une société à Hong Kong se crée en 5 à 7 jours ouvrés depuis chez toi. Zéro déplacement, zéro notaire."},{emoji:'🔒',name:"Confidentialité",sub:"Les actionnaires ne sont pas dans les registres publics. Confidentialité bien meilleure qu'en France."},{emoji:'🌐',name:"Accès à la Chine",sub:"Hong Kong est la porte d'entrée vers les fournisseurs chinois. Les entreprises chinoises préfèrent traiter avec des entités HK."}]},{t:'stat',val:'5-7',unit:"jours pour créer ta société HK depuis chez toi",body:"Pas besoin de se déplacer à Hong Kong. Pas besoin d'un avocat local. Un <strong>cabinet spécialisé en création à distance</strong> comme <em>Luminos Corp</em> gère tout : dossier, dépôt, documents officiels, en français."},{t:'recap',title:"Ce qu'il faut retenir",points:["0% sur revenus offshore — e-commerce, services, import-export","Pas de TVA — zéro déclaration, zéro reversement","Accès aux meilleures banques mondiales","Multi-devises natif — USD, EUR, GBP, CNY...","Création en 5-7 jours, tout à distance","Porte d'entrée vers les fournisseurs chinois"]}]},{id:3,title:"🔍 Comment fonctionne le 0% offshore",slides:[{t:'intro',emoji:'🔍',num:'03',title:"Comment fonctionne\n<em>le 0% offshore</em>",sub:"C'est quoi exactement un revenu offshore ? Qui peut en bénéficier ? Quelles sont les conditions ? On rentre dans le détail."},{t:'concept',tag:"La définition offshore",emoji:'🌏',title:"C'est quoi un revenu offshore à Hong Kong ? 🌏",body:"Un revenu est considéré <strong>offshore</strong> si :<br><br>✅ Le contrat est conclu en dehors de Hong Kong<br>✅ Le service est exécuté en dehors de Hong Kong<br>✅ Les biens sont achetés et revendus en dehors de HK<br><br>Concrètement : si tu gères ton business depu rde tous tes contrats et preuves","Revenus onshore : 8,25% sur les premiers 2M HKD puis 16,5%","Comptable HK obligatoire pour la déclaration offshore","Si tu gères depuis l'étranger et tes clients sont hors HK → 0%"]}]},{id:4,title:"⚡ Créer ta société HK depuis chez toi",slides:[{t:'intro',emoji:'⚡',num:'04',title:"Créer ta société HK\n<em>depuis chez toi</em>",sub:"Pas besoin de prendre l'avion. Pas besoin d'un avocat local. En 5 à 7 jours ouvrés, ta société est créée."},{t:'cards',title:"📋 Les éléments pour créer ta société HK",items:[{emoji:'🏢',name:"Nom de la société",sub:"Tu choisis un nom en anglais, généralement se terminant par 'Limited' ou 'Ltd'. Luminos vérifie la disponibilité."},{emoji:'👤',name:"Actionnaire(s) et directeur",sub:"Minimum 1 actionnaire et 1 directeur. Peut être la même personne — toi. La nationalité n'importe pas."},{emoji:'📍',name:"Adresse enregistrée HK",sub:"Une adresse physique à Hong Kong est obligatoire. Le cabinet qui crée ta société (Luminos) te la fournit."},{emoji:'📄',name:"Passeport valide",sub:"Copie de ton passeport suffisant. Pas besoin de l'apostiller ou de le certifier pour la création en ligne."}]},{t:'concept',emoji:'📅',title:"Le processus de création — étape par étape 📅",body:"<strong>Jour 1-2 :</strong> Tu fournis les documents, tu choisis ton nom<br><strong>Jour 2-3 :</strong> Dépôt au Companies Registry de Hong Kong<br><strong>Jour 4-5 :</strong> Validation et Certificate of Incorporation<br><strong>Jour 5-7 :</strong> BR Certificate, statuts, certificat d'actions<br><br>Tout se fait à distance. Luminos coordonne chaque étape et te tient informé en français."},{t:'stat',val:'1 490',unit:"USD pour la création complète avec Luminos",body:"Tarif tout compris de <strong>Luminos Corp</strong>, cabinet spécialisé en création de sociétés à Hong Kong pour entrepreneurs francophones.<br><br>✅ Certificate of Incorporation<br>✅ Business Registration Certificate<br>✅ Statuts et certificat d'actions<br>✅ Adresse officielle HK incl   var t=sl.t,h='';
  if(t==='intro'){
    h='<div class="slide-intro"><div class="slide-num">Leçon '+L.id+' / '+LESSONS.length+'</div><span class="slide-emoji-big">'+(sl.emoji||'')+'</span><div class="slide-intro-title">'+sl.title.replace(/\n/g,'<br>')+'</div>'+(sl.sub?'<div class="slide-intro-sub">'+sl.sub+'</div>':'')+'</div>';
  } else if(t==='concept'){
    h='<div class="slide-block">'+(sl.tag?'<div class="slide-tag">'+sl.tag+'</div>':'')+'<div class="slide-title">'+sl.title+'</div><div class="slide-body">'+sl.body+'</div></div>';
  } else if(t==='cards'){
    var items=sl.items.map(function(it){return'<div class="card-item"><div class="card-emoji">'+it.emoji+'</div><div><div class="card-name">'+it.name+'</div><div class="card-sub">'+it.sub+'</div></div></div>';}).join('');
    h='<div class="slide-block"><div class="slide-title">'+sl.title+'</div><div class="cards-grid">'+items+'</div></div>';
  } else if(t==='compare'){
    var lc=sl.left,rc=sl.right;
    h='<div class="slide-block"><div class="slide-title">'+sl.title+'</div><div class="compare-grid"><div class="compare-col"><div class="compare-header"><span class="compare-emoji">'+lc.emoji+'</span><span class="compare-label">'+lc.label+'</span></div><div class="compare-num">'+lc.num+'</div>'+(lc.unit?'<div class="compare-unit">'+lc.unit+'</div>':'')+'<div class="compare-desc">'+lc.desc+'</div></div><div class="compare-col '+(rc.color||'')+'"><div class="compare-header"><span class="compare-emoji">'+rc.emoji+'</span><span class="compare-label">'+rc.label+'</span></div><div class="compare-num '+(rc.color==='good'?'green':'')+'">'+rc.num+'</div>'+(rc.unit?'<div class="compare-unit">'+rc.unit+'</div>':'')+'<div class="compare-desc">'+rc.desc+'</div></div></div>'+(sl.note?'<div class="compare-note">'+sl.note+'</div>':'')+'</div>';
  } else if(t==='stat'){
    h='<div class="slide-block"><div class="stat-block"><div class="stat-val">'+sl.val+'</div><div class="stat-unit">'+sl.unit+'</div><div class="stat-body">'+sl.body+'</div></div></div>';
  } else if(t==='warning'){
    h='<div class="slide-block"><div class="warning-block"><div class="warning-icon">'+(sl.emoji||'⚠️')+'</div><div class="warning-title">'+sl.title+'</div><div class="warning-body">'+(sl.body||sl.warn||'')+'</div></div></div>';
  } else if(t==='action'){
    var steps=sl.steps.map(function(s,i){return'<div class="action-step"><div class="action-step-num">'+(i+1)+'</div><span>'+s+'</span></div>';}).join('');
    h='<div class="slide-block"><div class="action-block"><div class="action-badge">'+sl.badge+'</div><div class="action-title">'+sl.title+'</div><div class="action-steps">'+steps+'</div><a href="'+sl.url+'" target="_blank" rel="noopener" class="action-cta">'+sl.cta+' →</a></div></div>';
  } else if(t==='quote'){
    h='<div class="slide-block"><div class="quote-block"><div class="quote-text">"'+sl.text+'"</div><div class="quote-bar"></div></div></div>';
  } else if(t==='recap'){
    var pts=sl.points.map(function(p){return'<div class="recap-item"><span class="recap-dot">◆</span><span>'+p+'</span></div>';}).join('');
    h='<div class="slide-block"><div class="recap-title">'+sl.title+'</div><div class="recap-list">'+pts+'</div></div>';
  }
  a.innerHTML=h;a.scrollTop=0;
  updateNav();updatePbars();updateSidebar();
}

function updateNav(){
  var L=LESSONS[curL];
  document.getElementById('navInfo').textContent='Leçon '+L.id+' · Slide '+(curS+1)+'/'+L.slides.length;
  document.getElementById('btnPrev').disabled=curL===0&&curS===0;
  var last=curL===LESSONS.length-1&&curS===L.slides.length-1;
  var nb=document.getElementById('btnNext');
  nb.textContent=last?'Terminer ✓':'Suivant →';
  nb.className=last?'btn-nav done-btn':'btn-nav primary';
}

function updatePbars(){
  var s=seen[curL]?seen[curL].size:1;
  var tot=LESSONS[curL].slides.length;
  var pct=Math.max(Math.round(s/tot*100),Math.round((curS+1)/tot*100));
  document.getElementById('slidePbar').style.width=pct+'%';
  var gp=globalPct();
  document.getElementById('hPbarFill').style.width=gp+'%';
  document.getElementById('hPct').textContent=gp+'%';
}

function updateSidebar(){
  var d=loadProg();
  document.getElementById('sbLessons').innerHTML=LESSONS.map(function(l,i){
    var done=!!d[i];
    var s=seen[i]?seen[i].size:0;
    var pct=done?100:Math.round(s/l.slides.length*100);
    return'<div class="sb-item'+(i===curL?' active':'')+(done?' done':'')+'" onclick="goTo('+i+')">'+'<span class="sb-num">'+l.id+'</span><div class="sb-info"><div class="sb-name">'+l.title+'</div><div class="sb-bar"><div class="sb-bar-fill" style="width:'+pct+'%"></div></div></div><span class="sb-check">✓</span></div>';
  }).join('');
}

function refreshUI(){updatePbars();updateSidebar();}

// ══ NAVIGATION ══
function next(){
  var L=LESSONS[curL];
  if(curS<L.slides.length-1){curS++;render();}
  else if(curL<LESSONS.length-1){markDone(curL);curL++;curS=0;render();}
  else{markDone(curL);}
}
function prev(){
  if(curS>0){curS--;render();}
  else if(curL>0){curL--;curS=LESSONS[curL].slides.length-1;render();}
}
function goTo(idx){curL=idx;curS=0;render();}

// ══ INIT ══
(function(){
  var d=loadProg();
  LESSONS.forEach(function(l,i){if(d[i])seen[i]=new Set(Array.from({length:l.slides.length},function(_,j){return j;}));});
  var start=0;
  for(var i=0;i<LESSONS.length;i++){if(!d[i]){start=i;break;}if(i===LESSONS.length-1)start=i;}
  curL=start;curS=0;
  render();
})();

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  if(e.key==='ArrowLeft'){e.preventDefault();prev();}
});
</script>
</body>
</html>
