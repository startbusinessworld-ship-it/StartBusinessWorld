   vo:"Ton cerveau fonctionne par cycles d'environ quatre-vingt-dix minutes. Ultradian rhythms. Sur une journée, tu as deux à quatre heures de pic cognitif où ta concentration, ta créativité et ta capacité de décision sont au maximum. Pour la plupart des gens, c'est le matin, deux à quatre heures après le réveil. Identifier quand tes pics tombent dans ta journée et les réserver pour tes tâches les plus importantes, c'est l'optimisation la plus rentable que tu puisses faire. C'est ce que font tous les performers d'exception."},
  {type:'quote', text:"Prends soin de ton corps. C'est le seul endroit où tu aies à vivre.", auth:"— Jim Rohn",
   vo:"Jim Rohn a dit ça dans les années 1980 et c'est encore plus vrai aujourd'hui dans un monde où on passe des journées entières assis devant un écran. Ton business vit dans ta tête. Et ta tête vit dans un corps. Si le corps est épuisé, mal nourri, sans mouvement, le business s'en ressent directement. Les décisions sont moins bonnes. L'énergie pour prospecter et créer diminue. La résistance au stress baisse. Prendre soin de ton corps, c'est pas une activité annexe à ton business. C'en est le fondement."},
  {type:'action', badge:"Audit d'énergie", title:"Trouve tes pics",
   steps:[{txt:"Pendant 3 jours, note toutes les heures ton niveau d'énergie de 1 à 10"},{txt:"Identifie les patterns : quand es-tu au max ? Quand es-tu à plat ?"},{txt:"Réorganise ton agenda pour que tes tâches importantes tombent dans tes pics"}],
   vo:"L'exercice de cette leçon. Pendant trois jours, note toutes les heures ton niveau d'énergie sur dix. Juste un chiffre dans une note sur ton téléphone. Après trois jours, les patterns deviennent évidents. T'as des pics à certaines heures, des creux à d'autres. Et une fois que t'as identifié tes pics, réorganise ton agenda pour que tes tâches importantes, tes deep work, tes décisions stratégiques, tombent dans ces fenêtres. Le reste, admin, emails, appels routiniers, dans les creux."},
  {type:'recap', title:"Ce qu'il faut retenir", points:["6h de haute énergie > 12h de basse énergie","Les 4 sources : sommeil, sport, nutrition, récupération","Tu as 2-4h de pic cognitif par jour — protège-les","Gérer son énergie est plus rentable que gérer son temps"],
   vo:"Ce qu'il faut retenir. Six heures de haute énergie produisent plus que douze heures de basse énergie. Les quatre leviers : sommeil, sport quotidien, nutrition qui stabilise la glycémie, et récupération délibérée. Tu as deux à quatre heures de pic cognitif par jour, identifie-les et protège-les. Et gérer ton énergie est plus rentable que gérer ton temps. L'énergie est le multiplicateur de tout le reste."}
]},

{id:13, title:"Ton entourage : arme ou poison", slides:[
  {type:'intro', num:'13', title:"Ton entourage :\n<em>arme ou poison</em>",
   sub:"Tu es la moyenne des cinq personnes que tu fréquentes le plus. C'est pas poétique, c'est neurologique.",
   vo:"Leçon treize. L'entourage. Jim Rohn a dit : tu es la moyenne des cinq personnes que tu fréquentes le plus. Beaucoup l'ont entendu. Peu ont vraiment regardé leurs cinq personnes en face et tiré les conclusions qui s'imposent. Dans cette leçon, on va être honnêtes là-dessus."},
  {type:'concept', tag:'La science', title:"La contagion comportementale",
   body:"Les neurones miroirs de ton cerveau <strong>imitent inconsciemment les comportements, les attitudes et les émotions de ceux qui t'entourent.</strong> Côtoyer des gens ambitieux te rend ambitieux. L'inverse est vrai aussi.",
   vo:"La contagion sociale est réelle et mesurée. Les neurones miroirs de ton cerveau imitent inconsciemment les comportements et les attitudes des personnes avec qui tu passes du temps. C'est pour ça que tu te mets à parler comme tes amis proches. À avoir les mêmes blagues, les mêmes réflexes. Et les mêmes limites. Si t'es entouré de gens qui trouvent que c'est pas pour eux de gagner bien leur vie, qui voient les riches comme des exploiteurs, qui abandonnent au premier obstacle, ce n'est qu'une question de temps avant que ces croyances s'installent aussi dans ta tête."},
  {type:'list', title:"Les profils toxiques à identifier", items:[
    {icon:'🦀', name:"Le crabe dans le seau", sub:"Tire les autres vers le bas dès qu'ils essaient de s'élever. Souvent inconscient."},
    {icon:'😒', name:"Le réaliste pessimiste", sub:"Pour chaque projet que t'amènes, il a une liste de pourquoi ça va pas marcher."},
    {icon:'😱', name:"Le catastrophiste", sub:"Amplifie chaque risque jusqu'à te paralyser. Souvent bien intentionné mais dévastateur."}],
   vo:"Trois profils toxiques que tu dois identifier dans ton entourage. Le crabe dans le seau : dès que tu veux t'élever, il te tire vers le bas. Souvent sous des apparences de 'je veux juste que tu sois réaliste'. Le réaliste pessimiste : pour chaque idée que t'amènes, il a cinq raisons pour lesquelles ça va pas marcher. Il se croit utile. Il est destructeur. Et le catastrophiste : il amplifie chaque risque jusqu'à te faire rester immobile. Souvent bien intentionné, généralement dévastateur."},
  {type:'concept', tag:'La construction', title:"Construire ton cercle de croissance",
   body:"Tu n'as pas à attendre que les bonnes personnes arrivent dans ta vie. <strong>Tu vas les chercher.</strong> Meetups, mastermind, formations, mentors. Les gens qui t'élèvent existent. Ils sont juste pas dans ton canapé.",
   vo:"La bonne nouvelle, c'est que tu n'as pas à attendre que les bonnes personnes arrivent dans ta vie. Tu vas les chercher. Les meetups d'entrepreneurs dans ta ville. Les groupes Slack de ta niche. Les masterminds. Les formations en présentiel où tu croises des gens qui avancent. Les réseaux d'anciens d'incubateurs. Les gens qui t'élèvent existent. En grand nombre. Ils sont juste pas dans ton réseau actuel parce que tu les as pas encore cherchés. La prochaine fois que t'hésites à aller à un événement networking, pense à ça."},
  {type:'stat', num:'5', label:"personnes qui changent une trajectoire", body:"Selon une étude Stanford sur les entrepreneurs, avoir <strong>5 connexions clés avec des personnes plus avancées que soi</strong> dans sa carrière est l'un des meilleurs prédicteurs de succès entrepreneurial à long terme.",
   vo:"Une étude de Stanford sur les trajectoires entrepreneuriales a mis en évidence un chiffre précis. Cinq connexions clés. Pas cinq cents. Cinq. Cinq personnes plus avancées que toi dans les domaines qui comptent pour ton business. Un mentor. Un pair qui t'emmène vers le haut. Un expert dans une compétence que t'as pas. Un investisseur ou quelqu'un qui connaît le capital. Et quelqu'un qui t'a déjà fait le chemin que tu veux faire. Ces cinq connexions sont des multiplicateurs de ta trajectoire."},
  {type:'action', badge:"Audit relationnel", title:"Fais le bilan honnête",
   steps:[{txt:"Liste les 10 personnes avec qui tu passes le plus de temps. Note leur état d'esprit général."},{txt:"Identifie : qui te tire vers le haut ? Qui te tire vers le bas ? Qui est neutre ?"},{txt:"Décide d'une action pour rapprocher les premiers et distancier les seconds."}],
   vo:"L'exercice de cette leçon est peut-être le plus inconfortable de la formation. Prends dix minutes. Liste les dix personnes avec qui tu passes le plus de temps. Pour chacune, note honnêtement : est-ce que cette personne me tire vers le haut, vers le bas, ou est neutre pour mon développement ? Tu vas peut-être voir des choses qui font mal. Et ensuite, décide d'une action pour rapprocher les personnes qui t'élèvent et créer une distance saine avec celles qui te plombent."},
  {type:'recap', title:"Ce qu'il faut retenir", points:["Tu es la moyenne de tes 5 proches — c'est neurologique","La contagion sociale est réelle et automatique","Identifie les profils toxiques : crabe, pessimiste, catastrophiste","Cherche activement 5 connexions clés qui t'élèvent"],
   vo:"Ce qu'il faut retenir. T'es la moyenne des cinq personnes que tu fréquentes le plus. C'est pas une métaphore, c'est neurologique. La contagion sociale est réelle et automatique via les neurones miroirs. Identifie les profils toxiques dans ton entourage, le crabe, le pessimiste, le catastrophiste. Et cherche activement cinq connexions clés qui t'élèvent. Ça se construit, ça ne se trouve pas par hasard."}
]},

{id:14, title:"La résilience : tomber et se relever", slides:[
  {type:'intro', num:'14', title:"La résilience :\ntomber et <em>se relever</em>",
   sub:"T'as pas le choix de traverser des crises. T'as le choix de ce que tu en fais.",
   vo:"Leçon quatorze. La résilience. On arrive vers la fin de cette formation. Et je voulais garder ce sujet pour l'avant-dernière leçon parce qu'il intègre beaucoup de ce qu'on a vu. La résilience, c'est la capacité à encaisser, à traverser, et à se relever plus fort. C'est pas une qualité qu'on a ou qu'on a pas. C'est une compétence qui se développe. Et dans cette leçon, je vais te donner les outils pour la construire."},
  {type:'concept', tag:'La définition réelle', title:"La résilience, c'est pas l'absence de douleur",
   body:"Un entrepreneur résilient souffre autant que les autres face à une crise. Il <strong>traite cette douleur différemment.</strong> Il ne la nie pas. Il ne la laisse pas non plus s'installer et gouverner ses décisions.",
   vo:"Définissons ça correctement d'emblée parce qu'il y a un mythe là-dessus. La résilience, c'est pas être blindé, sans émotions, imperturbable. Les entrepreneurs les plus résilients que je connais ont pleuré, ont douté, ont eu des nuits blanches. La différence, c'est pas qu'ils souffrent moins. C'est qu'ils traitent cette douleur différemment. Ils la reconnaissent, ils la traversent, et ils prennent quand même les décisions qui s'imposent. Ils laissent pas la douleur du moment décider de leur trajectoire à long terme."},
  {type:'list', title:"Les 3 piliers de la résilience", items:[
    {icon:'🎯', name:"La dichotomie du contrôle", sub:"Séparer ce qui dépend de toi de ce qui n'en dépend pas. Agir sur le premier. Accepter le second."},
    {icon:'🔄', name:"Le recadrage", sub:"Changer la signification donnée aux événements. Pas les nier. Les voir différemment."},
    {icon:'🤝', name:"Le soutien", sub:"Les entrepreneurs seuls s'effondrent. Ceux avec un réseau de soutien traversent les crises."}],
   vo:"Trois piliers qui reviennent systématiquement chez les entrepreneurs résilients. La dichotomie du contrôle d'abord. Séparer ce qui dépend de toi et ce qui n'en dépend pas. Le marché qui se retourne ? Pas ton contrôle. Comment t'y réponds ? Ton contrôle total. Le recadrage ensuite. Changer la signification que tu donnes aux événements difficiles. Le projet qui est tombé, c'était peut-être la leçon dont t'avais besoin pour réussir le suivant. Et le soutien. Les données sont claires : les entrepreneurs avec un réseau de soutien traversent les crises. Les solitaires s'effondrent."},
  {type:'concept', tag:'Le stoïcisme', title:"Marcus Aurelius avait tout compris",
   body:"Il y a deux mille ans, l'Empereur romain Marcus Aurelius écrivait dans son journal : <strong>'L'obstacle sur le chemin devient le chemin.'</strong> Ce qui te résiste est exactement ce dont tu as besoin pour grandir.",
   vo:"Marcus Aurelius était l'un des hommes les plus puissants de son temps. Empereur romain, commandant en chef, il avait tout le pouvoir du monde. Et dans ses carnets personnels, jamais destinés à être publiés, il travaillait son mindset tous les jours. Il réfléchissait à comment traverser l'adversité. Sa conclusion principale : l'obstacle sur le chemin devient le chemin. Ce qui te résiste est précisément ce dont tu as besoin pour grandir. C'est pas de la philosophie de salon. C'est une façon de transformer chaque crise en carburant."},
  {type:'stat', num:'70%', label:"des fondateurs avec mentor traversent les crises", body:"70% des fondateurs avec un mentor ou un réseau de pairs traversent les crises sans abandonner, contre <strong>30% pour ceux qui sont seuls</strong>. La solitude entrepreneuriale est un facteur de risque majeur.",
   vo:"Ce chiffre devrait te faire réfléchir immédiatement sur ton niveau de solitude entrepreneuriale. Soixante-dix pourcent des fondateurs avec un mentor ou un réseau de pairs traversent les crises existentielles sans abandonner. Trente pourcent pour ceux qui sont seuls. La différence entre résilier et continuer est souvent aussi simple qu'avoir quelqu'un à appeler à trois heures du matin quand tout semble s'effondrer. Quelqu'un qui comprend. Quelqu'un qui a déjà traversé ça. La prochaine fois que tu penses que demander de l'aide est une faiblesse, rappelle-toi ce chiffre."},
  {type:'action', badge:"Outil de résilience", title:"Le journal d'adversité",
   steps:[{txt:"Chaque soir cette semaine, note : quel obstacle as-tu traversé aujourd'hui ?"},{txt:"Ce qui était hors de ton contrôle. Ce qui était dans ton contrôle."},{txt:"Ce que tu as appris. Ce que tu feras différemment."}],
   vo:"L'exercice de cette leçon est un rituel quotidien simple. Chaque soir cette semaine, prends cinq minutes. Note l'obstacle principal de la journée. Puis distingue clairement : qu'est-ce qui était hors de ton contrôle dans cette situation ? Et qu'est-ce qui était dans ton contrôle ? Qu'est-ce que tu as appris, même si c'est juste que t'aurais dû faire autrement ? Et qu'est-ce que tu feras différemment ? Cinq questions. Cinq minutes. Et progressivement, tu transformes chaque journée difficile en données exploitables."},
  {type:'recap', title:"L'essentiel de la résilience", points:["La résilience = traverser la douleur, pas l'éviter","3 piliers : dichotomie du contrôle, recadrage, soutien social","L'obstacle devient le chemin — Marcus Aurelius","70% vs 30% : le réseau fait la différence entre tenir et abandonner"],
   vo:"Ce qu'il faut retenir. La résilience c'est pas l'absence de douleur, c'est traverser la douleur sans la laisser gouverner tes décisions. Trois piliers : dichotomie du contrôle, recadrage, réseau de soutien. L'obstacle sur le chemin devient le chemin si tu le vois ainsi. Et soixante-dix pourcent contre trente pourcent : le réseau fait une différence décisive entre tenir et abandonner. Dernière leçon : le passage à l'action."}
]},

{id:15, title:"L'action : le seul truc qui compte", slides:[
  {type:'intro', num:'15', title:"L'action :\nle seul truc <em>qui compte</em>",
   sub:"T'as les outils. T'as la compréhension. Maintenant il reste le seul truc qui change vraiment les choses : agir.",
   vo:"Dernière leçon. Leçon quinze. On est au bout du chemin de cette formation. T'as maintenant quatorze leçons de mindset. Le cerveau, la peur, l'esprit de croissance, la discipline, les habitudes, la vision, le focus, l'énergie, l'entourage, la résilience. C'est beaucoup. Mais tout ça ne vaut rien sans l'action. Et dans cette dernière leçon, on va parler de pourquoi l'action est la seule chose qui compte vraiment, et comment lever les blocages finaux."},
  {type:'concept', tag:'Le piège final', title:"La paralysie par l'analyse",
   body:"Plus tu en sais, plus tu peux trouver des raisons de pas agir. <strong>La connaissance sans action est juste de la procrastination sophistiquée.</strong> Le moment parfait n'arrive jamais. La condition parfaite non plus.",
   vo:"Voilà le dernier piège, et c'est souvent le plus vicieux. Tu peux être convaincu de tout ce qu'on a vu dans cette formation. Comprendre le mindset de croissance. Savoir comment construire des habitudes. Avoir une vision claire. Et rester immobile. Parce que tu attends encore quelque chose. Que le moment soit parfait. Que le produit soit fini. Que tu sois plus préparé. C'est la paralysie par l'analyse. Et c'est de la procrastination habillée en prudence. Le moment parfait n'arrive jamais. Parce qu'il n'existe pas."},
  {type:'list', title:"Les 3 blocages finaux à l'action", items:[
    {icon:'⏳', name:"Attendre d'être prêt", sub:"Tu seras jamais assez prêt. La préparation nécessaire se fait en faisant."},
    {icon:'🎯', name:"Attendre la permission", sub:"Personne va venir te donner la permission de réussir. Prends-la toi-même."},
    {icon:'💯', name:"Attendre la perfection", sub:"Le produit parfait jamais lancé vaut zéro. Le produit imparfait lancé aujourd'hui vaut tout."}],
   vo:"Trois blocages finaux à l'action que je retrouve chez les entrepreneurs qui stagnent. Un : attendre d'être prêt. Tu seras jamais assez prêt. La préparation nécessaire pour faire quelque chose, ça s'acquiert en le faisant. Pas avant. Deux : attendre la permission. Personne va venir te tapper sur l'épaule et te dire : maintenant t'as le droit. Cette permission, tu te la donnes toi-même. Trois : attendre la perfection. Le produit parfait jamais lancé vaut zéro. Le produit imparfait lancé aujourd'hui te donne du feedback réel. Et le feedback réel, c'est ce qui te permet de construire le bon produit."},

/* ══════════════════════════════════════════════════════
   MOTEUR PLAYER
══════════════════════════════════════════════════════ */
let curLesson = 0, curSlide = 0;
let playing = true, voiceOn = true;
let tmr = null, ptmr = null, pstart = null;
const MIN_DUR = 5500;
const lessonProgress = {};

/* — VOICE — */
const synth = window.speechSynthesis;
let voices = [];
function loadVoices(){
  const all = synth.getVoices();
  voices = all.filter(v => v.lang.startsWith('fr'));
  if(!voices.length) voices = all;
}
if(synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
loadVoices();

function getBestVoice(){
  return voices.find(v=>v.name.toLowerCase().includes('google')&&v.lang.startsWith('fr'))
      || voices.find(v=>v.lang==='fr-FR')
      || voices[0];
}

function speak(txt, cb){
  synth.cancel();
  if(!voiceOn||!txt){cb&&cb();return;}
  const u = new SpeechSynthesisUtterance(txt);
  u.voice = getBestVoice();
  u.lang = 'fr-FR';
  u.rate = 1.10;
  u.pitch = 1.0;
  showCap(txt);
  u.onend = ()=>{hideCap();cb&&cb();};
  u.onerror = ()=>{hideCap();cb&&cb();};
  synth.speak(u);
}
function stopSpeak(){synth.cancel();hideCap();}
function showCap(t){
  const el = document.getElementById('capTxt');
  el.textContent = t.length>130 ? t.slice(0,130)+'…' : t;
  el.classList.remove('off');
}
function hideCap(){ document.getElementById('capTxt').classList.add('off'); }

/* — BUILD SLIDES — */
function buildSlideHTML(s, i, total, lnum){
  const tags = `<div class="logo-tag">SBW</div><div class="slide-tag">L${lnum} · ${i+1}/${total}</div>`;

  if(s.type==='intro'){
    const lines = s.title.split('\n');
    return `<div class="slide" id="sl-${i}">${tags}
      <div class="s-intro">
        <div class="s-intro-left">
          <div class="s-tag afb d1">Module Mindset · Leçon ${lnum}</div>
          <div class="s-intro-title afb d2">${lines.join('<br>')}</div>
          <div class="s-intro-sub af d3">${s.sub}</div>
        </div>
        <div class="s-intro-right">
          <div class="s-intro-num-bg afr d2">${lnum}</div>
        </div>
      </div>
    </div>`;
  }

  if(s.type==='concept'){
    return `<div class="slide" id="sl-${i}">${tags}
      <div class="s-center">
        <div class="s-tag afs d1">${s.tag}</div>
        <div class="s-concept-title afb d2">${s.title}</div>
        <div class="s-body af d3">${s.body}</div>
      </div>
    </div>`;
  }

  if(s.type==='list'){
    const cards = s.items.map((it,j)=>`
      <div class="s-card afb d${j+2}">
        <div class="s-card-icon">${it.icon}</div>
        <div class="s-card-name">${it.name}</div>
        <div class="s-card-sub">${it.sub}</div>
      </div>`).join('');
    return `<div class="slide" id="sl-${i}">${tags}
      <div class="s-list-wrap">
        <div class="s-list-title af d1">${s.title}</div>
        <div class="s-list-grid">${cards}</div>
      </div>
    </div>`;
  }

  if(s.type==='stat'){
    return `<div class="slide" id="sl-${i}">${tags}
      <div class="s-stat-wrap">
        <div class="s-stat-left">
          <div class="s-stat-num afs d1">${s.num}</div>
          <div class="s-stat-label af d2">${s.label}</div>
        </div>
        <div class="s-stat-right">
          <div class="s-stat-body af d2">${s.body}</div>
        </div>
      </div>
    </div>`;
  }

  if(s.type==='quote'){
    return `<div class="slide" id="sl-${i}">${tags}
      <div class="s-quote-wrap">
        <div class="s-quote-mark af d1">"</div>
        <div class="s-quote-text afb d2">${s.text}</div>
        <div class="s-quote-auth af d3">${s.auth}</div>
      </div>
    </div>`;
  }

  if(s.type==='action'){
    const steps = s.steps.map((st,j)=>`
      <div class="s-step afl d${j+3}">
        <div class="s-step-n">${j+1}</div>
        <div class="s-step-txt">${st.txt}</div>
      </div>`).join('');
    return `<div class="slide" id="sl-${i}">${tags}
      <div class="s-action-wrap">
        <div class="s-action-left">
          <div class="s-action-badge af d1">${s.badge}</div>
          <div class="s-action-title afb d2">${s.title}</div>
        </div>
        <div class="s-action-right">${steps}</div>
      </div>
    </div>`;
  }

  if(s.type==='recap'){
    const pts = s.points.map((p,j)=>`
      <div class="s-recap-pt afl d${j+2}">
        <div class="s-recap-dot"></div>
        <div class="s-recap-txt">${p}</div>
      </div>`).join('');
    return `<div class="slide" id="sl-${i}">${tags}
      <div class="s-recap-wrap">
        <div class="s-recap-left">
          <div class="s-recap-tag af d1">Récapitulatif</div>
          <div class="s-recap-title afb d1">${s.title}</div>
        </div>
        <div class="s-recap-right">${pts}</div>
      </div>
    </div>`;
  }

  return `<div class="slide" id="sl-${i}">${tags}<div class="s-center"><div class="s-body af d1">${JSON.stringify(s)}</div></div></div>`;
}

/* — RENDER LESSON — */
function renderLesson(idx){
  stopSpeak(); stopPlay();
  curLesson = idx; curSlide = 0;
  const L = LESSONS[idx];
  document.getElementById('slidesCont').innerHTML = L.slides.map((s,i)=>buildSlideHTML(s,i,L.slides.length,L.id)).join('');
  document.getElementById('tbLesson').textContent = `L${L.id} — ${L.title}`;
  updateMenu();
  showSlide(0);
  setTimeout(()=>{playing=true; document.getElementById('playBtn').textContent='⏸'; schedNext();}, 400);
}

function showSlide(i){
  document.querySelectorAll('#slidesCont .slide').forEach((el,j)=>el.classList.toggle('active',j===i));
  curSlide = i;
  updateProg(0);
  const L = LESSONS[curLesson];
  document.getElementById('slideCtr').textContent = `${i+1}/${L.slides.length}`;
  document.getElementById('lessonCtr').textContent = `Leçon ${curLesson+1}/${LESSONS.length}`;
}

function updateProg(p){
  const L = LESSONS[curLesson];
  document.getElementById('progBar').style.width = ((curSlide+p/100)/L.slides.length*100)+'%';
  lessonProgress[curLesson] = Math.max(lessonProgress[curLesson]||0, Math.round((curSlide+p/100)/L.slides.length*100));
  const sbBar = document.querySelectorAll('.sb-progbar')[curLesson];
  if(sbBar) sbBar.style.width = lessonProgress[curLesson]+'%';
}

function schedNext(){
  clearTmr();
  pstart = Date.now();
  const s = LESSONS[curLesson].slides[curSlide];
  let speechDone = !voiceOn, timerDone = false;

  function tryAdv(){ if(speechDone&&timerDone) advance(); }
  speak(s.vo, ()=>{ speechDone=true; tryAdv(); });
  ptmr = setInterval(()=>updateProg(Math.min((Date.now()-pstart)/MIN_DUR*100, voiceOn?55:100)), 60);
  tmr = setTimeout(()=>{ timerDone=true; tryAdv(); }, MIN_DUR);
}

function advance(){
  clearTmr();
  const L = LESSONS[curLesson];
  if(curSlide+1 < L.slides.length){
    showSlide(curSlide+1);
    if(playing) schedNext();
  } else {
    lessonProgress[curLesson] = 100;
    updateMenu();
    const next = curLesson+1;
    if(next < LESSONS.length){ setTimeout(()=>renderLesson(next), 1200); }
    else stopPlay();
  }
}

function stopPlay(){ playing=false; document.getElementById('playBtn').textContent='▶'; clearTmr(); stopSpeak(); }
function togglePlay(){ playing?stopPlay():(playing=true, document.getElementById('playBtn').textContent='⏸', schedNext()); }
function nextSlide(){ clearTmr();stopSpeak(); const L=LESSONS[curLesson]; if(curSlide+1<L.slides.length){showSlide(curSlide+1);if(playing)schedNext();} else if(curLesson+1<LESSONS.length){renderLesson(curLesson+1);} }
function prevSlide(){ clearTmr();stopSpeak(); if(curSlide>0){showSlide(curSlide-1);if(playing)schedNext();} else if(curLesson>0){renderLesson(curLesson-1);} }
function clearTmr(){ clearTimeout(tmr); clearInterval(ptmr); }
function toggleVoice(){ voiceOn=!voiceOn; const btn=document.getElementById('voiceBtn'); btn.textContent=voiceOn?'🔊 Voix ON':'🔇 Voix OFF'; btn.classList.toggle('on',voiceOn); if(!voiceOn)stopSpeak(); }

/* — MENU — */
function updateMenu(){
  document.querySelectorAll('.sb-item').forEach((el,i)=>{
    el.classList.toggle('active',i===curLesson);
    el.classList.toggle('done', lessonProgress[i]===100);
    const b = el.querySelector('.sb-progbar');
    if(b) b.style.width = (lessonProgress[i]||0)+'%';
  });
}

const sbList = document.getElementById('sbList');
LESSONS.forEach((l,i)=>{
  const el = document.createElement('div');
  el.className = 'sb-item';
  el.innerHTML = `<div class="sb-num">L${String(i+1).padStart(2,'0')}</div><div class="sb-title">${l.title}</div><div class="sb-prog"><div class="sb-progbar" style="width:0%"></div></div>`;
  el.onclick = ()=>renderLesson(i);
  sbList.appendChild(el);
});

/* — START — */
function startApp(){
  // Wake up audio context with user interaction
  const u = new SpeechSynthesisUtterance('');
  synth.speak(u);
  synth.cancel();

  const landing = document.getElementById('landing');
  const app = document.getElementById('app');
  landing.classList.add('out');
  setTimeout(()=>{
    landing.style.display='none';
    app.classList.add('in');
    renderLesson(0);
  }, 600);
}
</script>
