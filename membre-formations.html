<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formations — Club SBW</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sbw-tracker.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#FAFAF8;--ink:#111110;--surface:#F2F0EC;--subtle:rgba(0,0,0,0.08);--muted:#888;--gold:#A67C3A;--red:#C0392B;--dark:#0E0D0B}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:100px}
a{text-decoration:none;color:inherit}

/* ── Nav ── */
nav{background:var(--dark);height:54px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-logo{font-family:"DM Serif Display",serif;color:#fff;font-size:1.1rem}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-user{font-size:0.75rem;color:rgba(255,255,255,0.4)}
.btn-logout{background:none;border:0.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);padding:4px 12px;border-radius:4px;font-size:0.72rem;cursor:pointer;font-family:inherit}
.btn-logout:hover{border-color:rgba(255,255,255,.4);color:#fff}

/* ── Main ── */
.main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
.page-head{margin-bottom:2.5rem}
.page-title{font-family:"DM Serif Display",serif;font-size:1.8rem;margin-bottom:4px}
.page-sub{font-size:0.85rem;color:var(--muted)}

/* ── Global progress ── */
.global-bar{background:var(--surface);border-radius:10px;padding:16px 20px;margin-bottom:2.5rem;display:flex;align-items:center;gap:16px}
.gbar-wrap{flex:1;height:6px;background:var(--subtle);border-radius:3px;overflow:hidden}
.gbar-fill{height:100%;background:var(--gold);border-radius:3px;transition:width 0.4s}
.gbar-label{font-size:0.78rem;color:var(--muted);flex-shrink:0}
.gbar-pct{font-size:0.78rem;font-weight:600;color:var(--ink);flex-shrink:0;min-width:32px;text-align:right}

/* ── Formation group ── */
.f-group{margin-bottom:3rem}
.f-group-head{display:flex;align-items:baseline;gap:12px;margin-bottom:1.2rem;padding-bottom:12px;border-bottom:0.5px solid var(--subtle)}
.f-group-title{font-family:"DM Serif Display",serif;font-size:1.1rem}
.f-group-badge{font-size:0.65rem;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-html{background:rgba(99,91,255,0.1);color:#635BFF}
.badge-video{background:rgba(192,57,43,0.08);color:var(--red)}
.badge-ext{background:rgba(166,124,58,0.1);color:var(--gold)}
.f-group-count{font-size:0.75rem;color:var(--muted);margin-left:auto}

/* ── Module grid ── */
.m-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* ── Module card ── */
.m-card{background:#fff;border-radius:12px;border:0.5px solid var(--subtle);overflow:hidden;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s,border-color 0.15s;display:flex;flex-direction:column}
.m-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.09);border-color:rgba(0,0,0,0.15)}
.m-card-cover{width:100%;aspect-ratio:16/9;background:var(--dark);position:relative;overflow:hidden;flex-shrink:0}
.m-card-cover img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.m-card-cover-icon{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.m-card-cover-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,0.3))}
.m-card-body{padding:16px;flex:1;display:flex;flex-direction:column;gap:8px}
.m-card-title{font-size:0.92rem;font-weight:600;line-height:1.3;color:var(--ink)}
.m-card-cover-gradient{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.m-card-cover-emoji{font-size:2.5rem;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4))}
.m-card-cover-stats{font-size:.68rem;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.05em;background:rgba(0,0,0,.3);padding:3px 10px;border-radius:10px}
.m-card-sub{font-size:.75rem;color:var(--muted);line-height:1.4;margin-top:-2px}
.m-card-stats{font-size:0.72rem;color:var(--muted)}
.m-card-divider{height:0.5px;background:var(--subtle)}
.m-card-prog{display:flex;flex-direction:column;gap:4px}
.prog-bar{height:5px;background:var(--subtle);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--gold);border-radius:3px;transition:width 0.4s}
.prog-label{display:flex;justify-content:space-between;font-size:0.68rem;color:var(--muted)}
.m-card-btn{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--dark);color:#fff;padding:9px;border-radius:7px;font-size:0.8rem;font-weight:500;border:none;cursor:pointer;font-family:inherit;margin-top:auto;transition:background 0.15s;text-decoration:none}
.m-card-btn:hover{background:#222}
.m-card-btn.gold{background:var(--gold)}
.m-card-btn.gold:hover{background:#8a6630}

/* ── Vue détail (formations vidéo) ── */
#viewDetail{display:none;height:calc(100vh - 54px);overflow:hidden}
.detail-layout{display:grid;grid-template-columns:300px 1fr;height:100%;overflow:hidden}
.detail-sidebar{border-right:0.5px solid var(--subtle);overflow-y:auto;display:flex;flex-direction:column}
.detail-sidebar-head{padding:14px 16px;border-bottom:0.5px solid var(--subtle);position:sticky;top:0;background:var(--bg);z-index:1;flex-shrink:0}
.detail-back{font-size:0.78rem;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;margin-bottom:8px}
.detail-back:hover{color:var(--ink)}
.detail-title{font-family:"DM Serif Display",serif;font-size:1rem;line-height:1.3}
.mod-section{padding:8px;border-bottom:0.5px solid var(--subtle)}
.mod-section-title{font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);padding:8px 8px 4px}
.lecon-btn{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;cursor:pointer;transition:background 0.1s;width:100%;border:none;background:none;font-family:inherit;text-align:left}
.lecon-btn:hover{background:var(--surface)}
.lecon-btn.active{background:var(--ink);color:#fff}
.lecon-btn-num{font-size:0.65rem;color:inherit;opacity:0.5;width:18px;flex-shrink:0;text-align:right}
.lecon-btn-title{font-size:0.82rem;flex:1;line-height:1.3}
.lecon-btn-done{font-size:0.7rem;color:#5DBE7A;flex-shrink:0}
.detail-player{overflow-y:auto;display:flex;flex-direction:column}
.video-box{width:100%;height:0;padding-bottom:56.25%;background:#000;position:relative}.video-box>*{position:absolute;inset:0;width:100%;height:100%}
.no-video{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:rgba(255,255,255,.3);font-size:.82rem}
.vthumb{width:100%;height:100%;position:relative;cursor:pointer}
.vthumb img{width:100%;height:100%;object-fit:cover;display:block}
.vplay-overlay{position:absolute;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center}
.vplay-btn{width:52px;height:52px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center}
.vplay-tri{width:0;height:0;border-top:10px solid transparent;border-bottom:10px solid transparent;border-left:18px solid #fff;margin-left:4px}
.lecon-content{padding:24px;flex:1}
.lecon-content-title{font-family:"DM Serif Display",serif;font-size:1.2rem;margin-bottom:16px}
.lecon-content-body{font-size:0.88rem;line-height:1.75;color:#333}
.lecon-content-body h2{font-size:1rem;font-weight:600;margin:1.2rem 0 .5rem}
.lecon-content-body h3{font-size:.9rem;font-weight:600;margin:1rem 0 .4rem}
.lecon-content-body p{margin-bottom:.8rem}
.lecon-content-body ul{margin:.4rem 0 .8rem 1.2rem}
.lecon-content-body li{margin-bottom:.3rem}
.lecon-content-body a{color:var(--gold);text-decoration:underline;text-underline-offset:2px}
.lecon-content-body blockquote{border-left:3px solid var(--gold);padding:8px 14px;background:rgba(166,124,58,.06);border-radius:0 6px 6px 0;margin:1rem 0}
.tool-card{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border:1px solid var(--subtle);border-radius:9px;margin:1rem 0;text-decoration:none;color:inherit;transition:border-color .15s}
.tool-card:hover{border-color:var(--gold)}
.tool-card-name{font-weight:600;font-size:.88rem;margin-bottom:2px}
.tool-card-desc{font-size:.72rem;color:var(--muted)}
.tool-card-cta{font-size:.75rem;font-weight:500;color:var(--gold);white-space:nowrap;border:1px solid rgba(166,124,58,.3);padding:4px 10px;border-radius:4px;flex-shrink:0}
.done-bar{padding:14px 24px;border-top:0.5px solid var(--subtle);display:flex;gap:10px;flex-shrink:0}
.btn-done{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:7px;font-size:.82rem;font-weight:500;cursor:pointer;border:0.5px solid var(--subtle);background:var(--bg);font-family:inherit;transition:all .15s}
.btn-done:hover{background:var(--surface)}
.btn-done.completed{background:#f0faf4;border-color:#5DBE7A;color:#2d8a4e}
.btn-next{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:7px;font-size:.82rem;font-weight:500;cursor:pointer;border:none;background:var(--dark);color:#fff;font-family:inherit;transition:background .15s}
.btn-next:hover{background:#222}

/* ── Bottom nav mobile ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--dark);height:64px;padding:0 8px;align-items:center;justify-content:space-around;z-index:200;border-top:0.5px solid rgba(255,255,255,.08)}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;color:rgba(255,255,255,.4);cursor:pointer;font-size:.6rem;border:none;background:none;font-family:inherit}
.bn-item.active{color:var(--gold)}
.bn-item svg{width:22px;height:22px}

@media(max-width:768px){
  .main{padding:1.5rem 1rem}
  .m-grid{grid-template-columns:1fr 1fr;gap:10px}
  .detail-layout{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .detail-sidebar{display:none}
  .bottom-nav{display:flex}
  body{padding-bottom:80px}
}
@media(max-width:480px){
  .m-grid{grid-template-columns:1fr}
}
/* ── Overlay formation HTML ── */
#formationOverlay{display:none;position:fixed;inset:0;z-index:9999;background:#000;flex-direction:column}
#formationOverlay.open{display:flex}
.overlay-bar{height:48px;background:#0E0D0B;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;border-bottom:0.5px solid rgba(255,255,255,.1)}
.overlay-bar-title{font-size:.85rem;color:rgba(255,255,255,.6);font-weight:500}
.overlay-close{background:none;border:0.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.overlay-close:hover{background:rgba(255,255,255,.1);color:#fff}
#overlayFrame{flex:1;border:none;width:100%;height:100%}
}
/* Overlay visible uniquement quand .open — déjà géré par CSS */
</style>
</head>

<script>
var SB = supabase.createClient(
  'https://grwimhqsthcmfwblwdwg.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyd2ltaHFzdGhjbWZ3Ymx3ZHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTA5NDIsImV4cCI6MjA5MDA2Njk0Mn0.faK7rX_1OElj5g28NJyAkhucvJIX1R8scopOZ8TRKXc'
);

var user = null, prog = {}, allData = [];
var curModule = null, curLecon = null, curModLecons = [];
var EMOJIS = ['📚','🎯','⚡','🚀','💡','🌍','💼','🔥','📈','🎓'];

// ═══ PLAN LEVELS ═══
var PLAN_LEVELS = { 'inscrit': 2, 'intro': 2, 'basic': 2, 'pro': 3, 'business': 4 };
var userPlan = 'basic';
var userPlanLevel = 2;

// Le champ f.plan de la base Supabase détermine le plan requis (basic, pro, business)

// ═══ INIT ═══
async function init() {
  var s = await SB.auth.getSession();
  if (!s.data.session) { window.location.href = 'client-login.html'; return; }
  user = s.data.session.user;
  var fullName = user.user_metadata?.full_name || '';
  var firstName = fullName ? fullName.split(' ')[0] : user.email.split('@')[0];
  document.getElementById('navUser').textContent = firstName;
  document.getElementById('logoutBtn').onclick = async function() {
    await SB.auth.signOut(); window.location.href = 'client-login.html';
  };
  // Récupérer le plan du membre (par ID, puis fallback email)
  var { data: memberData } = await SB.from('members').select('plan, trial_plan, trial_expires_at').eq('id', user.id).single();
  if (!memberData && user.email) {
    var { data: memberByEmail } = await SB.from('members').select('plan, trial_plan, trial_expires_at').eq('email', user.email).maybeSingle();
    if (memberByEmail) {
      await SB.from('members').update({ id: user.id }).eq('email', user.email);
      memberData = memberByEmail;
    }
  }
  // Si pas de membre, créer avec basic
  if (!memberData) {
    await SB.from('members').upsert({
      id: user.id,
      email: user.email,
      full_name: fullName,
      plan: 'basic',
      created_at: new Date().toISOString()
    }, { onConflict: 'id' });
    memberData = { plan: 'basic' };
  }
  // Déterminer le plan effectif
  var effectivePlan = memberData.plan;
  // Trial prestige actif → utiliser le plan trial
  var trialActif = memberData.trial_plan && memberData.trial_expires_at &&
                   new Date(memberData.trial_expires_at) > new Date();
  if (trialActif) effectivePlan = memberData.trial_plan;
  // Plans inconnus (cancelled, trial, etc.) → fallback basic
  if (effectivePlan && PLAN_LEVELS[effectivePlan]) {
    userPlan = effectivePlan;
    userPlanLevel = PLAN_LEVELS[effectivePlan];
  } else {
    userPlan = 'basic';
    userPlanLevel = 2;
  }
  // Admin → accès total
  var { data: userData } = await SB.from('users').select('role').eq('id', user.id).single();
  if (userData?.role === 'admin') userPlanLevel = 99;

  try { prog = JSON.parse(localStorage.getItem('sbw_p_' + user.id) || '{}'); } catch(e) { prog = {}; }
  await loadAll();
}

// ═══ CHARGEMENT ═══
async function loadAll() {
  var r = await SB.from('formations')
    .select('*, modules(*, lecons(*))')
    .eq('status', 'published')
    .order('position');

  allData = (r.data || []).map(function(f) {
    if (!f.type) f.type = 'video';
    f.modules = (f.modules || [])
      .sort(function(a,b){return a.position-b.position;})
      .map(function(m) {
        // Corriger l'ancienne URL Vercel → nouveau domaine
        if (m.html_url) {
          m.html_url = m.html_url
            .replace('https://www.startbusinessworld.com/', 'https://www.startbusinessworld.com/')
            .replace('http://start-business-world.vercel.app/', 'https://www.startbusinessworld.com/');
        }
        if (m.html_url) {
          m.html_url = m.html_url.replace('https://start-business-world.vercel.app/', 'https://www.startbusinessworld.com/');
        }
        m.lecons = (m.lecons || []).sort(function(a,b){return a.position-b.position;});
        return m;
      });
    if (f.type === 'video' && f.modules.some(function(m){return !!m.html_url;})) {
      f.type = 'html';
    }
    return f;
  });

  renderAll();
}

// ═══ UPGRADE ═══
async function doUpgrade(plan) {
  try {
    var s = await SB.auth.getSession();
    if (!s.data.session) { window.location.href = 'client-login.html'; return; }
    var res = await fetch('https://grwimhqsthcmfwblwdwg.supabase.co/functions/v1/upgrade-plan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + s.data.session.access_token },
      body: JSON.stringify({ plan: plan })
    });
    var data = await res.json();
    if (data.url) { window.location.href = data.url; }
    else if (data.success) { window.location.reload(); }
    else { alert('Erreur: ' + (data.error || 'Réessaie')); }
  } catch(e) { alert('Erreur: ' + e.message); }
}

// ═══ LOCK CARD ═══
function applyLock(card, reqPlan) {
  var planName = reqPlan.charAt(0).toUpperCase() + reqPlan.slice(1);
  var prices = { 'pro': '79', 'business': '149' };
  var price = prices[reqPlan] || '79';

  card.style.position = 'relative';
  card.style.overflow = 'hidden';

  var lock = document.createElement('div');
  lock.style.cssText = 'position:absolute;inset:0;z-index:10;background:rgba(0,0,0,0.6);backdrop-filter:blur(3px);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;cursor:pointer';
  lock.innerHTML = '<div style="font-size:2rem;margin-bottom:8px">🔒</div>'
    + '<div style="color:#fff;font-size:0.85rem;font-weight:600;margin-bottom:4px">Plan ' + planName + '</div>'
    + '<div style="color:rgba(255,255,255,0.6);font-size:0.72rem;margin-bottom:12px">' + price + '€/mois</div>'
    + '<div style="background:#A67C3A;color:#fff;padding:10px 24px;border-radius:6px;font-size:0.82rem;font-weight:500">Passer au plan ' + planName + ' →</div>';

  lock.onclick = function(e) {
    e.stopPropagation();
    lock.querySelector('div:last-child').textContent = 'Chargement...';
    doUpgrade(reqPlan);
  };

  card.appendChild(lock);

  var btns = card.querySelectorAll('button, a');
  for (var i = 0; i < btns.length; i++) { btns[i].style.pointerEvents = 'none'; }
}

// ═══ RENDER PRINCIPAL ═══
function renderAll() {
  var container = document.getElementById('formationsContainer');
  var totalDone = 0, totalAll = 0;

  if (!allData.length) {
    container.innerHTML = '<div style="color:var(--muted);font-size:.85rem">Aucune formation disponible pour le moment.</div>';
    return;
  }

  container.innerHTML = '';

  var grid = document.createElement('div');
  grid.className = 'm-grid';

  allData.forEach(function(f, fi) {
    // Vérifier si la formation nécessite un plan supérieur
    var reqPlan = f.plan || 'basic';
    var reqLevel = PLAN_LEVELS[reqPlan] || 2;
    var isLocked = userPlanLevel < reqLevel;

    if (f.type === 'external') {
      var card = makeExtCard(f, fi);
      if (isLocked) applyLock(card, reqPlan);
      grid.appendChild(card);
    } else {
      f.modules.forEach(function(m, mi) {
        var prog_data = getModuleProgress(f, m);
        if (!isLocked) { totalDone += prog_data.done; totalAll += prog_data.total; }
        var card = makeModuleCard(f, m, mi + fi * 10, prog_data);
        if (isLocked) applyLock(card, reqPlan);
        grid.appendChild(card);
      });
    }
  });

  container.appendChild(grid);

  var globalProg = window.SBW_getAllFormationsProgress ? SBW_getAllFormationsProgress() : { totalDone: totalDone, totalLessons: totalAll, pct: totalAll > 0 ? Math.round(totalDone/totalAll*100) : 0 };
  var pct = globalProg.pct;
  setTimeout(function() { document.getElementById('gbarFill').style.width = pct + '%'; }, 200);
  document.getElementById('gbarLabel').textContent = globalProg.totalDone + '/' + (globalProg.totalLessons || totalAll) + ' leçons';
  document.getElementById('gbarPct').textContent = pct + '%';
}

// ── Progression d'un module ──
function getModuleProgress(f, m) {
  if (m.html_url) {
    // Lire depuis localStorage (SBW Tracker)
    // Extraire le nom du fichier sans le param ?lesson=N
    var urlBase = m.html_url.split('?')[0];
    var filename = urlBase.split('/').pop().replace('.html', '');
    var key = 'sbw_tracker__' + filename;
    var data = {};
    try { data = JSON.parse(localStorage.getItem(key) || '{}'); } catch(e) {}

    // Si l'URL a un param lesson, vérifier cette leçon spécifique (0-based)
    var lessonParam = m.html_url.indexOf('?lesson=') > -1
      ? parseInt(m.html_url.split('?lesson=')[1]) - 1
      : null;

    if (lessonParam !== null) {
      // Carte = 1 leçon
      var done = data[lessonParam] === true ? 1 : 0;
      return { done: done, total: 1, pct: done * 100 };
    }

    var total = data._total || 0;
    var done = Object.keys(data).filter(function(k) {
      return k !== '_total' && k !== '_updated' && data[k] === true;
    }).length;
    return { done: done, total: total, pct: total > 0 ? Math.round(done / total * 100) : 0 };
  } else if (f.type === 'video') {
    // Lire depuis localStorage (prog)
    var total = m.lecons.length;
    var done = m.lecons.filter(function(l) { return !!prog[l.id]; }).length;
    return { done: done, total: total, pct: total > 0 ? Math.round(done / total * 100) : 0 };
  }
  return { done: 0, total: 0, pct: 0 };
}

// ── Card module (html ou vidéo) ──
function makeModuleCard(f, m, idx, progData) {
  var card = document.createElement('div');
  card.className = 'm-card';

  // Cover — formation cover > module cover > gradient par défaut
  var cover = document.createElement('div');
  cover.className = 'm-card-cover';
  var imgSrc = f.cover_url || m.cover_url || '';
  if (imgSrc) {
    cover.innerHTML = '<img src="' + imgSrc + '" alt="" loading="lazy"><div class="m-card-cover-overlay"></div>';
  } else {
    // Gradient par défaut basé sur la position
    var gradients = [
      'linear-gradient(135deg,#8B0000 0%,#3a0000 100%)',
      'linear-gradient(135deg,#1e3a8a 0%,#1e1b4b 100%)',
      'linear-gradient(135deg,#831843 0%,#500724 100%)',
      'linear-gradient(135deg,#14532d 0%,#052e16 100%)',
      'linear-gradient(135deg,#064e3b 0%,#022c22 100%)',
    ];
    var grad = gradients[f.position ? (f.position - 1) % gradients.length : idx % gradients.length];
    var stats = f.extra_stats || m.extra_stats || '';
    cover.innerHTML = '<div class="m-card-cover-gradient" style="background:' + grad + '">' +
      '<div class="m-card-cover-emoji">' + EMOJIS[idx % EMOJIS.length] + '</div>' +
      (stats ? '<div class="m-card-cover-stats">' + stats + '</div>' : '') +
    '</div>';
  }
  card.appendChild(cover);

  // Body — titre formation + description
  var body = document.createElement('div');
  body.className = 'm-card-body';
  var displayTitle = f.title || m.title;
  var displaySub = f.description || m.extra_stats || '';
  body.innerHTML =
    '<div class="m-card-title">' + displayTitle + '</div>' +
    (displaySub ? '<div class="m-card-sub">' + displaySub.substring(0,90) + (displaySub.length>90?'…':'') + '</div>' : '') +
    '<div class="m-card-divider"></div>' +
    '<div class="m-card-prog">' +
      '<div class="prog-bar"><div class="prog-fill" style="width:' + progData.pct + '%"></div></div>' +
      '<div class="prog-label"><span>' + progData.pct + '% complété</span><span>' + (f.extra_stats || m.extra_stats || '') + '</span></div>' +
    '</div>';

  // Bouton
  var btn;
  if (m.html_url) {
    btn = document.createElement('button');
    btn.className = 'm-card-btn gold';
    btn.textContent = progData.pct > 0 ? '▶ Continuer' : '▶ Commencer';
    btn.addEventListener('click', (function(url, title) { return function(e) {
      e.stopPropagation();
      openFormationOverlay(url, title);
    }; })(m.html_url, m.title));
  } else {
    btn = document.createElement('button');
    btn.className = 'm-card-btn';
    btn.textContent = progData.pct > 0 ? '▶ Continuer' : '▶ Voir les leçons';
    btn.addEventListener('click', function(e) { e.stopPropagation(); openDetailModule(f, m); });
  }
  if (btn) body.appendChild(btn);
  card.appendChild(body);

  // Click card
  card.addEventListener('click', (function(url, title) { return function() {
    if (url) openFormationOverlay(url, title);
    else openDetailModule(f, m);
  }; })(m.html_url, m.title));

  return card;
}

// ── Card externe ──
function makeExtCard(f, idx) {
  var card = document.createElement('div');
  card.className = 'm-card';
  card.style.cursor = 'pointer';

  var cover = document.createElement('div');
  cover.className = 'm-card-cover';
  if (f.cover_url) {
    cover.innerHTML = '<img src="' + f.cover_url + '" alt="" loading="lazy"><div class="m-card-cover-overlay"></div>';
  } else {
    cover.innerHTML = '<div class="m-card-cover-icon">🔗</div>';
  }
  card.appendChild(cover);

  var body = document.createElement('div');
  body.className = 'm-card-body';
  body.innerHTML =
    '<div class="m-card-title">' + f.title + '</div>' +
    (f.description ? '<div class="m-card-stats" style="color:var(--muted);font-size:.78rem;line-height:1.5">' + f.description + '</div>' : '') +
    '<div class="m-card-divider"></div>';

  var btn = document.createElement('a');
  btn.href = f.external_url || '#';
  btn.target = '_blank';
  btn.rel = 'noopener';
  btn.className = 'm-card-btn gold';
  btn.textContent = '🔗 Accéder à la formation';
  btn.addEventListener('click', function(e) { e.stopPropagation(); });
  body.appendChild(btn);
  card.appendChild(body);

  card.addEventListener('click', function() {
    if (f.external_url) window.open(f.external_url, '_blank', 'noopener');
  });

  return card;
}

// ═══ VUE DÉTAIL (vidéo) ═══
function openDetailModule(f, m) {
  curModule = m;
  curLecon = null;
  curModLecons = m.lecons;

  document.getElementById('viewList').style.display = 'none';
  document.getElementById('viewDetail').style.display = 'block';
  document.getElementById('detailTitle').textContent = f.title + ' — ' + m.title;

  renderDetailSidebar(f);

  // Auto-ouvrir la première leçon non terminée
  var first = m.lecons.find(function(l) { return !prog[l.id]; }) || m.lecons[0];
  if (first) playLecon(first);
}

function renderDetailSidebar(f) {
  var el = document.getElementById('detailModules');
  el.innerHTML = '';

  // Afficher tous les modules de la formation dans la sidebar
  f.modules.forEach(function(m) {
    if (!m.lecons.length) return;
    var section = document.createElement('div');
    section.className = 'mod-section';
    var title = document.createElement('div');
    title.className = 'mod-section-title';
    title.textContent = m.title;
    section.appendChild(title);

    m.lecons.forEach(function(l, li) {
      var btn = document.createElement('button');
      btn.className = 'lecon-btn' + (curLecon && curLecon.id === l.id ? ' active' : '');
      btn.innerHTML =
        '<span class="lecon-btn-num">' + String(li+1).padStart(2,'0') + '</span>' +
        '<span class="lecon-btn-title">' + l.title + '</span>' +
        (prog[l.id] ? '<span class="lecon-btn-done">✓</span>' : '');
      btn.addEventListener('click', (function(lc) { return function() { playLecon(lc); }; })(l));
      section.appendChild(btn);
    });

    el.appendChild(section);
  });
}

function backToList() {
  document.getElementById('viewDetail').style.display = 'none';
  document.getElementById('viewList').style.display = 'block';
  renderAll(); // Refresh les progressions
}

// ═══ LECTEUR VIDÉO ═══
function playLecon(l) {
  curLecon = l;
  var box = document.getElementById('videoBox');

  if (l.youtube_id) {
    var id = l.youtube_id.split('?')[0].trim();
    box.innerHTML =
      '<div class="vthumb">' +
        '<img src="https://i.ytimg.com/vi/' + id + '/hqdefault.jpg" alt="">' +
        '<div class="vplay-overlay"><div class="vplay-btn"><div class="vplay-tri"></div></div></div>' +
      '</div>';
    var thumb = box.querySelector('.vthumb');
    if (thumb) {
      thumb.addEventListener('click', (function(vid) {
        return function() {
          box.innerHTML = '<iframe src="https://www.youtube.com/embed/' + vid + '?autoplay=1&rel=0" allowfullscreen allow="autoplay; encrypted-media" style="width:100%;height:100%;border:none;display:block"></iframe>';
        };
      })(id));
    }
  } else {
    box.innerHTML =
      '<div class="no-video">' +
        '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="2" width="20" height="20" rx="3"/><polygon points="10,8 16,12 10,16"/></svg>' +
        '<span>Leçon texte</span>' +
      '</div>';
  }

  // Contenu
  var content = document.getElementById('leconContent');
  content.innerHTML = '<div class="lecon-content-title">' + l.title + '</div>';
  if (l.content) {
    var bodyDiv = document.createElement('div');
    bodyDiv.className = 'lecon-content-body';
    renderContent(l.content, bodyDiv);
    content.appendChild(bodyDiv);
  }

  // Barre done
  document.getElementById('doneBar').style.display = 'flex';
  var btnDone = document.getElementById('btnDone');
  btnDone.textContent = prog[l.id] ? '✓ Terminée' : 'Marquer comme terminée';
  btnDone.className = 'btn-done' + (prog[l.id] ? ' completed' : '');

  // Bouton suivant
  var next = findNext();
  document.getElementById('btnNext').style.display = next ? 'flex' : 'none';

  // Refresh sidebar
  var f = allData.find(function(f) { return f.modules.some(function(m) { return m.id === curModule.id; }); });
  if (f) renderDetailSidebar(f);
}



function findNext() {
  if (!curModule || !curLecon) return null;
  var idx = curModLecons.findIndex(function(l) { return l.id === curLecon.id; });
  return idx >= 0 && idx < curModLecons.length - 1 ? curModLecons[idx + 1] : null;
}

function nextLecon() {
  var next = findNext();
  if (next) playLecon(next);
}

function toggleDone() {
  if (!curLecon) return;
  if (prog[curLecon.id]) {
    delete prog[curLecon.id];
  } else {
    prog[curLecon.id] = true;
    // XP
    SB.from('user_xp').select('*').eq('user_id', user.id).single().then(function(r) {
      var xp = (r.data ? r.data.xp : 0) + 10;
      SB.from('user_xp').upsert({ user_id: user.id, user_name: user.email.split('@')[0], xp: xp, lecons_done: (r.data?r.data.lecons_done:0)+1, last_active: new Date().toISOString() }).then(function(){});
    });
  }
  saveProgress();
  playLecon(curLecon);
}

function saveProgress() {
  try { localStorage.setItem('sbw_p_' + user.id, JSON.stringify(prog)); } catch(e) {}
}

// ═══ RENDU CONTENU ═══
function renderContent(text, container) {
  text.split('\n\n').forEach(function(p) {
    p = p.trim();
    if (!p) return;

    if (p.startsWith('[OUTIL:') && p.endsWith(']')) {
      var parts = p.slice(7, -1).split('|');
      var card = document.createElement('a');
      card.href = parts[2] || '#';
      card.target = '_blank';
      card.rel = 'noopener';
      card.className = 'tool-card';
      var left = document.createElement('div');
      var name = document.createElement('div'); name.className = 'tool-card-name'; name.textContent = parts[0] || '';
      var desc = document.createElement('div'); desc.className = 'tool-card-desc'; desc.textContent = parts[1] || '';
      left.appendChild(name); left.appendChild(desc);
      var cta = document.createElement('div'); cta.className = 'tool-card-cta'; cta.textContent = 'Découvrir →';
      card.appendChild(left); card.appendChild(cta);
      container.appendChild(card); return;
    }

    if (p.startsWith('## ')) { var h=document.createElement('h2');h.textContent=p.slice(3);container.appendChild(h);return; }
    if (p.startsWith('### ')) { var h=document.createElement('h3');h.textContent=p.slice(4);container.appendChild(h);return; }
    if (p.startsWith('> ')) { var bq=document.createElement('blockquote');bq.textContent=p.slice(2);container.appendChild(bq);return; }

    if (p.startsWith('- ')) {
      var ul=document.createElement('ul');
      p.split('\n').forEach(function(line) {
        if (!line.startsWith('- ')) return;
        var li=document.createElement('li'); li.innerHTML=fmtInline(line.slice(2));ul.appendChild(li);
      });
      container.appendChild(ul); return;
    }

    var el=document.createElement('p'); el.innerHTML=fmtInline(p); container.appendChild(el);
  });
}

function fmtInline(text) {
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  text = text.replace(/(https?:\/\/[^\s<"]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  return text;
}

function openFormationOverlay(url, title) {
  document.getElementById('overlayTitle').textContent = title || '';
  document.getElementById('overlayFrame').src = url;
  document.getElementById('formationOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  // History API — bouton retour ferme l'overlay au lieu de quitter la page
  history.pushState({ overlay: true }, '', '#formation');
}

window.addEventListener('popstate', function() {
  if (document.getElementById('formationOverlay').classList.contains('open')) {
    var frame = document.getElementById('overlayFrame');
    try {
      if (frame.contentWindow && frame.contentWindow.speechSynthesis) frame.contentWindow.speechSynthesis.cancel();
      if (frame.contentWindow && frame.contentWindow.synth) frame.contentWindow.synth.cancel();
    } catch(e) {}
    frame.src = '';
    document.getElementById('formationOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
});

function closeFormationOverlay() {
  var frame = document.getElementById('overlayFrame');
  try {
    if (frame.contentWindow && frame.contentWindow.speechSynthesis) {
      frame.contentWindow.speechSynthesis.cancel();
    }
    if (frame.contentWindow && frame.contentWindow.synth) {
      frame.contentWindow.synth.cancel();
    }
  } catch(e) {}
  frame.src = '';
  document.getElementById('formationOverlay').classList.remove('open');
  document.body.style.overflow = '';
  // Nettoyer le hash sans history.back() qui cause des boucles
  if (window.location.hash === '#formation') {
    history.replaceState(null, '', window.location.pathname);
  }
  renderAll(); // Rafraîchir les progressions
}

// Fermer avec Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeFormationOverlay();
});

// Écouter la fermeture depuis la formation
window.addEventListener('message', function(e) {
  if (e.data === 'sbw:close') {
    closeFormationOverlay();
    renderAll(); // Rafraîchir les progressions
  }
});

init();
</script>

<!-- Overlay formation HTML — plein écran, fermeture via X dans la formation -->
<div id="formationOverlay">
  <div class="overlay-bar">
    <span class="overlay-bar-title" id="overlayTitle"></span>
    <button class="overlay-close" onclick="closeFormationOverlay()" title="Fermer">✕</button>
  </div>
  <iframe id="overlayFrame" src="" allowfullscreen allow="autoplay; encrypted-media; microphone"></iframe>
</div>
