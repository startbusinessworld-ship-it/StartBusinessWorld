<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Club SBW</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0C0C0A;color:#F0EDE4;font-family:"DM Sans",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .spinner{width:36px;height:36px;border:3px solid rgba(166,124,58,.2);border-top-color:#A67C3A;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    p{font-size:.85rem;color:rgba(240,237,228,.4);text-align:center}
  </style>
</head>
<body>
<div>
  <div class="spinner"></div>
  <p>Connexion en cours...</p>
</div>
<script>
const sb = supabase.createClient(
  'https://grwimhqsthcmfwblwdwg.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyd2ltaHFzdGhjbWZ3Ymx3ZHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTA5NDIsImV4cCI6MjA5MDA2Njk0Mn0.faK7rX_1OElj5g28NJyAkhucvJIX1R8scopOZ8TRKXc'
)

const PLANS_PAYANTS = ['intro', 'basic', 'pro', 'business']

async function redirect(userId) {
  try {
    const { data: userData } = await sb.from('users').select('role').eq('id', userId).single()
    if (userData?.role === 'admin') {
      window.location.href = 'client-dashboard.html'
      return
    }
    const { data: member } = await sb.from('members').select('plan').eq('id', userId).single()
    if (member && PLANS_PAYANTS.includes(member.plan)) {
      window.location.href = 'client-dashboard.html'
    } else {
      window.location.href = 'plans.html'
    }
  } catch(e) {
    window.location.href = 'plans.html'
  }
}

// Supabase traite automatiquement le token dans le hash
sb.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    await redirect(session.user.id)
  }
})

// Vérifier aussi si session déjà active
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) redirect(session.user.id)
})

// Timeout de sécurité — si rien après 5s → login
setTimeout(() => {
  window.location.href = 'client-login.html'
}, 5000)
</script>
</body>
</html>
