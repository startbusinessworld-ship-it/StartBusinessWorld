<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Club SBW</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0C0C0A;color:#F0EDE4;font-family:"DM Sans",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .spinner{width:36px;height:36px;border:3px solid rgba(166,124,58,.2);border-top-color:#A67C3A;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    p{font-size:.85rem;color:rgba(240,237,228,.4);text-align:center}
  </style>
</head>
<body>
<div>
  <div class="spinner"></div>
  <p>Connexion en cours...</p>
</div>
<script>
const sb = supabase.createClient(
  'https://grwimhqsthcmfwblwdwg.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyd2ltaHFzdGhjbWZ3Ymx3ZHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTA5NDIsImV4cCI6MjA5MDA2Njk0Mn0.faK7rX_1OElj5g28NJyAkhucvJIX1R8scopOZ8TRKXc'
)

async function redirect(session) {
  var user = session.user
  try {
    // Admin → dashboard direct
    var { data: userData } = await sb.from('users').select('role').eq('id', user.id).single()
    if (userData?.role === 'admin') {
      window.location.href = 'client-dashboard.html'
      return
    }

    // Chercher membre par ID
    var { data: member } = await sb.from('members').select('plan').eq('id', user.id).single()

    // Pas trouvé → chercher par email
    if (!member) {
      var { data: memberByEmail } = await sb.from('members').select('id, plan').eq('email', user.email).maybeSingle()
      if (memberByEmail) {
        await sb.from('members').update({ id: user.id, email: user.email }).eq('id', memberByEmail.id)
        member = memberByEmail
      }
    }

    // Toujours pas de membre → le créer avec plan basic (inscription gratuite)
    if (!member) {
      var fullName = user.user_metadata?.full_name || user.user_metadata?.name || ''
      await sb.from('members').upsert({
        id: user.id,
        email: user.email,
        full_name: fullName,
        plan: 'basic',
        created_at: new Date().toISOString()
      }, { onConflict: 'id' })
    }

    // Accès direct au dashboard
    window.location.href = 'client-dashboard.html'

  } catch(e) {
    console.error('Auth callback error:', e)
    window.location.href = 'client-dashboard.html'
  }
}

sb.auth.onAuthStateChange(async (event, session) => {
  if (session) await redirect(session)
})

sb.auth.getSession().then(({ data: { session } }) => {
  if (session) redirect(session)
})

setTimeout(() => { window.location.href = 'client-login.html' }, 8000)
</script>
</body>
</html>
