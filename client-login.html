<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rejoindre le Club SBW</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0C0C0A;color:#F0EDE4;font-family:"DM Sans",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;position:relative;overflow:hidden}
    :root{--gold:#A67C3A}

    /* Fond dashboard flouté */
    .bg-dashboard{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;filter:blur(8px);opacity:.35;transform:scale(1.05)}
    .bg-dash-nav{height:54px;background:#141412;border-bottom:0.5px solid rgba(255,255,255,.08);display:flex;align-items:center;padding:0 1.5rem;gap:16px}
    .bg-dash-dot{width:8px;height:8px;border-radius:50%;background:rgba(166,124,58,.6)}
    .bg-dash-logo{font-family:"DM Serif Display",serif;font-size:1rem;color:rgba(240,237,228,.8);margin-right:auto}
    .bg-dash-layout{display:flex;height:calc(100vh - 54px)}
    .bg-dash-sidebar{width:220px;background:#111;border-right:0.5px solid rgba(255,255,255,.06);padding:1rem;flex-shrink:0}
    .bg-dash-item{height:36px;border-radius:7px;margin-bottom:6px;background:rgba(255,255,255,.04)}
    .bg-dash-item.active{background:rgba(166,124,58,.12);border:0.5px solid rgba(166,124,58,.2)}
    .bg-dash-content{flex:1;padding:1.5rem;display:flex;flex-direction:column;gap:16px}
    .bg-dash-banner{height:80px;border-radius:12px;background:linear-gradient(135deg,rgba(166,124,58,.15),rgba(166,124,58,.05));border:0.5px solid rgba(166,124,58,.15)}
    .bg-dash-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .bg-dash-stat{height:70px;border-radius:10px;background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.06)}
    .bg-dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;flex:1}
    .bg-dash-card{border-radius:12px;background:rgba(255,255,255,.03);border:0.5px solid rgba(255,255,255,.06)}
    .bg-dash-card-head{height:40px;border-bottom:0.5px solid rgba(255,255,255,.06);margin:0 16px}
    .bg-dash-line{height:10px;border-radius:5px;background:rgba(255,255,255,.06);margin:12px 16px}
    .bg-dash-line.short{width:60%}

    /* Overlay sombre */
    .bg-overlay{position:fixed;inset:0;z-index:1;background:rgba(12,12,10,.75)}

    /* Contenu au dessus */
    .wrap{width:100%;max-width:400px;position:relative;z-index:2}
    .logo{font-family:"DM Serif Display",serif;font-size:1.3rem;text-align:center;margin-bottom:.3rem}
    .badge{text-align:center;font-size:.62rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:2rem}
    .card{background:rgba(20,20,18,.95);border:0.5px solid rgba(255,255,255,.1);border-radius:14px;padding:2rem;backdrop-filter:blur(20px)}
    .card-title{font-family:"DM Serif Display",serif;font-size:1.4rem;margin-bottom:.3rem;text-align:center}
    .card-sub{font-size:.78rem;color:rgba(240,237,228,.4);text-align:center;margin-bottom:1.5rem;line-height:1.5}
    .field{margin-bottom:1rem}
    .field label{display:block;font-size:.72rem;color:rgba(240,237,228,.5);margin-bottom:5px;font-weight:500}
    .field input{width:100%;background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.1);border-radius:8px;padding:11px 14px;color:#F0EDE4;font-family:"DM Sans",sans-serif;font-size:.88rem;outline:none;transition:border-color .15s}
    .field input:focus{border-color:var(--gold)}
    .field input::placeholder{color:rgba(240,237,228,.2)}
    .btn-primary{width:100%;padding:13px;border-radius:8px;border:none;background:var(--gold);color:#fff;font-family:"DM Sans",sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .15s;margin-top:.3rem}
    .btn-primary:hover{opacity:.88}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed}
    .sep{text-align:center;font-size:.72rem;color:rgba(240,237,228,.2);margin:1.3rem 0;position:relative}
    .sep::before,.sep::after{content:'';position:absolute;top:50%;width:44%;height:0.5px;background:rgba(255,255,255,.08)}
    .sep::before{left:0}.sep::after{right:0}
    .btn-google{width:100%;padding:12px;border-radius:8px;border:0.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#F0EDE4;font-family:"DM Sans",sans-serif;font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s;font-weight:500}
    .btn-google:hover{background:rgba(255,255,255,.08)}
    .error{background:rgba(192,57,43,.15);border:0.5px solid rgba(192,57,43,.3);border-radius:7px;padding:9px 12px;font-size:.78rem;color:#F09595;margin-bottom:1rem;display:none}
    .switch-cta{text-align:center;font-size:.78rem;color:rgba(240,237,228,.35);margin-top:1.3rem}
    .switch-cta a{color:var(--gold);cursor:pointer;text-decoration:none;font-weight:500}
    .back{text-align:center;margin-top:1.5rem;font-size:.75rem}
    .back a{color:rgba(240,237,228,.3);text-decoration:none}
    .back a:hover{color:rgba(240,237,228,.6)}
  </style>
</head>
<body>
<!-- FOND DASHBOARD FLOUTÉ -->
<div class="bg-dashboard">
  <div class="bg-dash-nav">
    <div class="bg-dash-dot"></div>
    <div class="bg-dash-logo">Start Business World</div>
    <div class="bg-dash-dot"></div>
    <div class="bg-dash-dot"></div>
  </div>
  <div class="bg-dash-layout">
    <div class="bg-dash-sidebar">
      <div class="bg-dash-item active"></div>
      <div class="bg-dash-item"></div>
      <div class="bg-dash-item"></div>
      <div class="bg-dash-item"></div>
      <div class="bg-dash-item"></div>
      <div class="bg-dash-item"></div>
    </div>
    <div class="bg-dash-content">
      <div class="bg-dash-banner"></div>
      <div class="bg-dash-stats">
        <div class="bg-dash-stat"></div>
        <div class="bg-dash-stat"></div>
        <div class="bg-dash-stat"></div>
        <div class="bg-dash-stat"></div>
      </div>
      <div class="bg-dash-grid">
        <div class="bg-dash-card">
          <div class="bg-dash-card-head"></div>
          <div class="bg-dash-line"></div>
          <div class="bg-dash-line short"></div>
          <div class="bg-dash-line"></div>
          <div class="bg-dash-line short"></div>
        </div>
        <div class="bg-dash-card">
          <div class="bg-dash-card-head"></div>
          <div class="bg-dash-line short"></div>
          <div class="bg-dash-line"></div>
          <div class="bg-dash-line short"></div>
          <div class="bg-dash-line"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="bg-overlay"></div>

<div class="wrap">
  <div class="logo">Start Business World</div>
  <div class="badge">Le Club SBW</div>
  <div class="card">
    <div class="card-title" id="cardTitle">Créer mon compte</div>
    <div class="card-sub" id="cardSub">Rejoins le Club SBW — accès immédiat après paiement.</div>
    <div class="error" id="errorMsg"></div>
    <div id="mainForm">
      <div class="field" id="prenomField">
        <label>Prénom</label>
        <input type="text" id="inputPrenom" placeholder="Ton prénom" autocomplete="given-name">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="inputEmail" placeholder="ton@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label id="pwLabel">Choisis un mot de passe</label>
        <input type="password" id="inputPassword" placeholder="8 caractères minimum" autocomplete="new-password">
      </div>
      <button class="btn-primary" id="mainBtn" onclick="handleSubmit()">Créer mon compte →</button>
      <div class="sep">ou</div>
      <button class="btn-google" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuer avec Google
      </button>
    </div>
    <div class="switch-cta" id="switchCta">
      Déjà membre ? <a onclick="toggleMode()">Se connecter →</a>
    </div>
  </div>
  <div class="back"><a href="index.html">← Retour au site</a></div>
</div>
<script>
const SUPABASE_URL = 'https://grwimhqsthcmfwblwdwg.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyd2ltaHFzdGhjbWZ3Ymx3ZHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTA5NDIsImV4cCI6MjA5MDA2Njk0Mn0.faK7rX_1OElj5g28NJyAkhucvJIX1R8scopOZ8TRKXc'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// Détecter mode login depuis URL
var isLoginMode = new URLSearchParams(window.location.search).get('mode') === 'login'

// Si session active → rediriger selon plan
;(async function() {
  const { data: { session } } = await sb.auth.getSession()
  if (session) {
    await redirectUser(session.user.id)
  }
  if (isLoginMode) toggleMode()
})()

async function redirectUser(userId) {
  // Vérifier le plan du membre
  const { data: member } = await sb.from('members').select('plan, role').eq('id', userId).single()
  const plansPayants = ['intro', 'basic', 'pro', 'business']
  
  // Vérifier si admin
  const { data: userData } = await sb.from('users').select('role').eq('id', userId).single()
  if (userData?.role === 'admin') {
    window.location.href = 'client-dashboard.html'
    return
  }
  
  if (member && plansPayants.includes(member.plan)) {
    window.location.href = 'client-dashboard.html'
  } else {
    window.location.href = 'plans.html'
  }
}

function toggleMode() {
  isLoginMode = !isLoginMode
  document.getElementById('prenomField').style.display = isLoginMode ? 'none' : 'block'
  document.getElementById('cardTitle').textContent = isLoginMode ? 'Se connecter' : 'Créer mon compte'
  document.getElementById('cardSub').textContent = isLoginMode ? 'Accède à ton espace Club SBW.' : 'Rejoins le Club SBW — accès immédiat après paiement.'
  document.getElementById('mainBtn').textContent = isLoginMode ? 'Se connecter →' : 'Créer mon compte →'
  document.getElementById('pwLabel').textContent = isLoginMode ? 'Mot de passe' : 'Choisis un mot de passe'
  document.getElementById('inputPassword').placeholder = isLoginMode ? 'Ton mot de passe' : '8 caractères minimum'
  document.getElementById('inputPassword').autocomplete = isLoginMode ? 'current-password' : 'new-password'
  document.getElementById('switchCta').innerHTML = isLoginMode
    ? 'Pas encore membre ? <a onclick="toggleMode()">Créer un compte →</a>'
    : 'Déjà membre ? <a onclick="toggleMode()">Se connecter →</a>'
  document.getElementById('errorMsg').style.display = 'none'
}

function showError(msg) {
  var el = document.getElementById('errorMsg')
  el.textContent = msg
  el.style.display = 'block'
}

async function handleSubmit() {
  var email = document.getElementById('inputEmail').value.trim()
  var password = document.getElementById('inputPassword').value
  var prenom = document.getElementById('inputPrenom').value.trim()

  if (!isLoginMode && !prenom) { showError('Entre ton prénom.'); return }
  if (!email) { showError('Entre ton email.'); return }
  if (!password) { showError('Entre ton mot de passe.'); return }
  if (!isLoginMode && password.length < 8) { showError('Mot de passe trop court (8 min).'); return }

  var btn = document.getElementById('mainBtn')
  btn.disabled = true
  btn.textContent = 'Chargement...'
  document.getElementById('errorMsg').style.display = 'none'

  try {
    if (isLoginMode) {
      // CONNEXION
      var { data, error } = await sb.auth.signInWithPassword({ email, password })
      if (error) { showError('Email ou mot de passe incorrect.'); return }
      await redirectUser(data.user.id)
    } else {
      // INSCRIPTION
      var { data, error } = await sb.auth.signUp({
        email, password,
        options: { data: { full_name: prenom, prenom: prenom } }
      })
      if (error) { showError(error.message); return }
      if (data.user) {
        // Créer profil members
        await sb.from('members').upsert({
          id: data.user.id,
          email: email,
          full_name: prenom,
          plan: 'inscrit',
          created_at: new Date().toISOString()
        }, { onConflict: 'id' })
        // Toujours vers plans.html après inscription
        window.location.href = 'plans.html'
      }
    }
  } catch(e) {
    showError('Une erreur est survenue. Réessaie.')
  } finally {
    btn.disabled = false
    btn.textContent = isLoginMode ? 'Se connecter →' : 'Créer mon compte →'
  }
}

async function loginGoogle() {
  var { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/client-login.html' }
  })
  if (error) showError(error.message)
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleSubmit()
})
</script>
</body>
</html>
