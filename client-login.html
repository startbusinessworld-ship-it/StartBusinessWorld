<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Club SBW</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#A67C3A;--dark:#0E0D0B;--red:#C0392B}
body{
  font-family:"DM Sans",sans-serif;
  background:var(--dark);color:#F0EDE4;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:1.5rem;position:relative;overflow:hidden;
}
body::before{
  content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);
  width:600px;height:400px;
  background:radial-gradient(ellipse,rgba(166,124,58,0.1),transparent 65%);
  pointer-events:none;
}
.wrap{width:100%;max-width:380px;position:relative;z-index:1}
.logo{font-family:"DM Serif Display",serif;font-size:1.3rem;text-align:center;margin-bottom:4px}
.badge{
  text-align:center;font-size:.65rem;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;color:var(--gold);
  margin-bottom:2.5rem;display:flex;align-items:center;justify-content:center;gap:.5rem;
}
.badge::before,.badge::after{content:'◆';font-size:.4rem}

.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;padding:1.8rem;
}
.card-title{font-size:1rem;font-weight:500;margin-bottom:.3rem}
.card-sub{font-size:.78rem;color:rgba(240,237,228,0.4);margin-bottom:1.8rem;font-weight:300}

/* Onglets */
.tabs{display:flex;background:rgba(255,255,255,.06);border-radius:8px;padding:3px;margin-bottom:1.4rem;gap:3px}
.tab{flex:1;padding:7px;text-align:center;font-size:.78rem;border-radius:6px;cursor:pointer;transition:all .15s;color:rgba(240,237,228,.4);border:none;background:none;font-family:inherit}
.tab.active{background:rgba(255,255,255,.1);color:#F0EDE4;font-weight:500}

/* Formulaire */
.field{margin-bottom:1rem}
label{display:block;font-size:.7rem;font-weight:500;color:rgba(240,237,228,.4);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
input{
  width:100%;padding:.75rem 1rem;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:8px;font-size:.88rem;font-family:"DM Sans",sans-serif;
  color:#F0EDE4;outline:none;transition:border-color .15s;
}
input:focus{border-color:rgba(166,124,58,.5)}
input::placeholder{color:rgba(240,237,228,.2)}

.btn{
  width:100%;padding:.9rem;
  background:var(--gold);color:#fff;
  border:none;border-radius:8px;
  font-size:.9rem;font-weight:500;font-family:"DM Sans",sans-serif;
  cursor:pointer;transition:opacity .15s;margin-top:.3rem;
  display:flex;align-items:center;justify-content:center;gap:.5rem;
}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* Séparateur */
.sep{display:flex;align-items:center;gap:.8rem;margin:1.4rem 0;color:rgba(240,237,228,.15);font-size:.72rem}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07)}

/* Boutons sociaux */
.social-btns{display:flex;flex-direction:column;gap:.7rem}
.social-btn{
  width:100%;padding:.78rem;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:8px;font-size:.85rem;font-family:"DM Sans",sans-serif;
  color:#F0EDE4;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:.7rem;
}
.social-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}
.social-btn svg{flex-shrink:0}

/* Message succès */
.success{
  background:rgba(39,80,10,.2);border:1px solid rgba(39,80,10,.3);
  border-radius:10px;padding:1.2rem;text-align:center;display:none;
}
.success-icon{font-size:2rem;margin-bottom:.6rem}
.success-title{font-size:.95rem;font-weight:500;margin-bottom:.3rem}
.success-sub{font-size:.78rem;color:rgba(240,237,228,.45);line-height:1.55}

/* Erreur */
.error{
  background:rgba(192,57,43,.12);color:#F09595;
  border:1px solid rgba(192,57,43,.2);
  border-radius:8px;padding:.7rem 1rem;
  font-size:.8rem;margin-bottom:1rem;display:none;
}

.spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.back{text-align:center;margin-top:1.5rem;font-size:.75rem;color:rgba(240,237,228,.25)}
.back a{color:rgba(240,237,228,.4);transition:color .15s}
.back a:hover{color:#F0EDE4}
.join-cta{text-align:center;font-size:.8rem;color:rgba(240,237,228,.35);margin-top:1rem}
.join-cta a{color:var(--gold)}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Start Business World</div>
  <div class="badge">Le Club SBW</div>

  <div class="card">
    <div class="card-title">Accès membres</div>
    <div class="card-sub">Connecte-toi à ton espace Club SBW</div>

    <!-- ONGLETS -->
    <div class="tabs">
      <button class="tab active" id="tabMagic" onclick="switchTab('magic')">✉️ Lien mail</button>
      <button class="tab" id="tabPassword" onclick="switchTab('password')">🔑 Mot de passe</button>
    </div>

    <div class="error" id="errorMsg"></div>

    <!-- MAGIC LINK -->
    <div id="formMagic">
      <div class="field">
        <label>Ton email</label>
        <input type="email" id="magicEmail" placeholder="ton@email.com" autocomplete="email">
      </div>
      <button class="btn" id="magicBtn" onclick="sendMagicLink()">
        Recevoir le lien de connexion
      </button>
      <div class="success" id="magicSuccess">
        <div class="success-icon">📬</div>
        <div class="success-title">Lien envoyé !</div>
        <div class="success-sub">Vérifie ta boîte mail et clique sur le lien pour te connecter. Il est valable 1 heure.</div>
      </div>
    </div>

    <!-- MOT DE PASSE -->
    <div id="formPassword" style="display:none">
      <div class="field">
        <label>Email</label>
        <input type="email" id="pwEmail" placeholder="ton@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="pwPassword" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn" id="pwBtn" onclick="loginPassword()">
        Se connecter
      </button>
    </div>

    <!-- SÉPARATEUR -->
    <div class="sep">ou</div>

    <!-- BOUTONS SOCIAUX -->
    <div class="social-btns">
      <button class="social-btn" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuer avec Google
      </button>
      <!-- Apple désactivé — nécessite Apple Developer Account -->
    </div>

    <div class="join-cta">
      Pas encore membre ? <a href="club.html">Rejoindre le Club SBW →</a>
    </div>
  </div>

  <div class="back"><a href="index.html">← Retour au site</a></div>
</div>

<script>
var sb = supabase.createClient(
  "https://grwimhqsthcmfwblwdwg.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyd2ltaHFzdGhjbWZ3Ymx3ZHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTA5NDIsImV4cCI6MjA5MDA2Njk0Mn0.faK7rX_1OElj5g28NJyAkhucvJIX1R8scopOZ8TRKXc"
);

// Vérifier session existante
(async function() {
  var s = await sb.auth.getSession();
  if (s.data.session) window.location.href = "client-dashboard.html";

  // Gérer le retour OAuth (Google/Apple)
  sb.auth.onAuthStateChange(function(event, session) {
    if (event === "SIGNED_IN" && session) {
      window.location.href = "client-dashboard.html";
    }
  });
})();

function switchTab(tab) {
  document.getElementById("formMagic").style.display = tab === "magic" ? "block" : "none";
  document.getElementById("formPassword").style.display = tab === "password" ? "block" : "none";
  document.getElementById("tabMagic").className = "tab" + (tab === "magic" ? " active" : "");
  document.getElementById("tabPassword").className = "tab" + (tab === "password" ? " active" : "");
  hideError();
}

async function sendMagicLink() {
  var email = document.getElementById("magicEmail").value.trim();
  if (!email) { showError("Entre ton email."); return; }

  var btn = document.getElementById("magicBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Envoi...';
  hideError();

  var res = await sb.auth.signInWithOtp({
    email: email,
    options: { emailRedirectTo: window.location.origin + "/client-dashboard.html" }
  });

  if (res.error) {
    showError("Erreur : " + res.error.message);
    btn.disabled = false;
    btn.textContent = "Recevoir le lien de connexion";
  } else {
    btn.style.display = "none";
    document.getElementById("magicSuccess").style.display = "block";
    document.querySelector(".field").style.display = "none";
  }
}

async function loginPassword() {
  var email = document.getElementById("pwEmail").value.trim();
  var password = document.getElementById("pwPassword").value;
  if (!email || !password) { showError("Remplis tous les champs."); return; }

  var btn = document.getElementById("pwBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Connexion...';
  hideError();

  var res = await sb.auth.signInWithPassword({ email, password });

  if (res.error) {
    showError("Email ou mot de passe incorrect.");
    btn.disabled = false;
    btn.textContent = "Se connecter";
  } else {
    window.location.href = "client-dashboard.html";
  }
}

async function loginGoogle() {
  await sb.auth.signInWithOAuth({
    provider: "google",
    options: { redirectTo: window.location.origin + "/client-dashboard.html" }
  });
}

async function loginApple() {
  await sb.auth.signInWithOAuth({
    provider: "apple",
    options: { redirectTo: window.location.origin + "/client-dashboard.html" }
  });
}

function showError(msg) {
  var el = document.getElementById("errorMsg");
  el.textContent = msg;
  el.style.display = "block";
}
function hideError() {
  document.getElementById("errorMsg").style.display = "none";
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    var tab = document.getElementById("tabMagic").classList.contains("active");
    if (tab) sendMagicLink(); else loginPassword();
  }
});
</script>
</body>
</html>
