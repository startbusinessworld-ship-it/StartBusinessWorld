<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Club SBW</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --gold: #A67C3A; --dark: #0E0D0B; --red: #C0392B; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark); color: #F0EDE4;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(166,124,58,0.08), transparent 65%);
      pointer-events: none;
    }
    .wrap { width: 100%; max-width: 380px; padding: 2rem; position: relative; }
    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem; text-align: center; margin-bottom: 0.4rem;
    }
    .badge {
      text-align: center; font-size: 0.65rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 2.5rem;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .badge::before, .badge::after { content: '◆'; font-size: 0.4rem; }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 2rem;
    }
    .card-title { font-size: 1rem; font-weight: 500; margin-bottom: 0.3rem; }
    .card-sub { font-size: 0.78rem; color: rgba(240,237,228,0.4); margin-bottom: 1.8rem; font-weight: 300; }
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: 0.7rem; font-weight: 500; color: rgba(240,237,228,0.4); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px; }
    input {
      width: 100%; padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 7px; font-size: 0.88rem;
      font-family: 'DM Sans', sans-serif;
      color: #F0EDE4; outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: rgba(166,124,58,0.5); }
    input::placeholder { color: rgba(240,237,228,0.2); }
    .btn {
      width: 100%; padding: 0.88rem;
      background: var(--gold); color: #fff;
      border: none; border-radius: 7px;
      font-size: 0.88rem; font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: opacity 0.15s;
      margin-top: 0.5rem;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      background: rgba(192,57,43,0.12); color: #F09595;
      border: 1px solid rgba(192,57,43,0.2);
      border-radius: 7px; padding: 0.7rem 1rem;
      font-size: 0.8rem; margin-bottom: 1rem; display: none;
    }
    .divider {
      display: flex; align-items: center; gap: 0.8rem;
      margin: 1.5rem 0; color: rgba(240,237,228,0.2); font-size: 0.72rem;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.07); }
    .join-cta {
      text-align: center; font-size: 0.8rem;
      color: rgba(240,237,228,0.4);
    }
    .join-cta a { color: var(--gold); transition: opacity 0.15s; }
    .join-cta a:hover { opacity: 0.8; }
    .back {
      text-align: center; margin-top: 1.5rem;
      font-size: 0.75rem; color: rgba(240,237,228,0.25);
    }
    .back a { color: rgba(240,237,228,0.4); transition: color 0.15s; }
    .back a:hover { color: #F0EDE4; }
    .spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media(max-width:480px){
      .wrap { padding:1.5rem 1rem; }
      .logo { font-size:1.1rem; }
      .card { padding:1.5rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Start Business World</div>
    <div class="badge">Le Club SBW</div>

    <div class="card">
      <div class="card-title">Accès membres</div>
      <div class="card-sub">Connecte-toi à ton espace Club SBW</div>

      <div class="error" id="errorMsg"></div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="ton@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn" id="loginBtn" onclick="handleLogin()">Se connecter</button>

      <div class="divider">ou</div>

      <div class="join-cta">
        Pas encore membre ? <a href="club.html">Rejoindre le Club SBW →</a>
      </div>
    </div>

    <div class="back"><a href="index.html">← Retour au site</a></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://grwimhqsthcmfwblwdwg.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyd2ltaHFzdGhjbWZ3Ymx3ZHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTA5NDIsImV4cCI6MjA5MDA2Njk0Mn0.faK7rX_1OElj5g28NJyAkhucvJIX1R8scopOZ8TRKXc'
    const { createClient } = supabase
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    async function checkSession() {
      const { data: { session } } = await sb.auth.getSession()
      if (session) window.location.href = 'client-dashboard.html'
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const btn = document.getElementById('loginBtn')
      const err = document.getElementById('errorMsg')

      if (!email || !password) { showError('Remplis tous les champs.'); return }

      btn.disabled = true
      btn.innerHTML = '<span class="spinner"></span>Connexion...'
      err.style.display = 'none'

      const { data, error } = await sb.auth.signInWithPassword({ email, password })

      if (error) {
        showError('Email ou mot de passe incorrect.')
        btn.disabled = false
        btn.innerHTML = 'Se connecter'
        return
      }

      // Vérifie que c'est bien un membre (pas un admin)
      const { data: member } = await sb.from('members').select('id,status').eq('email', email).single()

      if (!member || member.status === 'inactive') {
        await sb.auth.signOut()
        showError('Ton abonnement est inactif. Rejoins le Club SBW pour accéder à ton espace.')
        btn.disabled = false
        btn.innerHTML = 'Se connecter'
        return
      }

      window.location.href = 'client-dashboard.html'
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg')
      el.textContent = msg
      el.style.display = 'block'
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin() })
    checkSession()
  </script>
</body>
</html>
