<style>
.shorts-grid { display: flex; flex-direction: column; gap: 1px; background: var(--subtle); border-radius: 10px; overflow: hidden; border: 0.5px solid var(--subtle); }
.short-row { background: var(--bg); padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
.short-row:hover { background: var(--surface); }
.short-thumb-small { width: 50px; height: 88px; border-radius: 6px; overflow: hidden; background: #1C1C1A; flex-shrink: 0; }
.short-thumb-small img { width: 100%; height: 100%; object-fit: cover; }
.short-info { flex: 1; min-width: 0; }
.short-name { font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.short-meta { font-size: 0.72rem; color: var(--muted); }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }
.overlay.on { display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-box { background: var(--bg); border-radius: 12px; padding: 24px; width: 100%; max-width: 460px; border: 0.5px solid var(--subtle); position: relative; z-index: 1000; }
.modal-head { font-size: 1rem; font-weight: 500; margin-bottom: 16px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 0.7rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.field input, .field select { width: 100%; padding: 8px 12px; border: 0.5px solid var(--subtle); border-radius: 6px; font-size: 0.85rem; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); outline: none; }
.field input:focus, .field select:focus { border-color: var(--ink); }
.hint { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }
.preview-box { display: none; background: var(--surface); border-radius: 8px; padding: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
.preview-img { width: 56px; height: 100px; border-radius: 6px; overflow: hidden; background: #1C1C1A; flex-shrink: 0; }
.preview-img img { width: 100%; height: 100%; object-fit: cover; }
.preview-id { font-size: 0.78rem; font-weight: 500; font-family: monospace; }
.preview-ok { font-size: 0.7rem; color: #27500A; margin-top: 4px; }
.btn-row { display: flex; gap: 8px; margin-top: 16px; }
.empty-msg { padding: 3rem; text-align: center; color: var(--muted); font-size: 0.85rem; }
</style>
</head>
<body>

<main class="main-content">
  <div class="topbar">
    <div>
      <h1 class="page-title">Shorts YouTube</h1>
      <div class="page-date" id="countLine">—</div>
    </div>
    <div class="topbar-actions">
      <button class="btn-primary" id="addBtn">+ Ajouter un Short</button>
    </div>
  </div>

  <div class="content-area">
    <div class="card">
      <div id="shortsList"><div class="empty-msg">Chargement...</div></div>
    </div>
  </div>
</main>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal-box">
    <div class="modal-head" id="modalHead">Ajouter un Short</div>

    <div class="field">
      <label>URL YouTube du Short *</label>
      <input type="text" id="inUrl" placeholder="https://youtube.com/shorts/ABC123">
      <div class="hint">Colle l'URL complète — l'ID est extrait automatiquement</div>
    </div>

    <div id="previewZone" style="display:none; background:var(--surface); border-radius:8px; padding:12px; margin-bottom:12px; display:none; align-items:center; gap:12px;">
      <div style="width:56px;height:100px;border-radius:6px;overflow:hidden;background:#1C1C1A;flex-shrink:0">
        <img id="previewImg" src="" alt="" style="width:100%;height:100%;object-fit:cover">
      </div>
      <div>
        <div style="font-size:0.72rem;color:var(--muted);margin-bottom:4px">ID détecté</div>
        <div id="previewId" style="font-size:0.85rem;font-weight:500;font-family:monospace"></div>
        <div style="font-size:0.7rem;color:#27500A;margin-top:4px">✓ Miniature chargée</div>
      </div>
    </div>

    <div class="field">
      <label>Titre *</label>
      <input type="text" id="inTitle" placeholder="Ex: Comment sourcer en Chine en 5 min">
    </div>

    <div class="field">
      <label>Catégorie</label>
      <select id="inCat">
        <option value="">Choisir...</option>
        <option value="Business Chine">Business Chine</option>
        <option value="Fiscalité">Fiscalité</option>
        <option value="Expatriation">Expatriation</option>
        <option value="E-commerce">E-commerce</option>
        <option value="Mindset">Mindset</option>
        <option value="Finance">Finance</option>
        <option value="Import-Export">Import-Export</option>
      </select>
    </div>

    <div class="field">
      <label>Statut</label>
      <select id="inStatus">
        <option value="published">Publié — visible sur le site</option>
        <option value="draft">Brouillon — caché</option>
      </select>
    </div>

    <div class="btn-row">
      <button class="btn-ghost" style="flex:1" id="cancelBtn">Annuler</button>
      <button class="btn-primary" style="flex:1;justify-content:center" id="saveBtn">Publier</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="admin-auth.js"></script>
<script>
var shorts = [];
var editId = null;
var ytId = null;

// Attendre que le DOM soit prêt
// Initialisation au chargement
initAuth().then(function(profile) {
  if (!profile) return;
  loadShorts();

  document.getElementById('addBtn').addEventListener('click', function() { openModal(null); });
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  document.getElementById('saveBtn').addEventListener('click', saveShort);
  document.getElementById('inUrl').addEventListener('input', function() { extractYtId(this.value); });
  document.getElementById('overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
});

function extractYtId(url) {
  url = url.trim();
  var id = null;
  var m;

  m = url.match(/youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/);
  if (m) id = m[1];

  m = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
  if (m) id = m[1];

  m = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
  if (m) id = m[1];

  if (!id && /^[a-zA-Z0-9_-]{11}$/.test(url)) id = url;

  ytId = id;

  var zone = document.getElementById('previewZone');
  if (id) {
    document.getElementById('previewId').textContent = id;
    document.getElementById('previewImg').src = 'https://i.ytimg.com/vi/' + id + '/mqdefault.jpg';
    zone.style.display = 'flex';
  } else {
    zone.style.display = 'none';
  }
}

function openModal(short) {
  editId = short ? short.id : null;
  ytId = short ? short.youtube_id : null;

  document.getElementById('modalHead').textContent = short ? 'Modifier le Short' : 'Ajouter un Short';
  document.getElementById('inUrl').value = short ? 'https://youtube.com/shorts/' + short.youtube_id : '';
  document.getElementById('inTitle').value = short ? short.title : '';
  document.getElementById('inCat').value = short ? (short.category || '') : '';
  document.getElementById('inStatus').value = short ? short.status : 'published';
  document.getElementById('saveBtn').textContent = short ? 'Mettre à jour' : 'Publier';

  if (short) extractYtId(document.getElementById('inUrl').value);
  else {
    document.getElementById('previewZone').style.display = 'none';
    ytId = null;
  }

  document.getElementById('overlay').classList.add('on');
  document.getElementById('inUrl').focus();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('on');
  editId = null;
  ytId = null;
}

async function saveShort() {
  if (!ytId) { showToast('Colle une URL YouTube valide.', 'error'); return; }
  var title = document.getElementById('inTitle').value.trim();
  if (!title) { showToast('Le titre est obligatoire.', 'error'); return; }

  var data = {
    youtube_id: ytId,
    title: title,
    category: document.getElementById('inCat').value,
    status: document.getElementById('inStatus').value
  };

  var res;
  if (editId) {
    res = await sb.from('shorts').update(data).eq('id', editId);
  } else {
    data.created_at = new Date().toISOString();
    res = await sb.from('shorts').insert(data);
  }

  if (res.error) { showToast('Erreur : ' + res.error.message, 'error'); return; }

  showToast(editId ? 'Short mis à jour !' : 'Short publié sur le site !', 'success');
  closeModal();
  loadShorts();
}

async function loadShorts() {
  var res = await sb.from('shorts').select('*').order('created_at', { ascending: false });
  shorts = res.data || [];

  var published = shorts.filter(function(s) { return s.status === 'published'; }).length;
  document.getElementById('countLine').textContent = shorts.length + ' shorts · ' + published + ' publiés';

  renderList();
}

function renderList() {
  var el = document.getElementById('shortsList');
  if (!shorts.length) {
    el.innerHTML = '<div class="empty-msg">Aucun short. Clique sur "+ Ajouter un Short" pour commencer.</div>';
    return;
  }

  var html = '<div class="shorts-grid">';
  for (var i = 0; i < shorts.length; i++) {
    var s = shorts[i];
    var pill = s.status === 'published' ? 'sent' : 'draft';
    var label = s.status === 'published' ? 'Publié' : 'Brouillon';
    html += '<div class="short-row">';
    html += '<div class="short-thumb-small"><img src="https://i.ytimg.com/vi/' + s.youtube_id + '/mqdefault.jpg" alt=""></div>';
    html += '<div class="short-info">';
    html += '<div class="short-name">' + s.title + '</div>';
    html += '<div class="short-meta">' + (s.category || '—') + ' · ' + s.youtube_id + '</div>';
    html += '</div>';
    html += '<span class="status-pill ' + pill + '">' + label + '</span>';
    html += '<div style="display:flex;gap:6px">';
    html += '<button class="row-action" data-idx="' + i + '">Modifier</button>';
    html += '<a href="https://youtube.com/shorts/' + s.youtube_id + '" target="_blank" class="row-action">Voir ↗</a>';
    html += '<button class="row-action" style="color:var(--red);border-color:rgba(192,57,43,0.3)" data-del="' + s.id + '">Suppr.</button>';
    html += '</div></div>';
  }
  html += '</div>';
  el.innerHTML = html;

  // Attacher les events après injection
  el.querySelectorAll('[data-idx]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      openModal(shorts[parseInt(this.getAttribute('data-idx'))]);
    });
  });
  el.querySelectorAll('[data-del]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      deleteShort(this.getAttribute('data-del'));
    });
  });
}

async function deleteShort(id) {
  if (!confirm('Supprimer ce short ?')) return;
  await sb.from('shorts').delete().eq('id', id);
  showToast('Supprimé.', 'success');
  loadShorts();
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'success') + ' show';
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}
</script>
</body>
</html>
