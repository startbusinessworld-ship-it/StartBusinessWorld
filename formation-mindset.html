{t:'action',title:"La lettre de ton futur",vo:"L'exercice le plus puissant de cette le\u00e7on et peut-\u00eatre de toute la formation. Prends vingt minutes. \u00c9cris une lettre. De toi dans dix ans, \u00e0 toi aujourd'hui. \u00c9cris \u00e0 la premi\u00e8re personne du pr\u00e9sent, comme si t'y \u00e9tais d\u00e9j\u00e0. D\u00e9cris ce que tu as construit. Les d\u00e9cisions que tu as prises. Les peurs que tu as surmont\u00e9es. Les gens que tu as aid\u00e9s. Et \u00e0 la fin, note une seule action que ce futur toi te conseille de faire cette semaine. Une seule. Et fais-la.",badge:"Exercice de vision",steps:[{txt:"\u00c9cris une lettre de toi dans 10 ans \u00e0 toi aujourd'hui. 20 minutes. Sois pr\u00e9cis."},{txt:"D\u00e9cris ce que tu as accompli, qui tu es devenu, ce que tu as laiss\u00e9."},{txt:"Note 1 seule action que ce futur toi te conseille de faire cette semaine."}]},
{t:'recap',title:"Ce qu'il faut retenir",vo:"Ce qu'il faut retenir. Un objectif sans vision, c'est une t\u00e2che. Avec une vision, c'est une mission. La structure est vision dix ans, \u00e9tapes trois ans, actions quatre-vingt-dix jours. Les objectifs dix fois plus ambitieux g\u00e9n\u00e8rent plus d'\u00e9nergie que les objectifs raisonnables. Et connecter les t\u00e2ches du quotidien \u00e0 la vision, \u00e7a transforme comment tu travailles au jour le jour.",points:["Un objectif sans vision = une t\u00e2che. Avec vision = une mission","Vision 10 ans \u2192 \u00e9tapes 3 ans \u2192 actions 90 jours","Les objectifs 10x ambitieux g\u00e9n\u00e8rent plus d'\u00e9nergie que les raisonnables","Connecte chaque t\u00e2che du quotidien \u00e0 ta vision \u2014 tout change"]}]},
{id:11,title:"Le focus, ton arme ultime",slides:[
{t:'intro',num:"11",title:"Le focus,\\nton <em>arme ultime</em>",sub:"Dans un monde d'entrepreneurs dispers\u00e9s, celui qui sait concentrer son attention gagne.",vo:"Le\u00e7on onze. Le focus. On vit dans l'\u00e9conomie de l'attention. Tout autour de toi est con\u00e7u pour la capturer. Ton t\u00e9l\u00e9phone, tes notifications, les r\u00e9seaux sociaux, les cha\u00eenes YouTube, les podcasts. Et dans cet environnement, l'entrepreneur qui sait concentrer son attention sur ce qui compte vraiment a un avantage comp\u00e9titif massif sur tous ceux qui se dispersent."},
{t:'concept',tag:"Le probl\u00e8me",title:"La dispersion co\u00fbte plus que tu ne penses",body:"Chaque interruption te co\u00fbte <strong>en moyenne 23 minutes</strong> de reconcentration. Une heure de travail avec dix interruptions = moins de vingt minutes de travail r\u00e9el. Tu travailles dur. Mais sur quoi ?",vo:"Une recherche de l'universit\u00e9 de Californie \u00e0 Irvine a mesur\u00e9 \u00e7a : apr\u00e8s une interruption, il faut en moyenne vingt-trois minutes pour retrouver son niveau de concentration. Vingt-trois minutes. Pour une notification. Ton t\u00e9l\u00e9phone qui vibre pendant que tu travailles, c'est vingt-trois minutes perdues. Fais le calcul. Si t'as dix interruptions dans ta journ\u00e9e de travail, tu as peut-\u00eatre moins de deux heures de vraie concentration sur une journ\u00e9e de huit heures. Tu travailles dur. Mais sur quoi ?"},
{t:'list',title:"Deep work vs Shallow work",sub:"Concentration totale, t\u00e2che cognitive difficile, valeur irrempla\u00e7able. 2-4h par jour maximum.",vo:"Cal Newport a popularis\u00e9 cette distinction dans son livre Deep Work. Le travail profond, c'est la concentration totale sur une t\u00e2che cognitive difficile. \u00c9crire, coder, strategiser, cr\u00e9er. C'est l\u00e0 que tu produis de la valeur irrempla\u00e7able. Deux \u00e0 quatre heures par jour, c'est le maximum que la plupart des gens peuvent soutenir \u00e0 haute intensit\u00e9. Le travail superficiel, emails, r\u00e9unions, admin, r\u00e9seaux, c'est utile mais rempla\u00e7able, souvent d\u00e9l\u00e9gable. La r\u00e8gle d'or : fais ton deep work en premier chaque matin, avant d'ouvrir le moindre outil de communication. Le reste apr\u00e8s.",items:[{emoji:"\ud83e\udde0",name:"Deep work",sub:"Concentration totale, t\u00e2che cognitive difficile, valeur irrempla\u00e7able. 2-4h par jour maximum."},{emoji:"\ud83d\udce7",name:"Shallow work",sub:"Emails, r\u00e9unions, admin, r\u00e9seaux sociaux. Utile mais rempla\u00e7able. \u00c0 regrouper et limiter."},{emoji:"\u26a1",name:"La r\u00e8gle d'or",sub:"Fais ton deep work en premier, avant toute notification. Le reste apr\u00e8s."}]},
{t:'concept',tag:"La r\u00e8gle",title:"Apprendre \u00e0 dire non",body:"Non est la phrase la plus strat\u00e9gique d'un entrepreneur. <strong>Chaque oui \u00e0 quelque chose qui compte pas est un non \u00e0 quelque chose qui compte.</strong> Ton attention est ta ressource la plus rare.",vo:"Warren Buffett a dit quelque chose d'important : la diff\u00e9rence entre les gens qui r\u00e9ussissent et ceux qui r\u00e9ussissent vraiment, c'est que ces derniers disent non \u00e0 presque tout. Ton attention est ta ressource la plus rare. Pas le temps. L'attention. Parce que le temps peut \u00eatre r\u00e9cup\u00e9r\u00e9. L'attention d\u00e9pens\u00e9e sur quelque chose qui compte pas, elle te revient pas. Chaque oui que tu donnes \u00e0 quelque chose, c'est un non \u00e0 autre chose. \u00catre strat\u00e9gique sur tes oui, c'est \u00eatre strat\u00e9gique sur ta trajectoire."},
{t:'stat',num:"4h",body:"Les \u00e9tudes sur les violonistes d'\u00e9lite, les romanciers, les math\u00e9maticiens : <strong>4 heures de concentration profonde par jour est le maximum soutenable</strong> sur le long terme pour produire du travail d'excellence.",vo:"Quatre heures. C'est le seuil mesur\u00e9 par les chercheurs sur les performers d'\u00e9lite dans tous les domaines. Les violonistes virtuoses \u00e0 l'acad\u00e9mie de Berlin. Les romanciers les plus prolifiques. Les math\u00e9maticiens prim\u00e9s. Quatre heures de concentration profonde par jour, c'est le maximum qu'on peut soutenir sur le long terme sans d\u00e9grader la qualit\u00e9. Pas huit heures. Quatre heures. Ce qui veut dire que si t'as quatre heures de deep work par jour, t'es d\u00e9j\u00e0 dans l'\u00e9lite de la productivit\u00e9.",label:"de deep work par jour, c'est le seuil des performeurs",val:"4h"},
{t:'action',title:"Ton bloc de deep work",vo:"L'exercice de cette le\u00e7on est simple et imm\u00e9diatement applicable. Identifie la t\u00e2che qui aurait le plus d'impact sur ton business cette semaine. Une seule. Bloque deux heures demain matin. T\u00e9l\u00e9phone en mode avion. Notifications coup\u00e9es. Porte ferm\u00e9e si t'as un bureau. Une seule t\u00e2che devant toi. Et travaille dessus sans interruption pendant deux heures. Ensuite seulement, ouvre tes emails et tes messages. Fais \u00e7a pendant une semaine et dis-moi si ta productivit\u00e9 a pas doubl\u00e9.",badge:"Protocole focus",steps:[{txt:"Identifie la t\u00e2che qui aurait le plus d'impact sur ton business cette semaine"},{txt:"Bloque 2h demain matin : t\u00e9l\u00e9phone en mode avion, notifications off, une seule t\u00e2che"},{txt:"Travaille dessus sans interruption. Ensuite seulement, ouvre tes emails."}]},
{t:'recap',title:"L'essentiel du focus",vo:"Ce qu'on retient. Chaque interruption te co\u00fbte vingt-trois minutes. Le deep work, concentration totale sur une t\u00e2che difficile, est limit\u00e9 \u00e0 quatre heures par jour maximum. Non est ta phrase strat\u00e9gique. Et ton attention est ta ressource la plus rare. Plus rare que le temps, plus rare que l'argent. Prot\u00e8ge-la comme telle. La prochaine le\u00e7on, on parle d'\u00e9nergie et de performance mentale.",points:["Chaque interruption = 23 minutes de reconcentration perdue","Deep work (4h/j max) = valeur irrempla\u00e7able. Shallow work = \u00e0 regrouper.","Non est ta phrase la plus strat\u00e9gique","Ton attention est ta ressource la plus rare \u2014 prot\u00e8ge-la comme telle"]}]},
{id:12,title:"\u00c9nergie et performance mentale",slides:[
{t:'intro',num:"12",title:"\u00c9nergie et\\nperformance <em>mentale</em>",sub:"Tu g\u00e8res ton temps. Mais g\u00e8res-tu ton \u00e9nergie ? La plupart des entrepreneurs \u00e9puisent leur batterie et se demandent pourquoi ils performent pas.",vo:"Le\u00e7on douze. L'\u00e9nergie. On parle tout le temps de gestion du temps. Mais le vrai sujet, c'est l'\u00e9nergie. Parce que deux heures de travail avec une \u00e9nergie maximale valent dix heures de travail \u00e9puis\u00e9. L'\u00e9nergie est la ressource sous-jacente \u00e0 tout. Et la plupart des entrepreneurs la g\u00e8rent tr\u00e8s mal."},
{t:'concept',tag:"La r\u00e9alit\u00e9",title:"T'as pas un probl\u00e8me de temps, t'as un probl\u00e8me d'\u00e9nergie",body:"Un entrepreneur avec 6h de haute \u00e9nergie produit plus qu'un autre avec 12h de basse \u00e9nergie. <strong>G\u00e9rer son \u00e9nergie n'est pas optionnel. C'est la comp\u00e9tence de performance la plus sous-estim\u00e9e.</strong>",vo:"Tony Schwartz a boss\u00e9 pendant vingt ans avec les meilleurs athl\u00e8tes et PDG du monde, et il est arriv\u00e9 \u00e0 une conclusion simple. Les performers d'exception ne g\u00e8rent pas leur temps mieux que les autres. Ils g\u00e8rent leur \u00e9nergie mieux. Ils savent quand ils sont au pic. Ils prot\u00e8gent ce pic. Ils r\u00e9cup\u00e8rent d\u00e9lib\u00e9r\u00e9ment entre les efforts intenses. Ils ne courent pas \u00e0 vide. Et \u00e7a se construit. L'\u00e9nergie, contrairement \u00e0 ce qu'on croit, \u00e7a se manage."},
{t:'list',title:"Les 4 sources d'\u00e9nergie \u00e0 ma\u00eetriser",sub:"7-8h min. La r\u00e9cup\u00e9ration cognitive et \u00e9motionnelle se fait uniquement pendant le sommeil.",vo:"Quatre sources d'\u00e9nergie que tu dois ma\u00eetriser. Le sommeil : sept \u00e0 huit heures minimum. La r\u00e9cup\u00e9ration cognitive se fait uniquement l\u00e0. C'est pas n\u00e9gociable si tu veux performer. L'activit\u00e9 physique : trente minutes par jour. Les recherches montrent que c'est plus efficace que n'importe quel stimulant pour la concentration et la gestion de l'anxi\u00e9t\u00e9. La nutrition : ta glyc\u00e9mie instable donne une concentration instable. Ce que tu manges au d\u00e9jeuner d\u00e9cide de tes apr\u00e8s-midis. Et la r\u00e9cup\u00e9ration d\u00e9lib\u00e9r\u00e9e : les pauses ne sont pas du temps perdu. Elles rechargent la batterie.",items:[{emoji:"\ud83d\ude34",name:"Le sommeil",sub:"7-8h min. La r\u00e9cup\u00e9ration cognitive et \u00e9motionnelle se fait uniquement pendant le sommeil."},{emoji:"\ud83c\udfc3",name:"L'activit\u00e9 physique",sub:"30 min/jour augmentent la concentration et r\u00e9duisent l'anxi\u00e9t\u00e9 mieux que n'importe quel stimulant."},{emoji:"\ud83e\udd57",name:"La nutrition",sub:"La glyc\u00e9mie instable = concentration instable. Ce que tu manges au d\u00e9jeuner d\u00e9cide tes apr\u00e8s-midis."},{emoji:"\ud83d\udd01",name:"La r\u00e9cup\u00e9ration",sub:"Les pauses d\u00e9lib\u00e9r\u00e9es ne sont pas du temps perdu. Elles rechargent la batterie entre les sprints."}]},
{t:'concept',tag:"La science",title:"Tes pics de performance dans la journ\u00e9e",body:"Ton \u00e9nergie mentale suit un rythme circadien. <strong>Tu as 2 \u00e0 4 heures de pic cognitif par jour.</strong> Identifier quand ils tombent et les prot\u00e9ger pour tes t\u00e2ches les plus importantes est l'optimisation la plus rentable possible.",vo:"Ton cerveau fonctionne par cycles d'environ quatre-vingt-dix minutes. Ultradian rhythms. Sur une journ\u00e9e, tu as deux \u00e0 quatre heures de pic cognitif o\u00f9 ta concentration, ta cr\u00e9ativit\u00e9 et ta capacit\u00e9 de d\u00e9cision sont au maximum. Pour la plupart des gens, c'est le matin, deux \u00e0 quatre heures apr\u00e8s le r\u00e9veil. Identifier quand tes pics tombent dans ta journ\u00e9e et les r\u00e9server pour tes t\u00e2ches les plus importantes, c'est l'optimisation la plus rentable que tu puisses faire. C'est ce que font tous les performers d'exception."},
{t:'quote',vo:"Jim Rohn a dit \u00e7a dans les ann\u00e9es 1980 et c'est encore plus vrai aujourd'hui dans un monde o\u00f9 on passe des journ\u00e9es enti\u00e8res assis devant un \u00e9cran. Ton business vit dans ta t\u00eate. Et ta t\u00eate vit dans un corps. Si le corps est \u00e9puis\u00e9, mal nourri, sans mouvement, le business s'en ressent directement. Les d\u00e9cisions sont moins bonnes. L'\u00e9nergie pour prospecter et cr\u00e9er diminue. La r\u00e9sistance au stress baisse. Prendre soin de ton corps, c'est pas une activit\u00e9 annexe \u00e0 ton business. C'en est le fondement.",text:"Prends soin de ton corps. C'est le seul endroit o\u00f9 tu aies \u00e0 vivre.",auth:"\u2014 Jim Rohn"},
{t:'action',title:"Trouve tes pics",vo:"L'exercice de cette le\u00e7on. Pendant trois jours, note toutes les heures ton niveau d'\u00e9nergie sur dix. Juste un chiffre dans une note sur ton t\u00e9l\u00e9phone. Apr\u00e8s trois jours, les patterns deviennent \u00e9vidents. T'as des pics \u00e0 certaines heures, des creux \u00e0 d'autres. Et une fois que t'as identifi\u00e9 tes pics, r\u00e9organise ton agenda pour que tes t\u00e2ches importantes, tes deep work, tes d\u00e9cisions strat\u00e9giques, tombent dans ces fen\u00eatres. Le reste, admin, emails, appels routiniers, dans les creux.",badge:"Audit d'\u00e9nergie",steps:[{txt:"Pendant 3 jours, note toutes les heures ton niveau d'\u00e9nergie de 1 \u00e0 10"},{txt:"Identifie les patterns : quand es-tu au max ? Quand es-tu \u00e0 plat ?"},{txt:"R\u00e9organise ton agenda pour que tes t\u00e2ches importantes tombent dans tes pics"}]},
{t:'recap',title:"Ce qu'il faut retenir",vo:"Ce qu'il faut retenir. Six heures de haute \u00e9nergie produisent plus que douze heures de basse \u00e9nergie. Les quatre leviers : sommeil, sport quotidien, nutrition qui stabilise la glyc\u00e9mie, et r\u00e9cup\u00e9ration d\u00e9lib\u00e9r\u00e9e. Tu as deux \u00e0 quatre heures de pic cognitif par jour, identifie-les et prot\u00e8ge-les. Et g\u00e9rer ton \u00e9nergie est plus rentable que g\u00e9rer ton temps. L'\u00e9nergie est le multiplicateur de tout le reste.",points:["6h de haute \u00e9nergie > 12h de basse \u00e9nergie","Les 4 sources : sommeil, sport, nutrition, r\u00e9cup\u00e9ration","Tu as 2-4h de pic cognitif par jour \u2014 prot\u00e8ge-les","G\u00e9rer son \u00e9nergie est plus rentable que g\u00e9rer son temps"]}]},
{id:13,title:"Ton entourage : arme ou poison",slides:[
{t:'intro',num:"13",title:"Ton entourage :\\n<em>arme ou poison</em>",sub:"Tu es la moyenne des cinq personnes que tu fr\u00e9quentes le plus. C'est pas po\u00e9tique, c'est neurologique.",vo:"Le\u00e7on treize. L'entourage. Jim Rohn a dit : tu es la moyenne des cinq personnes que tu fr\u00e9quentes le plus. Beaucoup l'ont entendu. Peu ont vraiment regard\u00e9 leurs cinq personnes en face et tir\u00e9 les conclusions qui s'imposent. Dans cette le\u00e7on, on va \u00eatre honn\u00eates l\u00e0-dessus."},
{t:'concept',tag:"La science",title:"La contagion comportementale",body:"Les neurones miroirs de ton cerveau <strong>imitent inconsciemment les comportements, les attitudes et les \u00e9motions de ceux qui t'entourent.</strong> C\u00f4toyer des gens ambitieux te rend ambitieux. L'inverse est vrai aussi.",vo:"La contagion sociale est r\u00e9elle et mesur\u00e9e. Les neurones miroirs de ton cerveau imitent inconsciemment les comportements et les attitudes des personnes avec qui tu passes du temps. C'est pour \u00e7a que tu te mets \u00e0 parler comme tes amis proches. \u00c0 avoir les m\u00eames blagues, les m\u00eames r\u00e9flexes. Et les m\u00eames limites. Si t'es entour\u00e9 de gens qui trouvent que c'est pas pour eux de gagner bien leur vie, qui voient les riches comme des exploiteurs, qui abandonnent au premier obstacle, ce n'est qu'une question de temps avant que ces croyances s'installent aussi dans ta t\u00eate."},
{t:'list',title:"Les profils toxiques \u00e0 identifier",sub:"Tire les autres vers le bas d\u00e8s qu'ils essaient de s'\u00e9lever. Souvent inconscient.",vo:"Trois profils toxiques que tu dois identifier dans ton entourage. Le crabe dans le seau : d\u00e8s que tu veux t'\u00e9lever, il te tire vers le bas. Souvent sous des apparences de 'je veux juste que tu sois r\u00e9aliste'. Le r\u00e9aliste pessimiste : pour chaque id\u00e9e que t'am\u00e8nes, il a cinq raisons pour lesquelles \u00e7a va pas marcher. Il se croit utile. Il est destructeur. Et le catastrophiste : il amplifie chaque risque jusqu'\u00e0 te faire rester immobile. Souvent bien intentionn\u00e9, g\u00e9n\u00e9ralement d\u00e9vastateur.",items:[{emoji:"\ud83e\udd80",name:"Le crabe dans le seau",sub:"Tire les autres vers le bas d\u00e8s qu'ils essaient de s'\u00e9lever. Souvent inconscient."},{emoji:"\ud83d\ude12",name:"Le r\u00e9aliste pessimiste",sub:"Pour chaque projet que t'am\u00e8nes, il a une liste de pourquoi \u00e7a va pas marcher."},{emoji:"\ud83d\ude31",name:"Le catastrophiste",sub:"Amplifie chaque risque jusqu'\u00e0 te paralyser. Souvent bien intentionn\u00e9 mais d\u00e9vastateur."}]},
{t:'concept',tag:"La construction",title:"Construire ton cercle de croissance",body:"Tu n'as pas \u00e0 attendre que les bonnes personnes arrivent dans ta vie. <strong>Tu vas les chercher.</strong> Meetups, mastermind, formations, mentors. Les gens qui t'\u00e9l\u00e8vent existent. Ils sont juste pas dans ton canap\u00e9.",vo:"La bonne nouvelle, c'est que tu n'as pas \u00e0 attendre que les bonnes personnes arrivent dans ta vie. Tu vas les chercher. Les meetups d'entrepreneurs dans ta ville. Les groupes Slack de ta niche. Les masterminds. Les formations en pr\u00e9sentiel o\u00f9 tu croises des gens qui avancent. Les r\u00e9seaux d'anciens d'incubateurs. Les gens qui t'\u00e9l\u00e8vent existent. En grand nombre. Ils sont juste pas dans ton r\u00e9seau actuel parce que tu les as pas encore cherch\u00e9s. La prochaine fois que t'h\u00e9sites \u00e0 aller \u00e0 un \u00e9v\u00e9nement networking, pense \u00e0 \u00e7a."},
{t:'stat',num:"5",body:"Selon une \u00e9tude Stanford sur les entrepreneurs, avoir <strong>5 connexions cl\u00e9s avec des personnes plus avanc\u00e9es que soi</strong> dans sa carri\u00e8re est l'un des meilleurs pr\u00e9dicteurs de succ\u00e8s entrepreneurial \u00e0 long terme.",vo:"Une \u00e9tude de Stanford sur les trajectoires entrepreneuriales a mis en \u00e9vidence un chiffre pr\u00e9cis. Cinq connexions cl\u00e9s. Pas cinq cents. Cinq. Cinq personnes plus avanc\u00e9es que toi dans les domaines qui comptent pour ton business. Un mentor. Un pair qui t'emm\u00e8ne vers le haut. Un expert dans une comp\u00e9tence que t'as pas. Un investisseur ou quelqu'un qui conna\u00eet le capital. Et quelqu'un qui t'a d\u00e9j\u00e0 fait le chemin que tu veux faire. Ces cinq connexions sont des multiplicateurs de ta trajectoire.",label:"personnes qui changent une trajectoire",val:"5"},
{t:'action',title:"Fais le bilan honn\u00eate",vo:"L'exercice de cette le\u00e7on est peut-\u00eatre le plus inconfortable de la formation. Prends dix minutes. Liste les dix personnes avec qui tu passes le plus de temps. Pour chacune, note honn\u00eatement : est-ce que cette personne me tire vers le haut, vers le bas, ou est neutre pour mon d\u00e9veloppement ? Tu vas peut-\u00eatre voir des choses qui font mal. Et ensuite, d\u00e9cide d'une action pour rapprocher les personnes qui t'\u00e9l\u00e8vent et cr\u00e9er une distance saine avec celles qui te plombent.",badge:"Audit relationnel",steps:[{txt:"Liste les 10 personnes avec qui tu passes le plus de temps. Note leur \u00e9tat d'esprit g\u00e9n\u00e9ral."},{txt:"Identifie : qui te tire vers le haut ? Qui te tire vers le bas ? Qui est neutre ?"},{txt:"D\u00e9cide d'une action pour rapprocher les premiers et distancier les seconds."}]},
{t:'recap',title:"Ce qu'il faut retenir",vo:"Ce qu'il faut retenir. T'es la moyenne des cinq personnes que tu fr\u00e9quentes le plus. C'est pas une m\u00e9taphore, c'est neurologique. La contagion sociale est r\u00e9elle et automatique via les neurones miroirs. Identifie les profils toxiques dans ton entourage, le crabe, le pessimiste, le catastrophiste. Et cherche activement cinq connexions cl\u00e9s qui t'\u00e9l\u00e8vent. \u00c7a se construit, \u00e7a ne se trouve pas par hasard.",points:["Tu es la moyenne de tes 5 proches \u2014 c'est neurologique","La contagion sociale est r\u00e9elle et automatique","Identifie les profils toxiques : crabe, pessimiste, catastrophiste","Cherche activement 5 connexions cl\u00e9s qui t'\u00e9l\u00e8vent"]}]},
{id:14,title:"La r\u00e9silience : tomber et se relever",slides:[
{t:'intro',num:"14",title:"La r\u00e9silience :\\ntomber et <em>se relever</em>",sub:"T'as pas le choix de traverser des crises. T'as le choix de ce que tu en fais.",vo:"Le\u00e7on quatorze. La r\u00e9silience. On arrive vers la fin de cette formation. Et je voulais garder ce sujet pour l'avant-derni\u00e8re le\u00e7on parce qu'il int\u00e8gre beaucoup de ce qu'on a vu. La r\u00e9silience, c'est la capacit\u00e9 \u00e0 encaisser, \u00e0 traverser, et \u00e0 se relever plus fort. C'est pas une qualit\u00e9 qu'on a ou qu'on a pas. C'est une comp\u00e9tence qui se d\u00e9veloppe. Et dans cette le\u00e7on, je vais te donner les outils pour la construire."},
{t:'concept',tag:"La d\u00e9finition r\u00e9elle",title:"La r\u00e9silience, c'est pas l'absence de douleur",body:"Un entrepreneur r\u00e9silient souffre autant que les autres face \u00e0 une crise. Il <strong>traite cette douleur diff\u00e9remment.</strong> Il ne la nie pas. Il ne la laisse pas non plus s'installer et gouverner ses d\u00e9cisions.",vo:"D\u00e9finissons \u00e7a correctement d'embl\u00e9e parce qu'il y a un mythe l\u00e0-dessus. La r\u00e9silience, c'est pas \u00eatre blind\u00e9, sans \u00e9motions, imperturbable. Les entrepreneurs les plus r\u00e9silients que je connais ont pleur\u00e9, ont dout\u00e9, ont eu des nuits blanches. La diff\u00e9rence, c'est pas qu'ils souffrent moins. C'est qu'ils traitent cette douleur diff\u00e9remment. Ils la reconnaissent, ils la traversent, et ils prennent quand m\u00eame les d\u00e9cisions qui s'imposent. Ils laissent pas la douleur du moment d\u00e9cider de leur trajectoire \u00e0 long terme."},
{t:'list',title:"Les 3 piliers de la r\u00e9silience",sub:"S\u00e9parer ce qui d\u00e9pend de toi de ce qui n'en d\u00e9pend pas. Agir sur le premier. Accepter le second.",vo:"Trois piliers qui reviennent syst\u00e9matiquement chez les entrepreneurs r\u00e9silients. La dichotomie du contr\u00f4le d'abord. S\u00e9parer ce qui d\u00e9pend de toi et ce qui n'en d\u00e9pend pas. Le march\u00e9 qui se retourne ? Pas ton contr\u00f4le. Comment t'y r\u00e9ponds ? Ton contr\u00f4le total. Le recadrage ensuite. Changer la signification que tu donnes aux \u00e9v\u00e9nements difficiles. Le projet qui est tomb\u00e9, c'\u00e9tait peut-\u00eatre la le\u00e7on dont t'avais besoin pour r\u00e9ussir le suivant. Et le soutien. Les donn\u00e9es sont claires : les entrepreneurs avec un r\u00e9seau de soutien traversent les crises. Les solitaires s'effondrent.",items:[{emoji:"\ud83c\udfaf",name:"La dichotomie du contr\u00f4le",sub:"S\u00e9parer ce qui d\u00e9pend de toi de ce qui n'en d\u00e9pend pas. Agir sur le premier. Accepter le second."},{emoji:"\ud83d\udd04",name:"Le recadrage",sub:"Changer la signification donn\u00e9e aux \u00e9v\u00e9nements. Pas les nier. Les voir diff\u00e9remment."},{emoji:"\ud83e\udd1d",name:"Le soutien",sub:"Les entrepreneurs seuls s'effondrent. Ceux avec un r\u00e9seau de soutien traversent les crises."}]},
{t:'concept',tag:"Le sto\u00efcisme",title:"Marcus Aurelius avait tout compris",body:"Il y a deux mille ans, l'Empereur romain Marcus Aurelius \u00e9crivait dans son journal : <strong>'L'obstacle sur le chemin devient le chemin.'</strong> Ce qui te r\u00e9siste est exactement ce dont tu as besoin pour grandir.",vo:"Marcus Aurelius \u00e9tait l'un des hommes les plus puissants de son temps. Empereur romain, commandant en chef, il avait tout le pouvoir du monde. Et dans ses carnets personnels, jamais destin\u00e9s \u00e0 \u00eatre publi\u00e9s, il travaillait son mindset tous les jours. Il r\u00e9fl\u00e9chissait \u00e0 comment traverser l'adversit\u00e9. Sa conclusion principale : l'obstacle sur le chemin devient le chemin. Ce qui te r\u00e9siste est pr\u00e9cis\u00e9ment ce dont tu as besoin pour grandir. C'est pas de la philosophie de salon. C'est une fa\u00e7on de transformer chaque crise en carburant."},
{t:'stat',num:"70%",body:"70% des fondateurs avec un mentor ou un r\u00e9seau de pairs traversent les crises sans abandonner, contre <strong>30% pour ceux qui sont seuls</strong>. La solitude entrepreneuriale est un facteur de risque majeur.",vo:"Ce chiffre devrait te faire r\u00e9fl\u00e9chir imm\u00e9diatement sur ton niveau de solitude entrepreneuriale. Soixante-dix pourcent des fondateurs avec un mentor ou un r\u00e9seau de pairs traversent les crises existentielles sans abandonner. Trente pourcent pour ceux qui sont seuls. La diff\u00e9rence entre r\u00e9silier et continuer est souvent aussi simple qu'avoir quelqu'un \u00e0 appeler \u00e0 trois heures du matin quand tout semble s'effondrer. Quelqu'un qui comprend. Quelqu'un qui a d\u00e9j\u00e0 travers\u00e9 \u00e7a. La prochaine fois que tu penses que demander de l'aide est une faiblesse, rappelle-toi ce chiffre.",label:"des fondateurs avec mentor traversent les crises",val:"70%"},
{t:'action',title:"Le journal d'adversit\u00e9",vo:"L'exercice de cette le\u00e7on est un rituel quotidien simple. Chaque soir cette semaine, prends cinq minutes. Note l'obstacle principal de la journ\u00e9e. Puis distingue clairement : qu'est-ce qui \u00e9tait hors de ton contr\u00f4le dans cette situation ? Et qu'est-ce qui \u00e9tait dans ton contr\u00f4le ? Qu'est-ce que tu as appris, m\u00eame si c'est juste que t'aurais d\u00fb faire autrement ? Et qu'est-ce que tu feras diff\u00e9remment ? Cinq questions. Cinq minutes. Et progressivement, tu transformes chaque journ\u00e9e difficile en donn\u00e9es exploitables.",badge:"Outil de r\u00e9silience",steps:[{txt:"Chaque soir cette semaine, note : quel obstacle as-tu travers\u00e9 aujourd'hui ?"},{txt:"Ce qui \u00e9tait hors de ton contr\u00f4le. Ce qui \u00e9tait dans ton contr\u00f4le."},{txt:"Ce que tu as appris. Ce que tu feras diff\u00e9remment."}]},
{t:'recap',title:"L'essentiel de la r\u00e9silience",vo:"Ce qu'il faut retenir. La r\u00e9silience c'est pas l'absence de douleur, c'est traverser la douleur sans la laisser gouverner tes d\u00e9cisions. Trois piliers : dichotomie du contr\u00f4le, recadrage, r\u00e9seau de soutien. L'obstacle sur le chemin devient le chemin si tu le vois ainsi. Et soixante-dix pourcent contre trente pourcent : le r\u00e9seau fait une diff\u00e9rence d\u00e9cisive entre tenir et abandonner. Derni\u00e8re le\u00e7on : le passage \u00e0 l'action.",points:["La r\u00e9silience = traverser la douleur, pas l'\u00e9viter","3 piliers : dichotomie du contr\u00f4le, recadrage, soutien social","L'obstacle devient le chemin \u2014 Marcus Aurelius","70% vs 30% : le r\u00e9seau fait la diff\u00e9rence entre tenir et abandonner"]}]},
{id:15,title:"L'action : le seul truc qui compte",slides:[
{t:'intro',num:"15",title:"L'action :\\nle seul truc <em>qui compte</em>",sub:"T'as les outils. T'as la compr\u00e9hension. Maintenant il reste le seul truc qui change vraiment les choses : agir.",vo:"Derni\u00e8re le\u00e7on. Le\u00e7on quinze. On est au bout du chemin de cette formation. T'as maintenant quatorze le\u00e7ons de mindset. Le cerveau, la peur, l'esprit de croissance, la discipline, les habitudes, la vision, le focus, l'\u00e9nergie, l'entourage, la r\u00e9silience. C'est beaucoup. Mais tout \u00e7a ne vaut rien sans l'action. Et dans cette derni\u00e8re le\u00e7on, on va parler de pourquoi l'action est la seule chose qui compte vraiment, et comment lever les blocages finaux."},
{t:'concept',tag:"Le pi\u00e8ge final",title:"La paralysie par l'analyse",body:"Plus tu en sais, plus tu peux trouver des raisons de pas agir. <strong>La connaissance sans action est juste de la procrastination sophistiqu\u00e9e.</strong> Le moment parfait n'arrive jamais. La condition parfaite non plus.",vo:"Voil\u00e0 le dernier pi\u00e8ge, et c'est souvent le plus vicieux. Tu peux \u00eatre convaincu de tout ce qu'on a vu dans cette formation. Comprendre le mindset de croissance. Savoir comment construire des habitudes. Avoir une vision claire. Et rester immobile. Parce que tu attends encore quelque chose. Que le moment soit parfait. Que le produit soit fini. Que tu sois plus pr\u00e9par\u00e9. C'est la paralysie par l'analyse. Et c'est de la procrastination habill\u00e9e en prudence. Le moment parfait n'arrive jamais. Parce qu'il n'existe pas."},
{t:'list',title:"Les 3 blocages finaux \u00e0 l'action",sub:"Tu seras jamais assez pr\u00eat. La pr\u00e9paration n\u00e9cessaire se fait en faisant.",vo:"Trois blocages finaux \u00e0 l'action que je retrouve chez les entrepreneurs qui stagnent. Un : attendre d'\u00eatre pr\u00eat. Tu seras jamais assez pr\u00eat. La pr\u00e9paration n\u00e9cessaire pour faire quelque chose, \u00e7a s'acquiert en le faisant. Pas avant. Deux : attendre la permission. Personne va venir te tapper sur l'\u00e9paule et te dire : maintenant t'as le droit. Cette permission, tu te la donnes toi-m\u00eame. Trois : attendre la perfection. Le produit parfait jamais lanc\u00e9 vaut z\u00e9ro. Le produit imparfait lanc\u00e9 aujourd'hui te donne du feedback r\u00e9el. Et le feedback r\u00e9el, c'est ce qui te permet de construire le bon produit.",items:[{emoji:"\u23f3",name:"Attendre d'\u00eatre pr\u00eat",sub:"Tu seras jamais assez pr\u00eat. La pr\u00e9paration n\u00e9cessaire se fait en faisant."},{emoji:"\ud83c\udfaf",name:"Attendre la permission",sub:"Personne va venir te donner la permission de r\u00e9ussir. Prends-la toi-m\u00eame."},{emoji:"\ud83d\udcaf",name:"Attendre la perfection",sub:"Le produit parfait jamais lanc\u00e9 vaut z\u00e9ro. Le produit imparfait lanc\u00e9 aujourd'hui vaut tout."}]},
{t:'concept',tag:"Le principe cl\u00e9",title:"Done is better than perfect",body:"Amazon, Airbnb, Facebook. Ils ont tous lanc\u00e9 avec un produit m\u00e9diocre. <strong>Ce qui les a diff\u00e9renci\u00e9s, c'est pas la perfection du lancement. C'est la vitesse d'it\u00e9ration apr\u00e8s.</strong>",vo:"Amazon a lanc\u00e9 avec un site web moche qui vendait uniquement des livres. Airbnb a lanc\u00e9 avec des photos de mauvaise qualit\u00e9 et trois h\u00f4tes. Facebook \u00e9tait r\u00e9serv\u00e9 \u00e0 une seule universit\u00e9. Ces entreprises valent aujourd'hui des milliers de milliards. Pas parce qu'ils ont lanc\u00e9 parfaitement. Parce qu'ils ont lanc\u00e9, r\u00e9cup\u00e9r\u00e9 du feedback r\u00e9el, et it\u00e9r\u00e9 vite. La vitesse d'it\u00e9ration est la comp\u00e9tence cruciale. Et tu peux pas it\u00e9rer si t'as pas lanc\u00e9. Done is better than perfect. Ce n'est pas une excuse pour faire du mauvais boulot. C'est une permission de commencer."},
{t:'quote',vo:"Mark Twain l'a \u00e9crit il y a deux si\u00e8cles et c'est toujours aussi vrai. Les \u00e9tudes sur les regrets chez les personnes en fin de vie montrent syst\u00e9matiquement la m\u00eame chose. Les gens regrettent pas ce qu'ils ont essay\u00e9 et qui a mal tourn\u00e9. Ils regrettent ce qu'ils ont pas os\u00e9. Les projets pas lanc\u00e9s. Les conversations pas eues. Les risques pas pris. Dans cinq ans, dans dix ans, dans vingt ans, tu regretteras davantage les choses que t'as pas faites. Rappelle-toi \u00e7a la prochaine fois que tu hesites \u00e0 te lancer.",text:"Dans cinq ans tu regretteras davantage les choses que t'as pas faites que celles que t'as faites.",auth:"\u2014 Mark Twain"},
{t:'action',title:"Ton engagement maintenant",vo:"L'exercice final de cette formation. Note une action que tu repousses depuis trop longtemps. Une action pr\u00e9cise, pas vague. Pas 'travailler sur mon business', une vraie action concr\u00e8te. Envoyer un email \u00e0 ce client potentiel. Finir cette page de vente. Prendre ce rendez-vous. Puis \u00e9cris : je m'engage \u00e0 faire cette action d'ici une date pr\u00e9cise dans quarante-huit heures maximum. Et partage cet engagement avec quelqu'un qui peut te demander des comptes. Pas pour qu'il te juge. Pour que tu aies une raison externe d'aller au bout.",badge:"Le contrat d'engagement",steps:[{txt:"Note une action que tu repousses depuis trop longtemps \u2014 sois pr\u00e9cis, pas vague"}]},
{t:'recap',title:"Bilan de la formation Mindset",vo:"On est au bout. Quinze le\u00e7ons. Voil\u00e0 la synth\u00e8se. Les le\u00e7ons un \u00e0 trois ont pos\u00e9 les fondations : mindset de croissance, fonctionnement du cerveau, relation \u00e0 la peur. Les le\u00e7ons quatre \u00e0 six t'ont aid\u00e9 \u00e0 te construire : zone de confort, identit\u00e9 d'entrepreneur, vision \u00e0 long terme. Les le\u00e7ons sept \u00e0 neuf t'ont donn\u00e9 les outils du quotidien : discipline, habitudes, gestion de l'\u00e9chec. Les le\u00e7ons dix \u00e0 douze ont optimis\u00e9 ta machine : focus, \u00e9nergie, performance mentale. Et les le\u00e7ons treize \u00e0 quinze ont couvert ce qui permet de tenir : entourage, r\u00e9silience, passage \u00e0 l'action. T'as maintenant les fondations. Le reste, c'est \u00e0 toi de jouer.",points:["1-3 : Mindset de croissance, cerveau, peur \u2014 comprendre les fondations","4-6 : Zone de confort, identit\u00e9, vision \u2014 te construire","7-9 : Discipline, habitudes, \u00e9chec \u2014 les outils du quotidien","10-12 : Focus, \u00e9nergie, performance \u2014 optimiser ta machine","13-15 : Entourage, r\u00e9silience, action \u2014 tenir et avancer"]}]},
];




// ══ TRACKER NATIF ══
const TRACKER_KEY='sbw_tracker__formation_mindset';
function loadProg(){try{return JSON.parse(localStorage.getItem(TRACKER_KEY)||'{}')}catch(e){return{}}}
function saveProg(d){try{localStorage.setItem(TRACKER_KEY,JSON.stringify(d))}catch(e){}}
function markDone(idx){var d=loadProg();if(!d[idx]){d[idx]=true;d._total=LESSONS.length;d._updated=Date.now();saveProg(d);refreshUI()}}
function globalPct(){var d=loadProg();var n=LESSONS.filter(function(_,i){return!!d[i]}).length;return Math.round(n/LESSONS.length*100)}

// ══ STATE ══
var curL=0,curS=0,seen={};
function markSeen(l,s){if(!seen[l])seen[l]=new Set();seen[l].add(s);var tot=LESSONS[l].slides.length;var pct=Math.round(seen[l].size/tot*100);if(pct>=80)markDone(l);updatePbars()}

// ══ RENDER ══
function render(){
  var L=LESSONS[curL],sl=L.slides[curS];
  markSeen(curL,curS);
  // Lancer la voix off si activée
  var sl_vo = LESSONS[curL].slides[curS];
  if (voixOn && sl_vo && sl_vo.vo) {
    if (synth) synth.cancel();
    setTimeout(function(){ playVoix(sl_vo.vo); }, 150);
  } else if (autoPlay) {
    // Slide sans VO : avancer après 2s
    setTimeout(autoAdvance, 2000);
  }
  var a=document.getElementById('slideArea');
  var t=sl.t,h='';
  if(t==='intro'){
    h='<div class="slide-intro"><div class="slide-num">Leçon '+L.id+' / '+LESSONS.length+'</div><span class="slide-emoji-big">'+(sl.emoji||'')+'</span><div class="slide-intro-title">'+sl.title.replace(/\\n|\n/g,'<br>')+'</div>'+(sl.sub?'<div class="slide-intro-sub">'+sl.sub+'</div>':'')+'</div>';
  } else if(t==='concept'){
    // Extraire les lignes fortes du body pour les mettre en valeur
    var bodyFmt = (sl.body||'').replace(/<br><br>/g,'</p><p>');
    // Détecter les éléments ✅ ❌ ⚠️ 🔴 etc pour les transformer en key-points
    var hasKeyPoints = /^[✅❌⚠️🔴🟢•▪]/.test(sl.body||'');
    var bodyHtml;
    if(hasKeyPoints){
      var klines = (sl.body||'').split('<br>').filter(Boolean);
      var kpts = klines.map(function(l){
        var icon = l.match(/^(\S+)\s*/);
        var txt = icon ? l.replace(icon[0],'') : l;
        return '<div class="key-point"><div class="key-point-icon">'+(icon?icon[1]:'▸')+'</div><div class="key-point-text">'+txt+'</div></div>';
      }).join('');
      bodyHtml = '<div class="concept-card">'+kpts+'</div>';
    } else {
      // Mettre les parties <strong>...</strong> en highlight
      var highlighted = (sl.body||'').replace(/<strong>(.*?)<\/strong>/g,'</p><div class="concept-highlight">$1</div><p>');
      bodyHtml = '<div class="slide-body">'+highlighted+'</div>';
    }
    var eyebrow = sl.emoji ? '<div class="slide-eyebrow"><span class="slide-eyebrow-icon">'+sl.emoji+'</span>'+(sl.tag?'<span class="slide-eyebrow-tag">'+sl.tag+'</span>':'')+'</div>' : (sl.tag?'<div class="slide-tag">'+sl.tag+'</div>':'');
    h='<div class="slide-block">'+eyebrow+'<div class="slide-title">'+sl.title+'</div>'+bodyHtml+'</div>';
  } else if(t==='cards'||t==='list'){
    var items=sl.items.map(function(it){return'<div class="card-item"><div class="card-emoji">'+it.emoji+'</div><div><div class="card-name">'+it.name+'</div><div class="card-sub">'+it.sub+'</div></div></div>';}).join('');
    h='<div class="slide-block"><div class="slide-title">'+sl.title+'</div><div class="cards-grid">'+items+'</div></div>';
  } else if(t==='compare'){
    var lc=sl.left,rc=sl.right;
    h='<div class="slide-block"><div class="slide-title">'+sl.title+'</div><div class="compare-grid"><div class="compare-col"><div class="compare-header"><span class="compare-emoji">'+lc.emoji+'</span><span class="compare-label">'+lc.label+'</span></div><div class="compare-num">'+lc.num+'</div>'+(lc.unit?'<div class="compare-unit">'+lc.unit+'</div>':'')+'<div class="compare-desc">'+lc.desc+'</div></div><div class="compare-col '+(rc.color||'')+'"><div class="compare-header"><span class="compare-emoji">'+rc.emoji+'</span><span class="compare-label">'+rc.label+'</span></div><div class="compare-num '+(rc.color==='good'?'green':'')+'">'+rc.num+'</div>'+(rc.unit?'<div class="compare-unit">'+rc.unit+'</div>':'')+'<div class="compare-desc">'+rc.desc+'</div></div></div>'+(sl.note?'<div class="compare-note">'+sl.note+'</div>':'')+'</div>';
  } else if(t==='stat'){
    h='<div class="slide-block"><div class="stat-block"><div class="stat-val">'+sl.val+'</div><div class="stat-unit">'+sl.unit+'</div><div class="stat-body">'+sl.body+'</div></div></div>';
  } else if(t==='warning'){
    h='<div class="slide-block"><div class="warning-block"><div class="warning-icon">'+(sl.emoji||'⚠️')+'</div><div class="warning-title">'+sl.title+'</div><div class="warning-body">'+(sl.body||sl.warn||'')+'</div></div></div>';
  } else if(t==='action'){
    var steps=sl.steps.map(function(s,i){return'<div class="action-step"><div class="action-step-num">'+(i+1)+'</div><span>'+s+'</span></div>';}).join('');
    h='<div class="slide-block"><div class="action-block"><div class="action-badge">'+sl.badge+'</div><div class="action-title">'+sl.title+'</div><div class="action-steps">'+steps+'</div><a href="'+sl.url+'" target="_blank" rel="noopener" class="action-cta">'+sl.cta+' →</a></div></div>';
  } else if(t==='quote'){
    h='<div class="slide-block"><div class="quote-block"><div class="quote-text">"'+sl.text+'"</div>'+(sl.auth?'<div style="font-size:.75rem;color:var(--muted);margin-top:10px;font-style:normal">'+sl.auth+'</div>':'')+'<div class="quote-bar"></div></div></div>';
  } else if(t==='recap'){
    var pts=sl.points.map(function(p){return'<div class="recap-item"><span class="recap-dot">◆</span><span>'+p+'</span></div>';}).join('');
    h='<div class="slide-block"><div class="recap-title">'+sl.title+'</div><div class="recap-list">'+pts+'</div></div>';
  }
  a.classList.remove('slide-enter','slide-enter-back');
  a.innerHTML=h;
  void a.offsetWidth; // force reflow
  a.classList.add(window._slideDir==='prev'?'slide-enter-back':'slide-enter');
  window._slideDir='next';
  a.scrollTop=0;
  updateNav();updatePbars();updateSidebar();
}

function updateNav(){
  var L=LESSONS[curL];
  document.getElementById('navInfo').textContent='Leçon '+L.id+' · Slide '+(curS+1)+'/'+L.slides.length;
  document.getElementById('btnPrev').disabled=curL===0&&curS===0;
  var last=curL===LESSONS.length-1&&curS===L.slides.length-1;
  var nb=document.getElementById('btnNext');
  nb.textContent=last?'Terminer ✓':'Suivant →';
  nb.className=last?'btn-nav done-btn':'btn-nav primary';
}

function updatePbars(){
  var s=seen[curL]?seen[curL].size:1;
  var tot=LESSONS[curL].slides.length;
  var pct=Math.max(Math.round(s/tot*100),Math.round((curS+1)/tot*100));
  document.getElementById('slidePbar').style.width=pct+'%';
  var gp=globalPct();
  document.getElementById('hPbarFill').style.width=gp+'%';
  document.getElementById('hPct').textContent=gp+'%';
}

function updateSidebar(){
  var d=loadProg();
  document.getElementById('sbLessons').innerHTML=LESSONS.map(function(l,i){
    var done=!!d[i];
    var s=seen[i]?seen[i].size:0;
    var pct=done?100:Math.round(s/l.slides.length*100);
    return'<div class="sb-item'+(i===curL?' active':'')+(done?' done':'')+'" onclick="goTo('+i+')">'+'<span class="sb-num">'+l.id+'</span><div class="sb-info"><div class="sb-name">'+l.title+'</div><div class="sb-bar"><div class="sb-bar-fill" style="width:'+pct+'%"></div></div></div><span class="sb-check">✓</span></div>';
  }).join('');
}

function refreshUI(){updatePbars();updateSidebar();renderLessonsPanel();}

function toggleLessonsPanel() {
  var panel = document.getElementById('lessonsPanel');
  var tab = document.getElementById('lessonsTab');
  var isOpen = panel.classList.contains('open');
  if (isOpen) {
    panel.classList.remove('open');
    var ov=document.getElementById('lpOverlay');if(ov)ov.classList.remove('open');
    tab.classList.remove('active');
  } else {
    renderLessonsPanel();
    panel.classList.add('open');
    var ov=document.getElementById('lpOverlay');if(ov)ov.classList.add('open');
    tab.classList.add('active');
  }
}

function renderLessonsPanel() {
  var d = loadProg();
  var el = document.getElementById('lpScroll');
  el.innerHTML = LESSONS.map(function(l, li) {
    var isDone = !!d[li];
    var isActivL = li === curL;
    var slides = l.slides.map(function(s, si) {
      var label = s.t === 'intro' ? '▶ Intro' :
                  s.t === 'recap' ? '✓ Recap' :
                  s.t === 'action' ? '🚀' :
                  s.t === 'stat' ? '📊' :
                  s.t === 'warning' ? '⚠️' :
                  s.t === 'quote' ? '"' :
                  s.t === 'compare' ? '⚖️' :
                  s.t === 'cards' ? '📋' : '💡';
      var isActS = isActivL && si === curS;
      return '<button class="lp-slide-btn' + (isActS?' active':'') + '" onclick="goToSlide(' + li + ',' + si + ')">' + label + ' ' + (si+1) + '</button>';
    }).join('');
    return '<div class="lp-lesson' + (isActivL?' open':'') + '">' +
      '<button class="lp-lesson-btn' + (isActivL?' active':'') + (isDone?' done':'') + '" onclick="toggleLpLesson(this,' + li + ')">' +
        '<span class="lp-lesson-num">' + l.id + '</span>' +
        '<span class="lp-lesson-name">' + l.title + '</span>' +
        '<span class="lp-lesson-check">✓</span>' +
      '</button>' +
      '<div class="lp-slides">' + slides + '</div>' +
    '</div>';
  }).join('');
}

function toggleLpLesson(btn, idx) {
  var lessonEl = btn.parentElement;
  var wasOpen = lessonEl.classList.contains('open');
  document.querySelectorAll('.lp-lesson').forEach(function(el){ el.classList.remove('open'); });
  if (!wasOpen) lessonEl.classList.add('open');
}

function goToSlide(li, si) {
  autoPlay = false; stopVoix();
  document.getElementById('playIcon').style.display='block';
  document.getElementById('pauseIcon').style.display='none';
  document.getElementById('playBtn').classList.remove('playing');
  curL = li; curS = si;
  render();
  renderLessonsPanel();
}

// ══ NAVIGATION ══
function next(){autoPlay=false;stopVoix();
  document.getElementById('playIcon').style.display='block';
  document.getElementById('pauseIcon').style.display='none';
  document.getElementById('playBtn').classList.remove('playing');
  window._slideDir='next';
  var L=LESSONS[curL];
  if(curS<L.slides.length-1){curS++;render();}
  else if(curL<LESSONS.length-1){markDone(curL);curL++;curS=0;render();}
  else{markDone(curL);}
}
function prev(){autoPlay=false;stopVoix();
  document.getElementById('playIcon').style.display='block';
  document.getElementById('pauseIcon').style.display='none';
  document.getElementById('playBtn').classList.remove('playing');
  window._slideDir='prev';
  if(curS>0){curS--;render();}
  else if(curL>0){curL--;curS=LESSONS[curL].slides.length-1;render();}
}
function goTo(idx){
  autoPlay=false;stopVoix();
  document.getElementById('playIcon').style.display='block';
  document.getElementById('pauseIcon').style.display='none';
  document.getElementById('playBtn').classList.remove('playing');
  curL=idx;curS=0;render();}

// ══ TTS ══
var voixOn = false;
var synth = window.speechSynthesis;
var utterance = null;

var autoPlay = false;

function stopVoix() {
  autoPlay = false;
  if (synth) synth.cancel();
  var subs = document.getElementById('subtitlesText');
  if (subs) { subs.classList.add('hidden'); subs.textContent = ''; }
}

function togglePlay() {
  if (autoPlay) {
    // Pause
    autoPlay = false;
    voixOn = false;
    stopVoix();
    document.getElementById('playIcon').style.display = 'block';
    document.getElementById('pauseIcon').style.display = 'none';
    document.getElementById('playBtn').classList.remove('playing');
    document.getElementById('btnVoix').classList.remove('active');
    document.getElementById('btnVoix').textContent = '🔊 Voix';
  } else {
    // Play
    voixOn = true;
    autoPlay = true;
    document.getElementById('playIcon').style.display = 'none';
    document.getElementById('pauseIcon').style.display = 'block';
    document.getElementById('playBtn').classList.add('playing');
    document.getElementById('btnVoix').classList.add('active');
    document.getElementById('btnVoix').textContent = '🔊 Voix ON';
    var sl = LESSONS[curL].slides[curS];
    if (sl && sl.vo) playVoix(sl.vo);
    else autoAdvance();
  }
}

function autoAdvance() {
  if (!autoPlay) return;
  window._slideDir='next';
  // Avancer au slide suivant
  var L = LESSONS[curL];
  if (curS < L.slides.length - 1) {
    curS++; render();
  } else if (curL < LESSONS.length - 1) {
    markDone(curL); curL++; curS = 0; render();
  } else {
    markDone(curL); autoPlay = false;
  }
}

function playVoix(text) {
  if (!voixOn || !text || !synth) return;
  synth.cancel();
  // Supprimer le préfixe "Leçon X." en début de VO
  text = text.replace(/^Le[çc]on\s+\w+\.?\s*/i, '');
  utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'fr-FR';
  utterance.rate = 1.05;
  utterance.pitch = 1;
  utterance.volume = 1;
  var voices = synth.getVoices();
  var frVoice = voices.find(function(v) { return v.lang === 'fr-FR' && v.name.indexOf('Google') > -1; })
    || voices.find(function(v) { return v.lang === 'fr-FR'; })
    || voices.find(function(v) { return v.lang.startsWith('fr'); });
  if (frVoice) utterance.voice = frVoice;

  // Sous-titres synchronisés via boundary event
  var subs = document.getElementById('subtitlesText');
  var sentences = text.match(/[^.!?…]+[.!?…]+\s*/g) || [text];
  // Précalculer les positions de début de chaque phrase
  var positions = [];
  var pos = 0;
  sentences.forEach(function(s) {
    positions.push(pos);
    pos += s.length;
  });

  utterance.onboundary = function(e) {
    if (e.name !== 'word' && e.name !== 'sentence') return;
    var ci = e.charIndex;
    // Trouver la phrase qui contient cet index
    var phraseIdx = 0;
    for (var i = positions.length - 1; i >= 0; i--) {
      if (ci >= positions[i]) { phraseIdx = i; break; }
    }
    subs.classList.remove('hidden');
    subs.textContent = sentences[phraseIdx].trim();
  };

  utterance.onend = function() {
    subs.classList.add('hidden');
    subs.textContent = '';
    if (autoPlay) setTimeout(autoAdvance, 400);
  };
  utterance.onerror = function() {
    subs.classList.add('hidden');
    subs.textContent = '';
  };

  synth.speak(utterance);
}

function playVoixAuto(text) {
  // Comme playVoix mais déclenche autoAdvance à la fin
  playVoix(text);
}

function toggleVoix() {
  voixOn = !voixOn;
  var btn = document.getElementById('btnVoix');
  if (voixOn) {
    btn.classList.add('active');
    btn.textContent = '🔊 Voix ON';
    // Lire le slide actuel
    var sl = LESSONS[curL].slides[curS];
    if (sl.vo) playVoix(sl.vo);
  } else {
    btn.classList.remove('active');
    btn.textContent = '🔊 Voix';
    stopVoix();
  }
}

// ══ INIT ══
(function(){
  var d=loadProg();
  LESSONS.forEach(function(l,i){if(d[i])seen[i]=new Set(Array.from({length:l.slides.length},function(_,j){return j;}));});
  var start=0;
  for(var i=0;i<LESSONS.length;i++){if(!d[i]){start=i;break;}if(i===LESSONS.length-1)start=i;}
  curL=start;curS=0;
  voixOn = false;
  render();
})();

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  if(e.key==='ArrowLeft'){e.preventDefault();prev();}
});
</script>
