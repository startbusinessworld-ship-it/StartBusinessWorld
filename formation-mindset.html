<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formation Mindset 🧠 | SBW</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0C0C0A;--surface:#141412;--border:rgba(255,255,255,.08);
  --white:#F0ECE4;--muted:rgba(240,236,228,.45);--faint:rgba(240,236,228,.07);
  --gold:#C2185B;--gold-rgb:194,24,91;--gold-light:#E91E8C;--green:#4ECB71;--red:#E05252;--site-gold:#A67C3A;--site-gold-light:#C49A4E;
  --sidebar:240px;--header:52px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);display:flex;flex-direction:column}
header{height:var(--header);background:var(--surface);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.h-left{display:flex;align-items:center;gap:14px}
.h-logo{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--site-gold);letter-spacing:.04em}
.h-sep{width:0.5px;height:18px;background:var(--border)}
.h-title{font-size:.82rem;color:var(--muted)}
.h-right{display:flex;align-items:center;gap:12px}
.h-pbar-wrap{width:120px;height:4px;background:var(--faint);border-radius:2px;overflow:hidden}
.h-pbar-fill{height:100%;background:var(--site-gold);border-radius:2px;transition:width .4s}
.h-pct{font-size:.72rem;color:var(--muted)}
.btn-close{background:none;border:0.5px solid var(--border);color:var(--muted);padding:5px 14px;border-radius:5px;font-size:.75rem;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-close:hover{border-color:var(--white);color:var(--white)}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar);background:var(--surface);border-right:0.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-head{padding:14px 14px 10px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.sb-head-label{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.sb-lessons{flex:1;overflow-y:auto;padding:6px}
.sb-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:7px;cursor:pointer;transition:background .1s}
.sb-item:hover{background:var(--faint)}
.sb-item.active{background:rgba(166,124,58,.15)}
.sb-item.active .sb-num{color:var(--gold)}
.sb-num{font-size:.65rem;color:var(--muted);width:16px;flex-shrink:0;text-align:right;font-weight:500}
.sb-info{flex:1;min-width:0}
.sb-name{font-size:.78rem;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-bar{height:2px;background:var(--faint);border-radius:1px;margin-top:4px;overflow:hidden}
.sb-bar-fill{height:100%;background:var(--site-gold);border-radius:1px;transition:width .3s}
.sb-check{font-size:.7rem;color:var(--green);opacity:0;flex-shrink:0;transition:opacity .2s}
.sb-item.done .sb-check{opacity:1}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.slide-progress{height:3px;background:var(--faint);flex-shrink:0}
.slide-progress-fill{height:100%;background:var(--site-gold);transition:width .3s}
.slide-area{flex:1;overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;padding:32px 40px 100px}
.slide-wrap{width:100%;max-width:720px}
.slide-intro{text-align:center;padding:40px 20px 32px}
.slide-num{font-size:.7rem;letter-spacing:.15em;color:var(--gold);margin-bottom:12px;text-transform:uppercase}
.slide-emoji-big{font-size:3.5rem;margin-bottom:20px;display:block}
.slide-intro-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:600;line-height:1.1;margin-bottom:18px}
.slide-intro-title em{color:var(--gold);font-style:italic}
.slide-intro-sub{font-size:.92rem;color:var(--muted);max-width:540px;margin:0 auto;line-height:1.7}
.slide-block{padding:8px 0}
.slide-tag{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);margin-bottom:10px}
.slide-title{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:600;line-height:1.2;margin-bottom:16px}
.slide-body{font-size:.9rem;color:rgba(240,236,228,.85);line-height:1.75}
.slide-body strong{color:var(--white);font-weight:600}
.slide-body em{color:var(--gold);font-style:italic}
.cards-grid{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.card-item{background:var(--faint);border:0.5px solid var(--border);border-radius:9px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.card-emoji{font-size:1.4rem;flex-shrink:0;margin-top:1px}
.card-name{font-size:.88rem;font-weight:600;margin-bottom:3px}
.card-sub{font-size:.78rem;color:var(--muted);line-height:1.55}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
.compare-col{background:var(--faint);border:0.5px solid var(--border);border-radius:9px;padding:16px}
.compare-col.good{border-color:rgba(78,203,113,.3);background:rgba(78,203,113,.06)}
.compare-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.compare-emoji{font-size:1.3rem}
.compare-label{font-size:.78rem;font-weight:600}
.compare-num{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:700;color:var(--gold);line-height:1;margin-bottom:4px}
.compare-num.green{color:var(--green)}
.compare-unit{font-size:.7rem;color:var(--muted);margin-bottom:10px}
.compare-desc{font-size:.78rem;color:var(--muted);line-height:1.55}
.compare-note{margin-top:12px;padding:10px 14px;background:rgba(166,124,58,.08);border-left:2px solid var(--gold);border-radius:0 6px 6px 0;font-size:.78rem;color:rgba(240,236,228,.7);line-height:1.6}
.stat-block{text-align:center;padding:32px 20px}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,10vw,5.5rem);font-weight:700;color:var(--gold);line-height:1}
.stat-unit{font-size:1rem;color:var(--muted);margin-top:4px;margin-bottom:20px}
.stat-body{font-size:.88rem;color:var(--muted);line-height:1.7;max-width:500px;margin:0 auto}
.warning-block{background:rgba(224,82,82,.08);border:0.5px solid rgba(224,82,82,.25);border-radius:10px;padding:20px 22px}
.warning-icon{font-size:1.6rem;margin-bottom:10px}
.warning-title{font-size:1rem;font-weight:600;margin-bottom:10px;color:#F08080}
.warning-body{font-size:.86rem;color:rgba(240,236,228,.8);line-height:1.7}
.action-block{background:linear-gradient(135deg,rgba(166,124,58,.12),rgba(166,124,58,.06));border:0.5px solid rgba(166,124,58,.3);border-radius:12px;padding:24px}
.action-badge{display:inline-flex;align-items:center;gap:6px;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);background:rgba(166,124,58,.15);padding:4px 10px;border-radius:20px;margin-bottom:14px}
.action-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;margin-bottom:16px}
.action-steps{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.action-step{display:flex;align-items:flex-start;gap:10px;font-size:.85rem;color:rgba(240,236,228,.85);line-height:1.5}
.action-step-num{width:20px;height:20px;border-radius:50%;background:var(--gold);color:#000;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.action-cta{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:#fff;padding:12px 24px;border-radius:8px;font-size:.88rem;font-weight:600;text-decoration:none;border:none;cursor:pointer;font-family:inherit;transition:background .15s}
.action-cta:hover{background:var(--gold-light)}
.recap-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;margin-bottom:14px;color:var(--gold)}
.recap-list{display:flex;flex-direction:column;gap:7px}
.recap-item{display:flex;align-items:flex-start;gap:10px;font-size:.86rem;color:rgba(240,236,228,.85);line-height:1.55}
.recap-dot{color:var(--gold);font-size:.7rem;flex-shrink:0;margin-top:3px}
.quote-block{text-align:center;padding:32px 20px}
.quote-text{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,3vw,1.8rem);font-style:italic;line-height:1.5;color:var(--white);margin-bottom:16px;max-width:580px;margin-left:auto;margin-right:auto}
.quote-bar{width:40px;height:2px;background:var(--gold);margin:0 auto}
.nav-bar{height:60px;background:var(--surface);border-top:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;gap:8px;position:fixed;bottom:0;left:var(--sidebar);right:0;z-index:50}
.nav-info{font-size:.75rem;color:var(--muted);flex:1;text-align:center}
.nav-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.nav-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn-nav{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:7px;font-size:.82rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;border:0.5px solid var(--border);background:var(--faint);color:var(--white)}
.btn-nav:hover{border-color:rgba(255,255,255,.3)}
.btn-nav:disabled{opacity:.3;cursor:not-allowed}
.btn-nav.primary{background:var(--site-gold);border-color:var(--site-gold);color:#fff}
.btn-nav.primary:hover{background:var(--site-gold-light)}
.btn-nav.done-btn{background:rgba(78,203,113,.12);border-color:rgba(78,203,113,.3);color:var(--green)}
/* Bouton hamburger */
.btn-menu{display:flex;flex-direction:column;justify-content:center;gap:4px;padding:8px 10px;border-radius:7px;border:0.5px solid var(--border);background:var(--faint);cursor:pointer;transition:all .15s}
.btn-menu:hover{border-color:rgba(255,255,255,.3)}
.btn-menu.active{border-color:var(--gold)}
.btn-menu span{display:block;width:16px;height:1.5px;background:var(--muted);border-radius:2px;transition:background .15s}
.btn-menu.active span{background:var(--gold)}
/* Bouton Play/Pause */
.btn-play{width:38px;height:38px;border-radius:50%;background:var(--site-gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;animation:pulse 2.5s infinite}
.btn-play:hover{background:var(--site-gold-light);transform:scale(1.08)}
.btn-play svg{fill:#fff}
.btn-play.playing{animation:none;background:var(--gold)}
#btnVoix.active{background:rgba(166,124,58,.15);border-color:var(--gold);color:var(--gold)}
.subtitles{position:fixed;bottom:130px;left:calc(var(--sidebar) + (100% - var(--sidebar)) / 2);transform:translateX(-50%);z-index:100;max-width:700px;width:90%;text-align:center;pointer-events:none}
.subtitles-text{display:inline-block;background:rgba(0,0,0,.75);color:#fff;font-size:.92rem;line-height:1.6;padding:8px 18px;border-radius:8px;backdrop-filter:blur(4px);transition:opacity .3s}
.subtitles-text.hidden{opacity:0}
.cta-fixed{position:fixed;bottom:72px;left:calc(var(--sidebar) + (100% - var(--sidebar)) / 2);transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:8px;background:var(--gold);color:#fff;padding:11px 28px;border-radius:30px;font-size:.85rem;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(27,94,32,.4);transition:background .15s,transform .15s;white-space:nowrap}
.cta-fixed:hover{background:var(--gold-light);transform:translateX(-50%) translateY(-2px)}

/* Play/pause dans la nav bar */
@keyframes pulse{0%,100%{box-shadow:0 0 0 6px rgba(166,124,58,.2)}50%{box-shadow:0 0 0 10px rgba(166,124,58,.06)}}

/* Panneau leçons */
.lessons-panel{position:fixed;bottom:0;left:0;width:320px;background:var(--surface);border-top:0.5px solid var(--border);border-right:0.5px solid var(--border);border-radius:0 12px 0 0;z-index:300;transform:translateY(100%);transition:transform .3s;max-height:70vh;display:flex;flex-direction:column}
.lessons-panel.open{transform:translateY(0)}
.lp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299;display:none}
.lp-overlay.open{display:block}
.lp-head{padding:14px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.lp-head-title{font-size:.8rem;font-weight:600;color:var(--white)}
.lp-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:2px 6px}
.lp-scroll{overflow-y:auto;flex:1;padding:8px}
.lp-lesson{margin-bottom:4px}
.lp-lesson-btn{width:100%;display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:6px;cursor:pointer;background:none;border:none;font-family:inherit;color:var(--white);text-align:left;transition:background .1s}
.lp-lesson-btn:hover{background:var(--faint)}
.lp-lesson-btn.active{color:var(--gold)}
.lp-lesson-num{font-size:.65rem;color:var(--muted);width:16px;flex-shrink:0}
.lp-lesson-name{font-size:.78rem;flex:1}
.lp-lesson-check{font-size:.68rem;color:var(--green);opacity:0}
.lp-lesson-btn.done .lp-lesson-check{opacity:1}
.lp-slides{padding:0 0 0 34px;display:none}
.lp-lesson.open .lp-slides{display:flex;flex-wrap:wrap;gap:4px;padding-bottom:6px}
.lp-slide-btn{font-size:.68rem;padding:3px 10px;border-radius:4px;border:0.5px solid var(--border);background:var(--faint);color:var(--muted);cursor:pointer;font-family:inherit;transition:all .1s}
.lp-slide-btn:hover{border-color:var(--gold);color:var(--gold)}
.lp-slide-btn.active{background:rgba(166,124,58,.2);border-color:var(--gold);color:var(--gold)}


::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px}

/* Animations slides */
@keyframes fadeSlideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeSlideInLeft{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
.slide-enter{animation:fadeSlideIn .28s cubic-bezier(.22,1,.36,1)}
.slide-enter-back{animation:fadeSlideInLeft .28s cubic-bezier(.22,1,.36,1)}

/* Concept enrichi */
.concept-card{background:var(--faint);border:0.5px solid var(--border);border-radius:12px;padding:22px 24px;margin-bottom:12px}
.concept-highlight{background:linear-gradient(135deg,rgba(var(--gold-rgb),.12),transparent);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:12px 16px;margin:14px 0;font-size:.9rem;line-height:1.7;color:var(--white)}
.key-point{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:0.5px solid var(--border)}
.key-point:last-child{border-bottom:none}
.key-point-icon{font-size:1.3rem;flex-shrink:0;margin-top:2px}
.key-point-text{font-size:.87rem;color:rgba(240,236,228,.85);line-height:1.6}
.slide-eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.slide-eyebrow-icon{font-size:1.8rem}
.slide-eyebrow-tag{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--gold)}
@media(max-width:600px){
  .sidebar{display:none}
  .lessons-panel{width:100%;border-right:none;border-radius:12px 12px 0 0;max-height:80vh}
  .nav-bar{left:0}
  .slide-area{padding:20px}
  .compare-grid{grid-template-columns:1fr}
  .h-title{display:none}
  .cta-fixed{left:50%}
  .subtitles{left:50%}
}
</style>
</head>
<body>
<header>
  <div class="h-left">
    <span class="h-logo">SBW</span>
    <div class="h-sep"></div>
    <span class="h-title">Formation Mindset 🧠</span>
  </div>
  <div class="h-right">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="h-pbar-wrap"><div class="h-pbar-fill" id="hPbarFill" style="width:0%"></div></div>
      <span class="h-pct" id="hPct">0%</span>
    </div>
    <button id="btnVoix" onclick="toggleVoix()" style="display:flex;align-items:center;gap:5px;background:none;border:0.5px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:5px;font-size:.75rem;cursor:pointer;font-family:inherit;transition:all .15s" title="Voix off 1.05x">🔊 Voix</button>
    <button class="btn-close" onclick="stopVoix();window.parent.postMessage('sbw:close','*')">✕ Fermer</button>
  </div>
</header>
<div class="layout">
  <aside class="sidebar">
    <div class="sb-head"><div class="sb-head-label">15 leçons</div></div>
    <div class="sb-lessons" id="sbLessons"></div>
  </aside>
  <div class="main">
    <div class="slide-progress"><div class="slide-progress-fill" id="slidePbar" style="width:0%"></div></div>
    <div class="slide-area" id="slideArea"></div>
    <div class="nav-bar">
      <div class="nav-left">
        <!-- Hamburger menu -->
        <button class="btn-menu" id="lessonsTab" onclick="toggleLessonsPanel()" title="Navigation" style="flex-direction:row;gap:6px;padding:6px 12px">
          <span></span><span></span><span></span><span class="btn-menu-label" style="font-size:.7rem;font-weight:500;color:var(--muted)">Leçons</span>
        </button>
        <!-- Play / Pause -->
        <button class="btn-play" id="playBtn" onclick="togglePlay()" title="Play / Pause">
          <svg id="playIcon" viewBox="0 0 24 24" width="14" height="14"><polygon points="5,3 19,12 5,21"/></svg>
          <svg id="pauseIcon" viewBox="0 0 24 24" width="14" height="14" style="display:none"><rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/></svg>
        </button>
      </div>
      <span class="nav-info" id="navInfo"></span>
      <div class="nav-right">
        <button class="btn-nav" id="btnPrev" onclick="prev()">←</button>
        <button class="btn-nav primary" id="btnNext" onclick="next()">→</button>
      </div>
    </div>
  </div>
</div>

<div class="subtitles" id="subtitles">
  <div class="subtitles-text hidden" id="subtitlesText"></div>
</div>

<!-- Panneau leçons -->
<div class="lp-overlay" id="lpOverlay" onclick="toggleLessonsPanel()"></div>
<div class="lessons-panel" id="lessonsPanel">
  <div class="lp-head">
    <span class="lp-head-title">Navigation</span>
    <button class="lp-close" onclick="toggleLessonsPanel()">✕</button>
  </div>
  <div class="lp-scroll" id="lpScroll"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sbw-membre-auth.js"></script>
<script>
const LESSONS=[
{id:1,title:"T'as pas un probl\u00e8me de talent",slides:[
{t:'intro',num:"01",title:"T'as pas un\\nprobl\u00e8me de <em>talent</em>",sub:"95% des entrepreneurs qui \u00e9chouent ont les comp\u00e9tences pour r\u00e9ussir. Ce qui leur manque, c'est dans la t\u00eate.",vo:"\u00c9coute bien ce que je vais te dire parce que \u00e7a va changer ta fa\u00e7on de voir les choses. T'as pas un probl\u00e8me de talent. T'as pas un probl\u00e8me de r\u00e9seau, ni de capital, ni d'opportunit\u00e9s. T'as un probl\u00e8me de mindset. Et c'est une excellente nouvelle. Parce que le mindset, contrairement au talent, \u00e7a se travaille. Dans cette formation, je vais pas te faire de discours. Je vais te donner les vrais outils pour reconstruire ta fa\u00e7on de penser de z\u00e9ro. Reste avec moi."},
{t:'concept',tag:"Le vrai probl\u00e8me",title:"Pourquoi les comp\u00e9tences ne suffisent pas",body:"T'imagines deux entrepreneurs avec les m\u00eames comp\u00e9tences, la m\u00eame id\u00e9e, le m\u00eame march\u00e9. L'un r\u00e9ussit, l'autre abandonne au premier obstacle. <strong>La seule diff\u00e9rence, c'est comment ils ont interpr\u00e9t\u00e9 cet obstacle.</strong> Pas les comp\u00e9tences. La fa\u00e7on de penser.",vo:"Je vais pas te la faire \u00e0 l'envers. On a tous crois\u00e9 des gens ultra-comp\u00e9tents qui gal\u00e8rent, et des gens moins dou\u00e9s qui cartonnent. Pourquoi ? Parce que les comp\u00e9tences te donnent les outils. Le mindset d\u00e9cide si tu les utilises ou si tu les ranges dans un tiroir. Un entrepreneur avec des comp\u00e9tences moyennes et un mindset solide va syst\u00e9matiquement battre un entrepreneur brillant qui se sabotera au premier coup dur. C'est \u00e7a la r\u00e9alit\u00e9 du terrain."},
{t:'stat',num:"80%",body:"Pas \u00e0 cause du march\u00e9, pas \u00e0 cause de la concurrence, pas \u00e0 cause du financement. Les \u00e9tudes sont claires : <strong>80% des \u00e9checs viennent de d\u00e9cisions li\u00e9es \u00e0 l'\u00e9tat d'esprit du fondateur.</strong> Peur, ego, perfectionnisme, manque de r\u00e9silience.",vo:"Voil\u00e0 le chiffre que les incubateurs et acc\u00e9l\u00e9rateurs cachent un peu. Quatre-vingts pourcent des \u00e9checs de startups viennent du fondateur lui-m\u00eame. Pas du march\u00e9. Pas de la concurrence. Du fondateur. De sa peur de prendre des d\u00e9cisions. De son perfectionnisme qui lui fait retarder le lancement. De son ego qui lui fait ignorer les retours clients. De son incapacit\u00e9 \u00e0 se relever apr\u00e8s un \u00e9chec. C'est brutal, mais c'est la v\u00e9rit\u00e9. Et c'est ce qu'on va travailler.",label:"des startups \u00e9chouent \u00e0 cause du fondateur",val:"80%"},
{t:'list',title:"Les 3 blocages principaux",sub:"Cette petite voix dans ta t\u00eate qui dit 'qui tu crois \u00eatre pour faire \u00e7a ?'",vo:"Trois blocages reviennent chez presque tous les entrepreneurs que j'ai rencontr\u00e9s. Un : la voix du doute. Cette petite voix dans ta t\u00eate qui dit 'qui tu crois \u00eatre pour faire \u00e7a, t'as pas les \u00e9paules, les autres sont meilleurs.' Deux : la peur de l'\u00e9chec. Qui te paralyse et te fait rester dans le flou plut\u00f4t que de prendre une d\u00e9cision qui pourrait mal tourner. Trois : les croyances limitantes. Des histoires que tu te racontes depuis l'enfance sur l'argent, le succ\u00e8s, ce que tu m\u00e9rites ou pas. On va d\u00e9monter tout \u00e7a.",items:[{emoji:"\ud83e\udde0",name:"La voix du doute",sub:"Cette petite voix dans ta t\u00eate qui dit 'qui tu crois \u00eatre pour faire \u00e7a ?'"},{emoji:"\ud83d\ude30",name:"La peur de l'\u00e9chec",sub:"Qui te fait rester immobile plut\u00f4t que d'avancer et risquer de te planter"},{emoji:"\ud83d\udd04",name:"Les croyances limitantes",sub:"Des histoires que tu te racontes depuis l'enfance et qui gouvernent tes d\u00e9cisions"}]},
{t:'quote',vo:"Tony Robbins a pass\u00e9 quarante ans \u00e0 analyser ce qui diff\u00e9rencie ceux qui r\u00e9ussissent de ceux qui \u00e9chouent. Et il revient toujours au m\u00eame point. Deux personnes avec les m\u00eames ressources vont produire des r\u00e9sultats radicalement diff\u00e9rents. Pas \u00e0 cause de la chance. Pas \u00e0 cause des contacts. \u00c0 cause de comment elles utilisent ce qu'elles ont. Et \u00e7a commence par la t\u00eate. Toujours par la t\u00eate.",text:"Le succ\u00e8s ne d\u00e9pend pas des ressources que vous avez. Il d\u00e9pend de l'usage que vous en faites.",auth:"\u2014 Tony Robbins"},
{t:'action',title:"Ton auto-diagnostic",vo:"Avant de passer \u00e0 la suite, je veux que tu fasses quelque chose de concret. Prends une feuille maintenant, pas dans une heure. Note trois moments dans les douze derniers mois o\u00f9 tu t'es retenu de faire quelque chose \u00e0 cause de la peur. Une d\u00e9cision que tu as repouss\u00e9e. Un projet que tu as pas lanc\u00e9. Une conversation que t'as \u00e9vit\u00e9e. Pour chacun, demande-toi : quel \u00e9tait le vrai risque r\u00e9el si j'avais fonc\u00e9 ? Dans la plupart des cas, tu vas voir que le danger \u00e9tait dans ta t\u00eate, pas dans la r\u00e9alit\u00e9.",badge:"Exercice d'intro",steps:[{txt:"Prends une feuille. Note 3 moments o\u00f9 tu t'es retenu par peur de ce qui pourrait mal tourner."},{txt:"Pour chacun : quel aurait \u00e9t\u00e9 le vrai risque r\u00e9el si tu avais fonc\u00e9 ?"},{txt:"Qu'est-ce que \u00e7a te dit sur tes blocages principaux ?"}]},
{t:'recap',title:"Ce qu'on a pos\u00e9 ici",vo:"Ce qu'on a pos\u00e9 dans cette premi\u00e8re le\u00e7on. Le talent sans mindset, \u00e7a donne rien de durable. La preuve par les chiffres : quatre-vingts pourcent des \u00e9checs viennent du fondateur lui-m\u00eame. Tes trois ennemis principaux sont le doute, la peur et les croyances limitantes. Et la bonne nouvelle, c'est que le mindset \u00e7a se construit. T'es pas n\u00e9 avec ou sans. Tu le d\u00e9veloppes. C'est ce qu'on fait ensemble dans les quatorze le\u00e7ons qui suivent.",points:["Le talent sans mindset ne produit rien de durable","80% des \u00e9checs viennent de l'\u00e9tat d'esprit du fondateur","Tes 3 ennemis principaux : le doute, la peur, les croyances limitantes","Le mindset \u00e7a se travaille \u2014 c'est l'objet de toute cette formation"]}]},
{id:2,title:"Ton cerveau te sabote",slides:[
{t:'intro',num:"02",title:"Ton cerveau\\nte <em>sabote</em>",sub:"Ton cerveau est ton meilleur alli\u00e9 et ton pire ennemi en m\u00eame temps. Comprendre comment il marche, c'est ton avantage comp\u00e9titif.",vo:"Le\u00e7on deux. Je vais te parler de quelque chose que personne t'explique jamais dans les formations business classiques. Comment ton cerveau fonctionne vraiment. Et pourquoi il est c\u00e2bl\u00e9 pour te maintenir l\u00e0 o\u00f9 tu es plut\u00f4t que pour te faire avancer. Comprendre \u00e7a, c'est comme avoir la notice de la machine. T'es plus \u00e0 la merci de tes r\u00e9actions automatiques. T'as le contr\u00f4le."},
{t:'concept',tag:"La neurologie",title:"Le cerveau reptilien et l'amygdale",body:"T'as deux cerveaux qui se battent en permanence. Le cerveau reptilien, vieux de millions d'ann\u00e9es, est programm\u00e9 pour <strong>ta survie</strong>. Il voit une menace partout. Et pour lui, lancer ton business, c'est une menace.",vo:"Voil\u00e0 ce qui se passe dans ta t\u00eate quand tu t'appr\u00eates \u00e0 prendre un risque entrepreneurial. Ton amygdale, la partie la plus primitive de ton cerveau, d\u00e9clenche une alarme. La m\u00eame alarme que si tu \u00e9tais menac\u00e9 par un pr\u00e9dateur. Tu ressens de l'anxi\u00e9t\u00e9, tu procrastines, tu cherches des raisons de pas le faire. C'est pas de la l\u00e2chet\u00e9. C'est de la biologie. Ton cerveau confond inconfort et danger. Et tant que tu comprends pas \u00e7a, tu vas te laisser gouverner par cette alarme sans le savoir."},
{t:'list',title:"Les 4 biais qui te plombent",sub:"Tu retiens les infos qui confirment tes peurs et ignores celles qui les contredisent",vo:"Quatre biais cognitifs que tu dois conna\u00eetre parce qu'ils gouvernent tes d\u00e9cisions en ce moment m\u00eame. Le biais de confirmation : tu cherches inconsciemment des preuves que tu vas \u00e9chouer. L'effet Dunning-Kruger : tu sais pas \u00e0 quel point tu sous-estimes tes propres comp\u00e9tences. L'aversion \u00e0 la perte : tu \u00e9vites de prendre des risques parce que ton cerveau surpond\u00e8re les pertes potentielles. Et le biais du statu quo : ton cerveau pr\u00e9f\u00e8re rester dans une situation merdique connue plut\u00f4t que d'aller vers quelque chose de meilleur mais incertain.",items:[{emoji:"\ud83d\udcce",name:"Le biais de confirmation",sub:"Tu retiens les infos qui confirment tes peurs et ignores celles qui les contredisent"},{emoji:"\ud83d\udd2e",name:"L'effet Dunning-Kruger",sub:"Tu te sous-estimes dans les domaines que tu connais, et tu sais pas ce que tu sais pas"},{emoji:"\ud83d\ude31",name:"L'aversion \u00e0 la perte",sub:"La douleur de perdre 100\u20ac est deux fois plus forte que le plaisir d'en gagner 100"},{emoji:"\ud83e\uddca",name:"Le biais du statu quo",sub:"Ton cerveau pr\u00e9f\u00e8re l'inconfort connu \u00e0 la possibilit\u00e9 inconnue, m\u00eame si elle est meilleure"}]},
{t:'concept',tag:"Le hack",title:"Nommer pour d\u00e9sarmer",body:"Quand tu ressens de l'anxi\u00e9t\u00e9 avant de prendre une d\u00e9cision, ton cerveau est en mode survie. <strong>Le simple fait de nommer ce qui se passe r\u00e9duit l'activit\u00e9 de l'amygdale de 50%.</strong> Les neurosciences l'ont mesur\u00e9.",vo:"Voil\u00e0 un truc simple mais puissant. Les recherches de Matthew Lieberman \u00e0 UCLA ont montr\u00e9 que quand tu mets des mots sur une \u00e9motion difficile, l'activit\u00e9 de ton amygdale, le centre de la peur dans ton cerveau, diminue de moiti\u00e9. Juste en nommant. 'L\u00e0 je ressens de la peur parce que je vais appeler ce grand client.' 'L\u00e0 je procrastine parce que j'ai peur de pas \u00eatre pr\u00eat.' Le simple fait de nommer te remet dans le si\u00e8ge du conducteur. Essaie, c'est bluffant."},
{t:'stat',num:"95%",body:"La recherche en neurosciences montre que <strong>95% de nos d\u00e9cisions sont prises de mani\u00e8re automatique</strong>, avant m\u00eame que notre conscience en soit inform\u00e9e. Tu crois d\u00e9cider. Tu r\u00e9agis.",vo:"\u00c7a va peut-\u00eatre te d\u00e9ranger, mais c'est la r\u00e9alit\u00e9. Quatre-vingt-quinze pourcent de tes d\u00e9cisions sont automatiques. Prises avant m\u00eame que ton cerveau conscient soit dans la boucle. Ce que tu interpr\u00e8tes comme une r\u00e9flexion, c'est souvent une justification apr\u00e8s coup de ce que ton cerveau inconscient avait d\u00e9j\u00e0 d\u00e9cid\u00e9. C'est pour \u00e7a que comprendre tes biais et tes automatismes, c'est pas optionnel. Si tu les connais pas, ils te pilotent. Si tu les connais, tu peux commencer \u00e0 en reprendre le contr\u00f4le.",label:"de nos d\u00e9cisions sont inconscientes",val:"95%"},
{t:'action',title:"Observer ton saboteur int\u00e9rieur",vo:"L'exercice pratique de cette le\u00e7on est simple. Cette semaine, \u00e0 chaque fois que tu procrastines sur quelque chose d'important, stop. Observe ce qui se passe dans ta t\u00eate. Est-ce que c'est la peur de pas bien faire ? L'aversion \u00e0 la perte ? Le biais du statu quo ? Nomme le biais exactement. Dis-le \u00e0 voix haute si tu peux. 'C'est mon aversion \u00e0 la perte qui parle.' Puis reprends ta t\u00e2che. Tu vas voir que \u00e7a devient plus facile avec la pratique. Ton cerveau peut pas se saboter aussi facilement quand tu sais ce qu'il fait.",badge:"Pratique",steps:[{txt:"Cette semaine, quand tu procrastines sur une t\u00e2che importante, note ce qui se passe dans ta t\u00eate"},{txt:"Identifie le biais en jeu : peur ? aversion \u00e0 la perte ? biais du statu quo ?"},{txt:"Nomme-le \u00e0 voix haute et reprends ta t\u00e2che. C'est tout."}]},
{t:'recap',title:"Les points cl\u00e9s",vo:"Ce qu'il faut retenir de cette le\u00e7on. Ton cerveau primitif voit une menace l\u00e0 o\u00f9 il y a juste de l'inconfort. Quatre biais cognitifs gouvernent la plupart de tes mauvaises d\u00e9cisions entrepreneuriales. Quatre-vingt-quinze pourcent de tes d\u00e9cisions sont inconscientes, et donc automatiques si tu travailles pas \u00e0 en reprendre le contr\u00f4le. Et nommer tes \u00e9motions, juste les nommer, c'est l'outil le plus simple et le plus efficace pour d\u00e9sarmer ton saboteur int\u00e9rieur.",points:["Ton cerveau confond inconfort entrepreneurial et danger r\u00e9el","4 biais principaux : confirmation, Dunning-Kruger, aversion \u00e0 la perte, statu quo","95% des d\u00e9cisions sont inconscientes \u2014 donc automatiques","Nommer tes \u00e9motions r\u00e9duit l'activit\u00e9 de l'amygdale de 50%"]}]},
{id:3,title:"L'esprit de croissance",slides:[
{t:'intro',num:"03",title:"L'esprit de\\n<em>croissance</em>",sub:"T'es pas limit\u00e9 par tes capacit\u00e9s actuelles. T'es limit\u00e9 par ce que tu crois de tes capacit\u00e9s. La nuance est \u00e9norme.",vo:"Le\u00e7on trois. L'esprit de croissance. C'est le concept de Carol Dweck, professeur \u00e0 Stanford, et c'est probablement la d\u00e9couverte la plus importante en psychologie de la performance des trente derni\u00e8res ann\u00e9es. L'id\u00e9e de base est simple : ce que tu crois sur ton intelligence et tes capacit\u00e9s d\u00e9termine tout ce que tu feras ou ne feras pas. Pas tes capacit\u00e9s r\u00e9elles. Tes croyances sur tes capacit\u00e9s. Et \u00e7a, \u00e7a se change."},
{t:'concept',tag:"Fixed vs Growth",title:"Deux fa\u00e7ons de voir le monde",body:"L'esprit fixe croit que t'es n\u00e9 avec un certain niveau d'intelligence et que \u00e7a change pas. <strong>L'esprit de croissance comprend que le cerveau est un muscle.</strong> Plus tu l'utilises correctement, plus il se d\u00e9veloppe. Tout s'apprend.",vo:"Deux croyances fondamentalement diff\u00e9rentes. L'esprit fixe, c'est croire que t'es comme t'es, que ton intelligence est fix\u00e9e \u00e0 la naissance, que si tu sais pas faire quelque chose naturellement c'est que c'est pas pour toi. L'esprit de croissance, c'est comprendre que les neurosciences modernes ont prouv\u00e9 une chose : le cerveau est plastique. Il se reconfigure avec l'usage. Ce qu'on appelle le talent, c'est souvent juste quelqu'un qui a commenc\u00e9 plus t\u00f4t et qui a plus pratiqu\u00e9. Le terrain de jeu est plus \u00e9gal qu'on ne le pense."},
{t:'list',title:"Comment l'esprit fixe se manifeste",sub:"Si c'est dur, c'est signe que c'est pas pour toi \u2014 alors t'essaies pas",vo:"Comment reconna\u00eetre ton esprit fixe dans le quotidien. D'abord, tu \u00e9vites les d\u00e9fis. Si quelque chose est difficile, ton cerveau traduit : 'je suis pas fait pour \u00e7a' plut\u00f4t que 'je suis pas encore pr\u00eat'. Ensuite, tu deviens d\u00e9fensif face aux critiques. Parce que si ton intelligence est fixe, une critique de ton travail devient une critique de ce que t'es. Et enfin, le succ\u00e8s des autres te p\u00e8se. Parce que dans l'esprit fixe, leurs r\u00e9ussites r\u00e9duisent les tiennes. Ces trois signes, note-les. Ils te co\u00fbtent cher.",items:[{emoji:"\ud83d\ude36",name:"T'\u00e9vites les d\u00e9fis",sub:"Si c'est dur, c'est signe que c'est pas pour toi \u2014 alors t'essaies pas"},{emoji:"\ud83d\ude24",name:"T'es sur la d\u00e9fensive",sub:"Une critique devient une attaque contre ce que tu es, pas contre ce que tu fais"},{emoji:"\ud83d\ude1f",name:"Le succ\u00e8s des autres te d\u00e9range",sub:"Voir quelqu'un r\u00e9ussir l\u00e0 o\u00f9 tu as \u00e9chou\u00e9 confirme que t'es pas assez bon"}]},
{t:'stat',num:"40%",body:"\u00c0 niveau de d\u00e9part identique, les \u00e9l\u00e8ves et entrepreneurs avec un \u00e9tat d'esprit de croissance performent <strong>en moyenne 40% mieux</strong> sur le long terme. Pas parce qu'ils sont plus intelligents. Parce qu'ils arr\u00eatent pas.",vo:"Le chiffre qui devrait te convaincre si l'argument th\u00e9orique suffisait pas. Quarante pourcent de performance en plus. \u00c0 niveau de d\u00e9part \u00e9quivalent. La seule variable : la croyance sur la nature des comp\u00e9tences. Ceux qui croient que \u00e7a s'apprend, apprennent effectivement plus. Ils cherchent plus de feedback. Ils essaient plus longtemps. Ils voient les obstacles comme des \u00e9tapes et pas comme des preuves de leur incomp\u00e9tence. Et sur le long terme, cet avantage compos\u00e9 devient massif.",label:"de performance en plus avec l'esprit de croissance",val:"40%"},
{t:'quote',vo:"Einstein a dit \u00e7a et c'est l'une des citations les plus importantes pour un entrepreneur. Il remet les pendules \u00e0 l'heure sur ce qu'on appelle le g\u00e9nie. Le g\u00e9nie, c'est souvent juste de la persistance habill\u00e9e. Les gens qui r\u00e9ussissent durent plus longtemps avec les probl\u00e8mes. Ils l\u00e2chent pas. Pas parce qu'ils ont un QI sup\u00e9rieur. Parce qu'ils ont une relation diff\u00e9rente avec la difficult\u00e9. Pour eux, la difficult\u00e9 n'est pas un signal d'arr\u00eat. C'est un signal de travail.",text:"Je ne suis pas plus intelligent que les autres. Je reste juste plus longtemps avec les probl\u00e8mes.",auth:"\u2014 Albert Einstein"},
{t:'action',title:"Le journal 'pas encore'",vo:"Exercice pratique. Prends les trois domaines o\u00f9 tu te brides le plus. Les trucs que tu te dis que c'est pas pour toi. La comptabilit\u00e9, la vente, le management, peu importe. R\u00e9\u00e9cris chaque phrase avec la formule : je suis pas encore arriv\u00e9 \u00e0 ma\u00eetriser \u00e7a, mais. Ce mot encore, il change tout neurologiquement. Il bascule ton cerveau de l'\u00e9tat fixe \u00e0 l'\u00e9tat de progression. Et pour chaque domaine, identifie une seule action pour avancer. Un livre. Une formation. Une personne \u00e0 appeler.",badge:"Exercice",steps:[{txt:"Identifie 3 domaines o\u00f9 tu te dis souvent 'je suis pas fait pour \u00e7a'"},{txt:"R\u00e9\u00e9cris chaque phrase avec 'je suis pas encore arriv\u00e9 \u00e0 ma\u00eetriser \u00e7a, mais...'"},{txt:"Identifie une action concr\u00e8te pour chacun. Juste une."}]},
{t:'recap',title:"Ce qu'il faut garder",vo:"Les points \u00e0 retenir. L'esprit fixe te dit que t'es limit\u00e9 par ce que t'es. L'esprit de croissance te dit que t'es limit\u00e9 par ce que t'as encore appris. Quarante pourcent de performance suppl\u00e9mentaire pour ceux qui ont compris \u00e7a. Le talent, c'est souvent juste une avance de pratique. Et le mot encore, il transforme 'je suis pas capable' en 'je suis pas encore capable'. Change un mot, change une trajectoire.",points:["Esprit fixe = tes capacit\u00e9s sont fixes. Esprit de croissance = tout s'apprend","40% de performance en plus pour ceux qui croient que \u00e7a s'apprend","Le talent, c'est souvent juste plus de pratique et plus t\u00f4t","Le mot 'encore' est le plus puissant de ton vocabulaire"]}]},
{id:4,title:"La peur : info, pas stop",slides:[
{t:'intro',num:"04",title:"La peur :\\n<em>info, pas stop</em>",sub:"La peur est le signal le plus mal interpr\u00e9t\u00e9 dans la vie d'un entrepreneur. Elle te dit pas d'arr\u00eater. Elle te dit que t'es sur quelque chose d'important.",vo:"Le\u00e7on quatre. La peur. On va y aller direct. La peur est la force qui paralyse le plus d'entrepreneurs talentueux. Pas le manque de comp\u00e9tences. Pas le manque d'argent. La peur. Mais voil\u00e0 ce que personne t'a dit : la peur est une information, pas une instruction. Elle te dit pas quoi faire. Elle te signale que quelque chose compte pour toi. Et comprendre \u00e7a change tout."},
{t:'concept',tag:"La v\u00e9rit\u00e9",title:"Ce que la peur te dit vraiment",body:"Ton cerveau g\u00e9n\u00e8re de la peur pour deux raisons : un danger r\u00e9el ou un d\u00e9sir fort. <strong>La peur que tu ressens avant de lancer ton projet, c'est la deuxi\u00e8me cat\u00e9gorie.</strong> C'est ton cerveau qui confirme que c'est important pour toi.",vo:"Il y a deux types de peur. La peur fonctionnelle : elle te signale un vrai danger physique. Tu vois un camion fonce sur toi, t'as peur, tu sautes. C'est utile. Et la peur dysfonctionnelle : elle se d\u00e9clenche face \u00e0 quelque chose d'important pour toi. Avant de passer un appel crucial. Avant de signer un contrat. Avant de lancer ton produit. Cette peur-l\u00e0 te dit pas de t'arr\u00eater. Elle te dit que tu tiens \u00e0 quelque chose. Et si tu t'arr\u00eates \u00e0 chaque fois que tu ressens cette peur, tu te priveras de tout ce qui compte vraiment pour toi."},
{t:'list',title:"Comment la peur se d\u00e9guise",sub:"T'attends le bon moment, d'\u00eatre pr\u00eat, d'avoir plus d'infos \u2014 c'est de la peur d\u00e9guis\u00e9e en pr\u00e9paration",vo:"La peur est rarement honn\u00eate. Elle se d\u00e9guise. Sous la procrastination : je suis pas encore pr\u00eat, j'attends le bon moment. En r\u00e9alit\u00e9 : j'ai peur de me lancer et de me planter. Sous le perfectionnisme : mon produit est pas encore assez bon. En r\u00e9alit\u00e9 : j'ai peur que les gens jugent mon travail. Sous la sur-formation : je lis encore un livre avant de d\u00e9marrer. En r\u00e9alit\u00e9 : tant que je lance pas, je peux pas \u00e9chouer. Reconnais ces masques. Ils te co\u00fbtent des mois, parfois des ann\u00e9es.",items:[{emoji:"\ud83d\udd50",name:"La procrastination",sub:"T'attends le bon moment, d'\u00eatre pr\u00eat, d'avoir plus d'infos \u2014 c'est de la peur d\u00e9guis\u00e9e en pr\u00e9paration"},{emoji:"\ud83d\udd0d",name:"Le perfectionnisme",sub:"T'as jamais fini parce que c'est jamais parfait \u2014 c'est de la peur du jugement d\u00e9guis\u00e9e en standards \u00e9lev\u00e9s"},{emoji:"\ud83d\udcda",name:"La sur-formation",sub:"T'accumules les formations et les livres mais tu lances rien \u2014 c'est de la peur d\u00e9guis\u00e9e en investissement"}]},
{t:'stat',num:"5%",body:"Les \u00e9tudes sur la prise de d\u00e9cision montrent que <strong>moins de 5% des sc\u00e9narios catastrophes imagin\u00e9s se r\u00e9alisent effectivement</strong>. Ton cerveau est un g\u00e9n\u00e9rateur de fictions anxiog\u00e8nes. La r\u00e9alit\u00e9 est presque toujours moins dure.",vo:"Voil\u00e0 le chiffre qui devrait te lib\u00e9rer. Moins de cinq pourcent des catastrophes que tu imagines se r\u00e9alisent. Ton cerveau est un g\u00e9n\u00e9rateur d'histoires. Il prend un risque r\u00e9el de deux sur dix et l'amplifie en sc\u00e9nario catastrophe de dix sur dix. Ce n'est pas de la mauvaise volont\u00e9, c'est de la biologie. Ton cerveau surpond\u00e8re les pertes potentielles pour te prot\u00e9ger. Mais \u00e7a te co\u00fbte \u00e9norm\u00e9ment. La r\u00e9alit\u00e9 de l'entrepreneuriat est presque toujours r\u00e9cup\u00e9rable. Presque toujours.",label:"des peurs entrepreneuriales se r\u00e9alisent vraiment",val:"5%"},
{t:'quote',vo:"Le courage, c'est pas \u00eatre sans peur. C'est d\u00e9cider d'avancer malgr\u00e9 elle. Susan Jeffers a \u00e9crit un bouquin entier l\u00e0-dessus avec l'id\u00e9e simple : feel the fear and do it anyway. Ressens la peur et fonce quand m\u00eame. Parce que la peur dispara\u00eet pas avec la pr\u00e9paration. Elle dispara\u00eet avec l'action. Tu verras que les entrepreneurs qui ont l'air courageux ont autant peur que toi. Ils ont juste appris \u00e0 avancer avec.",text:"Agis malgr\u00e9 la peur. Le courage n'est pas l'absence de peur. C'est d\u00e9cider que quelque chose est plus important qu'elle.",auth:"\u2014 Ambrose Redmoon"},
{t:'action',title:"L'inventaire de peur",vo:"L'exercice de la worst case analysis. Note ta plus grande peur entrepreneuriale en ce moment. Pas une peur vague, une peur pr\u00e9cise. D\u00e9cris le pire sc\u00e9nario possible dans tous les d\u00e9tails. Vraiment. Vas au bout. Puis pose-toi deux questions. Quelle est la probabilit\u00e9 r\u00e9elle que \u00e7a arrive, sur dix ? Et si \u00e7a arrivait quand m\u00eame, est-ce que tu pourrais t'en remettre dans deux ans ? Quatre-vingt-dix pourcent du temps, la r\u00e9ponse \u00e0 la deuxi\u00e8me question est oui. Et \u00e7a suffit pour avancer.",badge:"Pratique",steps:[{txt:"Note ta plus grande peur entrepreneuriale en ce moment \u2014 sois honn\u00eate"},{txt:"D\u00e9cris le pire sc\u00e9nario possible dans les d\u00e9tails. Vraiment."},{txt:"\u00c9value : probabilit\u00e9 r\u00e9elle ? Et si \u00e7a arrivait, tu pourrais t'en remettre dans 2 ans ?"}]},
{t:'recap',title:"L'essentiel",vo:"Ce qu'il faut retenir. La peur est une information, pas un stop. Elle te dit que quelque chose compte pour toi. Elle se d\u00e9guise sous des formes qui ont l'air l\u00e9gitimes : pr\u00e9paration, perfectionnisme, formation. Moins de cinq pourcent de tes sc\u00e9narios catastrophes se r\u00e9alisent. Et le courage, c'est pas l'absence de peur. C'est d\u00e9cider qu'avancer est plus important que rester confortable. Prochaine le\u00e7on : comment sortir de ta zone de confort sans te cramer.",points:["La peur est une info, pas une instruction d'arr\u00eat","Elle se d\u00e9guise en procrastination, perfectionnisme et sur-formation","Moins de 5% de tes sc\u00e9narios catastrophes se r\u00e9alisent","Le courage = avancer malgr\u00e9 la peur, pas l'absence de peur"]}]},
{id:5,title:"Ta zone de confort",slides:[
{t:'intro',num:"05",title:"Ta zone\\nde <em>confort</em>",sub:"Ta zone de confort ne te prot\u00e8ge pas. Elle t'emprisonne dans une version appauvrie de ce que tu pourrais \u00eatre.",vo:"Le\u00e7on cinq. La zone de confort. Tout le monde te dit d'en sortir. Personne t'explique vraiment comment. Dans cette le\u00e7on, on va aller au fond du truc. Comprendre pourquoi c'est si difficile biologiquement. Et avoir un protocole concret pour l'\u00e9largir progressivement, sans te br\u00fbler les ailes."},
{t:'concept',tag:"La biologie",title:"Pourquoi le confort est un pi\u00e8ge \u00e9volutif",body:"Ton cerveau a une r\u00e8gle simple h\u00e9rit\u00e9e de millions d'ann\u00e9es : <strong>le connu est s\u00fbr, l'inconnu est potentiellement mortel</strong>. Cette r\u00e8gle te sauvait la vie dans la savane. Elle te plombe en business.",vo:"Il faut comprendre quelque chose. Ton cerveau ne te permet pas de sortir de ta zone de confort facilement parce qu'il veut pas te voir mourir. Pendant des millions d'ann\u00e9es, l'inconnu voulait dire potentiellement un pr\u00e9dateur, une falaise, un clan ennemi. Donc ton cerveau a appris \u00e0 \u00e9viter l'inconnu par d\u00e9faut. Le probl\u00e8me, c'est que ce m\u00e9canisme s'applique aussi \u00e0 appeler un grand client, lancer ton premier produit ou demander une augmentation. Ton cerveau voit pas la diff\u00e9rence. Il voit juste : inconnu, danger."},
{t:'list',title:"Les 3 zones que tu dois conna\u00eetre",sub:"Z\u00e9ro effort, z\u00e9ro stress, z\u00e9ro croissance. T'as la ma\u00eetrise totale. Tu stagneras ici.",vo:"Trois zones que tu dois conna\u00eetre par coeur. La zone de confort : t'es \u00e0 l'aise, tout est pr\u00e9visible, tu ma\u00eetrises. Mais il se passe rien. Z\u00e9ro croissance. La zone d'apprentissage : c'est inconfortable mais g\u00e9rable. Tu peux pas encore faire \u00e7a naturellement, mais tu peux t'y mettre. C'est l\u00e0 que la magie op\u00e8re. Et la zone de panique : le d\u00e9fi est trop grand, le stress trop intense, tu peux plus apprendre. Les sauts trop importants t'am\u00e8nent l\u00e0 et te font regretter d'avoir essay\u00e9. L'objectif, c'est de passer le maximum de temps en zone d'apprentissage.",items:[{emoji:"\ud83d\udfe2",name:"Zone de confort",sub:"Z\u00e9ro effort, z\u00e9ro stress, z\u00e9ro croissance. T'as la ma\u00eetrise totale. Tu stagneras ici."},{emoji:"\ud83d\udfe1",name:"Zone d'apprentissage",sub:"Inconfort g\u00e9rable. C'est ici que tu grandis. C'est ici que tu dois passer le plus de temps."},{emoji:"\ud83d\udd34",name:"Zone de panique",sub:"Stress paralysant. Aucun apprentissage possible. Les sauts trop grands t'am\u00e8nent ici."}]},
{t:'concept',tag:"Le principe",title:"L'expansion progressive, pas le saut",body:"La zone de confort s'\u00e9largit. Elle ne s'abandonne pas. <strong>Chaque petite action l\u00e9g\u00e8rement inconfortable agrandit ton territoire de ce qui est possible.</strong> C'est cumulatif.",vo:"L'erreur classique, c'est de vouloir se jeter dans le grand bain directement. Quitter son job du jour au lendemain, lancer un produit sans test, tout miser sur une seule d\u00e9cision. Dans quatre-vingt pourcent des cas, \u00e7a aboutit \u00e0 la zone de panique et \u00e0 l'abandon. La vraie m\u00e9thode, c'est l'expansion progressive. Un micro-challenge par jour. Un truc l\u00e9g\u00e8rement inconfortable chaque semaine. Et lentement, ce qui te faisait peur devient normal. Ce qui \u00e9tait dans ta zone d'apprentissage entre dans ta zone de confort. Et ta zone de confort s'agrandit."},
{t:'stat',num:"2min",body:"La r\u00e8gle des deux minutes de James Clear : <strong>si une habitude prend moins de deux minutes \u00e0 d\u00e9marrer, tu n'as aucune excuse valable pour ne pas la faire.</strong> Commence ridiculement petit. Grandis ensuite.",vo:"La r\u00e8gle des deux minutes de James Clear est l'une des plus efficaces que j'ai appliqu\u00e9es. Quand t'as une nouvelle habitude \u00e0 construire ou un d\u00e9fi \u00e0 relever, commence par quelque chose qui prend deux minutes maximum. Pas pour rester \u00e0 deux minutes. Pour que tu n'aies plus d'excuse pour ne pas commencer. Parce que le plus dur, c'est toujours de commencer. Une fois lanc\u00e9, tu continues naturellement. La taille de la marche d\u00e9termine si tu la franchis ou pas.",label:"c'est tout ce qu'il faut pour d\u00e9marrer",val:"2min"},
{t:'action',title:"Le protocole de la semaine",vo:"Le protocole concret. Identifie quelque chose que tu repousses depuis plus d'un mois. Ce truc qui tra\u00eene dans ta liste et que tu fais toujours glisser au lendemain. D\u00e9coupe-le en cinq micro-actions de dix minutes maximum chacune. Pas une grosse action. Cinq petites. Et engage-toi sur la premi\u00e8re aujourd'hui. Pas demain. Aujourd'hui. Parce que demain, c'est le pays o\u00f9 vivent les perdants. Aujourd'hui, c'est l\u00e0 o\u00f9 les choses se font.",badge:"D\u00e9fi hebdo",steps:[{txt:"Identifie quelque chose que tu repousses depuis plus d'un mois"},{txt:"D\u00e9coupe-le en 5 micro-actions de 10 minutes max chacune"},{txt:"Engage-toi sur la premi\u00e8re micro-action aujourd'hui \u2014 pas demain"}]},
{t:'recap',title:"Ce qu'il faut retenir",vo:"Ce qu'on retient. Ton cerveau confond inconfort et danger, c'est de la biologie, pas de la faiblesse. La zone d'apprentissage est ta zone de croissance cible. T'essaies pas d'aller directement dans la zone de panique. Tu \u00e9largis progressivement ta zone de confort avec des micro-challenges. Et tu commences ridiculement petit pour ne jamais avoir d'excuse pour ne pas d\u00e9marrer.",points:["Le cerveau confond inconfort entrepreneur et danger de mort","Zone de confort = stagnation, zone d'apprentissage = croissance, zone de panique = burnout","On \u00e9largit la zone de confort progressivement \u2014 on l'abandonne pas","Commence ridiculement petit. Deux minutes. Grandis ensuite."]}]},
{id:6,title:"Ton identit\u00e9 d'entrepreneur",slides:[
{t:'intro',num:"06",title:"Ton identit\u00e9\\nd'<em>entrepreneur</em>",sub:"Tu changeras tes habitudes le jour o\u00f9 tu changeras l'histoire que tu te racontes sur toi-m\u00eame. L'identit\u00e9 pr\u00e9c\u00e8de l'action.",vo:"Le\u00e7on six. L'identit\u00e9. C'est probablement le levier le plus puissant et le plus sous-estim\u00e9 de tout le mindset. Parce qu'on peut changer ses habitudes par la force brute pendant quelques semaines. Mais les vrais changements durables, ils viennent quand tu changes l'histoire que tu te racontes sur qui tu es. L'identit\u00e9 pr\u00e9c\u00e8de l'action. Toujours."},
{t:'concept',tag:"Le principe fondateur",title:"Tu agis selon qui tu crois \u00eatre",body:"Si tu te vois comme quelqu'un qui lutte avec l'argent, tu trouveras des fa\u00e7ons de confirmer \u00e7a. Si tu te vois comme un entrepreneur, tu prendrais des d\u00e9cisions d'entrepreneur. <strong>Tes actions suivent ton identit\u00e9, pas l'inverse.</strong>",vo:"Voil\u00e0 le truc que peu de gens comprennent. Tes comportements suivent ton identit\u00e9, pas l'inverse. Si tu te vois comme quelqu'un d'organis\u00e9, tu rangeras naturellement. Si tu te vois comme quelqu'un qui lutte en vente, tu trouveras des raisons d'\u00e9viter les appels commerciaux. Ton cerveau cherche en permanence la coh\u00e9rence entre qui tu penses \u00eatre et comment tu agis. Si tu veux changer tes comportements durablement, change d'abord ton identit\u00e9. Commence \u00e0 te voir diff\u00e9remment."},
{t:'list',title:"Les identit\u00e9s qui te limitent",sub:"Cette histoire que tu te racontes justifie chaque mauvaise d\u00e9cision financi\u00e8re",vo:"Trois identit\u00e9s limitantes que j'entends tout le temps. 'Je suis pas bon avec l'argent.' Cette histoire justifie chaque d\u00e9cision financi\u00e8re hasardeuse. Chaque fois que tu valides pas tes prix, chaque fois que tu donnes des remises gratuites. 'Je suis pas un vendeur.' Alors tu prospectes pas, tu sous-tarifies, tu te retrouves avec des clients qui te respectent pas. 'Je suis pas encore l\u00e9gitime.' Alors tu vas jamais chercher les gros clients, les gros projets, les vraies opportunit\u00e9s. Ces trois phrases te co\u00fbtent cher.",items:[{emoji:"\ud83d\udcb8",name:"'Je suis pas bon avec l'argent'",sub:"Cette histoire que tu te racontes justifie chaque mauvaise d\u00e9cision financi\u00e8re"},{emoji:"\ud83d\ude30",name:"'Je suis pas un vendeur'",sub:"Alors tu sous-estimes tes services, tu prospectes pas, tu perds des clients potentiels"},{emoji:"\ud83d\ude14",name:"'Je suis pas assez l\u00e9gitime'",sub:"Cette histoire t'emp\u00eache de te positionner au bon niveau et d'aller chercher les bons clients"}]},
{t:'concept',tag:"Le changement",title:"Comment changer ton identit\u00e9",body:"L'identit\u00e9 se construit par les preuves. <strong>Chaque action align\u00e9e avec ta nouvelle identit\u00e9 est une preuve.</strong> Accumuler des preuves, c'est construire une nouvelle identit\u00e9. Pas le contraire.",vo:"Alors comment tu changes une identit\u00e9 ? Pas en te r\u00e9p\u00e9tant des affirmations positives dans le miroir. En accumulant des preuves que tu es d\u00e9j\u00e0 cette nouvelle personne. Tu veux \u00eatre quelqu'un qui livre toujours ce qu'il promet ? Commence \u00e0 toujours livrer ce que tu promets, m\u00eame sur des petites choses. Chaque action est une preuve. Cinq preuves dans une semaine commencent \u00e0 construire une nouvelle vision de toi-m\u00eame. Cent preuves en un mois, et ton identit\u00e9 a chang\u00e9. C'est de la neuroplasticit\u00e9, pas de la magie."},
{t:'quote',vo:"Cette phrase est l'une de mes pr\u00e9f\u00e9r\u00e9es parce qu'elle touche directement l'identit\u00e9. La fa\u00e7on dont tu traites un petit client est la fa\u00e7on dont tu traites tous les clients. La fa\u00e7on dont tu g\u00e8res un petit projet est la fa\u00e7on dont tu g\u00e9reras les grands. Parce que ton identit\u00e9 s'exprime dans chaque action, petite ou grande. Si tu veux \u00eatre quelqu'un d'excellent, sois excellent dans les petites choses. Les grandes suivront naturellement.",text:"La fa\u00e7on dont tu fais une chose est la fa\u00e7on dont tu fais tout.",auth:"\u2014 Tom Waits"},
{t:'action',title:"Ta d\u00e9claration d'identit\u00e9",vo:"L'exercice d'identit\u00e9. Prends une feuille et compl\u00e8te cette phrase : je suis le type d'entrepreneur qui. Et compl\u00e8te avec cinq qualit\u00e9s que tu veux vraiment incarner. Pas ce que t'es aujourd'hui. Ce que tu choisis de devenir. Pour chacune, identifie une action concr\u00e8te de cette semaine qui prouve cette identit\u00e9. Et lis cette d\u00e9claration chaque matin pendant trente jours. Pas pour te raconter des histoires. Pour commencer \u00e0 agir en coh\u00e9rence avec cette nouvelle identit\u00e9, et accumuler les preuves.",badge:"Exercice d'identit\u00e9",steps:[{txt:"\u00c9cris : 'Je suis le type d'entrepreneur qui...' \u2014 compl\u00e8te avec 5 qualit\u00e9s que tu veux incarner"},{txt:"Pour chacune, identifie une action de cette semaine qui prouve cette identit\u00e9"},{txt:"Lis cette d\u00e9claration chaque matin pendant 30 jours"}]},
{t:'recap',title:"L'essentiel",vo:"Ce qu'il faut retenir. L'identit\u00e9 pr\u00e9c\u00e8de l'action. Si tu veux changer durablement, change d'abord l'histoire que tu te racontes sur toi. Tes croyances identitaires gouvernent chaque d\u00e9cision quotidienne en arri\u00e8re-plan. L'identit\u00e9 se construit par les preuves accumul\u00e9es, pas par les affirmations positives. Et tu peux choisir qui tu veux \u00eatre, d\u00e8s aujourd'hui, en commen\u00e7ant \u00e0 agir en coh\u00e9rence avec cette nouvelle identit\u00e9.",points:["L'identit\u00e9 pr\u00e9c\u00e8de l'action \u2014 change ton identit\u00e9 pour changer tes comportements","Tes croyances sur toi-m\u00eame gouvernent tes d\u00e9cisions quotidiennes","L'identit\u00e9 se construit par les preuves, pas les affirmations","Choisis qui tu veux \u00eatre et commence \u00e0 agir en coh\u00e9rence aujourd'hui"]}]},
{id:7,title:"La discipline, ta seule libert\u00e9",slides:[
{t:'intro',num:"07",title:"La discipline,\\nta seule <em>libert\u00e9</em>",sub:"La plupart des gens voient la discipline comme une cage. Les entrepreneurs qui r\u00e9ussissent l'ont compris : c'est la cl\u00e9.",vo:"Le\u00e7on sept. La discipline. Je sais ce que tu penses. Encore un cours sur la discipline, les routines matinales, se lever \u00e0 cinq heures. C'est pas \u00e7a. Je vais te parler de quelque chose de beaucoup plus fondamental. Pourquoi la discipline est la forme de libert\u00e9 la plus totale qui existe pour un entrepreneur. Et pourquoi attendre la motivation est l'une des erreurs les plus co\u00fbteuses que tu peux faire."},
{t:'concept',tag:"Le paradoxe",title:"Plus de discipline = plus de libert\u00e9",body:"\u00c7a para\u00eet contre-intuitif. Mais r\u00e9fl\u00e9chis. <strong>Quelqu'un de disciplin\u00e9 sur sa sant\u00e9 est libre de tout manger sans culpabilit\u00e9. Quelqu'un de disciplin\u00e9 financi\u00e8rement est libre de d\u00e9penser sans stress.</strong> La discipline cr\u00e9e l'espace.",vo:"Le paradoxe de la discipline. Plus tu es disciplin\u00e9, plus tu es libre. Parce que la discipline \u00e9limine les d\u00e9cisions. Un entrepreneur qui a des routines claires ne passe pas chaque matin \u00e0 d\u00e9cider quoi faire en premier. Il ex\u00e9cute. Il est lib\u00e9r\u00e9 de la charge mentale des d\u00e9cisions. Un entrepreneur disciplin\u00e9 sur ses finances ne passe pas ses nuits \u00e0 stresser sur sa tr\u00e9sorerie. Il a le syst\u00e8me. Jocko Willink, ancien commando Navy SEAL, a popularis\u00e9 cette id\u00e9e : discipline equals freedom. La discipline cr\u00e9e la libert\u00e9."},
{t:'list',title:"Motivation vs Discipline",sub:"\u00c9motionnelle, fluctuante, li\u00e9e \u00e0 l'humeur. Elle monte et descend. Tu peux pas compter dessus.",vo:"La motivation, c'est utile pour d\u00e9marrer. Elle est \u00e9motionnelle, elle monte quand t'es inspir\u00e9, apr\u00e8s une conf\u00e9rence, apr\u00e8s un podcast motivant. Mais elle descend aussi. Et le lendemain matin quand t'as pas envie, quand c'est gris dehors, quand les r\u00e9sultats tardent, la motivation est partie. La discipline, elle, s'en fout de ton humeur. Elle s'ex\u00e9cute. Elle est structurelle. Et tous les r\u00e9sultats durables que t'as vus chez les entrepreneurs qui r\u00e9ussissent sur le long terme viennent de la discipline. Sans exception.",items:[{emoji:"\ud83c\udf0a",name:"La motivation",sub:"\u00c9motionnelle, fluctuante, li\u00e9e \u00e0 l'humeur. Elle monte et descend. Tu peux pas compter dessus."},{emoji:"\u2699\ufe0f",name:"La discipline",sub:"Structurelle, stable, ind\u00e9pendante de l'humeur. Elle s'ex\u00e9cute que t'aies envie ou pas."},{emoji:"\ud83c\udfc6",name:"Les r\u00e9sultats durables",sub:"Viennent syst\u00e9matiquement de la discipline, jamais de la motivation seule. Sans exception."}]},
{t:'concept',tag:"La science",title:"L'\u00e9puisement de la volont\u00e9",body:"La volont\u00e9 est une ressource limit\u00e9e. Elle se d\u00e9pense. <strong>C'est pour \u00e7a que les grandes d\u00e9cisions se prennent le matin et que les nuits de doute sont toujours plus intenses.</strong> Les syst\u00e8mes automatisent ce qui ne doit plus d\u00e9pendre de la volont\u00e9.",vo:"Roy Baumeister a montr\u00e9 dans ses recherches que la volont\u00e9 s'\u00e9puise comme un muscle. Chaque d\u00e9cision que tu prends dans la journ\u00e9e consomme une partie de ta r\u00e9serve de volont\u00e9. C'est pour \u00e7a que les juges rendent des d\u00e9cisions plus cl\u00e9mentes le matin que l'apr\u00e8s-midi. C'est pour \u00e7a que tes nuits de doute sont toujours plus intenses. C'est pour \u00e7a que Mark Zuckerberg portait toujours la m\u00eame tenue : \u00e9liminer une d\u00e9cision inutile pour pr\u00e9server la volont\u00e9 pour ce qui compte. Tes syst\u00e8mes et routines sont l\u00e0 pour \u00e7a : automatiser ce qui ne doit plus d\u00e9pendre de ta volont\u00e9."},
{t:'stat',num:"3",body:"Tu n'as pas besoin d'une routine matinale de deux heures. <strong>3 comportements non-n\u00e9gociables par jour, maintenus 90 jours, suffisent \u00e0 transformer ton niveau d'\u00e9nergie et de productivit\u00e9.</strong>",vo:"On overcomplique la discipline. T'as pas besoin de te lever \u00e0 quatre heures, de m\u00e9diter quarante-cinq minutes, de faire une heure de sport, de journaliser et de pr\u00e9parer ton planning de la semaine avant sept heures. Trois comportements non-n\u00e9gociables. Maintenus sans exception pendant quatre-vingt-dix jours. C'est tout ce qu'il faut pour transformer ta productivit\u00e9. Parce que la cl\u00e9, c'est pas la quantit\u00e9 de discipline. C'est la coh\u00e9rence. Trois choses que tu fais tous les jours, m\u00eame quand t'as pas envie, changent tout.",label:"non-n\u00e9gociables suffisent pour changer",val:"3"},
{t:'action',title:"Tes 3 non-n\u00e9gociables",vo:"L'exercice de cette le\u00e7on. Identifie tes trois non-n\u00e9gociables. Trois comportements qui auraient le plus d'impact sur ton business si tu les faisais chaque jour. Rends-les courts : quinze \u00e0 trente minutes maximum chacun. Parce que si un non-n\u00e9gociable prend deux heures, tu le feras pas les jours difficiles. Et engage-toi pour trente jours seulement, pas pour la vie. Trente jours, sans exception. Pas d'excuses. Aucune. Apr\u00e8s trente jours, r\u00e9\u00e9value.",badge:"Pratique imm\u00e9diate",steps:[{txt:"Identifie 3 comportements qui auraient le plus d'impact sur ton business si tu les faisais chaque jour"},{txt:"Rends-les assez courts pour \u00eatre faisables m\u00eame les mauvais jours (15-30 min max)"},{txt:"Engage-toi pour 30 jours, sans exception. 30 jours, pas plus."}]},
{t:'recap',title:"Ce qu'il faut retenir",vo:"Ce qu'il faut retenir de cette le\u00e7on. La discipline cr\u00e9e la libert\u00e9, c'est pas une cage. La motivation est utile pour d\u00e9marrer, la discipline est n\u00e9cessaire pour durer. Ta volont\u00e9 est une ressource limit\u00e9e qui s'\u00e9puise dans la journ\u00e9e \u2014 tes syst\u00e8mes existent pour la pr\u00e9server. Et trois non-n\u00e9gociables maintenus quatre-vingt-dix jours, c'est tout ce qu'il faut pour changer une trajectoire.",points:["La discipline cr\u00e9e la libert\u00e9, elle ne la supprime pas","La motivation fluctue \u2014 la discipline, elle, s'ex\u00e9cute","La volont\u00e9 est limit\u00e9e \u2014 les syst\u00e8mes automatisent pour la pr\u00e9server","3 non-n\u00e9gociables maintenus 90 jours changent une trajectoire"]}]},
{id:8,title:"Les habitudes qui font les grands",slides:[
{t:'intro',num:"08",title:"Les habitudes\\nqui font les <em>grands</em>",sub:"Tu n'es pas le r\u00e9sultat de ce que tu d\u00e9cides. Tu es le r\u00e9sultat de ce que tu fais automatiquement, chaque jour.",vo:"Le\u00e7on huit. Les habitudes. James Clear a pass\u00e9 des ann\u00e9es \u00e0 analyser la science derri\u00e8re les habitudes pour \u00e9crire Atomic Habits, le livre le plus vendu sur le sujet. Et la conclusion principale, c'est celle-ci : tu n'es pas le r\u00e9sultat de tes grandes d\u00e9cisions. Tu es le r\u00e9sultat de tes petites actions quotidiennes automatiques. Et \u00e7a, \u00e7a change compl\u00e8tement l'approche."},
{t:'concept',tag:"La m\u00e9canique",title:"La boucle des habitudes",body:"Toute habitude suit un cycle : <strong>d\u00e9clencheur \u2192 envie \u2192 comportement \u2192 r\u00e9compense</strong>. Pour cr\u00e9er une nouvelle habitude, tu joues sur ces quatre variables. Pour en casser une mauvaise, tu fais pareil en sens inverse.",vo:"Chaque habitude que tu as fonctionne sur un cycle en quatre temps. Le d\u00e9clencheur : un signal qui active le comportement. Une heure, un lieu, une \u00e9motion, ce que quelqu'un dit. L'envie : le d\u00e9sir que le d\u00e9clencheur g\u00e9n\u00e8re. Le comportement : l'action elle-m\u00eame. Et la r\u00e9compense : ce que tu obtiens, qui grave l'habitude dans ton cerveau. Pour cr\u00e9er une nouvelle habitude, tu dois cr\u00e9er un d\u00e9clencheur clair, r\u00e9duire l'effort du comportement et rendre la r\u00e9compense imm\u00e9diate. Pour casser une mauvaise habitude, tu fais l'inverse."},
{t:'list',title:"Les habitudes des entrepreneurs qui performent",sub:"Pas forc\u00e9ment \u00e0 5h. Mais un premier bloc sans t\u00e9l\u00e9phone, sans email, sans r\u00e9seaux sociaux.",vo:"Les habitudes que je retrouve chez pratiquement tous les entrepreneurs qui performent durablement. D'abord, la routine matinale. Pas forc\u00e9ment \u00e0 cinq heures. Mais un premier bloc sans t\u00e9l\u00e9phone, sans email, sans r\u00e9seaux. Un moment pour toi, avant que le monde t'envahisse. La journalisation ensuite. Cinq minutes par jour pour \u00e9crire ce qui compte, ce qui bloque, ce qu'on va faire. \u00c7a clarifie comme rien d'autre. Et la planification hebdo. Trente minutes le dimanche ou le lundi pour v\u00e9rifier que ce que tu vas faire cette semaine est bien align\u00e9 sur ce qui compte vraiment.",items:[{emoji:"\ud83c\udf05",name:"La routine matinale",sub:"Pas forc\u00e9ment \u00e0 5h. Mais un premier bloc sans t\u00e9l\u00e9phone, sans email, sans r\u00e9seaux sociaux."},{emoji:"\ud83d\udcdd",name:"La journalisation",sub:"5 minutes par jour pour clarifier ses pens\u00e9es, ses priorit\u00e9s et prendre du recul."},{emoji:"\ud83c\udfaf",name:"La planification hebdo",sub:"30 minutes chaque dimanche ou lundi pour aligner ses actions sur ses objectifs r\u00e9els."}]},
{t:'concept',tag:"Le principe des 1%",title:"L'int\u00e9r\u00eat compos\u00e9 des comportements",body:"<strong>1% d'am\u00e9lioration chaque jour = 37 fois meilleur en un an.</strong> 1% de r\u00e9gression chaque jour = quasi z\u00e9ro. Les habitudes sont le m\u00e9canisme de l'int\u00e9r\u00eat compos\u00e9 appliqu\u00e9 \u00e0 ta vie.",vo:"Le principe le plus puissant d'Atomic Habits. Un pourcent d'am\u00e9lioration par jour. \u00c7a para\u00eet insignifiant. Mais si t'am\u00e9liores d'un pourcent chaque jour pendant un an, tu es trente-sept fois meilleur qu'au d\u00e9part. Trente-sept fois. Pas trente-sept pourcent. Trente-sept fois. C'est la puissance de la composition. Et \u00e7a marche dans l'autre sens aussi. Un pourcent de r\u00e9gression chaque jour pendant un an, tu es \u00e0 z\u00e9ro virgule z\u00e9ro quelque chose de ce que t'\u00e9tais. C'est pour \u00e7a que les petites habitudes quotidiennes sont la chose la plus s\u00e9rieuse dans ta vie d'entrepreneur."},
{t:'stat',num:"66j",body:"L'\u00e9tude de Phillippa Lally \u00e0 l'UCL a mesur\u00e9 <strong>66 jours en moyenne</strong> pour qu'un comportement devienne automatique \u2014 pas 21 jours comme le mythe populaire. Sois patient avec toi-m\u00eame.",vo:"Soixante-six jours. Pas vingt-et-un. L'\u00e9tude de Phillippa Lally \u00e0 University College London a mesur\u00e9 \u00e7a sur plusieurs centaines de participants. Soixante-six jours en moyenne pour qu'un comportement devienne vraiment automatique. Avec une fourchette de dix-huit \u00e0 deux cent cinquante-quatre jours selon la complexit\u00e9 du comportement. Ce que \u00e7a signifie pour toi : sois patient. Les premi\u00e8res semaines, l'habitude demande un effort conscient. C'est normal. Continue. \u00c0 partir du soixanti\u00e8me jour environ, \u00e7a commence \u00e0 tourner tout seul.",label:"pour automatiser une habitude",val:"66j"},
{t:'action',title:"Ta premi\u00e8re keystone habit",vo:"La keystone habit, c'est l'habitude ma\u00eetresse. Celle qui en g\u00e9n\u00e8re d'autres automatiquement. Le sport du matin g\u00e9n\u00e8re une meilleure alimentation, moins d'alcool, plus d'\u00e9nergie. La m\u00e9ditation g\u00e9n\u00e8re plus de calme, de meilleures d\u00e9cisions, moins de r\u00e9actions impulsives. Identifie ta keystone habit. Attache-la \u00e0 un d\u00e9clencheur qui existe d\u00e9j\u00e0 dans ta journ\u00e9e. Et rends-la ridiculement petite au d\u00e9part. Cinq minutes. Augmente apr\u00e8s deux semaines. La cl\u00e9, c'est pas la dur\u00e9e. C'est la coh\u00e9rence.",badge:"Conception d'habitude",steps:[{txt:"Identifie l'habitude qui, si tu la maintenais, en g\u00e9n\u00e9rerait automatiquement d'autres (sport, m\u00e9ditation, planification)"},{txt:"Attache-la \u00e0 un d\u00e9clencheur existant dans ta journ\u00e9e \u2014 'apr\u00e8s mon caf\u00e9 du matin, je...' "},{txt:"Rends-la ridiculement petite pour commencer. 5 minutes. Augmente apr\u00e8s 2 semaines."}]},
{t:'recap',title:"Ce qu'il faut retenir",vo:"Ce qu'on retient. La boucle des habitudes en quatre temps : d\u00e9clencheur, envie, comportement, r\u00e9compense. Le principe des un pourcent : trente-sept fois meilleur en un an. Soixante-six jours pour automatiser, pas vingt et un. Et commence toujours ridiculement petit, pour ne jamais avoir l'excuse de rater un jour. Une habitude imparfaite ex\u00e9cut\u00e9e chaque jour bat une habitude parfaite ex\u00e9cut\u00e9e deux fois par semaine.",points:["Toute habitude : d\u00e9clencheur \u2192 envie \u2192 comportement \u2192 r\u00e9compense","1% par jour = 37x meilleur en un an. Les habitudes, c'est l'int\u00e9r\u00eat compos\u00e9","66 jours pour automatiser, pas 21 \u2014 sois patient","Commence ridiculement petit pour ne jamais rater un jour"]}]},
{id:9,title:"Apprivoiser l'\u00e9chec",slides:[
{t:'intro',num:"09",title:"Apprivoiser\\n<em>l'\u00e9chec</em>",sub:"T'as pas le choix de te planter. La vraie question, c'est ce que tu fais avec.",vo:"Le\u00e7on neuf. L'\u00e9chec. Soyons honn\u00eates. T'as pas le choix de te planter dans ta vie d'entrepreneur. C'est pas une possibilit\u00e9, c'est une certitude. Les entrepreneurs que tu admires, ceux qui ont des grosses bo\u00eetes, ceux qui cartonnent, ils se sont tous plant\u00e9 plusieurs fois. La vraie diff\u00e9rence entre eux et ceux qui ont abandonn\u00e9, c'est pas d'avoir \u00e9vit\u00e9 l'\u00e9chec. C'est ce qu'ils ont fait avec."},
{t:'concept',tag:"La red\u00e9finition",title:"L'\u00e9chec comme donn\u00e9es",body:"L'\u00e9chec n'est pas le contraire du succ\u00e8s. C'est <strong>une \u00e9tape sur le chemin du succ\u00e8s.</strong> Chaque \u00e9chec est un retour d'information que la r\u00e9alit\u00e9 te donne gratuitement. Les entrepreneurs qui apprennent vite progressent vite.",vo:"La premi\u00e8re chose \u00e0 faire, c'est changer la d\u00e9finition. L'\u00e9chec n'est pas le contraire du succ\u00e8s. C'est une donn\u00e9e. Une information que la r\u00e9alit\u00e9 te donne. Ton produit n'a pas trouv\u00e9 son march\u00e9 ? Donn\u00e9e. Ton associ\u00e9 et toi \u00e9tiez pas align\u00e9s ? Donn\u00e9e. Tu t'es plant\u00e9 sur les co\u00fbts ? Donn\u00e9e. Les entrepreneurs qui progressent le plus vite sont ceux qui traitent leurs \u00e9checs le plus rapidement. Pas ceux qui en font le moins. Ceux qui en font le plus d'apprentissage dans le moins de temps."},
{t:'list',title:"Les 3 fa\u00e7ons malsaines de g\u00e9rer l'\u00e9chec",sub:"Tu fuis tout ce qui pourrait te faire \u00e9chouer \u2014 donc tu fuis aussi tout ce qui pourrait te faire r\u00e9ussir",vo:"Trois mani\u00e8res malsaines de g\u00e9rer un \u00e9chec que j'observe tout le temps. L'\u00e9vitement : tu prot\u00e8ges tellement ton ego que tu prends plus de risques. Tu stagneras l\u00e0. La victimisation : c'\u00e9tait la faute du march\u00e9, des associ\u00e9s, du timing. C'est peut-\u00eatre vrai. Mais tant que t'es dans ce mode, tu peux rien apprendre parce que t'es pas responsable. Et la rumination : tu y repenses en boucle, tu rejoues le film, sans jamais en tirer une conclusion qui te fait avancer. C'est la forme de souffrance la plus inutile qui existe.",items:[{emoji:"\ud83d\udeab",name:"L'\u00e9vitement",sub:"Tu fuis tout ce qui pourrait te faire \u00e9chouer \u2014 donc tu fuis aussi tout ce qui pourrait te faire r\u00e9ussir"},{emoji:"\ud83d\ude22",name:"La victimisation",sub:"'C'est la faute du march\u00e9, des clients, des associ\u00e9s.' \u00c7a te prive de l'apprentissage."},{emoji:"\ud83d\udd01",name:"La rumination",sub:"T'y repenses en boucle sans en tirer de conclusion concr\u00e8te \u2014 la pire forme de souffrance inutile"}]},
{t:'concept',tag:"L'outil",title:"Le post-mortem d'\u00e9chec",body:"Les meilleures \u00e9quipes tech font un post-mortem apr\u00e8s chaque incident majeur. <strong>Pas pour trouver un coupable. Pour comprendre ce qui s'est pass\u00e9 et s'assurer que \u00e7a n'arrive plus.</strong> Fais pareil avec tes \u00e9checs.",vo:"Les meilleures \u00e9quipes tech du monde, chez Google, Amazon, Netflix, ont une pratique syst\u00e9matique : le post-mortem. Quand quelque chose merde, ils font une r\u00e9union structur\u00e9e. Pas pour trouver un coupable. Pour comprendre exactement ce qui s'est pass\u00e9, pourquoi, et comment s'assurer que \u00e7a n'arrive plus. Et surtout, ils ont une r\u00e8gle : pendant le post-mortem, y'a pas de coupable. Y'a que des causes syst\u00e9miques. Fais pareil avec tes \u00e9checs entrepreneuriaux. Analyse, apprends, applique. Passe \u00e0 autre chose."},
{t:'quote',vo:"Michael Jordan est consid\u00e9r\u00e9 comme le meilleur basketteur de tous les temps. Et il est connu pour ses succ\u00e8s. Mais ce qu'il d\u00e9crit dans cette citation, c'est ses \u00e9checs. Neuf mille tirs rat\u00e9s. Trois cents matchs perdus. Vingt-six tirs d\u00e9cisifs manqu\u00e9s. Et sa conclusion : c'est pour \u00e7a qu'il a r\u00e9ussi. Pas malgr\u00e9 \u00e7a. \u00c0 cause de \u00e7a. Chaque rat\u00e9 l'a rendu meilleur. C'est \u00e7a la relation saine avec l'\u00e9chec.",text:"J'ai rat\u00e9 plus de 9000 tirs dans ma carri\u00e8re. J'ai perdu presque 300 matchs. 26 fois, on m'a fait confiance pour prendre le tir de la victoire et j'ai rat\u00e9. C'est pour \u00e7a que je r\u00e9ussis.",auth:"\u2014 Michael Jordan"},
{t:'action',title:"Ton post-mortem personnel",vo:"L'exercice pratique. Prends un \u00e9chec r\u00e9cent que t'as pas encore vraiment dig\u00e9r\u00e9. Quelque chose qui tra\u00eene encore. Pose-toi trois questions et \u00e9cris les r\u00e9ponses. Qu'est-ce qui s'est pass\u00e9 exactement, en faits, pas en \u00e9motions ? Pourquoi c'est arriv\u00e9, les vraies causes ? Et qu'est-ce que tu feras diff\u00e9remment la prochaine fois ? Trois questions. R\u00e9ponses \u00e9crites. Puis ferme le dossier. Litt\u00e9ralement. T'as tir\u00e9 l'apprentissage. C'est fait. Passe \u00e0 autre chose.",badge:"Exercice",steps:[{txt:"Prends un \u00e9chec r\u00e9cent que t'as pas encore dig\u00e9r\u00e9"},{txt:"Pose-toi 3 questions : Qu'est-ce qui s'est pass\u00e9 exactement ? Pourquoi ? Qu'est-ce que je fais diff\u00e9remment la prochaine fois ?"},{txt:"\u00c9cris les r\u00e9ponses. Ferme le dossier. Passe \u00e0 autre chose."}]},
{t:'recap',title:"L'essentiel",vo:"Ce qu'il faut retenir. L'\u00e9chec est une donn\u00e9e, pas un verdict sur ta valeur en tant que personne ou entrepreneur. \u00c9vitement, victimisation et rumination te priven de l'apprentissage. Le post-mortem est ton outil pour extraire de la valeur de chaque \u00e9chec. Et rater vite et apprendre vite, c'est probablement la comp\u00e9tence entrepreneuriale la plus importante qui soit.",points:["L'\u00e9chec est une donn\u00e9e, pas un verdict sur ta valeur","\u00c9vitement, victimisation et rumination sont les 3 fa\u00e7ons malsaines","Le post-mortem : causes syst\u00e9miques, pas coupables","Rater vite et apprendre vite, c'est la vraie comp\u00e9tence"]}]},
{id:10,title:"Ta vision : pourquoi tu te l\u00e8ves",slides:[
{t:'intro',num:"10",title:"Ta vision :\\npourquoi tu te l\u00e8ves",sub:"Un entrepreneur sans vision travaille beaucoup et avance peu. Une vision claire transforme l'effort en direction.",vo:"Le\u00e7on dix. La vision. La moiti\u00e9 des chemin est fait. Dans cette le\u00e7on, on va parler de quelque chose de fondamental. Pourquoi tu fais tout \u00e7a. Pas le pourquoi officiel que tu balances en r\u00e9union. Le vrai pourquoi. Celui qui te ferait avancer m\u00eame si plus rien ne marchait. Parce que les entrepreneurs qui construisent quelque chose de durable ont tous ce fil conducteur. Et ceux qui abandonnent au premier gros obstacle, souvent, ils l'avaient pas."},
{t:'concept',tag:"La diff\u00e9rence",title:"Vision vs Objectifs",body:"Un objectif te dit quoi faire. Une vision te dit pourquoi le faire. <strong>Les objectifs sans vision sont des t\u00e2ches. Les objectifs ancr\u00e9s dans une vision sont des missions.</strong> Et personne n'abandonne sa mission.",vo:"La diff\u00e9rence entre un objectif et une vision, c'est fondamental. Un objectif, c'est faire dix mille euros de chiffre d'affaires ce mois-ci. Une vision, c'est aider les entrepreneurs qui d\u00e9marrent \u00e0 construire des entreprises solides et vivre librement. Les objectifs te disent quoi faire. La vision te dit pourquoi le faire. Et quand les objectifs sont reli\u00e9s \u00e0 une vision forte, ils ont une autre dimension. T'es plus en train d'ex\u00e9cuter des t\u00e2ches. T'es en train d'avancer vers quelque chose qui compte pour toi."},
{t:'list',title:"Les 3 couches de la vision",sub:"Qui es-tu ? Qu'as-tu construit ? Quel impact as-tu sur les gens autour de toi ?",vo:"La vision se construit en trois couches. La vision \u00e0 dix ans d'abord. Ferme les yeux. Tu es dix ans plus vieux. D\u00e9cris ta vie en d\u00e9tail. O\u00f9 tu vis. Avec qui. Ce que tu fais. L'impact que tu as. Les gens que tu as aid\u00e9s. Ensuite les \u00e9tapes \u00e0 trois ans. Qu'est-ce qui doit \u00eatre vrai dans trois ans pour que dans dix ans tu sois l\u00e0 o\u00f9 tu veux \u00eatre ? Et enfin les quatre-vingt-dix jours. Qu'est-ce que tu fais maintenant, concr\u00e8tement, pour t'approcher de l'\u00e9tape \u00e0 trois ans ? C'est comme \u00e7a qu'on connecte le quotidien \u00e0 la vision.",items:[{emoji:"\ud83d\udd2d",name:"Dans 10 ans",sub:"Qui es-tu ? Qu'as-tu construit ? Quel impact as-tu sur les gens autour de toi ?"},{emoji:"\ud83d\uddfa\ufe0f",name:"Dans 3 ans",sub:"Quelles \u00e9tapes majeures doivent \u00eatre franchies pour atteindre la vision \u00e0 10 ans ?"},{emoji:"\u26a1",name:"Dans 90 jours",sub:"Qu'est-ce que tu fais maintenant pour t'approcher de l'\u00e9tape \u00e0 3 ans ?"}]},
{t:'concept',tag:"Le moteur",title:"Connecter les t\u00e2ches du quotidien \u00e0 la vision",body:"Quand tu r\u00e9ponds \u00e0 un email chiant, tu travailles sur ta vision. Quand tu prospectes un client ingrat, tu travailles sur ta vision. <strong>Tout prend une autre dimension quand tu vois le fil.</strong>",vo:"Voil\u00e0 ce que \u00e7a change concr\u00e8tement. Quand tu r\u00e9ponds \u00e0 un email difficile, t'es pas en train de r\u00e9pondre \u00e0 un email. T'es en train de construire la r\u00e9putation d'un entrepreneur qui prend soin de ses clients. Quand tu prospectes un client qui te r\u00e9pond pas, t'es pas en train de perdre ton temps. T'es en train de d\u00e9velopper la comp\u00e9tence commerciale qui va alimenter ta vision. Voir le fil entre les t\u00e2ches du quotidien et la vision \u00e0 dix ans, \u00e7a transforme la fa\u00e7on dont tu travailles."},
{t:'stat',num:"10x",body:"Les \u00e9tudes sur la motivation montrent que <strong>les objectifs 10 fois plus ambitieux que ce que tu penses possible g\u00e9n\u00e8rent plus d'engagement</strong> que des objectifs raisonnables. Penser grand lib\u00e8re une \u00e9nergie que penser petit ne g\u00e9n\u00e8re pas.",vo:"Il y a un ph\u00e9nom\u00e8ne contre-intuitif dans la recherche sur la motivation. Les objectifs dix fois plus grands que ce que tu penses possible g\u00e9n\u00e8rent plus d'engagement et plus d'\u00e9nergie que les objectifs raisonnables. Pourquoi ? Parce que l'objectif raisonnable, ton cerveau sait comment l'atteindre. Il va donc proc\u00e9der prudemment, sans vraiment s'emballer. L'objectif dix fois plus grand, ton cerveau ne sait pas comment l'atteindre dans les sentiers habituels. Alors il cherche des voies nouvelles. Il se mobilise autrement.",label:"la r\u00e8gle de la vision ambitieuse",val:"10x"},
