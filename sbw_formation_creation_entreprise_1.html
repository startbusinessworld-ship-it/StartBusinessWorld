<!DOCTYPE html>
<html lang="fr">
<head>

<title>Création d'entreprise &amp; Fiscalité 🇫🇷 | SBW</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0C0C0A;--surface:#141412;--border:rgba(255,255,255,.08);
  --white:#F0ECE4;--muted:rgba(240,236,228,.45);--faint:rgba(240,236,228,.07);
  --gold:#3B82F6;--gold-rgb:59,130,246;--gold-light:#60A5FA;--green:#4ECB71;--red:#E05252;--site-gold:#A67C3A;--site-gold-light:#C49A4E;
  --sidebar:240px;--header:52px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);display:flex;flex-direction:column}
header{height:var(--header);background:var(--surface);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.h-left{display:flex;align-items:center;gap:14px}
.h-logo{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--site-gold);letter-spacing:.04em}
.h-sep{width:0.5px;height:18px;background:var(--border)}
.h-title{font-size:.82rem;color:var(--muted)}
.h-right{display:flex;align-items:center;gap:12px}
.h-pbar-wrap{width:120px;height:4px;background:var(--faint);border-radius:2px;overflow:hidden}
.h-pbar-fill{height:100%;background:var(--site-gold);border-radius:2px;transition:width .4s}
.h-pct{font-size:.72rem;color:var(--muted)}
.btn-close{background:none;border:0.5px solid var(--border);color:var(--muted);padding:5px 14px;border-radius:5px;font-size:.75rem;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-close:hover{border-color:var(--white);color:var(--white)}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar);background:var(--surface);border-right:0.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-head{padding:14px 14px 10px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.sb-head-label{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.sb-lessons{flex:1;overflow-y:auto;padding:6px}
.sb-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:7px;cursor:pointer;transition:background .1s}
.sb-item:hover{background:var(--faint)}
.sb-item.active{background:rgba(166,124,58,.15)}
.sb-item.active .sb-num{color:var(--gold)}
.sb-num{font-size:.65rem;color:var(--muted);width:16px;flex-shrink:0;text-align:right;font-weight:500}
.sb-info{flex:1;min-width:0}
.sb-name{font-size:.78rem;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-bar{height:2px;background:var(--faint);border-radius:1px;margin-top:4px;overflow:hidden}
.sb-bar-fill{height:100%;background:var(--site-gold);border-radius:1px;transition:width .3s}
.sb-check{font-size:.7rem;color:var(--green);opacity:0;flex-shrink:0;transition:opacity .2s}
.sb-item.done .sb-check{opacity:1}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.slide-progress{height:3px;background:var(--faint);flex-shrink:0}
.slide-progress-fill{height:100%;background:var(--site-gold);transition:width .3s}
.slide-area{flex:1;overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;padding:32px 40px 100px}
.slide-wrap{width:100%;max-width:720px}
.slide-intro{text-align:center;padding:40px 20px 32px}
.slide-num{font-size:.7rem;letter-spacing:.15em;color:var(--gold);margin-bottom:12px;text-transform:uppercase}
.slide-emoji-big{font-size:3.5rem;margin-bottom:20px;display:block}
.slide-intro-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:600;line-height:1.1;margin-bottom:18px}
.slide-intro-title em{color:var(--gold);font-style:italic}
.slide-intro-sub{font-size:.92rem;color:var(--muted);max-width:540px;margin:0 auto;line-height:1.7}
.slide-block{padding:8px 0}
.slide-tag{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);margin-bottom:10px}
.slide-title{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:600;line-height:1.2;margin-bottom:16px}
.slide-body{font-size:.9rem;color:rgba(240,236,228,.85);line-height:1.75}
.slide-body strong{color:var(--white);font-weight:600}
.slide-body em{color:var(--gold);font-style:italic}
.cards-grid{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.card-item{background:var(--faint);border:0.5px solid var(--border);border-radius:9px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.card-emoji{font-size:1.4rem;flex-shrink:0;margin-top:1px}
.card-name{font-size:.88rem;font-weight:600;margin-bottom:3px}
.card-sub{font-size:.78rem;color:var(--muted);line-height:1.55}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
.compare-col{background:var(--faint);border:0.5px solid var(--border);border-radius:9px;padding:16px}
.compare-col.good{border-color:rgba(78,203,113,.3);background:rgba(78,203,113,.06)}
.compare-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.compare-emoji{font-size:1.3rem}
.compare-label{font-size:.78rem;font-weight:600}
.compare-num{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:700;color:var(--gold);line-height:1;margin-bottom:4px}
.compare-num.green{color:var(--green)}
.compare-unit{font-size:.7rem;color:var(--muted);margin-bottom:10px}
.compare-desc{font-size:.78rem;color:var(--muted);line-height:1.55}
.compare-note{margin-top:12px;padding:10px 14px;background:rgba(166,124,58,.08);border-left:2px solid var(--gold);border-radius:0 6px 6px 0;font-size:.78rem;color:rgba(240,236,228,.7);line-height:1.6}
.stat-block{text-align:center;padding:32px 20px}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,10vw,5.5rem);font-weight:700;color:var(--gold);line-height:1}
.stat-unit{font-size:1rem;color:var(--muted);margin-top:4px;margin-bottom:20px}
.stat-body{font-size:.88rem;color:var(--muted);line-height:1.7;max-width:500px;margin:0 auto}
.warning-block{background:rgba(224,82,82,.08);border:0.5px solid rgba(224,82,82,.25);border-radius:10px;padding:20px 22px}
.warning-icon{font-size:1.6rem;margin-bottom:10px}
.warning-title{font-size:1rem;font-weight:600;margin-bottom:10px;color:#F08080}
.warning-body{font-size:.86rem;color:rgba(240,236,228,.8);line-height:1.7}
.action-block{background:linear-gradient(135deg,rgba(166,124,58,.12),rgba(166,124,58,.06));border:0.5px solid rgba(166,124,58,.3);border-radius:12px;padding:24px}
.action-badge{display:inline-flex;align-items:center;gap:6px;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);background:rgba(166,124,58,.15);padding:4px 10px;border-radius:20px;margin-bottom:14px}
.action-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;margin-bottom:16px}
.action-steps{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.action-step{display:flex;align-items:flex-start;gap:10px;font-size:.85rem;color:rgba(240,236,228,.85);line-height:1.5}
.action-step-num{width:20px;height:20px;border-radius:50%;background:var(--gold);color:#000;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.action-cta{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:#fff;padding:12px 24px;border-radius:8px;font-size:.88rem;font-weight:600;text-decoration:none;border:none;cursor:pointer;font-family:inherit;transition:background .15s}
.action-cta:hover{background:var(--gold-light)}
.recap-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;margin-bottom:14px;color:var(--gold)}
.recap-list{display:flex;flex-direction:column;gap:7px}
.recap-item{display:flex;align-items:flex-start;gap:10px;font-size:.86rem;color:rgba(240,236,228,.85);line-height:1.55}
.recap-dot{color:var(--gold);font-size:.7rem;flex-shrink:0;margin-top:3px}
.quote-block{text-align:center;padding:32px 20px}
.quote-text{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,3vw,1.8rem);font-style:italic;line-height:1.5;color:var(--white);margin-bottom:16px;max-width:580px;margin-left:auto;margin-right:auto}
.quote-bar{width:40px;height:2px;background:var(--gold);margin:0 auto}
.nav-bar{height:60px;background:var(--surface);border-top:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;gap:8px}
.nav-info{font-size:.75rem;color:var(--muted);flex:1;text-align:center}
.nav-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.nav-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn-nav{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:7px;font-size:.82rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;border:0.5px solid var(--border);background:var(--faint);color:var(--white)}
.btn-nav:hover{border-color:rgba(255,255,255,.3)}
.btn-nav:disabled{opacity:.3;cursor:not-allowed}
.btn-nav.primary{background:var(--site-gold);border-color:var(--site-gold);color:#fff}
.btn-nav.primary:hover{background:var(--site-gold-light)}
.btn-nav.done-btn{background:rgba(78,203,113,.12);border-color:rgba(78,203,113,.3);color:var(--green)}
/* Bouton hamburger */
.btn-menu{display:flex;flex-direction:column;justify-content:center;gap:4px;padding:8px 10px;border-radius:7px;border:0.5px solid var(--border);background:var(--faint);cursor:pointer;transition:all .15s}
.btn-menu:hover{border-color:rgba(255,255,255,.3)}
.btn-menu.active{border-color:var(--gold)}
.btn-menu span{display:block;width:16px;height:1.5px;background:var(--muted);border-radius:2px;transition:background .15s}
.btn-menu.active span{background:var(--gold)}
/* Bouton Play/Pause */
.btn-play{width:38px;height:38px;border-radius:50%;background:var(--site-gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;animation:pulse 2.5s infinite}
.btn-play:hover{background:var(--site-gold-light);transform:scale(1.08)}
.btn-play svg{fill:#fff}
.btn-play.playing{animation:none;background:var(--gold)}
#btnVoix.active{background:rgba(166,124,58,.15);border-color:var(--gold);color:var(--gold)}
.subtitles{position:fixed;bottom:130px;left:50%;transform:translateX(-50%);z-index:100;max-width:700px;width:90%;text-align:center;pointer-events:none}
.subtitles-text{display:inline-block;background:rgba(0,0,0,.75);color:#fff;font-size:.92rem;line-height:1.6;padding:8px 18px;border-radius:8px;backdrop-filter:blur(4px);transition:opacity .3s}
.subtitles-text.hidden{opacity:0}
.cta-fixed{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:8px;background:var(--gold);color:#fff;padding:11px 28px;border-radius:30px;font-size:.85rem;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(166,124,58,.4);transition:background .15s,transform .15s;white-space:nowrap}
.cta-fixed:hover{background:var(--gold-light);transform:translateX(-50%) translateY(-2px)}

/* Play/pause dans la nav bar */
@keyframes pulse{0%,100%{box-shadow:0 0 0 6px rgba(166,124,58,.2)}50%{box-shadow:0 0 0 10px rgba(166,124,58,.06)}}

/* Panneau leçons */
.lessons-panel{position:fixed;bottom:0;left:0;width:320px;background:var(--surface);border-top:0.5px solid var(--border);border-right:0.5px solid var(--border);border-radius:0 12px 0 0;z-index:300;transform:translateY(100%);transition:transform .3s;max-height:70vh;display:flex;flex-direction:column}
.lessons-panel.open{transform:translateY(0)}
.lp-head{padding:14px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.lp-head-title{font-size:.8rem;font-weight:600;color:var(--white)}
.lp-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:2px 6px}
.lp-scroll{overflow-y:auto;flex:1;padding:8px}
.lp-lesson{margin-bottom:4px}
.lp-lesson-btn{width:100%;display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:6px;cursor:pointer;background:none;border:none;font-family:inherit;color:var(--white);text-align:left;transition:background .1s}
.lp-lesson-btn:hover{background:var(--faint)}
.lp-lesson-btn.active{color:var(--gold)}
.lp-lesson-num{font-size:.65rem;color:var(--muted);width:16px;flex-shrink:0}
.lp-lesson-name{font-size:.78rem;flex:1}
.lp-lesson-check{font-size:.68rem;color:var(--green);opacity:0}
.lp-lesson-btn.done .lp-lesson-check{opacity:1}
.lp-slides{padding:0 0 0 34px;display:none}
.lp-lesson.open .lp-slides{display:flex;flex-wrap:wrap;gap:4px;padding-bottom:6px}
.lp-slide-btn{font-size:.68rem;padding:3px 10px;border-radius:4px;border:0.5px solid var(--border);background:var(--faint);color:var(--muted);cursor:pointer;font-family:inherit;transition:all .1s}
.lp-slide-btn:hover{border-color:var(--gold);color:var(--gold)}
.lp-slide-btn.active{background:rgba(166,124,58,.2);border-color:var(--gold);color:var(--gold)}


::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px}

/* Animations slides */
@keyframes fadeSlideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeSlideInLeft{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
.slide-enter{animation:fadeSlideIn .28s cubic-bezier(.22,1,.36,1)}
.slide-enter-back{animation:fadeSlideInLeft .28s cubic-bezier(.22,1,.36,1)}

/* Concept enrichi */
.concept-card{background:var(--faint);border:0.5px solid var(--border);border-radius:12px;padding:22px 24px;margin-bottom:12px}
.concept-highlight{background:linear-gradient(135deg,rgba(var(--gold-rgb),.12),transparent);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:12px 16px;margin:14px 0;font-size:.9rem;line-height:1.7;color:var(--white)}
.key-point{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:0.5px solid var(--border)}
.key-point:last-child{border-bottom:none}
.key-point-icon{font-size:1.3rem;flex-shrink:0;margin-top:2px}
.key-point-text{font-size:.87rem;color:rgba(240,236,228,.85);line-height:1.6}
.slide-eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.slide-eyebrow-icon{font-size:1.8rem}
.slide-eyebrow-tag{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--gold)}
@media(max-width:600px){
  .sidebar{display:none}
  .slide-area{padding:20px}
  .compare-grid{grid-template-columns:1fr}
  .h-title{display:none}
}
</style>
</head>

{t:'intro',emoji:"\ud83c\udfe2",num:"01",title:"Pourquoi avoir une\\n<em>entreprise d\u00e9clar\u00e9e</em>",sub:"Et les risques concrets si tu le fais pas. Avant de parler d'optimisation, on pose les bases.",vo:"Le\u00e7on une. Avant qu'on parle de comment payer moins d'imp\u00f4ts, avant tout \u00e7a, y'a un truc de base qu'on doit r\u00e9gler ensemble. Pourquoi t'as besoin d'une entreprise officielle. D\u00e9clar\u00e9e. L\u00e9gale. Parce que beaucoup de gens commencent \u00e0 vendre des trucs, \u00e0 encaisser de l'argent, et ils d\u00e9clarent rien. Je commence petit, on verra plus tard. Et cette phrase-l\u00e0, elle a co\u00fbt\u00e9 tr\u00e8s cher \u00e0 beaucoup de monde."},
{t:'concept',emoji:"\ud83d\udcb3",tag:"Premier blocage",title:"Sans soci\u00e9t\u00e9, les vrais outils te ferment la porte \ud83d\udcb3",body:"Tu veux vendre en ligne ? <strong>Stripe, PayPal Pro, les vrais outils de paiement te demandent un num\u00e9ro de soci\u00e9t\u00e9.</strong> Sans \u00e7a, t'as pas acc\u00e8s. Et sans syst\u00e8me de paiement professionnel, <em>t'as pas de boutique en ligne s\u00e9rieuse.</em>",vo:"Premier truc concret. Si tu veux vendre des produits en ligne, tu peux pas encaisser de paiements correctement sans soci\u00e9t\u00e9. Stripe, PayPal Pro, les vrais outils de paiement, ils te demandent un num\u00e9ro de soci\u00e9t\u00e9. Sans \u00e7a, t'as pas acc\u00e8s. Et sans syst\u00e8me de paiement propre, t'as pas de boutique en ligne s\u00e9rieuse. C'est bloquant d\u00e8s le premier jour. M\u00eame pour les fournisseurs s\u00e9rieux, les grossistes, les partenaires B2B, ils veulent un SIRET. Les portes restent ferm\u00e9es sans \u00e7a."},
{t:'warning',emoji:"\u26a0\ufe0f",title:"Le compte perso bloqu\u00e9 \u2014 la gal\u00e8re en cascade \ud83d\udea8",body:"Y'en a qui encaissent sur leur compte perso. Au d\u00e9but \u00e7a passe.",warn:"<strong>\ud83d\udcf5 La banque bloque tout</strong> quand elle voit des virements commerciaux sur un compte personnel.<br><br><strong>\ud83d\udc65 Tu fais passer par des amis, la famille</strong> \u2014 leur compte se fait scruter, stress \u00e9norme.<br><br><strong>\ud83d\udcb8 T'as plus acc\u00e8s \u00e0 ton argent</strong> \u2014 y compris pour tes d\u00e9penses du quotidien.<br><br><strong>\ud83d\udd0d Tout \u00e7a parce qu'on avait peur de cr\u00e9er une soci\u00e9t\u00e9.</strong> C'est vraiment dommage.",vo:"Y'en a qui vendent sur Snapchat, sur Leboncoin, en direct, et ils encaissent sur leur compte perso. Au d\u00e9but \u00e7a passe. Mais tr\u00e8s vite la banque elle voit des dizaines de virements qui ressemblent \u00e0 du commerce sur un compte personnel. Elle bloque tout. Ton compte perso est bloqu\u00e9, y compris pour tes d\u00e9penses du quotidien. Alors tu commences \u00e0 faire passer les paiements par le compte d'un ami, d'un fr\u00e8re, de la famille. Et l\u00e0 tu cr\u00e9es un stress \u00e9norme autour de toi pour rien. Tout \u00e7a parce qu'on avait peur de cr\u00e9er une soci\u00e9t\u00e9."},
{t:'compare',emoji:"\u274c",num:"0",title:"\ud83d\udee1\ufe0f Perso vs Pro \u2014 la s\u00e9paration qui te prot\u00e8ge",vo:"Et y'a un autre truc fondamental que beaucoup comprennent pas. La s\u00e9paration entre le perso et le pro. Quand t'as une soci\u00e9t\u00e9, ce qui se passe dans ta soci\u00e9t\u00e9 \u00e7a te concerne pas toi directement en tant que personne. Si ta bo\u00eete a un probl\u00e8me, un litige, une dette, \u00e7a reste dans la soci\u00e9t\u00e9. Ton argent personnel, ton compte perso, ta vie, tout \u00e7a est prot\u00e9g\u00e9. C'est ce qu'on appelle la responsabilit\u00e9 limit\u00e9e. Quand t'as pas de soci\u00e9t\u00e9 et que tu fais tout sur ton compte perso, t'as aucune s\u00e9paration. Le moindre probl\u00e8me te touche directement.",left:{emoji:"\u274c",label:"Sans soci\u00e9t\u00e9",num:"0",unit:"",desc:"Aucune s\u00e9paration perso / pro. Un probl\u00e8me dans le business touche directement ta vie perso. Tes biens personnels en danger."},right:{emoji:"\u2705",label:"Avec soci\u00e9t\u00e9",num:"100",unit:"%",desc:"Ce qui se passe dans ta soci\u00e9t\u00e9 \u00e7a reste dans la soci\u00e9t\u00e9. Ton argent perso est prot\u00e9g\u00e9. C'est la responsabilit\u00e9 limit\u00e9e.",color:"good"},note:"Une soci\u00e9t\u00e9 c'est pas une contrainte \u2014 c'est une protection pour toi."},
{t:'warning',emoji:"\ud83d\udd0d",title:"L'administration remonte \u00e0 3 ans \u2014 les risques fiscaux \ud83d\udd0d",body:"L'administration fiscale peut regarder tes relev\u00e9s bancaires sur les 3 derni\u00e8res ann\u00e9es.",warn:"<strong>\ud83d\udcb8 Tous les virements non expliqu\u00e9s</strong> = revenus non d\u00e9clar\u00e9s selon l'administration.<br><br><strong>\ud83d\udcca Elle calcule les imp\u00f4ts dessus</strong>, rajoute des p\u00e9nalit\u00e9s, et te r\u00e9clame tout d'un coup.<br><br><strong>\u26a0\ufe0f On parle parfois de dizaines de milliers d'euros</strong> sur des activit\u00e9s modestes.<br><br><strong>Depuis 2020</strong> les banques transmettent automatiquement les infos \u00e0 l'administration.",vo:"Voil\u00e0 les risques fiscaux concrets quand tu travailles sans \u00eatre d\u00e9clar\u00e9. L'administration peut regarder tes relev\u00e9s bancaires sur les trois derni\u00e8res ann\u00e9es. Tous les virements qu'elle comprend pas, elle les consid\u00e8re comme des revenus non d\u00e9clar\u00e9s. Elle calcule les imp\u00f4ts dessus, elle rajoute des p\u00e9nalit\u00e9s, et elle te r\u00e9clame tout \u00e7a d'un coup. On parle parfois de dizaines de milliers d'euros sur des activit\u00e9s qui \u00e9taient m\u00eame pas si grosses. Et depuis 2020, les banques sont oblig\u00e9es de transmettre automatiquement les informations \u00e0 l'administration fiscale. Tout est trac\u00e9. Tout est vu."},
{t:'concept',emoji:"\ud83d\udca1",tag:"La bonne nouvelle",title:"Une soci\u00e9t\u00e9 c'est pas le CAC 40 \ud83d\udca1",body:"C'est juste dire \u00e0 l'\u00c9tat : <em>'Je fais du commerce, je suis officiel.'</em><br><br>\u2705 Simple et rapide \u00e0 cr\u00e9er en ligne<br>\u2705 Au d\u00e9part si tu r\u00e9investis, tu paies peu ou rien en imp\u00f4ts<br>\u2705 Code <strong>SBW25</strong> sur LegalPlace \u2014 25% de r\u00e9duction exclusive membres",vo:"Faut pas s'imaginer qu'une soci\u00e9t\u00e9 c'est compliqu\u00e9. C'est pas le CAC 40. C'est pas r\u00e9serv\u00e9 aux grandes entreprises ou aux gens qui ont fait des \u00e9tudes de droit. C'est juste dire \u00e0 l'\u00c9tat : je fais du commerce, je suis officiel. C'est tout. T'as un num\u00e9ro, tu peux encaisser proprement, tu prot\u00e8ges ta vie personnelle de ta vie professionnelle. Et surtout, au d\u00e9part si tu r\u00e9investis dans ta bo\u00eete, tu paieras tr\u00e8s peu ou rien en imp\u00f4ts. Parce que toutes tes d\u00e9penses professionnelles se d\u00e9duisent. On verra \u00e7a dans les prochaines le\u00e7ons."},
{t:'recap',emoji:"\ud83c\udfe2",title:"Ce qu'il faut retenir",vo:"Ce qu'il faut retenir de cette premi\u00e8re le\u00e7on. Sans soci\u00e9t\u00e9, Stripe et les vrais outils de paiement te bloquent. Encaisser sur un compte perso m\u00e8ne au compte bloqu\u00e9 et au stress pour toute ta famille. Avoir une soci\u00e9t\u00e9 c'est s\u00e9parer le perso du pro et se prot\u00e9ger. L'administration peut remonter trois ans en arri\u00e8re. Cr\u00e9er une soci\u00e9t\u00e9 c'est simple et au d\u00e9part tu paies peu si tu r\u00e9investis. Et pour cr\u00e9er ta structure, le code SBW25 sur LegalPlace te donne 25% de r\u00e9duction exclusive. Prochaine le\u00e7on, tous les statuts juridiques expliqu\u00e9s simplement.",points:["Sans soci\u00e9t\u00e9 : Stripe, PayPal Pro, grossistes \u2014 les portes sont ferm\u00e9es","Compte perso bloqu\u00e9 + gal\u00e8re famille et amis pour rien","Soci\u00e9t\u00e9 = s\u00e9paration perso / pro = responsabilit\u00e9 limit\u00e9e","Administration remonte 3 ans en arri\u00e8re sur tes relev\u00e9s","Cr\u00e9er une soci\u00e9t\u00e9 c'est simple, rapide, et au d\u00e9part tu paies peu","LegalPlace \u2014 code SBW25 pour 25% de r\u00e9duction exclusive membres"]}]},
{id:2,title:"\ud83d\udccb Tous les statuts juridiques expliqu\u00e9s",slides:[
{t:'intro',emoji:"\ud83d\udccb",num:"02",title:"Tous les statuts\\n<em>juridiques expliqu\u00e9s</em>",sub:"Micro-entreprise, SASU, EURL, SAS, SARL, SCI, SA, association \u2014 tu vas tout savoir.",vo:"Le\u00e7on deux. Avant qu'on rentre dans les d\u00e9tails de chaque structure, j'ai besoin de te donner une vue d'ensemble. Parce que quand tu commences \u00e0 chercher, tu tombes sur plein de termes. Micro-entreprise, SASU, EURL, SARL, SCI, SA, association. Si tu sais pas ce que \u00e7a veut dire, c'est facile de se perdre. Dans cette le\u00e7on je te les explique tous. Simple, court, sans jargon."},
{t:'cards',emoji:"\u26a1",title:"\ud83c\udfc3 Les statuts solo \u2014 les plus simples",sub:"Le plus simple. Charges = % fixe du CA. Si tu gagnes rien, tu paies rien. Pas de bilan. Mais tu peux rien d\u00e9duire. Plafond de CA. Pour tester ou compl\u00e9ment.",vo:"Les deux premiers statuts. La micro-entreprise d'abord. Le statut le plus simple. Tu d\u00e9clares tes revenus, tu paies un pourcentage fixe de charges sur ce que tu encaisses. Si tu gagnes rien, tu paies rien. Pas de comptabilit\u00e9 complexe, pas de bilan. Mais tu peux rien d\u00e9duire et y'a des plafonds de chiffre d'affaires. L'entreprise individuelle est un peu plus avanc\u00e9e. Tu peux d\u00e9passer les plafonds et d\u00e9duire tes d\u00e9penses. Depuis 2022, l'EI prot\u00e8ge automatiquement le patrimoine personnel. Mais dans cette formation on va t'orienter vers des structures encore plus optimis\u00e9es.",items:[{emoji:"\u26a1",name:"Micro-entreprise",sub:"Le plus simple. Charges = % fixe du CA. Si tu gagnes rien, tu paies rien. Pas de bilan. Mais tu peux rien d\u00e9duire. Plafond de CA. Pour tester ou compl\u00e9ment."},{emoji:"\ud83d\udc64",name:"Entreprise Individuelle (EI)",sub:"Toi tout seul, pas de capital. Tu d\u00e9passes les plafonds micro. Tu d\u00e9duis tes d\u00e9penses. Mais en EI classique tes biens perso peuvent \u00eatre touch\u00e9s si dettes."},{emoji:"\ud83d\udee1\ufe0f",name:"EI prot\u00e9g\u00e9e (depuis 2022)",sub:"Depuis 2022, l'EI prot\u00e8ge automatiquement ton patrimoine personnel. Meilleure version de l'EI."}]},
{t:'compare',emoji:"\ud83d\ude80",num:"0\u20ac",title:"\u2b50 SASU vs EURL \u2014 les deux recommand\u00e9es",vo:"Les deux structures qu'on recommande dans cette formation. La SASU, Soci\u00e9t\u00e9 par Actions Simplifi\u00e9e Unipersonnelle. Si tu te verses pas de salaire au d\u00e9part, tu paies z\u00e9ro. Z\u00e9ro charges, z\u00e9ro imp\u00f4ts. Tu gardes tes aides sociales. Et quand ta bo\u00eete fait des b\u00e9n\u00e9fices, tu te verses des dividendes tax\u00e9s \u00e0 seulement 30%. L'EURL, Entreprise Unipersonnelle \u00e0 Responsabilit\u00e9 Limit\u00e9e, c'est mieux si tu veux te verser un revenu rapidement. Les charges sont moins lourdes sur la r\u00e9mun\u00e9ration, environ 40 \u00e0 45%.",left:{emoji:"\ud83d\ude80",label:"SASU \u2014 Recommand\u00e9e",num:"0\u20ac",unit:"",desc:"Pas de salaire = z\u00e9ro charges. Tu gardes ch\u00f4mage, RSA, APL. Dividendes \u00e0 30% quand b\u00e9n\u00e9fices. LE meilleur choix pour lancer seul."},right:{emoji:"\ud83d\udcbc",label:"EURL \u2014 Si tu veux te r\u00e9mun\u00e9rer",num:"~1 200\u20ac",unit:"/an min",desc:"Charges ~40-45% sur r\u00e9mun\u00e9ration. Mais cotisations minimales m\u00eame si z\u00e9ro CA (~1 200\u20ac/an). Risque de perdre les aides sociales.",color:"neutral"},note:"On compare ces deux structures en d\u00e9tail dans la le\u00e7on 4."},
{t:'cards',emoji:"\ud83e\udd1d",title:"\ud83d\udc65 Les structures \u00e0 plusieurs associ\u00e9s",sub:"La SASU \u00e0 plusieurs. Min 2 associ\u00e9s. Tr\u00e8s flexible. Pr\u00e9f\u00e9r\u00e9e des investisseurs. M\u00eames avantages fiscaux que la SASU.",vo:"Pour les structures \u00e0 plusieurs. La SAS c'est la SASU mais \u00e0 plusieurs associ\u00e9s. Minimum deux personnes. Tr\u00e8s flexible dans l'organisation. La structure pr\u00e9f\u00e9r\u00e9e si vous cherchez des investisseurs. La SARL c'est la forme de soci\u00e9t\u00e9 la plus r\u00e9pandue en France. Le g\u00e9rant majoritaire, celui qui a plus de 50% des parts, rel\u00e8ve du r\u00e9gime des travailleurs ind\u00e9pendants avec des charges moins lourdes. La SCI c'est pour l'immobilier uniquement. Acheter des appartements, g\u00e9rer un patrimoine immobilier.",items:[{emoji:"\ud83e\udd1d",name:"SAS",sub:"La SASU \u00e0 plusieurs. Min 2 associ\u00e9s. Tr\u00e8s flexible. Pr\u00e9f\u00e9r\u00e9e des investisseurs. M\u00eames avantages fiscaux que la SASU."},{emoji:"\ud83c\udfea",name:"SARL",sub:"La plus r\u00e9pandue en France. Min 2 associ\u00e9s. G\u00e9rant majoritaire = charges TNS ~45%. Moins flexible que la SAS."},{emoji:"\ud83c\udfe0",name:"SCI",sub:"Uniquement pour l'immobilier. Acheter des appartements, g\u00e9rer un patrimoine. On en reparle avec les holdings."}]},
{t:'concept',emoji:"\ud83d\udeab",tag:"\u00c0 conna\u00eetre mais pas pour toi",title:"SA et Association \u2014 pas pour d\u00e9marrer \ud83d\udeab",body:"La <strong>SA (Soci\u00e9t\u00e9 Anonyme)</strong> c'est les grandes structures. Minimum 7 actionnaires, capital de 37 000\u20ac. Pour la bourse ou les grosses lev\u00e9es de fonds.<br><br>L'<strong>Association loi 1901</strong> c'est pour les activit\u00e9s sans but lucratif. Elle peut avoir des revenus mais ne distribue pas de b\u00e9n\u00e9fices. <em>Pour faire du business, c'est pas la bonne structure.</em>",vo:"Deux statuts importants \u00e0 conna\u00eetre mais qui ne te concernent pas au d\u00e9marrage. La SA, Soci\u00e9t\u00e9 Anonyme. Minimum sept actionnaires, capital minimum de 37 000 euros. Pour les grandes entreprises qui veulent entrer en bourse ou lever des fonds importants. Toi au d\u00e9marrage, t'as aucune raison de t'y int\u00e9resser. L'association loi 1901, c'est pas une structure commerciale. Faite pour des activit\u00e9s sans but lucratif. Sport, culture, humanitaire. Elle peut avoir des revenus mais ne peut pas distribuer des b\u00e9n\u00e9fices. Pour faire du business, c'est pas la bonne structure."},
{t:'recap',emoji:"\ud83d\udccb",title:"R\u00e9capitulatif \u2014 qui choisit quoi",vo:"Le r\u00e9capitulatif. Tu veux tester une id\u00e9e avec peu de risques, c'est la micro-entreprise. Tu lances un vrai business seul et tu veux garder tes aides sociales, c'est la SASU, le meilleur choix pour d\u00e9marrer. Tu veux te r\u00e9mun\u00e9rer d\u00e8s le d\u00e9part et t'es s\u00fbr de ton activit\u00e9, c'est l'EURL. Vous \u00eates plusieurs et vous voulez de la flexibilit\u00e9, c'est la SAS. Vous \u00eates plusieurs pour une activit\u00e9 classique, c'est la SARL. Et pour l'immobilier, c'est la SCI. Prochaine le\u00e7on, la micro-entreprise en d\u00e9tail.",points:["Tester une id\u00e9e / compl\u00e9ment de revenus \u2192 Micro-entreprise","Lancer un vrai business seul, garder les aides \u2192 SASU \u2b50","Se r\u00e9mun\u00e9rer vite, t'es s\u00fbr de ton activit\u00e9 \u2192 EURL","Plusieurs associ\u00e9s, flexibilit\u00e9 \u2192 SAS","Plusieurs associ\u00e9s, activit\u00e9 classique \u2192 SARL","Immobilier \u2192 SCI"]}]},
{id:3,title:"\u26a1 La micro-entreprise : bien ou pi\u00e8ge ?",slides:[
{t:'intro',emoji:"\u26a1",num:"03",title:"La micro-entreprise :\\n<em>bien ou pi\u00e8ge ?</em>",sub:"Tout le monde te dit de commencer par l\u00e0. Mon avis honn\u00eate sur pourquoi c'est souvent un pi\u00e8ge.",vo:"Le\u00e7on trois. La micro-entreprise. Tout le monde te conseille ce statut quand tu te lances. Ta famille, tes potes, parfois m\u00eame des comptables. Commence en micro-entreprise, c'est simple, c'est gratuit. Et dans cette le\u00e7on je vais te donner mon avis honn\u00eate. Pour moi la micro-entreprise c'est souvent un pi\u00e8ge pour quelqu'un qui veut vraiment construire un business s\u00e9rieux."},
{t:'cards',emoji:"\ud83c\udd93",title:"\u2705 Ce qui est vraiment bien",sub:"Cr\u00e9ation en 15 min en ligne sur autoentrepreneur.urssaf.fr. Z\u00e9ro frais. SIRET en quelques jours.",vo:"Soyons honn\u00eates, y'a des points positifs. La cr\u00e9ation c'est gratuit et \u00e7a prend 15 minutes en ligne. Si tu gagnes rien, tu paies rien. Les charges c'est un pourcentage fixe de ce que tu encaisses. Tu peux le faire en m\u00eame temps que ton travail. La comptabilit\u00e9 c'est ultra simple. Tu d\u00e9clares en ligne tous les mois ou tous les trimestres. T'entres juste le montant encaiss\u00e9, le site calcule automatiquement. Et au d\u00e9marrage tu peux b\u00e9n\u00e9ficier de l'ACRE, une aide de l'\u00c9tat qui r\u00e9duit tes charges sociales pendant les premi\u00e8res ann\u00e9es.",items:[{emoji:"\ud83c\udd93",name:"Gratuit et rapide",sub:"Cr\u00e9ation en 15 min en ligne sur autoentrepreneur.urssaf.fr. Z\u00e9ro frais. SIRET en quelques jours."},{emoji:"\ud83d\udcca",name:"Simple \u00e0 g\u00e9rer",sub:"D\u00e9claration en ligne chaque mois ou trimestre. Tu entres le montant encaiss\u00e9, le site calcule. Pas de bilan, pas de comptable obligatoire."},{emoji:"\ud83d\udee1\ufe0f",name:"Z\u00e9ro risque au d\u00e9marrage",sub:"Si tu gagnes rien, tu paies rien. Charges = % fixe. Peut se cumuler avec un emploi. L'ACRE r\u00e9duit les charges les premi\u00e8res ann\u00e9es."}]},
{t:'concept',emoji:"\u26a0\ufe0f",tag:"Le vrai probl\u00e8me",title:"Tu peux rien d\u00e9duire \u2014 et \u00e7a change tout \u26a0\ufe0f",body:"Imagine : tu fais <strong>3 000\u20ac de ventes</strong> ce mois. Pour les g\u00e9n\u00e9rer, t'as achet\u00e9 <strong>1 500\u20ac de marchandises.</strong> Ton vrai b\u00e9n\u00e9fice c'est 1 500\u20ac. <em>Mais en micro-entreprise tu paies tes charges sur les 3 000\u20ac.</em> Pas sur les 1 500\u20ac. T'as pas le droit de d\u00e9duire tes d\u00e9penses.",vo:"Voil\u00e0 le pi\u00e8ge principal de la micro-entreprise. Tu peux rien d\u00e9duire. Je vais te donner un exemple tr\u00e8s concret. Imagine que tu fais trois mille euros de ventes ce mois. Pour g\u00e9n\u00e9rer ces trois mille euros, t'as achet\u00e9 quinze cents euros de marchandises. Ton vrai b\u00e9n\u00e9fice c'est quinze cents euros. Mais en micro-entreprise tu paies tes charges sur les trois mille euros. Pas sur les quinze cents euros. T'as pas le droit de soustraire ce que t'as d\u00e9pens\u00e9 pour travailler. Et quand tu fais des petites marges, ce qui est souvent le cas au d\u00e9marrage, l\u00e0 \u00e7a devient vraiment probl\u00e9matique."},
{t:'calc',tag:"\ud83d\udcb8 Impact concret",title:"Micro vs SASU \u2014 sur 3 000\u20ac CA avec 1 500\u20ac achats",vo:"Le calcul concret. Tu fais trois mille euros de ventes. T'as d\u00e9pens\u00e9 quinze cents euros en marchandises. Ton vrai b\u00e9n\u00e9fice c'est quinze cents euros. En micro-entreprise, tu paies tes charges sur les trois mille euros, pas sur les quinze cents. Avec un taux de 12%, \u00e7a fait trois cent soixante euros de charges. En SASU, tu paies l'IS uniquement sur le b\u00e9n\u00e9fice r\u00e9el de quinze cents euros. \u00c0 15%, \u00e7a fait deux cent vingt-cinq euros. La diff\u00e9rence semble petite ici mais sur une ann\u00e9e enti\u00e8re avec des volumes plus importants, c'est des milliers d'euros d'\u00e9cart en ta faveur avec une vraie soci\u00e9t\u00e9.",premise:"Marges faibles \u2014 situation classique en e-commerce",lines:[{type:"base",label:"\ud83d\udcb0 CA r\u00e9alis\u00e9",val:"3 000 \u20ac"},{type:"minus",label:"\ud83d\udce6 Achats marchandises",val:"-1 500 \u20ac"},{type:"equals",label:"\ud83d\udca1 Vrai b\u00e9n\u00e9fice r\u00e9el",val:"1 500 \u20ac"},{type:"minus",label:"\u26a1 Micro : charges ~12% sur 3 000\u20ac",val:"-360 \u20ac"},{type:"minus",label:"\ud83d\ude80 SASU : IS 15% sur 1 500\u20ac b\u00e9n\u00e9fice",val:"-225 \u20ac"}]},
{t:'warning',emoji:"\u26a0\ufe0f",title:"Les autres limites \u00e0 conna\u00eetre \ud83d\udea8",body:"La micro-entreprise c'est pas fait pour construire un vrai business.",warn:"<strong>\ud83d\udcca Plafond de CA :</strong> vente de produits max 188 700\u20ac/an, services max 77 700\u20ac/an.<br><br><strong>\ud83e\udd1d Cr\u00e9dibilit\u00e9 limit\u00e9e :</strong> certains fournisseurs pro, grossistes, partenaires B2B refusent de travailler avec les micro-entrepreneurs.<br><br><strong>\ud83e\uddea Mindset 'test' :</strong> quand tu te dis je teste, tu te laisses une porte de sortie. \u00c0 la moindre difficult\u00e9 tu l'utilises. Quand tu lances, t'es l\u00e0 pour que \u00e7a marche.",vo:"Les autres limites. Le plafond de chiffre d'affaires. En vente de produits c'est 188 700 euros par an maximum. Pour les prestations de services c'est 77 700 euros par an. Si tu d\u00e9passes, tu bascules en soci\u00e9t\u00e9. Certains partenaires s\u00e9rieux refusent de travailler avec des micro-entrepreneurs. Et la question de mindset. Quand tu te dis je teste, tu te laisses une porte de sortie. Et \u00e0 la moindre gal\u00e8re, tu ressors par cette porte. Quand tu lances un business, t'es l\u00e0 pour que \u00e7a marche, pas pour tester."},
{t:'recap',emoji:"\ud83d\udcbb",title:"Cr\u00e9er ta micro-entreprise ou ta soci\u00e9t\u00e9",vo:"Si tu veux commencer par la micro-entreprise, tu peux cr\u00e9er directement sur autoentrepreneur.urssaf.fr, c'est gratuit. Si tu veux cr\u00e9er une vraie soci\u00e9t\u00e9 comme une SASU ou une EURL, je recommande LegalPlace. Tout se fait en ligne, statuts, domiciliation, compte pro, tout au m\u00eame endroit. Le lien est dans la description. Et le code SBW25 te donne 25% de r\u00e9duction, c'est le code exclusif que j'ai n\u00e9goci\u00e9 pour les membres de cette formation. Dans mes vid\u00e9os publiques je donne le code SBW15, mais vu que t'es dans la formation j'ai obtenu 10% de plus pour toi.",points:["Gratuit, simple, z\u00e9ro risque \u2014 id\u00e9al pour d\u00e9buter ou tester","Tu peux rien d\u00e9duire \u2014 les charges s'appliquent sur le CA brut","Plafonds CA : 188 700\u20ac produits / 77 700\u20ac services","Certains partenaires pro refusent de travailler avec les micro","Recommand\u00e9e pour : salari\u00e9 + compl\u00e9ment / tester / petits revenus","Pour construire un vrai business : passe en SASU ou EURL"]},
{t:'recap',emoji:"\u26a1",title:"Micro-entreprise \u2014 l'essentiel",vo:"Ce qu'il faut retenir sur la micro-entreprise. C'est gratuit, simple, z\u00e9ro risque au d\u00e9marrage. Mais tu peux rien d\u00e9duire, les charges s'appliquent sur tout ce que tu encaisses. Il y a des plafonds de chiffre d'affaires. Certains partenaires pro ne veulent pas travailler avec des micro-entrepreneurs. La micro c'est bien pour tester ou pour un compl\u00e9ment de revenus. Mais pour construire un vrai business avec de vraies marges \u00e0 optimiser, il faut passer en SASU ou EURL. Prochaine le\u00e7on, SASU versus EURL en d\u00e9tail.",points:["Gratuit, simple, z\u00e9ro risque \u2014 id\u00e9al pour d\u00e9buter ou tester","Tu peux rien d\u00e9duire \u2014 les charges s'appliquent sur le CA brut","Plafonds CA : 188 700\u20ac produits / 77 700\u20ac services","Certains partenaires pro refusent de travailler avec les micro","Recommand\u00e9e pour : salari\u00e9 + compl\u00e9ment / tester / petits revenus","Pour construire un vrai business : passe en SASU ou EURL"]}]},
{id:4,title:"\u2696\ufe0f SASU vs EURL : laquelle pour toi ?",slides:[
{t:'intro',emoji:"\u2696\ufe0f",num:"04",title:"SASU vs EURL :\\n<em>laquelle pour toi ?</em>",sub:"Deux structures pour une seule personne. Le choix d\u00e9pend d'une question cl\u00e9.",vo:"Le\u00e7on quatre. SASU versus EURL. Deux mots qui font peur mais en vrai c'est simple. Et le choix entre les deux, selon ta situation, \u00e7a peut te faire \u00e9conomiser ou perdre des milliers d'euros par an. Alors autant comprendre."},
{t:'concept',emoji:"\ud83d\ude80",tag:"La SASU",title:"SASU \u2014 Soci\u00e9t\u00e9 par Actions Simplifi\u00e9e Unipersonnelle \ud83d\ude80",body:"En SASU, tu es <strong>assimil\u00e9 salari\u00e9.</strong><br>Si tu te verses un salaire \u2192 fiches de paie, charges lourdes <strong>(~75-80% du net).</strong><br>Si tu te verses pas de salaire \u2192 <em>z\u00e9ro charges, z\u00e9ro imp\u00f4ts.</em><br>Tu gardes toutes tes aides sociales \u2014 ch\u00f4mage, RSA, APL.",vo:"La SASU. SASU \u00e7a veut dire Soci\u00e9t\u00e9 par Actions Simplifi\u00e9e Unipersonnelle. En SASU, si tu te verses un salaire, tu te fais des fiches de paie comme un employ\u00e9. Et l\u00e0 les charges sont lourdes. On parle d'environ 75 \u00e0 80% de charges au-dessus de ce que tu veux toucher net. Pour toucher 2 000 euros nets par mois, ta soci\u00e9t\u00e9 doit sortir environ 3 500 euros. C'est beaucoup. Mais l\u00e0 o\u00f9 la SASU devient tr\u00e8s int\u00e9ressante, c'est que si tu te verses aucun salaire et que ta soci\u00e9t\u00e9 fait z\u00e9ro b\u00e9n\u00e9fice, tu paies z\u00e9ro euro."},
{t:'concept',emoji:"\ud83d\udee1\ufe0f",tag:"L'avantage SASU",title:"Tu gardes tes aides sociales \u2014 l'avantage cl\u00e9 \ud83d\udee1\ufe0f",body:"La SASU est une <strong>personne morale</strong> \u2014 une entit\u00e9 s\u00e9par\u00e9e de toi.<br>Tant que tu te verses pas de salaire, <em>toi en tant que personne tu n'as pas de revenus.</em><br><br>\u2705 Ch\u00f4mage maintenu \u00b7 \u2705 RSA maintenu \u00b7 \u2705 APL maintenu<br><br>C'est un avantage \u00e9norme que <strong>beaucoup de gens ignorent.</strong>",vo:"Et l\u00e0 y'a un avantage \u00e9norme que beaucoup de gens ignorent. La SASU c'est une personne morale. C'est une entit\u00e9 s\u00e9par\u00e9e de toi. \u00c7a veut dire que tant que tu te verses pas de salaire, toi en tant que personne tu n'as pas de revenus. C'est ta soci\u00e9t\u00e9 qui en a. Donc tu peux continuer \u00e0 percevoir le ch\u00f4mage, le RSA, les APL, ou toute autre aide sociale que tu touchais avant. C'est pour \u00e7a que la SASU c'est souvent le meilleur choix pour d\u00e9marrer. Tu fais tourner ta bo\u00eete, tu r\u00e9investis, tu gardes tes aides, et quand les b\u00e9n\u00e9fices arrivent tu te verses des dividendes."},
{t:'concept',emoji:"\ud83d\udcbc",tag:"L'EURL",title:"EURL \u2014 Entreprise Unipersonnelle \u00e0 Responsabilit\u00e9 Limit\u00e9e \ud83d\udcbc",body:"En EURL, tu es g\u00e9rant TNS (Travailleur Non Salari\u00e9).<br>Pas de fiches de paie. R\u00e9mun\u00e9ration de g\u00e9rant.<br>Charges moins lourdes \u2014 <strong>environ 40-45%.</strong><br><br>\u26a0\ufe0f <strong>M\u00eame si tu gagnes z\u00e9ro :</strong> cotisations minimales <em>~1 000-1 200\u20ac/an.</em><br>Risque de perdre les aides sociales.",vo:"Maintenant l'EURL. EURL \u00e7a veut dire Entreprise Unipersonnelle \u00e0 Responsabilit\u00e9 Limit\u00e9e. En EURL tu rel\u00e8ves du r\u00e9gime des travailleurs ind\u00e9pendants. Tu te verses pas vraiment un salaire, tu te verses une r\u00e9mun\u00e9ration de g\u00e9rant. Pas de fiches de paie. Les charges sont moins lourdes qu'en SASU, environ 40 \u00e0 45% sur ce que tu te verses. Donc si tu veux te verser un revenu d\u00e8s le d\u00e9part, l'EURL est moins ch\u00e8re que la SASU sur la r\u00e9mun\u00e9ration. Mais attention, il y a un pi\u00e8ge important. M\u00eame si tu te verses aucun revenu, m\u00eame si ta soci\u00e9t\u00e9 fait z\u00e9ro b\u00e9n\u00e9fice, tu as quand m\u00eame des cotisations minimales obligatoires \u00e0 payer. On parle d'environ 1 000 \u00e0 1 200 euros par an minimum."},
{t:'compare',emoji:"\ud83d\ude80",num:"0\u20ac",title:"\ud83d\udcca SASU vs EURL \u2014 la comparaison d\u00e9cisive",vo:"La comparaison d\u00e9cisive. Si tu lances ton business, que tu sais pas encore combien tu vas gagner, que tu veux garder tes aides sociales le temps que \u00e7a d\u00e9colle, que tu veux payer z\u00e9ro si tu gagnes z\u00e9ro, la SASU c'est clairement le meilleur choix. Si tu as d\u00e9j\u00e0 de l'exp\u00e9rience, des clients, que tu es s\u00fbr que \u00e7a va fonctionner d\u00e8s le d\u00e9part et que tu veux te verser un revenu rapidement, dans ce cas-l\u00e0 l'EURL peut \u00eatre mieux. Les charges sur ta r\u00e9mun\u00e9ration sont moins lourdes qu'en SASU.",left:{emoji:"\ud83d\ude80",label:"SASU \u2014 Si tu d\u00e9marres",num:"0\u20ac",unit:"",desc:"Pas de salaire = z\u00e9ro charges. Tu gardes le ch\u00f4mage, RSA, APL. Dividendes \u00e0 30% quand b\u00e9n\u00e9fices. LE meilleur choix pour commencer."},right:{emoji:"\ud83d\udcbc",label:"EURL \u2014 Si tu veux te r\u00e9mun\u00e9rer",num:"~1 200\u20ac",unit:"/an min",desc:"Charges moins lourdes sur r\u00e9mun\u00e9ration (40-45%). Mais cotisations minimales m\u00eame si z\u00e9ro CA. Risque de perdre les aides sociales.",color:"neutral"},note:"Dans les deux cas : consulte un comptable pour ta situation sp\u00e9cifique."},
{t:'concept',emoji:"\ud83d\udcb0",tag:"Dividendes SASU",title:"Dividendes SASU : la strat\u00e9gie gagnante \ud83d\udcb0",body:"Quand ta SASU fait des b\u00e9n\u00e9fices :<br>\u2022 Elle paie <strong>15% d'IS</strong> sur les premiers 42 500\u20ac<br>\u2022 Tu te verses le reste en <strong>dividendes tax\u00e9s \u00e0 30%</strong> (PFU)<br>\u2022 Tu peux aussi prendre un <strong>acompte sur dividendes</strong> en cours d'ann\u00e9e si b\u00e9n\u00e9ficiaire",vo:"Et l\u00e0 c'est l\u00e0 que la SASU devient vraiment int\u00e9ressante. Quand ta soci\u00e9t\u00e9 fait des b\u00e9n\u00e9fices, elle paie 15% d'imp\u00f4t sur les soci\u00e9t\u00e9s sur les premiers 42 500 euros. Ensuite tu peux te verser ces b\u00e9n\u00e9fices en dividendes tax\u00e9s \u00e0 seulement 30% au total. C'est ce qu'on appelle le PFU, le Pr\u00e9l\u00e8vement Forfaitaire Unique. 17,2% de pr\u00e9l\u00e8vements sociaux et 12,8% d'imp\u00f4t sur le revenu. Total 30%. C'est beaucoup moins lourd que se verser un salaire."},
{t:'recap',emoji:"\u2696\ufe0f",title:"Comment tu choisis ?",vo:"Comment tu choisis. Si tu touches le ch\u00f4mage, le RSA ou les APL et que tu veux pas les perdre, c'est la SASU. Si tu d\u00e9marres sans certitude sur les revenus et que tu veux payer z\u00e9ro si tu gagnes z\u00e9ro, c'est la SASU. Si t'as d\u00e9j\u00e0 de l'exp\u00e9rience, des clients confirm\u00e9s, et que tu veux te r\u00e9mun\u00e9rer rapidement sans te soucier des aides, l'EURL peut \u00eatre mieux. Pour cr\u00e9er ta SASU ou ton EURL en ligne simplement, je recommande LegalPlace. Ils s'occupent de tout, statuts, d\u00e9p\u00f4t du capital, immatriculation, domiciliation, et m\u00eame ouverture du compte pro. Le lien est dans la description, code SBW25 pour 25% de r\u00e9duction.",points:["SASU : assimil\u00e9 salari\u00e9 \u2014 charges lourdes sur salaire (75-80%)","SASU sans salaire = 0\u20ac de charges + tu gardes ch\u00f4mage/RSA/APL","SASU : dividendes tax\u00e9s \u00e0 30% seulement \u2014 la strat\u00e9gie gagnante","EURL : TNS, charges 40-45% \u2014 mais cotisations minimales ~1 200\u20ac/an","EURL : risque de perdre les aides sociales","D\u00e9marrage incertain \u2192 SASU / Revenus rapides certains \u2192 EURL"]},
{t:'recap',emoji:"\u2696\ufe0f",title:"SASU vs EURL \u2014 le r\u00e9sum\u00e9",vo:"Le r\u00e9capitulatif. La SASU est assimil\u00e9 salari\u00e9 avec des charges lourdes sur le salaire, mais si tu te verses aucun salaire tu paies z\u00e9ro et tu gardes toutes tes aides. Les dividendes en SASU sont tax\u00e9s \u00e0 seulement 30%, c'est la strat\u00e9gie gagnante. L'EURL a des charges moins lourdes sur la r\u00e9mun\u00e9ration mais des cotisations minimales m\u00eame sans CA et un risque de perdre les aides sociales. Pour un d\u00e9marrage incertain, la SASU est clairement la meilleure option. Si tu as des revenus certains d\u00e8s le d\u00e9part, l'EURL peut \u00eatre mieux. Prochaine le\u00e7on, s'associer.",points:["SASU : assimil\u00e9 salari\u00e9 \u2014 charges lourdes sur salaire (75-80%)","SASU sans salaire = 0\u20ac de charges + tu gardes ch\u00f4mage/RSA/APL","SASU : dividendes tax\u00e9s \u00e0 30% seulement \u2014 la strat\u00e9gie gagnante","EURL : TNS, charges 40-45% \u2014 mais cotisations minimales ~1 200\u20ac/an","EURL : risque de perdre les aides sociales","D\u00e9marrage incertain \u2192 SASU / Revenus rapides certains \u2192 EURL"]}]},
{id:5,title:"\ud83e\udd1d S'associer : SAS, SARL et pacte",slides:[
{t:'intro',emoji:"\ud83e\udd1d",num:"05",title:"S'associer :\\n<em>SAS, SARL et pacte d'associ\u00e9s</em>",sub:"Vous vous lancez \u00e0 plusieurs ? Cette le\u00e7on peut sauver ton business ET tes relations.",vo:"Le\u00e7on cinq. S'associer. Parce que beaucoup de gens se lancent \u00e0 deux, \u00e0 trois, avec un ami, un fr\u00e8re, un coll\u00e8gue. Et c'est bien de vouloir s'associer. Mais si c'est mal fait, \u00e7a peut d\u00e9truire ton business et ta relation avec la personne en m\u00eame temps. Je vais te donner toutes les cl\u00e9s pour que \u00e7a se passe bien."},
{t:'compare',emoji:"\ud83d\ude80",num:"\u2713",title:"\ud83c\udfe2 SAS vs SARL \u2014 \u00e0 plusieurs associ\u00e9s",vo:"On commence par les structures. La SAS c'est la SASU mais \u00e0 plusieurs. Minimum deux associ\u00e9s. Tr\u00e8s flexible dans l'organisation. Vous d\u00e9cidez ensemble dans vos statuts comment fonctionne la soci\u00e9t\u00e9, qui prend les d\u00e9cisions, comment on vote, comment on se partage les b\u00e9n\u00e9fices. La SARL c'est la forme de soci\u00e9t\u00e9 la plus r\u00e9pandue en France. Le g\u00e9rant majoritaire, celui qui d\u00e9tient plus de 50% des parts, rel\u00e8ve du r\u00e9gime des travailleurs ind\u00e9pendants avec des charges moins lourdes.",left:{emoji:"\ud83d\ude80",label:"SAS \u2014 Flexible",num:"\u2713",unit:"",desc:"La SASU \u00e0 plusieurs. Min 2 associ\u00e9s. Tr\u00e8s libre dans l'organisation. Pr\u00e9f\u00e9r\u00e9e des investisseurs. Dividendes flat tax 30% sans cotisations sociales."},right:{emoji:"\ud83c\udfea",label:"SARL \u2014 Classique",num:"\u2713",unit:"",desc:"La plus r\u00e9pandue. G\u00e9rant majoritaire (+50%) = TNS, charges 40-45%. G\u00e9rant minoritaire = assimil\u00e9 salari\u00e9. Moins flexible mais tr\u00e8s solide.",color:"neutral"},note:"SAS si vous voulez la flexibilit\u00e9 et envisagez des investisseurs. SARL si le g\u00e9rant veut se r\u00e9mun\u00e9rer avec moins de charges."},
{t:'warning',emoji:"\u26a0\ufe0f",title:"Le pacte d'associ\u00e9s \u2014 le document le plus important \ud83e\udd1d",body:"C'est le truc que 90% des associ\u00e9s oublient de faire. Et c'est souvent l\u00e0 que tout se joue.",warn:"<strong>Au d\u00e9part tout va bien.</strong> Vous \u00eates motiv\u00e9s, vous vous faites confiance.<br><br><strong>Mais les conflits entre associ\u00e9s \u00e7a arrive.</strong> M\u00eame entre amis. M\u00eame entre fr\u00e8res.<br><br><strong>Sans pacte d'associ\u00e9s, quand \u00e7a part en vrille, t'as rien pour te prot\u00e9ger.</strong>",vo:"Maintenant on va parler du truc le plus important de cette le\u00e7on. Le pacte d'associ\u00e9s. Et si t'en retiens qu'une chose aujourd'hui, c'est \u00e7a. Le pacte d'associ\u00e9s c'est un document l\u00e9gal que vous signez entre associ\u00e9s en dehors des statuts de la soci\u00e9t\u00e9. Il r\u00e8gle tout ce que les statuts r\u00e8glent pas. Et c'est ce document qui va te prot\u00e9ger si un jour les choses se passent mal entre vous. Parce que je vais \u00eatre honn\u00eate avec toi. Au d\u00e9part tout va bien. Mais les conflits entre associ\u00e9s \u00e7a arrive. M\u00eame entre amis. M\u00eame entre fr\u00e8res."},
{t:'cards',emoji:"\ud83d\udcb0",title:"\ud83d\udccb Ce que le pacte d'associ\u00e9s r\u00e8gle",sub:"Qui d\u00e9tient combien. Comment \u00e7a peut \u00e9voluer. Conditions d'entr\u00e9e de nouveaux associ\u00e9s.",vo:"Voil\u00e0 ce que le pacte d'associ\u00e9s r\u00e8gle concr\u00e8tement. La r\u00e9partition des parts et comment elle peut \u00e9voluer dans le temps. Les d\u00e9cisions, qui d\u00e9cide de quoi, et comment \u00e9viter le blocage \u00e0 50/50. La clause de sortie, si un associ\u00e9 veut partir comment \u00e7a se passe, les autres ont-ils le droit de racheter ses parts en priorit\u00e9 et \u00e0 quel prix. La non-concurrence, si un associ\u00e9 part peut-il aller cr\u00e9er une soci\u00e9t\u00e9 concurrente. Et ce qui se passe si quelqu'un d\u00e9c\u00e8de ou devient incapable. Ces questions sont difficiles \u00e0 aborder mais elles doivent \u00eatre r\u00e9gl\u00e9es avant.",items:[{emoji:"\ud83d\udcb0",name:"R\u00e9partition et \u00e9volution des parts",sub:"Qui d\u00e9tient combien. Comment \u00e7a peut \u00e9voluer. Conditions d'entr\u00e9e de nouveaux associ\u00e9s."},{emoji:"\ud83d\uddf3\ufe0f",name:"Prise de d\u00e9cision",sub:"Qui d\u00e9cide de quoi. D\u00e9cisions \u00e0 l'unanimit\u00e9 ou \u00e0 la majorit\u00e9. Clause anti-blocage en cas de 50/50."},{emoji:"\ud83d\udeaa",name:"Clause de sortie et pr\u00e9emption",sub:"Si un associ\u00e9 veut partir, comment \u00e7a se passe. Les autres ont-ils le droit de racheter ses parts en priorit\u00e9 ?"},{emoji:"\ud83d\udeab",name:"Non-concurrence et d\u00e9c\u00e8s",sub:"Si un associ\u00e9 part, peut-il cr\u00e9er une soci\u00e9t\u00e9 concurrente ? Que se passe-t-il si quelqu'un d\u00e9c\u00e8de ou devient incapable ?"}]},
{t:'warning',emoji:"\ud83d\udee1\ufe0f",title:"La r\u00e8gle d'or : jamais sans pacte \ud83d\udee1\ufe0f",body:"Peu importe que ce soit ton meilleur ami, ton fr\u00e8re, ou quelqu'un en qui tu as une confiance totale.",warn:"<strong>Le pacte d'associ\u00e9s c'est pas un manque de confiance.</strong><br>C'est une protection pour vous deux.<br><br><strong>C'est comme une assurance.</strong> Tu esp\u00e8res ne jamais en avoir besoin. Mais si un jour tu en as besoin, tu es content de l'avoir.<br><br><strong>\u2192 LegalPlace</strong> propose des mod\u00e8les de pacte d'associ\u00e9s personnalisables. Code SBW25.",vo:"Je vais \u00eatre tr\u00e8s direct avec toi maintenant. Ne t'associe jamais sans pacte d'associ\u00e9s. Jamais. Peu importe que ce soit ton meilleur ami, ton fr\u00e8re, ou quelqu'un en qui tu as une confiance totale. Ce document c'est pas un manque de confiance. C'est une protection pour vous deux. C'est comme une assurance. Tu esp\u00e8res ne jamais en avoir besoin. Mais si un jour tu en as besoin, tu es content de l'avoir. LegalPlace propose des mod\u00e8les de pacte d'associ\u00e9s que tu peux personnaliser. Le lien est dans la description, code SBW25 pour ta r\u00e9duction exclusive."},
{t:'recap',emoji:"\ud83e\udd1d",title:"S'associer \u2014 l'essentiel",vo:"Le r\u00e9capitulatif. La SAS c'est la structure flexible pour plusieurs associ\u00e9s, dividendes flat tax 30%, id\u00e9ale si vous visez des investisseurs. La SARL c'est la structure classique, tr\u00e8s r\u00e9pandue, avec des charges moins lourdes pour le g\u00e9rant majoritaire. Le pacte d'associ\u00e9s c'est le document le plus important quand on s'associe. R\u00e8gles de vote, clause de sortie, non-concurrence, ce qui se passe en cas de d\u00e9c\u00e8s, tout \u00e7a doit \u00eatre \u00e9crit avant de commencer. C'est une protection pour vous deux. Prochaine le\u00e7on, la domiciliation.",points:["SAS : flexible, dividendes flat tax 30%, id\u00e9ale si vous visez des investisseurs","SARL : solide, g\u00e9rant majoritaire TNS avec charges moins lourdes","Pacte d'associ\u00e9s : le document le plus important \u2014 ne jamais l'oublier","R\u00e8gles de vote, sortie, non-concurrence, d\u00e9c\u00e8s \u2014 tout \u00e9crire avant","C'est une protection pour vous deux, pas un manque de confiance","LegalPlace pour cr\u00e9er la soci\u00e9t\u00e9 ET le pacte \u2014 code SBW25"]}]},
{id:6,title:"\ud83d\udccd La domiciliation",slides:[
{t:'intro',emoji:"\ud83d\udccd",num:"06",title:"La domiciliation :\\n<em>adresse pro obligatoire</em>",sub:"Mettre son adresse perso sur sa soci\u00e9t\u00e9 \u2014 l'erreur que beaucoup font et qui peut co\u00fbter cher.",vo:"Le\u00e7on six. La domiciliation. Quand tu cr\u00e9es ta soci\u00e9t\u00e9, une des premi\u00e8res choses qu'on va te demander c'est l'adresse de ton entreprise. Et l\u00e0 beaucoup de gens mettent leur adresse personnelle, leur appartement, chez leurs parents. Et c'est une erreur. Dans cette le\u00e7on je t'explique ce qu'est la domiciliation, pourquoi c'est important, et comment \u00e7a marche."},
{t:'cards',emoji:"\ud83d\udd13",title:"\u274c Pourquoi mettre ton adresse perso c'est une mauvaise id\u00e9e",sub:"Le Kbis de ta soci\u00e9t\u00e9 est un document public. N'importe qui peut chercher l'adresse en ligne. Si c'est ton adresse perso, tout le monde sait o\u00f9 tu habites.",vo:"Pourquoi mettre ton adresse personnelle comme adresse de soci\u00e9t\u00e9 c'est une mauvaise id\u00e9e. Premi\u00e8rement ton adresse devient publique. Le Kbis de ta soci\u00e9t\u00e9 est un document public. N'importe qui peut aller chercher l'adresse en ligne. Si c'est ton adresse personnelle, n'importe qui sait o\u00f9 tu habites. Deuxi\u00e8mement ton bail peut l'interdire. Beaucoup de contrats de location interdisent d'utiliser le logement comme adresse commerciale. Si ton propri\u00e9taire s'en aper\u00e7oit, il peut te demander de partir. Troisi\u00e8mement c'est pas professionnel.",items:[{emoji:"\ud83d\udd13",name:"Ton adresse devient publique",sub:"Le Kbis de ta soci\u00e9t\u00e9 est un document public. N'importe qui peut chercher l'adresse en ligne. Si c'est ton adresse perso, tout le monde sait o\u00f9 tu habites."},{emoji:"\ud83d\udcdc",name:"Ton bail peut l'interdire",sub:"Beaucoup de contrats de location interdisent l'adresse commerciale. Le propri\u00e9taire peut te demander de partir."},{emoji:"\ud83d\ude2c",name:"C'est pas professionnel",sub:"Une facture avec l'adresse d'un appartement inspire moins confiance qu'une adresse dans un quartier d'affaires."}]},
{t:'concept',emoji:"\u2705",tag:"La solution",title:"La domiciliation commerciale \u2705",body:"C'est un abonnement mensuel pour utiliser une <strong>adresse professionnelle</strong> comme adresse officielle de ta soci\u00e9t\u00e9.<br><br>\u2705 Courrier re\u00e7u et transmis par email<br>\u2705 Tu travailles d'o\u00f9 tu veux \u2014 chez toi, d'un caf\u00e9, de l'\u00e9tranger<br>\u2705 <strong>\u00c0 partir de 20-30\u20ac/mois</strong> \u2014 et c'est d\u00e9ductible<br>\u2705 Paris, Lyon, Bordeaux, Marseille...",vo:"La solution c'est la domiciliation commerciale. C'est un service o\u00f9 tu paies un abonnement mensuel pour utiliser une adresse professionnelle comme adresse officielle de ta soci\u00e9t\u00e9. Tu re\u00e7ois ton courrier l\u00e0-bas, ils te le transmettent par email ou physiquement selon les formules. Et toi tu travailles d'o\u00f9 tu veux. De chez toi, d'un caf\u00e9, de l'\u00e9tranger. Peu importe. Ton adresse officielle reste professionnelle. Le co\u00fbt \u00e7a commence \u00e0 partir d'environ 20 \u00e0 30 euros par mois. Et cette d\u00e9pense elle est d\u00e9ductible de ta soci\u00e9t\u00e9."},
{t:'concept',emoji:"\ud83d\udcbb",tag:"LegalPlace + domiciliation",title:"Cr\u00e9er la soci\u00e9t\u00e9 ET la domiciliation en m\u00eame temps \ud83d\udcbb",body:"Avec <strong>LegalPlace</strong>, tu choisis directement ton adresse de domiciliation pendant la cr\u00e9ation de ta soci\u00e9t\u00e9. Tout au m\u00eame endroit.<br><br>\ud83d\uddfa\ufe0f Tu choisis la ville parmi celles disponibles<br>\ud83d\udcec L'adresse est activ\u00e9e en m\u00eame temps que ta soci\u00e9t\u00e9<br>\ud83d\udca1 Pas besoin de chercher un prestataire s\u00e9par\u00e9<br><br><strong>Code SBW25 \u2014 25% de r\u00e9duction exclusive membres.</strong>",vo:"Et le gros avantage avec LegalPlace, c'est que quand tu cr\u00e9es ta soci\u00e9t\u00e9 avec eux, tu peux directement choisir une adresse de domiciliation pendant la cr\u00e9ation. Tout se fait au m\u00eame endroit. Tu choisis ton adresse parmi celles qu'ils proposent, Paris, Lyon, Bordeaux, Marseille et d'autres villes disponibles, et c'est r\u00e9gl\u00e9. Ton adresse professionnelle est activ\u00e9e en m\u00eame temps que ta soci\u00e9t\u00e9. T'as pas besoin de chercher un prestataire de domiciliation s\u00e9par\u00e9. Le lien est dans la description. Code SBW25 pour ta r\u00e9duction de 25% exclusive aux membres de la formation."},
{t:'concept',emoji:"\ud83c\udf0d",tag:"Si tu pars \u00e0 l'\u00e9tranger",title:"La domiciliation si tu g\u00e8res depuis l'\u00e9tranger \ud83c\udf0d",body:"Si tu pars \u00e0 Duba\u00ef, au Maroc, \u00e0 Bali \u2014 <strong>ta domiciliation en France reste l'adresse officielle de ta soci\u00e9t\u00e9 fran\u00e7aise.</strong><br><br>C'est ce qui te permet d'avoir une soci\u00e9t\u00e9 en France tout en vivant ailleurs.",vo:"Un dernier point important. Si un jour tu pars \u00e0 l'\u00e9tranger, si tu g\u00e8res ta bo\u00eete depuis Duba\u00ef, depuis le Maroc, depuis n'importe o\u00f9, ta domiciliation en France reste l'adresse officielle de ta soci\u00e9t\u00e9 fran\u00e7aise. C'est ce qui te permet d'avoir une soci\u00e9t\u00e9 en France tout en vivant ailleurs. Pour l'instant retiens juste : domiciliation commerciale obligatoire, \u00e0 partir de 20 euros par mois, d\u00e9ductible, et \u00e7a se fait directement sur LegalPlace au moment de cr\u00e9er ta soci\u00e9t\u00e9."},
{t:'recap',emoji:"\ud83d\udccd",title:"Domiciliation \u2014 l'essentiel",vo:"Ce qu'il faut retenir. L'adresse personnelle comme adresse de soci\u00e9t\u00e9, c'est une erreur. Elle devient publique, ton bail peut l'interdire, et c'est pas professionnel. La domiciliation commerciale c'est la solution. Adresse professionnelle, courrier transmis par email, \u00e0 partir de 20 euros par mois, et c'est d\u00e9ductible. Avec LegalPlace tu choisis ton adresse de domiciliation directement pendant la cr\u00e9ation de ta soci\u00e9t\u00e9. Et \u00e7a permet de g\u00e9rer ta soci\u00e9t\u00e9 fran\u00e7aise depuis l'\u00e9tranger si tu pars un jour. Prochaine le\u00e7on, le compte pro.",points:["Adresse perso = publique + risque bail + pas professionnel","Domiciliation commerciale : adresse pro, courrier transmis, d\u00e9ductible","\u00c0 partir de 20-30\u20ac/mois \u2014 charge d\u00e9ductible de ta soci\u00e9t\u00e9","Paris, Lyon, Bordeaux, Marseille... tu choisis la ville","LegalPlace : domiciliation incluse dans la cr\u00e9ation de soci\u00e9t\u00e9","Permet de g\u00e9rer ta soci\u00e9t\u00e9 fran\u00e7aise depuis l'\u00e9tranger"]}]},
{id:7,title:"\ud83c\udfe6 Le compte pro",slides:[
{t:'intro',emoji:"\ud83c\udfe6",num:"07",title:"Le compte pro :\\n<em>obligatoire et indispensable</em>",sub:"Pourquoi m\u00e9langer perso et pro c'est la pire erreur \u2014 et comment bien choisir ton compte.",vo:"Le\u00e7on sept. Le compte bancaire professionnel. L\u00e0 encore c'est un truc que beaucoup de gens n\u00e9gligent au d\u00e9part. Ils gardent leur compte perso et ils font passer tout le business dessus. C'est une erreur. Dans cette le\u00e7on je t'explique pourquoi c'est obligatoire et comment bien choisir."},
{t:'concept',emoji:"\u2696\ufe0f",tag:"Obligatoire ou pas ?",title:"Pour une soci\u00e9t\u00e9 : obligatoire l\u00e9galement \u2696\ufe0f",body:"Ta soci\u00e9t\u00e9 est une <strong>personne morale.</strong> Elle a sa propre existence l\u00e9gale. Elle doit avoir <strong>son propre compte bancaire.</strong><br><br>Tu peux pas m\u00e9langer l'argent de ta soci\u00e9t\u00e9 avec ton argent personnel. C'est interdit.<br><br>Pour une micro-entreprise : <em>pas obligatoire l\u00e9galement</em>, mais fortement recommand\u00e9.",vo:"Est-ce que le compte pro c'est obligatoire. Pour une soci\u00e9t\u00e9, SASU, EURL, SAS, SARL, oui c'est obligatoire l\u00e9galement. Ta soci\u00e9t\u00e9 est une personne morale. Elle a sa propre existence l\u00e9gale. Elle doit avoir son propre compte bancaire. Tu peux pas m\u00e9langer l'argent de ta soci\u00e9t\u00e9 avec ton argent personnel. C'est interdit. Pour une micro-entreprise, c'est pas obligatoire l\u00e9galement. Mais c'est fortement recommand\u00e9 quand m\u00eame. Parce que si tu m\u00e9langes tout sur ton compte perso, quand tu vas devoir justifier tes revenus ou g\u00e9rer ta comptabilit\u00e9, ce sera un cauchemar."},
{t:'cards',emoji:"\ud83d\udee1\ufe0f",title:"\ud83d\udca1 Pourquoi c'est indispensable au-del\u00e0 de l'obligation",sub:"Tout ce qui rentre et sort de ta soci\u00e9t\u00e9 passe par le compte pro. Si ta soci\u00e9t\u00e9 a un probl\u00e8me, ton compte perso est prot\u00e9g\u00e9.",vo:"Pourquoi c'est indispensable au-del\u00e0 de l'obligation l\u00e9gale. Premi\u00e8rement la s\u00e9paration perso et pro. Tout ce qui rentre dans ta soci\u00e9t\u00e9 et tout ce qui sort passe par le compte pro. Ton argent personnel reste sur ton compte perso. Si ta soci\u00e9t\u00e9 a un probl\u00e8me, ton compte perso est prot\u00e9g\u00e9. Deuxi\u00e8mement la cr\u00e9dibilit\u00e9. Quand tu paies tes fournisseurs, quand tu re\u00e7ois des paiements de clients professionnels, un compte pro \u00e7a inspire confiance. Troisi\u00e8mement la comptabilit\u00e9. Avec un compte pro d\u00e9di\u00e9, ton comptable peut directement acc\u00e9der \u00e0 tes relev\u00e9s et faire ta comptabilit\u00e9 facilement.",items:[{emoji:"\ud83d\udee1\ufe0f",name:"S\u00e9paration perso / pro",sub:"Tout ce qui rentre et sort de ta soci\u00e9t\u00e9 passe par le compte pro. Si ta soci\u00e9t\u00e9 a un probl\u00e8me, ton compte perso est prot\u00e9g\u00e9."},{emoji:"\ud83e\udd1d",name:"Cr\u00e9dibilit\u00e9 professionnelle",sub:"Tes fournisseurs, clients pro, partenaires \u2014 un compte pro inspire confiance. Un compte perso peut bloquer des op\u00e9rations."},{emoji:"\ud83d\udcca",name:"Comptabilit\u00e9 simplifi\u00e9e",sub:"Ton comptable acc\u00e8de directement \u00e0 tes relev\u00e9s pro. Tout est clair, rien n'est m\u00e9lang\u00e9. Tu \u00e9conomises du temps et de l'argent."}]},
{t:'compare',emoji:"\ud83c\udfdb\ufe0f",num:"30-60",title:"\ud83c\udfe6 Banque traditionnelle vs N\u00e9o-banque pro",vo:"Maintenant lequel choisir. Y'a deux grandes cat\u00e9gories. Les banques traditionnelles et les n\u00e9o-banques. Les banques traditionnelles comme BNP, Soci\u00e9t\u00e9 G\u00e9n\u00e9rale, Cr\u00e9dit Agricole ont des agences physiques et des services complets. Mais elles sont ch\u00e8res, entre 30 et 60 euros par mois de frais. Et l'ouverture peut prendre plusieurs semaines. Les n\u00e9o-banques pro comme Qonto, Shine, Revolut Business, Blank, tout se passe en ligne. L'ouverture se fait en quelques jours, parfois en 24 heures. Les frais sont beaucoup moins \u00e9lev\u00e9s, entre 9 et 15 euros par mois. Pour un entrepreneur qui se lance, les n\u00e9o-banques c'est souvent le meilleur choix au d\u00e9part.",left:{emoji:"\ud83c\udfdb\ufe0f",label:"Banque traditionnelle",num:"30-60",unit:"\u20ac/mois",desc:"BNP, SG, Cr\u00e9dit Agricole. Agences physiques, conseiller d\u00e9di\u00e9. Mais cher et ouverture qui prend plusieurs semaines."},right:{emoji:"\u26a1",label:"N\u00e9o-banque pro",num:"9-15",unit:"\u20ac/mois",desc:"Qonto, Shine, Revolut Business, Blank. Tout en ligne, ouverture en 24-48h, interface simple. Parfait pour d\u00e9marrer.",color:"good"},note:"Pour un entrepreneur qui se lance, les n\u00e9o-banques sont souvent le meilleur choix au d\u00e9part."},
{t:'concept',emoji:"\ud83d\udcbb",tag:"LegalPlace + compte pro",title:"Ouvrir ton compte pro en m\u00eame temps que ta soci\u00e9t\u00e9 \ud83d\udcbb",body:"Avec <strong>LegalPlace</strong>, tu peux ouvrir ton compte pro directement pendant la cr\u00e9ation de ta soci\u00e9t\u00e9. Tout au m\u00eame endroit.<br><br>\u2705 Cr\u00e9ation de soci\u00e9t\u00e9 \u00b7 \u2705 Domiciliation \u00b7 \u2705 Compte pro<br><br><strong>Capital social minimum l\u00e9gal : 1\u20ac</strong> \u2014 recommand\u00e9 500-1 000\u20ac.",vo:"Et si tu passes par LegalPlace pour cr\u00e9er ta soci\u00e9t\u00e9, ils te proposent directement d'ouvrir un compte pro pendant le processus de cr\u00e9ation. Tout au m\u00eame endroit. Tu cr\u00e9es ta soci\u00e9t\u00e9, tu choisis ton adresse de domiciliation, et tu ouvres ton compte pro. En quelques clics. Concernant le capital social, le minimum l\u00e9gal pour une SASU ou une SAS c'est un euro. Oui un euro. Mais en pratique on conseille de mettre au minimum entre 500 et 1 000 euros. \u00c7a montre que ta soci\u00e9t\u00e9 a une vraie base financi\u00e8re. Le lien est dans la description, code SBW25 pour ta r\u00e9duction."},
{t:'recap',emoji:"\ud83c\udfe6",title:"Compte pro \u2014 l'essentiel",vo:"Ce qu'il faut retenir. Le compte pro est obligatoire l\u00e9galement pour toute soci\u00e9t\u00e9 et c'est interdit de m\u00e9langer perso et pro. Il s\u00e9pare les finances, prot\u00e8ge ton patrimoine perso, cr\u00e9dibilise ta bo\u00eete et simplifie la comptabilit\u00e9. Les n\u00e9o-banques comme Qonto ou Shine co\u00fbtent entre 9 et 15 euros par mois et s'ouvrent en 24 \u00e0 48 heures. LegalPlace te permet d'ouvrir ton compte pro en m\u00eame temps que tu cr\u00e9es ta soci\u00e9t\u00e9. Prochaine le\u00e7on, comment te payer.",points:["Obligatoire l\u00e9galement pour toute soci\u00e9t\u00e9 \u2014 interdit de m\u00e9langer perso et pro","S\u00e9pare le perso du pro \u2014 protection, cr\u00e9dibilit\u00e9, comptabilit\u00e9 simplifi\u00e9e","N\u00e9o-banques (Qonto, Shine...) : 9-15\u20ac/mois, ouverture en 24-48h","Banques traditionnelles : plus cher, plus long, mais utile pour certains besoins","LegalPlace : compte pro inclus dans le processus de cr\u00e9ation","Capital social minimum l\u00e9gal : 1\u20ac \u2014 recommand\u00e9 500-1 000\u20ac"]}]},
{id:8,title:"\ud83d\udcb0 Comment te payer : salaire ou dividendes ?",slides:[
{t:'intro',emoji:"\ud83d\udcb0",num:"08",title:"Comment te payer :\\n<em>salaire ou dividendes ?</em>",sub:"Ta soci\u00e9t\u00e9 gagne de l'argent. Comment tu le mets dans ta poche le plus intelligemment possible ?",vo:"Le\u00e7on huit. Ta soci\u00e9t\u00e9 tourne. Elle commence \u00e0 gagner de l'argent. Et l\u00e0 la question que tout le monde se pose c'est comment je me paie. Est-ce que je me verse un salaire ? Est-ce que je prends des dividendes ? C'est quoi la diff\u00e9rence ? Dans cette le\u00e7on je t'explique tout simplement."},
{t:'concept',emoji:"\ud83d\udcbc",tag:"Le salaire",title:"Option 1 : Le salaire \ud83d\udcbc",body:"Tu te verses un salaire chaque mois. En SASU : <strong>fiches de paie</strong>, protection sociale.<br><br>\u2705 R\u00e9gulier \u2014 tu sais exactement combien tu touches<br>\u2705 Charge d\u00e9ductible \u2014 r\u00e9duit le b\u00e9n\u00e9fice imposable<br>\u274c <strong>Charges lourdes \u2014 pour toucher 2 000\u20ac nets, ta soci\u00e9t\u00e9 sort ~3 500\u20ac</strong>",vo:"Premi\u00e8re option, le salaire. Tu te verses un salaire chaque mois comme si t'\u00e9tais un employ\u00e9 de ta propre bo\u00eete. En SASU, tu te fais des fiches de paie. Le gros avantage du salaire c'est que c'est r\u00e9gulier. Tu sais exactement combien tu vas toucher chaque mois. Et le salaire que tu te verses c'est une charge pour ta soci\u00e9t\u00e9, \u00e7a r\u00e9duit les b\u00e9n\u00e9fices imposables. Mais le probl\u00e8me du salaire c'est le co\u00fbt. En SASU, pour te verser 1 500 euros nets par mois, ta soci\u00e9t\u00e9 doit sortir environ 2 600 euros. Pour 2 000 euros nets, ta soci\u00e9t\u00e9 sort environ 3 500 euros."},
{t:'concept',emoji:"\ud83d\udcc8",tag:"Les dividendes",title:"Option 2 : Les dividendes \ud83d\udcc8",body:"Les dividendes c'est une fa\u00e7on de distribuer les <strong>b\u00e9n\u00e9fices de ta soci\u00e9t\u00e9</strong> vers ta poche personnelle.<br><br>\u26a0\ufe0f <strong>Condition : ta soci\u00e9t\u00e9 doit \u00eatre en b\u00e9n\u00e9fice.</strong><br><br>\u2705 Tax\u00e9s \u00e0 seulement <strong>30% (PFU)</strong> \u2014 17,2% pr\u00e9l\u00e8vements sociaux + 12,8% IR<br>\u2705 Pas de charges patronales<br>\u2705 Acompte en cours d'ann\u00e9e possible",vo:"Deuxi\u00e8me option, les dividendes. Les dividendes c'est une fa\u00e7on de distribuer les b\u00e9n\u00e9fices de ta soci\u00e9t\u00e9 vers ta poche personnelle. Mais attention, tu peux te verser des dividendes uniquement si ta soci\u00e9t\u00e9 a fait des b\u00e9n\u00e9fices. Le gros avantage des dividendes c'est la fiscalit\u00e9. Quand tu te verses des dividendes en SASU, tu paies 30% de taxes au total. C'est ce qu'on appelle le PFU, le Pr\u00e9l\u00e8vement Forfaitaire Unique. 17,2% de pr\u00e9l\u00e8vements sociaux et 12,8% d'imp\u00f4t sur le revenu. Total 30%. C'est beaucoup moins lourd que le salaire."},
{t:'calc',tag:"\ud83d\udca1 Exemple concret",title:"Sur 50 000\u20ac de b\u00e9n\u00e9fice annuel en SASU",vo:"Le calcul concret sur 50 000 euros de b\u00e9n\u00e9fice en SASU. Ta soci\u00e9t\u00e9 paie 15% d'IS sur les premiers 42 500 euros et 25% sur les 7 500 euros restants, soit 8 250 euros d'IS au total. Il reste 41 750 euros dans ta soci\u00e9t\u00e9. Si tu d\u00e9cides de tout distribuer en dividendes, tu paies le PFU \u00e0 30%, soit 12 525 euros. Tu touches 29 225 euros nets dans ta poche. Sur 50 000 euros de b\u00e9n\u00e9fice, tu as pay\u00e9 en tout 20 775 euros de taxes et tu as touch\u00e9 29 225 euros. C'est bien plus int\u00e9ressant que de tout sortir en salaire.",premise:"Strat\u00e9gie optimale : IS + dividendes",lines:[{type:"base",label:"\ud83d\udcb0 B\u00e9n\u00e9fice avant IS",val:"50 000 \u20ac"},{type:"minus",label:"\ud83c\udfdb\ufe0f IS 15% sur 42 500\u20ac + 25% sur 7 500\u20ac",val:"-8 250 \u20ac"},{type:"equals",label:"\ud83d\udca1 B\u00e9n\u00e9fice apr\u00e8s IS",val:"41 750 \u20ac"},{type:"minus",label:"\ud83d\udcca PFU 30% sur dividendes distribu\u00e9s",val:"-12 525 \u20ac"},{type:"equals",label:"\u2705 Net dans ta poche",val:"29 225 \u20ac"}]},
{t:'concept',emoji:"\ud83c\udfaf",tag:"La strat\u00e9gie gagnante",title:"La combinaison optimale : petit salaire + dividendes \ud83c\udfaf",body:"La strat\u00e9gie que la plupart des entrepreneurs malins utilisent :<br><br>\ud83d\udcbc <strong>Un petit salaire</strong> pour couvrir les besoins du quotidien et cotiser<br>\ud83d\udcc8 <strong>Des dividendes</strong> pour sortir le reste quand la soci\u00e9t\u00e9 est b\u00e9n\u00e9ficiaire<br><br>\ud83d\udca1 Et au d\u00e9but \u2014 <strong>ne te verse rien.</strong> R\u00e9investis. Fais grandir ta bo\u00eete d'abord.",vo:"La strat\u00e9gie que la plupart des entrepreneurs malins utilisent c'est la combinaison des deux. Un petit salaire pour couvrir les besoins du quotidien et maintenir des droits sociaux. Et des dividendes pour sortir le reste quand la soci\u00e9t\u00e9 est b\u00e9n\u00e9ficiaire. Comme \u00e7a tu optimises au maximum. Mais rappelle-toi. Au d\u00e9but quand tu lances, verse-toi rien. Ou le minimum. R\u00e9investis dans ta bo\u00eete. Fais grandir ton business d'abord. Et quand les b\u00e9n\u00e9fices sont stables, l\u00e0 tu optimises ta fa\u00e7on de te payer."},
{t:'recap',emoji:"\ud83d\udcb0",title:"R\u00e9mun\u00e9ration dirigeant \u2014 l'essentiel",vo:"Ce qu'il faut retenir. Le salaire c'est r\u00e9gulier et d\u00e9ductible mais les charges sont lourdes en SASU. Les dividendes sont tax\u00e9s \u00e0 seulement 30% mais ta soci\u00e9t\u00e9 doit \u00eatre en b\u00e9n\u00e9fice. La strat\u00e9gie optimale c'est la combinaison des deux, un petit salaire plus des dividendes. Au d\u00e9marrage, verse-toi rien et r\u00e9investis dans ta bo\u00eete. Et ton comptable te dira pr\u00e9cis\u00e9ment le mix optimal selon ta situation exacte. Prochaine le\u00e7on, l'imp\u00f4t sur les soci\u00e9t\u00e9s.",points:["Salaire : r\u00e9gulier, charge d\u00e9ductible, mais charges lourdes (75-80% en SASU)","Dividendes : seulement si b\u00e9n\u00e9fice, tax\u00e9s \u00e0 30% (PFU) \u2014 beaucoup plus l\u00e9ger","Strat\u00e9gie optimale : petit salaire + dividendes pour le reste","Au d\u00e9marrage : verse-toi rien, r\u00e9investis, fais grandir d'abord","Acompte sur dividendes possible en cours d'ann\u00e9e si soci\u00e9t\u00e9 b\u00e9n\u00e9ficiaire","Ton comptable te dira le mix optimal selon ta situation exacte"]}]},
{id:9,title:"\ud83e\uddfe L'imp\u00f4t sur les soci\u00e9t\u00e9s (IS)",slides:[
{t:'intro',emoji:"\ud83e\uddfe",num:"09",title:"L'imp\u00f4t sur les soci\u00e9t\u00e9s :\\n<em>comment \u00e7a marche</em>",sub:"L'IS c'est pas si compliqu\u00e9. Et quand tu comprends comment \u00e7a fonctionne, tu vois comment payer moins.",vo:"Le\u00e7on neuf. L'imp\u00f4t sur les soci\u00e9t\u00e9s, qu'on appelle l'IS. C'est l'imp\u00f4t que ta soci\u00e9t\u00e9 paie sur ce qu'elle gagne. Et c'est important de bien comprendre comment \u00e7a marche parce que c'est l\u00e0 que beaucoup d'argent peut \u00eatre \u00e9conomis\u00e9 si tu joues bien."},
{t:'concept',emoji:"\ud83d\udca1",tag:"La base",title:"L'IS c'est sur les b\u00e9n\u00e9fices, pas le CA \ud83d\udca1",body:"<strong>L'IS se calcule sur le b\u00e9n\u00e9fice de ta soci\u00e9t\u00e9 \u2014 pas sur ce que tu encaisses.</strong><br><br>Exemple : ta soci\u00e9t\u00e9 encaisse 100 000\u20ac. Elle a d\u00e9pens\u00e9 70 000\u20ac. Il reste 30 000\u20ac. <em>L'IS s'applique sur ces 30 000\u20ac uniquement.</em><br><br>C'est pour \u00e7a que les charges d\u00e9ductibles sont si importantes.",vo:"La base. L'IS ce n'est pas un imp\u00f4t sur ce que tu encaisses. C'est un imp\u00f4t sur ce que ta soci\u00e9t\u00e9 gagne vraiment, c'est-\u00e0-dire sur le b\u00e9n\u00e9fice. Le b\u00e9n\u00e9fice c'est ce qu'il reste apr\u00e8s avoir soustrait toutes les d\u00e9penses de ta soci\u00e9t\u00e9 de tous ses revenus. Exemple simple. Ta soci\u00e9t\u00e9 encaisse 100 000 euros cette ann\u00e9e. Elle a d\u00e9pens\u00e9 70 000 euros. Il reste 30 000 euros. L'IS s'applique sur ces 30 000 euros uniquement. Pas sur les 100 000 euros. C'est pour \u00e7a que les charges d\u00e9ductibles sont tellement importantes."},
{t:'compare',emoji:"\ud83d\udfe2",num:"15",title:"\ud83d\udcca Les 2 taux IS en France 2026",vo:"Deux taux d'IS en France en 2026. Le taux r\u00e9duit \u00e0 15% qui s'applique sur les premiers 42 500 euros de b\u00e9n\u00e9fice. Et le taux normal \u00e0 25% qui s'applique sur tout ce qui d\u00e9passe 42 500 euros. Le taux r\u00e9duit \u00e0 15% est automatique pour les PME qui remplissent trois conditions. Un, le chiffre d'affaires est inf\u00e9rieur \u00e0 10 millions d'euros. Deux, le capital social est enti\u00e8rement lib\u00e9r\u00e9. Trois, au moins 75% du capital est d\u00e9tenu par des personnes physiques. Quand tu d\u00e9marres, tu remplis presque automatiquement ces trois conditions.",left:{emoji:"\ud83d\udfe2",label:"Taux r\u00e9duit PME",num:"15",unit:"%",desc:"Sur les 42 500 premiers euros de b\u00e9n\u00e9fice. Pour les PME qui remplissent les 3 conditions."},right:{emoji:"\ud83d\udd35",label:"Taux normal",num:"25",unit:"%",desc:"Sur tout ce qui d\u00e9passe 42 500\u20ac de b\u00e9n\u00e9fice.",color:"neutral"},note:"Pour le taux r\u00e9duit : CA < 10M\u20ac, capital enti\u00e8rement lib\u00e9r\u00e9, 75% d\u00e9tenu par des personnes physiques."},
{t:'calc',tag:"\ud83d\udcb0 Calcul concret",title:"Sur 60 000\u20ac de b\u00e9n\u00e9fice",vo:"Le calcul concret sur 60 000 euros de b\u00e9n\u00e9fice pour une PME \u00e9ligible. Sur les premiers 42 500 euros, tu paies 15%, soit 6 375 euros d'IS. Sur les 17 500 euros restants, tu paies 25%, soit 4 375 euros d'IS. Total IS d\u00fb : 10 750 euros. Il reste 49 250 euros dans ta soci\u00e9t\u00e9 apr\u00e8s IS. C'est \u00e0 partir de l\u00e0 que tu d\u00e9cides combien tu te verses en dividendes et combien tu laisses dans la soci\u00e9t\u00e9 pour r\u00e9investir. Garde toujours de l'argent de c\u00f4t\u00e9 pour payer l'IS. Une bonne habitude c'est de mettre de c\u00f4t\u00e9 entre 15 et 20% de tes b\u00e9n\u00e9fices d\u00e8s que l'argent rentre.",premise:"PME \u00e9ligible au taux r\u00e9duit \u2014 situation classique",lines:[{type:"base",label:"\ud83d\udfe2 15% sur les 42 500 premiers \u20ac",val:"6 375 \u20ac"},{type:"base",label:"\ud83d\udd35 25% sur les 17 500\u20ac restants",val:"4 375 \u20ac"},{type:"equals",label:"\ud83d\udcb8 IS total d\u00fb",val:"10 750 \u20ac"},{type:"equals",label:"\u2705 B\u00e9n\u00e9fice restant dans la soci\u00e9t\u00e9",val:"49 250 \u20ac"}]},
{t:'concept',emoji:"\ud83d\udcc5",tag:"Quand tu paies",title:"Les acomptes trimestriels \u2014 anticipe \ud83d\udcc5",body:"L'IS ne se paie pas en une seule fois. <strong>Tu paies des acomptes trimestriels :</strong><br><br>\ud83d\udcc5 Mars \u00b7 Juin \u00b7 Septembre \u00b7 D\u00e9cembre<br><br>En fin d'exercice tu r\u00e9gularises.<br><br>\u26a0\ufe0f <strong>Mets toujours 15-20% de tes b\u00e9n\u00e9fices de c\u00f4t\u00e9 d\u00e8s que l'argent rentre.</strong>",vo:"L'IS ne se paie pas en une seule fois \u00e0 la fin de l'ann\u00e9e. En France tu paies des acomptes trimestriels en mars, juin, septembre et d\u00e9cembre. Et en fin d'exercice tu fais le bilan et tu r\u00e9gularises. Tu paies le reste ou tu te fais rembourser si tu as trop pay\u00e9. Ton comptable g\u00e8re tout \u00e7a pour toi. Mais c'est important de le savoir pour anticiper les sorties d'argent. La bonne habitude c'est de mettre de c\u00f4t\u00e9 entre 15 et 20% de tes b\u00e9n\u00e9fices d\u00e8s que l'argent rentre. Comme \u00e7a quand l'\u00e9ch\u00e9ance arrive, t'as l'argent qui attend."},
