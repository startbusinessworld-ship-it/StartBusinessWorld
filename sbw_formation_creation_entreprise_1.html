{t:'recap',emoji:"\ud83e\uddfe",title:"IS \u2014 l'essentiel",vo:"Ce qu'il faut retenir. L'IS c'est sur les b\u00e9n\u00e9fices nets, pas le chiffre d'affaires. 15% sur les premiers 42 500 euros, 25% au-del\u00e0, avec trois conditions pour le taux r\u00e9duit. Plus t'as de charges d\u00e9ductibles, moins tu as de b\u00e9n\u00e9fice imposable, moins tu paies d'IS. Tu paies des acomptes trimestriels, anticipe en mettant 15 \u00e0 20% de c\u00f4t\u00e9. Et au d\u00e9marrage si tu r\u00e9investis tout dans ta bo\u00eete, ton b\u00e9n\u00e9fice sera faible et ton IS sera faible ou nul. Prochaine le\u00e7on, la TVA.",points:["IS = imp\u00f4t sur les b\u00e9n\u00e9fices nets, pas sur le CA","15% sur les 42 500 premiers \u20ac / 25% au-del\u00e0 \u2014 donn\u00e9es 2026","3 conditions pour le 15% : CA < 10M\u20ac, capital lib\u00e9r\u00e9, 75% pers. physiques","Plus de charges d\u00e9ductibles = moins de b\u00e9n\u00e9fice = moins d'IS","Acomptes trimestriels \u2014 anticipe avec 15-20% de c\u00f4t\u00e9","Au d\u00e9marrage si tu r\u00e9investis tout : b\u00e9n\u00e9fice faible = IS faible ou z\u00e9ro"]}]},
{id:10,title:"\ud83d\udcb6 La TVA \u2014 tout comprendre",slides:[
{t:'intro',emoji:"\ud83d\udcb6",num:"10",title:"La TVA :\\n<em>tout comprendre</em>",sub:"La TVA fait peur \u00e0 beaucoup. En 10 minutes tu vas comprendre comment \u00e7a marche et comment \u00e9viter les pi\u00e8ges.",vo:"Le\u00e7on dix. La TVA. Tout le monde en a entendu parler mais peu de gens comprennent vraiment comment \u00e7a marche. Et surtout, peu de gens savent qu'au d\u00e9part tu peux choisir de ne pas la g\u00e9rer du tout. Dans cette le\u00e7on je t'explique tout."},
{t:'concept',emoji:"\ud83d\udcca",tag:"La base",title:"La TVA c'est pas ton argent \ud83d\udcca",body:"TVA = Taxe sur la Valeur Ajout\u00e9e. En France le taux standard c'est <strong>20%.</strong><br><br>Tu vends un produit 120\u20ac \u00e0 ton client :<br>\u2705 100\u20ac c'est pour toi (hors taxe)<br>\u274c 20\u20ac c'est la TVA = pour l'\u00c9tat<br><br><em>Tu es juste l'interm\u00e9diaire. Ces 20\u20ac tu les collectes pour l'\u00c9tat.</em>",vo:"La TVA c'est quoi. TVA \u00e7a veut dire Taxe sur la Valeur Ajout\u00e9e. C'est une taxe que tes clients paient quand ils ach\u00e8tent quelque chose chez toi. En France le taux standard c'est 20%. Sur certains produits alimentaires c'est 5,5%, sur les livres aussi 5,5%. Mais pour la majorit\u00e9 des produits et services, c'est 20%. Tu vends un produit 120 euros. Dans ces 120 euros, 100 euros c'est ton prix hors taxe. Et 20 euros c'est la TVA. Ces 20 euros appartiennent pas \u00e0 toi. Tu les collectes pour l'\u00c9tat. Tu es juste l'interm\u00e9diaire."},
{t:'calc',tag:"\ud83d\udca1 Comment \u00e7a marche",title:"Tu ne reverses que la diff\u00e9rence",vo:"La TVA que toi tu paies \u00e0 tes fournisseurs, tu peux la r\u00e9cup\u00e9rer. On appelle \u00e7a la TVA d\u00e9ductible. Exemple. Tu ach\u00e8tes du stock pour 600 euros TTC, dans ces 600 euros il y a 100 euros de TVA. Tu vends ce stock 1 200 euros TTC, dans ces 1 200 euros il y a 200 euros de TVA. Tu reverses \u00e0 l'\u00c9tat la diff\u00e9rence : 200 moins 100 \u00e9gale 100 euros. Et parfois c'est m\u00eame l'\u00c9tat qui te doit de l'argent. Si t'as achet\u00e9 beaucoup de mat\u00e9riel au d\u00e9marrage, la TVA que t'as pay\u00e9e peut \u00eatre sup\u00e9rieure \u00e0 la TVA collect\u00e9e. Dans ce cas l'\u00c9tat te rembourse la diff\u00e9rence. On appelle \u00e7a un cr\u00e9dit de TVA.",premise:"Tu peux r\u00e9cup\u00e9rer la TVA que toi tu paies \u00e0 tes fournisseurs",lines:[{type:"base",label:"\ud83d\udce6 TVA collect\u00e9e sur tes ventes",val:"+200 \u20ac"},{type:"minus",label:"\ud83d\uded2 TVA pay\u00e9e sur tes achats (d\u00e9ductible)",val:"-100 \u20ac"},{type:"equals",label:"\u2705 Si TVA pay\u00e9e > TVA collect\u00e9e",val:"Cr\u00e9dit TVA \u2014 l\\"}]},
{t:'concept',emoji:"\ud83c\udd93",tag:"Franchise en base",title:"La franchise en base de TVA \u2014 la simplification \ud83c\udd93",body:"En 2026, si ton CA est sous les seuils, tu peux \u00eatre en <strong>franchise en base de TVA :</strong><br><br>\ud83d\udce6 <strong>Vente de produits :</strong> 85 000\u20ac/an<br>\ud83d\udee0\ufe0f <strong>Prestations de services :</strong> 37 500\u20ac/an<br><br>Tu collectes pas de TVA. Tu la reverses pas. Sur tes factures : <em>'TVA non applicable, article 293 B du CGI'.</em>",vo:"Maintenant le point le plus important de cette le\u00e7on. La franchise en base de TVA. En France en 2026, quand tu cr\u00e9es ta soci\u00e9t\u00e9, tu as la possibilit\u00e9 d'opter pour la franchise en base de TVA. C'est un r\u00e9gime qui te dispense totalement de collecter et de reverser la TVA. En vente de produits le seuil c'est 85 000 euros de chiffre d'affaires annuel. En prestations de services c'est 37 500 euros. Si tu es en dessous de ces seuils, tu collectes pas de TVA, tu la reverses pas, et sur tes factures tu mentionnes obligatoirement TVA non applicable article 293B du CGI."},
{t:'compare',emoji:"\ud83c\udd93",num:"\u2713",title:"\ud83e\udd14 Franchise en base ou TVA r\u00e9elle ?",vo:"Est-ce que tu dois opter pour la franchise en base ou pas. \u00c7a d\u00e9pend de ta situation. Si tu as peu de mat\u00e9riel ou de fournitures \u00e0 acheter, opte pour la franchise en base. Tes prix sont plus comp\u00e9titifs pour tes clients, t'as moins de paperasse, et pas de d\u00e9claration de TVA \u00e0 faire chaque mois. Si tu vas investir beaucoup d\u00e8s le d\u00e9part, beaucoup de stock, du mat\u00e9riel, des \u00e9quipements neufs, l\u00e0 \u00eatre soumis \u00e0 la TVA c'est avantageux. Parce que toute la TVA que tu as pay\u00e9e sur tes achats, tu vas la r\u00e9cup\u00e9rer. L'\u00c9tat peut te rembourser plusieurs milliers d'euros.",left:{emoji:"\ud83c\udd93",label:"Franchise en base",num:"\u2713",unit:"",desc:"Pas de TVA sur tes ventes = prix plus comp\u00e9titifs. Pas de d\u00e9claration \u00e0 faire. Id\u00e9al si peu d'achats au d\u00e9part."},right:{emoji:"\ud83d\udcca",label:"TVA r\u00e9elle",num:"\u2713",unit:"",desc:"Tu r\u00e9cup\u00e8res la TVA sur tes achats. Si tu investis beaucoup au d\u00e9marrage, l'\u00c9tat peut te rembourser plusieurs milliers d'euros.",color:"neutral"},note:"Mon conseil : peu d'achats au d\u00e9part \u2192 franchise. Gros investissements \u2192 TVA r\u00e9elle pour r\u00e9cup\u00e9rer."},
{t:'warning',emoji:"\u26a0\ufe0f",title:"R\u00e8gle d'or : la TVA collect\u00e9e c'est pas ton argent \ud83d\udea8",body:"D\u00e8s que tu es soumis \u00e0 la TVA :",warn:"<strong>Ne d\u00e9pense JAMAIS la TVA collect\u00e9e.</strong><br><br>Quand tu encaisses 1 200\u20ac, les 200\u20ac de TVA appartiennent \u00e0 l'\u00c9tat.<br><br><strong>Beaucoup d'entrepreneurs ont eu de gros probl\u00e8mes \u00e0 cause de \u00e7a.</strong><br><br>\ud83d\udca1 <strong>Astuce :</strong> ouvre un sous-compte d\u00e9di\u00e9 TVA. D\u00e8s qu'une vente rentre, mets automatiquement 20% de c\u00f4t\u00e9.",vo:"Une derni\u00e8re chose tr\u00e8s importante. La TVA c'est pas de l'argent \u00e0 toi. D\u00e8s que tu es soumis \u00e0 la TVA, quand tu encaisses un paiement client, mets toujours de c\u00f4t\u00e9 la part de TVA. Ne la d\u00e9pense jamais. Parce que le jour o\u00f9 tu dois la reverser \u00e0 l'\u00c9tat, si tu l'as d\u00e9pens\u00e9e, t'es dans une situation tr\u00e8s compliqu\u00e9e. Beaucoup d'entrepreneurs ont eu de gros probl\u00e8mes \u00e0 cause de \u00e7a. L'astuce c'est d'ouvrir un sous-compte ou une tirelire d\u00e9di\u00e9e \u00e0 la TVA et de mettre automatiquement 20% de c\u00f4t\u00e9 d\u00e8s qu'une vente rentre. Comme \u00e7a la TVA attend et elle sera toujours l\u00e0 le jour J."},
{t:'recap',emoji:"\ud83d\udcb6",title:"TVA \u2014 l'essentiel",vo:"Ce qu'il faut retenir. La TVA \u00e0 20% standard, tu la collectes pour l'\u00c9tat, tu es juste l'interm\u00e9diaire. Tu ne reverses que la diff\u00e9rence entre ce que tu as collect\u00e9 et ce que tu as pay\u00e9. La franchise en base te dispense de tout si ton CA est sous les seuils. Si peu d'achats au d\u00e9part, opte pour la franchise. Si gros investissements, la TVA r\u00e9elle pour r\u00e9cup\u00e9rer. Et r\u00e8gle d'or, la TVA collect\u00e9e c'est pas ton argent, ne jamais la d\u00e9penser. Prochaine le\u00e7on, les charges d\u00e9ductibles.",points:["TVA 20% standard \u2014 tu collectes pour l'\u00c9tat, tu es juste l'interm\u00e9diaire","Tu ne reverses que la diff\u00e9rence : TVA collect\u00e9e - TVA pay\u00e9e sur achats","Franchise en base : pas de TVA si CA < 85 000\u20ac produits / 37 500\u20ac services","Peu d'achats \u2192 franchise / Gros investissements \u2192 TVA r\u00e9elle pour r\u00e9cup\u00e9rer","TVA collect\u00e9e = pas ton argent. Ne JAMAIS la d\u00e9penser","Sous-compte d\u00e9di\u00e9 TVA : mets 20% de c\u00f4t\u00e9 automatiquement \u00e0 chaque vente"]}]},
{id:11,title:"\ud83d\udcc9 Les charges d\u00e9ductibles",slides:[
{t:'intro',emoji:"\ud83d\udcc9",num:"11",title:"Les charges d\u00e9ductibles :\\n<em>tout ce que tu peux d\u00e9duire</em>",sub:"T'as probablement des milliers d'euros de charges que tu n'utilises pas. Cette le\u00e7on va t'ouvrir les yeux.",vo:"Le\u00e7on onze. Les charges d\u00e9ductibles. C'est un des sujets les plus importants pour payer le moins d'imp\u00f4ts possible. Et je suis s\u00fbr qu'en regardant cette le\u00e7on tu vas r\u00e9aliser que t'as des d\u00e9penses dans ta vie que tu peux d\u00e9duire de ta soci\u00e9t\u00e9 et que tu d\u00e9duisais pas."},
{t:'concept',emoji:"\ud83d\udca1",tag:"Le principe",title:"Comment une charge d\u00e9ductible r\u00e9duit tes imp\u00f4ts \ud83d\udca1",body:"Une charge d\u00e9ductible = une d\u00e9pense professionnelle qui se soustrait du b\u00e9n\u00e9fice imposable.<br><br><strong>R\u00e8gle d'or :</strong> la d\u00e9pense doit \u00eatre :<br>\u2705 Engag\u00e9e dans l'int\u00e9r\u00eat de la soci\u00e9t\u00e9<br>\u2705 Justifi\u00e9e par une facture ou un re\u00e7u<br>\u2705 R\u00e9elle \u2014 pas invent\u00e9e<br><br><em>Garde toujours tes factures. Toujours.</em>",vo:"Une charge d\u00e9ductible c'est une d\u00e9pense que ta soci\u00e9t\u00e9 a faite dans le cadre de son activit\u00e9 professionnelle. Et cette d\u00e9pense tu la soustrais des revenus de ta soci\u00e9t\u00e9. Moins de revenus imposables, moins d'imp\u00f4ts. La r\u00e8gle de base pour qu'une d\u00e9pense soit d\u00e9ductible c'est qu'elle doit \u00eatre engag\u00e9e dans l'int\u00e9r\u00eat de la soci\u00e9t\u00e9, justifi\u00e9e par une facture ou un re\u00e7u, et r\u00e9elle, pas invent\u00e9e. Garde toujours tes factures. Toujours. En version num\u00e9rique c'est parfait. Tu prends une photo avec ton t\u00e9l\u00e9phone d\u00e8s que tu as un re\u00e7u."},
{t:'cards',emoji:"\ud83d\udcbb",title:"\ud83d\udcbb Ce que tu peux d\u00e9duire \u2014 partie 1",sub:"Ordinateur, \u00e9cran, souris, clavier, disque dur, tablette. Tout ce que t'utilises pour travailler. 100% d\u00e9ductible.",vo:"La liste de ce que tu peux d\u00e9duire. Le mat\u00e9riel informatique d'abord. Ton ordinateur, ton \u00e9cran, ta souris, ton clavier, ton disque dur externe, ta tablette. Tout ce que t'utilises pour travailler. C'est d\u00e9ductible. Ton t\u00e9l\u00e9phone et ton abonnement. Si tu utilises ton t\u00e9l\u00e9phone pour ton business, tu peux d\u00e9duire l'achat et une partie ou la totalit\u00e9 de l'abonnement. Si c'est mixte perso et pro, tu d\u00e9duis la partie professionnelle, en g\u00e9n\u00e9ral estim\u00e9e \u00e0 50 ou 75%. Les logiciels et abonnements en ligne. Shopify, Adobe, Canva Pro, outils de comptabilit\u00e9, CRM, h\u00e9bergement de site, nom de domaine, outils d'email marketing. Tout \u00e7a c'est d\u00e9ductible.",items:[{emoji:"\ud83d\udcbb",name:"Mat\u00e9riel informatique",sub:"Ordinateur, \u00e9cran, souris, clavier, disque dur, tablette. Tout ce que t'utilises pour travailler. 100% d\u00e9ductible."},{emoji:"\ud83d\udcf1",name:"T\u00e9l\u00e9phone et abonnement",sub:"Achat du t\u00e9l\u00e9phone + abonnement pro. Si mixte perso/pro : d\u00e9duire la part pro (g\u00e9n\u00e9ralement 50-75%)."},{emoji:"\u2601\ufe0f",name:"Logiciels et abonnements SaaS",sub:"Shopify, Adobe, Canva Pro, CRM, h\u00e9bergement, nom de domaine, email marketing. 100% d\u00e9ductible."}]},
{t:'cards',emoji:"\u2708\ufe0f",title:"\ud83d\udee0\ufe0f Ce que tu peux d\u00e9duire \u2014 partie 2",sub:"Billets train/avion, taxi, h\u00f4tel, repas lors de d\u00e9placements pro. Tout d\u00e9placement dans l'int\u00e9r\u00eat de la soci\u00e9t\u00e9.",vo:"La suite. Les frais de d\u00e9placement. Si tu te d\u00e9places pour ton business, les billets de train, d'avion, les frais de taxi, d'h\u00f4tel, les repas lors de d\u00e9placements professionnels, tout \u00e7a se d\u00e9duit. Les frais de repas professionnels. Tu as d\u00e9jeun\u00e9 avec un client, un fournisseur, un partenaire, le repas est d\u00e9ductible. Garde toujours le re\u00e7u et note au dos avec qui tu as mang\u00e9 et pourquoi. \u00c7a te prot\u00e8ge en cas de contr\u00f4le. Les formations et livres professionnels. Cette formation que t'es en train de suivre, si tu la paies via ta soci\u00e9t\u00e9 c'est une charge d\u00e9ductible. Les livres professionnels, les autres formations en ligne, les conf\u00e9rences et s\u00e9minaires, tout \u00e7a se d\u00e9duit.",items:[{emoji:"\u2708\ufe0f",name:"Frais de d\u00e9placement",sub:"Billets train/avion, taxi, h\u00f4tel, repas lors de d\u00e9placements pro. Tout d\u00e9placement dans l'int\u00e9r\u00eat de la soci\u00e9t\u00e9."},{emoji:"\ud83c\udf7d\ufe0f",name:"Repas professionnels",sub:"D\u00e9jeuner avec client, fournisseur, partenaire. Garde le re\u00e7u et note avec qui tu as mang\u00e9 et pourquoi."},{emoji:"\ud83d\udcda",name:"Formations et livres pro",sub:"Cette formation que tu suis via ta soci\u00e9t\u00e9, c'est d\u00e9ductible. Livres pro, conf\u00e9rences, s\u00e9minaires."}]},
{t:'cards',emoji:"\ud83d\udccd",title:"\ud83d\udce3 Ce que tu peux d\u00e9duire \u2014 partie 3",sub:"Abonnement domiciliation, loyer bureau/coworking. Si tu bosses chez toi : quote-part du loyer selon surface utilis\u00e9e.",vo:"Suite et fin. La domiciliation et le loyer. Ton abonnement de domiciliation c'est d\u00e9ductible. Si tu loues un bureau ou un espace de coworking, c'est d\u00e9ductible. Si tu travailles depuis chez toi, tu peux d\u00e9duire une partie de ton loyer proportionnellement \u00e0 la surface que tu utilises pour travailler. Les frais publicitaires. Tes d\u00e9penses en publicit\u00e9 Facebook, TikTok Ads, Google Ads, les collaborations avec des influenceurs, la cr\u00e9ation de contenu pour ton business, tout \u00e7a c'est des charges d\u00e9ductibles. Et les honoraires de ton comptable, de ton avocat, tout \u00e7a c'est d\u00e9ductible.",items:[{emoji:"\ud83d\udccd",name:"Domiciliation et loyer",sub:"Abonnement domiciliation, loyer bureau/coworking. Si tu bosses chez toi : quote-part du loyer selon surface utilis\u00e9e."},{emoji:"\ud83d\udce3",name:"Publicit\u00e9 et marketing",sub:"Facebook Ads, TikTok Ads, Google Ads, influenceurs, cr\u00e9ation de contenu. 100% d\u00e9ductible."},{emoji:"\ud83e\uddee",name:"Honoraires comptable et avocat",sub:"Les frais de ton comptable, avocat, conseil juridique. Des d\u00e9penses professionnelles d\u00e9ductibles."}]},
{t:'warning',emoji:"\u26a0\ufe0f",title:"Les 2 r\u00e8gles importantes \ud83d\udea8",warn:"<strong>\u26a0\ufe0f D\u00e9ductible \u2260 Gratuit</strong><br>Une charge d\u00e9ductible r\u00e9duit tes imp\u00f4ts, elle n'efface pas la d\u00e9pense. Si ta soci\u00e9t\u00e9 est impos\u00e9e \u00e0 15%, 1 000\u20ac de charges = 150\u20ac d'\u00e9conomie d'IS. T'as quand m\u00eame d\u00e9pens\u00e9 1 000\u20ac. D\u00e9pense intelligemment.<br><br><strong>\ud83d\udeab Ne d\u00e9duis jamais des d\u00e9penses personnelles</strong><br>Courses, v\u00eatements perso, vacances, sorties \u2014 c'est pas d\u00e9ductible. En cas de contr\u00f4le fiscal si l'administration trouve des d\u00e9penses perso pass\u00e9es en charges, c'est un redressement.",vo:"Deux r\u00e8gles importantes. Premi\u00e8rement, d\u00e9ductible ne veut pas dire gratuit. Une charge d\u00e9ductible \u00e7a veut pas dire que la d\u00e9pense est gratuite. \u00c7a veut dire que tu la soustrais de tes b\u00e9n\u00e9fices avant de calculer l'imp\u00f4t. Si ta soci\u00e9t\u00e9 est impos\u00e9e \u00e0 15%, une d\u00e9pense de 1 000 euros te fait \u00e9conomiser 150 euros d'imp\u00f4ts. T'as quand m\u00eame d\u00e9pens\u00e9 1 000 euros. Donc d\u00e9pense pas n'importe comment sous pr\u00e9texte que c'est d\u00e9ductible. D\u00e9pense intelligemment. Deuxi\u00e8mement, ne d\u00e9duis jamais des d\u00e9penses personnelles. Tes courses, tes v\u00eatements perso, tes sorties, tes vacances, c'est pas d\u00e9ductible. En cas de contr\u00f4le fiscal si l'administration trouve des d\u00e9penses personnelles pass\u00e9es en charges, c'est un redressement."},
{t:'recap',emoji:"\ud83d\udcc9",title:"Charges d\u00e9ductibles \u2014 l'essentiel",vo:"Ce qu'il faut retenir. Mat\u00e9riel informatique, t\u00e9l\u00e9phone, internet, logiciels et abonnements pro, d\u00e9placements professionnels, repas avec clients et fournisseurs, formations et livres professionnels, publicit\u00e9 et marketing, tout \u00e7a c'est d\u00e9ductible. La r\u00e8gle c'est que la d\u00e9pense doit \u00eatre r\u00e9elle, dans l'int\u00e9r\u00eat de la soci\u00e9t\u00e9, et justifi\u00e9e par une facture. Garde toujours tes factures. Et ne d\u00e9duis jamais de d\u00e9penses personnelles. Prochaine le\u00e7on, la comptabilit\u00e9 et le bilan.",points:["Mat\u00e9riel informatique, t\u00e9l\u00e9phone, internet \u2014 d\u00e9ductibles","Logiciels et abonnements SaaS (Shopify, Adobe, CRM...) \u2014 d\u00e9ductibles","D\u00e9placements pro, repas avec clients/fournisseurs \u2014 d\u00e9ductibles","Formations, livres pro, conf\u00e9rences \u2014 d\u00e9ductibles","Publicit\u00e9 et marketing (Meta Ads, TikTok Ads...) \u2014 d\u00e9ductibles","R\u00e8gle : r\u00e9elle + dans l'int\u00e9r\u00eat de la soci\u00e9t\u00e9 + justifi\u00e9e par facture"]}]},
{id:12,title:"\ud83d\udcca La comptabilit\u00e9 et le bilan",slides:[
{t:'intro',emoji:"\ud83d\udcca",num:"12",title:"La comptabilit\u00e9 et le bilan :\\n<em>c'est quoi en vrai ?</em>",sub:"La comptabilit\u00e9 c'est pas compliqu\u00e9 \u00e0 comprendre. C'est juste l'histoire financi\u00e8re de ta soci\u00e9t\u00e9.",vo:"Le\u00e7on douze. La comptabilit\u00e9. C'est le mot qui fait peur \u00e0 beaucoup d'entrepreneurs. Mais dans cette le\u00e7on je vais te d\u00e9mystifier tout \u00e7a. La comptabilit\u00e9 c'est pas compliqu\u00e9 \u00e0 comprendre. C'est juste l'histoire financi\u00e8re de ta soci\u00e9t\u00e9. Tout ce qui rentre, tout ce qui sort, tout ce que ta soci\u00e9t\u00e9 poss\u00e8de, tout ce qu'elle doit."},
{t:'concept',emoji:"\u2696\ufe0f",tag:"Le bilan",title:"Le bilan \u2014 la photo de ta soci\u00e9t\u00e9 \u2696\ufe0f",body:"Le bilan c'est une <strong>photo de ta soci\u00e9t\u00e9 \u00e0 un instant pr\u00e9cis</strong> \u2014 en g\u00e9n\u00e9ral en fin d'exercice.<br><br>\ud83d\udce6 <strong>L'actif</strong> = ce que ta soci\u00e9t\u00e9 poss\u00e8de (argent, stock, mat\u00e9riel, cr\u00e9ances)<br>\ud83d\udcb3 <strong>Le passif</strong> = ce que ta soci\u00e9t\u00e9 doit (dettes fournisseurs, emprunts, IS \u00e0 payer)<br><br><em>R\u00e8gle d'or : l'actif est toujours \u00e9gal au passif.</em>",vo:"Commen\u00e7ons par le bilan. Le bilan c'est une photo de ta soci\u00e9t\u00e9 \u00e0 un instant pr\u00e9cis. En g\u00e9n\u00e9ral \u00e0 la fin de ton exercice comptable. Cette photo elle montre deux choses. L'actif, c'est ce que ta soci\u00e9t\u00e9 poss\u00e8de. L'argent sur ton compte bancaire pro, le stock que t'as en r\u00e9serve, le mat\u00e9riel que t'as achet\u00e9, les factures que tes clients doivent encore te payer. Et le passif, c'est ce que ta soci\u00e9t\u00e9 doit \u00e0 des tiers. Les dettes fournisseurs, les emprunts bancaires, la TVA que tu dois reverser \u00e0 l'\u00c9tat, l'IS que tu dois payer. La r\u00e8gle d'or du bilan c'est que l'actif est toujours \u00e9gal au passif. Toujours."},
{t:'concept',emoji:"\ud83d\udcc8",tag:"Compte de r\u00e9sultat",title:"Le compte de r\u00e9sultat \u2014 le film de l'ann\u00e9e \ud83d\udcc8",body:"Si le bilan c'est une photo, <strong>le compte de r\u00e9sultat c'est le film de l'ann\u00e9e.</strong><br><br>Il montre :<br>\ud83d\udcb0 Tous tes revenus sur l'ann\u00e9e<br>\ud83d\udcb8 Toutes tes d\u00e9penses sur l'ann\u00e9e<br>\ud83d\udcca Et le r\u00e9sultat : <strong>B\u00e9n\u00e9fice = Revenus - D\u00e9penses</strong><br><br>C'est ce document qui d\u00e9termine <em>combien tu vas payer en IS.</em>",vo:"En dehors du bilan, y'a un autre document important qu'on appelle le compte de r\u00e9sultat. Si le bilan c'est une photo de ta soci\u00e9t\u00e9, le compte de r\u00e9sultat c'est le film de l'ann\u00e9e. Il montre tous tes revenus et toutes tes d\u00e9penses sur l'ann\u00e9e. Et il calcule si ta soci\u00e9t\u00e9 a fait un b\u00e9n\u00e9fice ou une perte. Revenus moins d\u00e9penses \u00e9gale b\u00e9n\u00e9fice ou perte. C'est ce document qui d\u00e9termine combien tu vas payer en imp\u00f4t sur les soci\u00e9t\u00e9s. Et c'est le document que ton comptable va produire \u00e0 la fin de chaque exercice."},
{t:'cards',emoji:"\ud83d\uddc2\ufe0f",title:"\u2705 Les bonnes habitudes \u00e0 prendre d\u00e8s maintenant",sub:"Photo sur ton t\u00e9l\u00e9phone d\u00e8s que t'as un re\u00e7u. Class\u00e9es par mois dans un dossier num\u00e9rique. En version num\u00e9rique c'est parfait.",vo:"Les bonnes habitudes \u00e0 prendre d\u00e8s maintenant. Premi\u00e8rement, garde absolument toutes tes factures. Factures d'achat, factures de vente, re\u00e7us, tickets de caisse pour des d\u00e9penses pro. Tout. En version num\u00e9rique c'est parfait. Tu prends une photo avec ton t\u00e9l\u00e9phone d\u00e8s que tu as un re\u00e7u et tu les classes dans un dossier organis\u00e9. Deuxi\u00e8mement, utilise un logiciel de comptabilit\u00e9 simple. M\u00eame si tu as un comptable, des outils comme Pennylane, Indy ou Abby te permettent de suivre tes finances en temps r\u00e9el. Troisi\u00e8mement, ne jamais m\u00e9langer le perso et le pro. Chaque d\u00e9pense professionnelle passe par le compte pro. Chaque d\u00e9pense personnelle passe par ton compte perso.",items:[{emoji:"\ud83d\uddc2\ufe0f",name:"Garde toutes tes factures",sub:"Photo sur ton t\u00e9l\u00e9phone d\u00e8s que t'as un re\u00e7u. Class\u00e9es par mois dans un dossier num\u00e9rique. En version num\u00e9rique c'est parfait."},{emoji:"\ud83d\udcbb",name:"Utilise un logiciel simple",sub:"Pennylane, Indy, Abby \u2014 tu suis tes finances en temps r\u00e9el. Tu vois combien ta soci\u00e9t\u00e9 a gagn\u00e9, d\u00e9pens\u00e9, o\u00f9 elle en est."},{emoji:"\ud83d\udeab",name:"Ne jamais m\u00e9langer perso et pro",sub:"Chaque d\u00e9pense pro passe par le compte pro. Chaque d\u00e9pense perso passe par le compte perso. Jamais de m\u00e9lange."}]},
{t:'concept',emoji:"\ud83d\udcc5",tag:"Les \u00e9ch\u00e9ances",title:"Anticipe les \u00e9ch\u00e9ances fiscales \ud83d\udcc5",body:"TVA \u00e0 reverser (mensuelle ou trimestrielle)<br>IS en acomptes trimestriels (mars, juin, sept, d\u00e9c)<br>Charges sociales<br>Liasse fiscale et d\u00e9clarations annuelles<br><br><strong>Mets ces dates dans ton agenda.</strong> Garde toujours de la tr\u00e9sorerie.<br><br><em>Rapproche ton compte pro chaque semaine.</em>",vo:"Anticipe les \u00e9ch\u00e9ances fiscales. TVA \u00e0 reverser chaque mois ou trimestre, IS \u00e0 payer en acomptes trimestriels. Mets ces dates dans ton agenda. Et garde toujours de la tr\u00e9sorerie de c\u00f4t\u00e9. Et comprends tes chiffres. Quand tu comprends ta comptabilit\u00e9 tu prends de meilleures d\u00e9cisions pour ton business. Suis ton chiffre d'affaires, ta marge, ta tr\u00e9sorerie chaque mois. Rapproche ton compte pro r\u00e9guli\u00e8rement. Chaque semaine, regarde tes relev\u00e9s de compte pro. Chaque mouvement doit correspondre \u00e0 quelque chose de r\u00e9el."},
{t:'recap',emoji:"\ud83d\udcca",title:"Comptabilit\u00e9 et bilan \u2014 l'essentiel",vo:"Ce qu'il faut retenir. Le bilan c'est la photo de ta soci\u00e9t\u00e9 \u00e0 un instant pr\u00e9cis, actif \u00e9gale passif. Le compte de r\u00e9sultat c'est le film de l'ann\u00e9e, revenus moins d\u00e9penses \u00e9gale b\u00e9n\u00e9fice ou perte. Garde toutes tes factures en version num\u00e9rique. Utilise un logiciel de suivi m\u00eame si t'as un comptable. Et ne jamais m\u00e9langer le perso et le pro. Prochaine le\u00e7on, t'as besoin d'un comptable ou pas.",points:["Bilan = photo de la soci\u00e9t\u00e9 (actif = ce qu'elle a / passif = ce qu'elle doit)","Compte de r\u00e9sultat = film de l'ann\u00e9e (revenus - d\u00e9penses = b\u00e9n\u00e9fice)","Garde toutes tes factures \u2014 photo sur ton t\u00e9l\u00e9phone d\u00e8s r\u00e9ception","Logiciel de suivi (Pennylane, Indy, Abby) m\u00eame si t'as un comptable","Jamais m\u00e9langer perso et pro \u2014 r\u00e8gle absolue","Anticipe les \u00e9ch\u00e9ances fiscales \u2014 mets l'argent de c\u00f4t\u00e9 d\u00e8s que \u00e7a rentre"]}]},
{id:13,title:"\ud83e\uddee T'as besoin d'un comptable ou pas ?",slides:[
{t:'intro',emoji:"\ud83e\uddee",num:"13",title:"T'as besoin d'un comptable\\n<em>ou pas ?</em>",sub:"La vraie r\u00e9ponse honn\u00eate. Pas celle que tu veux entendre \u2014 celle qui va vraiment t'aider.",vo:"Le\u00e7on treize. T'as besoin d'un comptable ou pas ? C'est une des questions que j'entends le plus souvent. Est-ce que j'ai besoin d'un comptable ? Est-ce que je peux g\u00e9rer ma comptabilit\u00e9 tout seul ? C'est cher un comptable ? Dans cette le\u00e7on je te donne ma r\u00e9ponse honn\u00eate."},
{t:'compare',emoji:"\u26a1",num:"\u2713",title:"Micro-entreprise vs Soci\u00e9t\u00e9 \u2014 la r\u00e8gle",vo:"Commen\u00e7ons par la micro-entreprise. Si t'es en micro-entreprise, tu n'as pas besoin d'un comptable. La comptabilit\u00e9 est ultra simple. Tu d\u00e9clares ton chiffre d'affaires en ligne tous les mois ou tous les trimestres. Un logiciel gratuit ou un simple tableau Excel suffit. Pas de bilan, pas de compte de r\u00e9sultat. Maintenant pour une soci\u00e9t\u00e9, SASU, EURL, SAS, SARL, l\u00e0 c'est diff\u00e9rent. Tu es oblig\u00e9 l\u00e9galement de produire des comptes annuels. Un bilan, un compte de r\u00e9sultat, une annexe comptable. Ces documents doivent \u00eatre d\u00e9pos\u00e9s chaque ann\u00e9e au greffe du tribunal de commerce. C'est public, c'est obligatoire, et si tu le fais pas tu risques des sanctions.",left:{emoji:"\u26a1",label:"Micro-entreprise",num:"\u2713",unit:"",desc:"Tu n'as pas besoin d'un comptable. D\u00e9claration simple en ligne. Un tableau Excel ou un logiciel gratuit suffit. Pas de bilan, pas de compte de r\u00e9sultat obligatoire."},right:{emoji:"\ud83c\udfe2",label:"Soci\u00e9t\u00e9 (SASU, EURL...)",num:"!",unit:"",desc:"Tu es oblig\u00e9 l\u00e9galement de produire des comptes annuels. Bilan, compte de r\u00e9sultat, annexe. \u00c0 d\u00e9poser chaque ann\u00e9e au greffe. Un comptable est fortement recommand\u00e9.",color:"neutral"},note:"La loi n'oblige pas \u00e0 prendre un comptable mais le d\u00e9p\u00f4t annuel des comptes est obligatoire pour toute soci\u00e9t\u00e9."},
{t:'cards',emoji:"\ud83d\udee1\ufe0f",title:"\ud83d\udca1 3 raisons pour lesquelles un comptable vaut son prix",sub:"Erreur dans une d\u00e9claration TVA, charge mal enregistr\u00e9e \u2192 p\u00e9nalit\u00e9s, redressement fiscal. Un bon comptable te prot\u00e8ge de tout \u00e7a.",vo:"Trois raisons pour lesquelles un comptable vaut son prix. Premi\u00e8rement il te prot\u00e8ge des erreurs. Une erreur dans ta d\u00e9claration de TVA, une charge mal enregistr\u00e9e, \u00e7a peut entra\u00eener des p\u00e9nalit\u00e9s, un redressement fiscal. Un bon comptable te prot\u00e8ge de tout \u00e7a. Deuxi\u00e8mement il t'optimise. Il conna\u00eet ta situation, il conna\u00eet les lois fiscales, et il va t'aider \u00e0 optimiser. Combien te verser en salaire, combien en dividendes, quelles charges tu peux d\u00e9duire. Ces conseils valent souvent bien plus que ce que tu paies pour ses honoraires. Troisi\u00e8mement il lib\u00e8re ton temps. Le temps que tu passes \u00e0 essayer de comprendre la comptabilit\u00e9, c'est du temps que tu passes pas \u00e0 d\u00e9velopper ton business.",items:[{emoji:"\ud83d\udee1\ufe0f",name:"Il te prot\u00e8ge des erreurs",sub:"Erreur dans une d\u00e9claration TVA, charge mal enregistr\u00e9e \u2192 p\u00e9nalit\u00e9s, redressement fiscal. Un bon comptable te prot\u00e8ge de tout \u00e7a."},{emoji:"\ud83e\udde0",name:"Il t'optimise",sub:"Combien te verser en salaire, en dividendes, quelles charges d\u00e9duire, comment structurer. Ces conseils valent souvent bien plus que ses honoraires."},{emoji:"\u23f0",name:"Il lib\u00e8re ton temps",sub:"Le temps que tu passes sur la compta c'est du temps pas pass\u00e9 sur ton business. Fais ce que tu sais faire. D\u00e9l\u00e8gue ce que tu ma\u00eetrises pas."}]},
{t:'stat',emoji:"\ud83d\udcb0",num:"80-200\u20ac",body:"<strong>960 \u00e0 2 400\u20ac par an.</strong> \u00c7a para\u00eet beaucoup. Mais si ton comptable t'aide \u00e0 \u00e9conomiser <strong>2 000, 3 000 ou 5 000\u20ac d'imp\u00f4ts</strong> gr\u00e2ce \u00e0 une bonne optimisation, le calcul est vite fait.<br><br>Et cette d\u00e9pense est <em>d\u00e9ductible de ta soci\u00e9t\u00e9.</em>",vo:"Combien \u00e7a co\u00fbte un comptable. Pour une petite structure comme une SASU qui d\u00e9marre, \u00e7a varie entre 80 et 200 euros par mois selon le comptable et les services inclus. C'est 960 \u00e0 2 400 euros par an. \u00c7a para\u00eet beaucoup. Mais si ton comptable t'aide \u00e0 \u00e9conomiser 2 000, 3 000 ou 5 000 euros d'imp\u00f4ts gr\u00e2ce \u00e0 une bonne optimisation, le calcul est vite fait. C'est un investissement, pas une d\u00e9pense. Et cette d\u00e9pense elle est d\u00e9ductible de ta soci\u00e9t\u00e9.",label:"par mois pour un comptable soci\u00e9t\u00e9"},
{t:'cards',emoji:"\ud83c\udfaf",title:"\ud83d\udd0d Comment trouver un bon comptable",sub:"Cherche un comptable habitu\u00e9 au business en ligne, e-commerce, import-export. Pas tous comprennent ces activit\u00e9s.",vo:"Comment tu trouves un bon comptable. Premi\u00e8rement cherche un comptable qui a l'habitude de travailler avec des entrepreneurs qui font du business en ligne, de l'e-commerce, de l'import-export. Pas tous les comptables comprennent ces activit\u00e9s. Deuxi\u00e8mement demande autour de toi. Les recommandations c'est souvent la meilleure fa\u00e7on de trouver quelqu'un de bien. Dans les groupes d'entrepreneurs, dans les communaut\u00e9s business. Troisi\u00e8mement v\u00e9rifie qu'il utilise des outils en ligne modernes. En 2026, un bon comptable utilise des plateformes comme Pennylane, Indy ou Abby qui te donnent acc\u00e8s \u00e0 tes finances en temps r\u00e9el. Et commence t\u00f4t. Prends un comptable d\u00e8s la cr\u00e9ation de ta soci\u00e9t\u00e9.",items:[{emoji:"\ud83c\udfaf",name:"Sp\u00e9cialis\u00e9 dans ton secteur",sub:"Cherche un comptable habitu\u00e9 au business en ligne, e-commerce, import-export. Pas tous comprennent ces activit\u00e9s."},{emoji:"\ud83d\udc65",name:"Recommand\u00e9 par des entrepreneurs",sub:"Demande dans les communaut\u00e9s business. Les bonnes adresses circulent. Les retours d'exp\u00e9riences comptent."},{emoji:"\ud83d\udcbb",name:"Outils modernes en ligne",sub:"En 2026, un bon comptable utilise Pennylane, Indy ou Abby. Tu acc\u00e8des \u00e0 tes finances en temps r\u00e9el."}]},
{t:'recap',emoji:"\ud83e\uddee",title:"Comptable \u2014 l'essentiel",vo:"Ce qu'il faut retenir. Micro-entreprise, tu g\u00e8res seul, c'est simple. Pour une soci\u00e9t\u00e9, un comptable est fortement recommand\u00e9. Il te prot\u00e8ge, t'optimise et lib\u00e8re ton temps. \u00c7a co\u00fbte entre 80 et 200 euros par mois, c'est un investissement d\u00e9ductible qui se rentabilise. Cherche quelqu'un de sp\u00e9cialis\u00e9 dans ton secteur, recommand\u00e9 par des entrepreneurs, et qui utilise des outils modernes. Et commence d\u00e8s la cr\u00e9ation de ta soci\u00e9t\u00e9. Prochaine le\u00e7on, l'imp\u00f4t sur le revenu.",points:["Micro-entreprise : pas besoin de comptable, g\u00e8re seul","Soci\u00e9t\u00e9 : comptable fortement recommand\u00e9 \u2014 d\u00e9p\u00f4t annuel obligatoire","Il te prot\u00e8ge, t'optimise et lib\u00e8re ton temps","80-200\u20ac/mois \u2014 investissement d\u00e9ductible qui se rentabilise","Sp\u00e9cialis\u00e9 ton secteur + recommand\u00e9 + outils modernes","Commence d\u00e8s la cr\u00e9ation \u2014 pas apr\u00e8s les erreurs"]}]},
{id:14,title:"\ud83c\udff7\ufe0f L'imp\u00f4t sur le revenu (IR)",slides:[
{t:'intro',emoji:"\ud83c\udff7\ufe0f",num:"14",title:"L'imp\u00f4t sur le revenu :\\n<em>comment \u00e7a marche ?</em>",sub:"L'IS c'est pour ta bo\u00eete. L'IR c'est pour toi. Deux imp\u00f4ts distincts \u2014 comprendre les deux change tout.",vo:"Le\u00e7on quatorze. L'imp\u00f4t sur le revenu. Dans les le\u00e7ons pr\u00e9c\u00e9dentes on a parl\u00e9 de l'imp\u00f4t sur les soci\u00e9t\u00e9s. C'est l'imp\u00f4t que ta soci\u00e9t\u00e9 paie sur ses b\u00e9n\u00e9fices. Mais y'a un deuxi\u00e8me imp\u00f4t dont on a pas encore parl\u00e9. L'imp\u00f4t sur le revenu. C'est l'imp\u00f4t que toi en tant que personne tu paies sur les revenus que tu re\u00e7ois personnellement. L'IS c'est pour ta bo\u00eete. L'IR c'est pour toi. Deux imp\u00f4ts distincts, deux calculs distincts."},
{t:'concept',emoji:"\ud83d\udcca",tag:"Le bar\u00e8me 2026",title:"Le bar\u00e8me progressif par tranches 2026 \ud83d\udcca",body:"L'imp\u00f4t sur le revenu fonctionne par tranches. <strong>Le taux s'applique tranche par tranche, pas sur la totalit\u00e9.</strong><br><br>\ud83d\udfe2 0 \u00e0 11 497\u20ac \u2192 <strong>0%</strong><br>\ud83d\udfe1 11 497 \u00e0 29 315\u20ac \u2192 <strong>11%</strong><br>\ud83d\udfe0 29 315 \u00e0 83 823\u20ac \u2192 <strong>30%</strong><br>\ud83d\udd34 83 823 \u00e0 180 294\u20ac \u2192 <strong>41%</strong><br>\ud83d\udd34 + de 180 294\u20ac \u2192 <strong>45%</strong>",vo:"L'imp\u00f4t sur le revenu en France fonctionne par tranches. C'est ce qu'on appelle le bar\u00e8me progressif. Plus tu gagnes, plus le taux augmente. Mais ce taux s'applique pas sur la totalit\u00e9 de tes revenus. Il s'applique tranche par tranche. En 2026 les tranches sont les suivantes. De 0 \u00e0 11 497 euros de revenus annuels, tu paies 0%. De 11 497 \u00e0 29 315 euros, tu paies 11%. De 29 315 \u00e0 83 823 euros, tu paies 30%. De 83 823 \u00e0 180 294 euros, tu paies 41%. Au-del\u00e0 de 180 294 euros, tu paies 45%."},
{t:'calc',tag:"\ud83d\udca1 Exemple concret",title:"Sur 40 000\u20ac de revenus annuels",vo:"Le calcul concret sur 40 000 euros de revenus annuels. Sur les premiers 11 497 euros, tu paies 0%. Sur les 17 818 euros suivants entre 11 497 et 29 315 euros, tu paies 11%, soit environ 1 960 euros. Sur les 10 685 euros restants entre 29 315 et 40 000 euros, tu paies 30%, soit 3 205 euros. Total imp\u00f4t sur le revenu, environ 5 165 euros sur 40 000 euros gagn\u00e9s. C'est beaucoup moins que si t'avais pay\u00e9 30% sur tout. C'est \u00e7a le bar\u00e8me progressif. Chaque tranche est impos\u00e9e \u00e0 son propre taux.",premise:"Bar\u00e8me 2026 \u2014 les taux s'appliquent tranche par tranche",lines:[{type:"base",label:"0% sur les 11 497 premiers \u20ac",val:"0 \u20ac"},{type:"base",label:"11% sur 17 818\u20ac (11 497\u219229 315)",val:"1 960 \u20ac"},{type:"base",label:"30% sur 10 685\u20ac (29 315\u219240 000)",val:"3 205 \u20ac"},{type:"equals",label:"\ud83d\udcb8 IR total sur 40 000\u20ac",val:"5 165 \u20ac"}]},
{t:'concept',emoji:"\ud83d\udd17",tag:"IR + SASU",title:"Comment IR et SASU s'articulent \ud83d\udd17",body:"\u2022 Tu te verses un <strong>salaire depuis ta SASU</strong> \u2192 ce salaire rentre dans ton bar\u00e8me IR.<br><br>\u2022 Tu te verses des <strong>dividendes depuis ta SASU</strong> \u2192 tax\u00e9s au <em>PFU \u00e0 30%</em>. Tu ne paies pas deux fois.<br><br>\u2022 Tu peux opter pour l'<strong>int\u00e9gration au bar\u00e8me</strong> si c'est plus avantageux \u2014 ton comptable t'aide \u00e0 choisir.",vo:"Comment l'imp\u00f4t sur le revenu s'articule avec ta SASU. Si tu te verses un salaire depuis ta SASU, ce salaire rentre dans le calcul de ton imp\u00f4t sur le revenu. Si tu te verses des dividendes depuis ta SASU, tu paies le PFU \u00e0 30%. Ce PFU de 30% remplace l'imp\u00f4t sur le revenu et les pr\u00e9l\u00e8vements sociaux sur ces dividendes. Donc tu paies pas deux fois. C'est soit l'un soit l'autre. Mais tu peux aussi choisir d'int\u00e9grer tes dividendes dans ton bar\u00e8me progressif si c'est plus avantageux. Ton comptable te dit laquelle des deux options est la meilleure selon ta situation."},
{t:'concept',emoji:"\ud83d\udca1",tag:"La strat\u00e9gie cl\u00e9",title:"L'argent dans la soci\u00e9t\u00e9 c'est pas de l'IR \ud83d\udca1",body:"<strong>L'argent qui reste dans ta SASU n'est pas soumis \u00e0 l'IR.</strong><br><br>Il est juste soumis \u00e0 l'IS \u00e0 15% sur les premiers 42 500\u20ac.<br><br>Tu peux le r\u00e9investir, le faire travailler, construire ton patrimoine <em>depuis ta soci\u00e9t\u00e9</em> \u2014 sans IR.<br><br>C'est l\u00e0 que commence la vraie optimisation. <strong>Section 2 : les holdings.</strong>",vo:"Le point le plus important que je veux que tu retiennes. Plus tu te verses d'argent personnellement, que ce soit en salaire ou en dividendes, plus tu vas payer d'imp\u00f4t sur le revenu. C'est pour \u00e7a que la strat\u00e9gie intelligente c'est de garder un maximum d'argent dans ta soci\u00e9t\u00e9 pour r\u00e9investir. L'argent qui reste dans ta soci\u00e9t\u00e9 n'est pas soumis \u00e0 l'imp\u00f4t sur le revenu. Il est juste soumis \u00e0 l'IS \u00e0 15% sur les premiers 42 500 euros. Et tu peux le r\u00e9investir, le faire travailler, et construire ton patrimoine depuis ta soci\u00e9t\u00e9. C'est l\u00e0 que commence la vraie optimisation qu'on verra dans la section avanc\u00e9e avec les holdings."},
{t:'recap',emoji:"\ud83c\udff7\ufe0f",title:"IR \u2014 l'essentiel",vo:"Ce qu'il faut retenir. Le bar\u00e8me progressif 2026 avec les tranches \u00e0 0%, 11%, 30%, 41% et 45%. Le salaire de ta SASU est inclus dans le bar\u00e8me IR. Les dividendes sont tax\u00e9s au PFU \u00e0 30% sans double imposition. L'argent qui reste dans ta soci\u00e9t\u00e9 n'est pas soumis \u00e0 l'IR. La strat\u00e9gie c'est de garder l'argent dans la soci\u00e9t\u00e9 et de sortir le minimum en perso. Et la suite, dans la section avanc\u00e9e, les holdings pour optimiser les gros b\u00e9n\u00e9fices. Avant-derni\u00e8re le\u00e7on, g\u00e9rer depuis l'\u00e9tranger.",points:["Bar\u00e8me progressif 2026 : 0% / 11% / 30% / 41% / 45% par tranches","Salaire SASU \u2192 inclus dans le bar\u00e8me IR selon le montant","Dividendes SASU \u2192 PFU 30% (pas de double imposition)","Argent dans la soci\u00e9t\u00e9 = pas d'IR (juste IS \u00e0 15% sur premiers 42 500\u20ac)","Strat\u00e9gie : garder l'argent dans la soci\u00e9t\u00e9, sortir le minimum en perso","La suite : holdings pour optimiser les gros b\u00e9n\u00e9fices \u2014 section 2"]}]},
{id:15,title:"\ud83c\udf0d G\u00e9rer sa bo\u00eete depuis l'\u00e9tranger",slides:[
{t:'intro',emoji:"\ud83c\udf0d",num:"15",title:"G\u00e9rer sa bo\u00eete\\n<em>depuis l'\u00e9tranger</em>",sub:"Duba\u00ef, Maroc, Bali, Portugal \u2014 c'est possible, c'est l\u00e9gal, mais y'a des r\u00e8gles \u00e0 conna\u00eetre.",vo:"Le\u00e7on quinze. G\u00e9rer ton business depuis Duba\u00ef, Istanbul, Bali ou Casablanca. C'est le r\u00eave de beaucoup. Et c'est possible. Mais y'a des r\u00e8gles. Et si tu les connais pas, tu peux te retrouver \u00e0 devoir payer des imp\u00f4ts dans deux pays en m\u00eame temps. Cette le\u00e7on c'est pour \u00e9viter \u00e7a."},
{t:'concept',emoji:"\ud83c\udfe0",tag:"R\u00e9sidence fiscale",title:"O\u00f9 tu paies tes imp\u00f4ts personnels \u2014 les 3 crit\u00e8res \ud83c\udfe0",body:"En France tu es r\u00e9sident fiscal si au moins UN crit\u00e8re est rempli :<br><br>\ud83c\udfe0 <strong>Ton foyer principal est en France</strong> (famille, logement principal)<br>\ud83d\udcc5 <strong>Tu passes plus de 183 jours/an en France</strong><br>\ud83d\udcbc <strong>Ton activit\u00e9 professionnelle principale est en France</strong><br><br><em>Si tu pars mais que ta famille est en France et que tu rentres souvent \u2014 t'es toujours r\u00e9sident fiscal fran\u00e7ais.</em>",vo:"Premier truc \u00e0 comprendre. O\u00f9 tu es r\u00e9sident fiscal d\u00e9termine o\u00f9 tu paies tes imp\u00f4ts personnels. En France, t'es r\u00e9sident fiscal fran\u00e7ais si ton foyer principal est en France, si tu passes plus de 183 jours par an en France, ou si ton activit\u00e9 professionnelle principale est en France. Si t'es r\u00e9sident fiscal fran\u00e7ais, tu paies tes imp\u00f4ts en France, peu importe o\u00f9 est domicili\u00e9e ta soci\u00e9t\u00e9. Donc si tu pars \u00e0 l'\u00e9tranger mais que tu rentres tout le temps en France, que tes enfants sont scolaris\u00e9s en France, pour l'\u00c9tat fran\u00e7ais t'es toujours r\u00e9sident fiscal fran\u00e7ais."},
{t:'concept',emoji:"\ud83c\udfe2",tag:"Soci\u00e9t\u00e9 vs toi",title:"Ta soci\u00e9t\u00e9 et toi c'est pas pareil \ud83c\udfe2",body:"Ta SASU peut \u00eatre <strong>domicili\u00e9e en France</strong> et toi vivre \u00e0 l'\u00e9tranger. Deux fiscalit\u00e9s s\u00e9par\u00e9es.<br><br>\ud83d\udcbc <strong>Ta soci\u00e9t\u00e9</strong> paie l'IS l\u00e0 o\u00f9 elle est enregistr\u00e9e<br>\ud83d\udc64 <strong>Toi personnellement</strong> tu paies l'IR l\u00e0 o\u00f9 t'es r\u00e9sident fiscal<br><br>Si tu coupes ta r\u00e9sidence fiscale fran\u00e7aise \u2192 tu paies l'IR selon les r\u00e8gles du pays o\u00f9 tu vis.",vo:"Deuxi\u00e8me chose importante. Ta soci\u00e9t\u00e9 et toi c'est pas pareil. Ta SASU peut \u00eatre bas\u00e9e en France et toi vivre \u00e0 l'\u00e9tranger. Ou ta soci\u00e9t\u00e9 peut \u00eatre \u00e0 Hong Kong et toi vivre en France. C'est deux fiscalit\u00e9s diff\u00e9rentes qui s'appliquent. Ta soci\u00e9t\u00e9 paie l'imp\u00f4t sur ses b\u00e9n\u00e9fices l\u00e0 o\u00f9 elle est enregistr\u00e9e. Toi tu paies l'imp\u00f4t sur tes revenus personnels l\u00e0 o\u00f9 t'es r\u00e9sident fiscal. Donc si tu coupes ta r\u00e9sidence fiscale fran\u00e7aise et que tu t'installes vraiment dans un autre pays, tu paies l'IR selon les r\u00e8gles de ce pays."},
{t:'cards',emoji:"\ud83c\udde6\ud83c\uddea",title:"\ud83c\udf0d Les destinations populaires et leurs avantages",sub:"Pas d'imp\u00f4t sur le revenu. Tr\u00e8s populaire. Mais pour couper la r\u00e9sidence fiscale fran\u00e7aise, faut vraiment y vivre. Pas juste un visa renouvel\u00e9.",vo:"Les destinations qui attirent les entrepreneurs. Duba\u00ef avec 0% d'imp\u00f4t sur le revenu personnel. Tr\u00e8s populaire. Mais pour couper ta r\u00e9sidence fiscale fran\u00e7aise faut vraiment y vivre, pas juste avoir un visa de touriste renouvel\u00e9. Le Portugal a un r\u00e9gime sp\u00e9cial pour les nouveaux arrivants qui donne des avantages fiscaux pendant 10 ans. Tr\u00e8s appr\u00e9ci\u00e9 des entrepreneurs europ\u00e9ens. Le Maroc et la Tunisie ont des conventions fiscales avec la France qui \u00e9vitent de payer deux fois sur les m\u00eames revenus. Pratique pour rester proche culturellement.",items:[{emoji:"\ud83c\udde6\ud83c\uddea",name:"Duba\u00ef \u2014 0% IR personnel",sub:"Pas d'imp\u00f4t sur le revenu. Tr\u00e8s populaire. Mais pour couper la r\u00e9sidence fiscale fran\u00e7aise, faut vraiment y vivre. Pas juste un visa renouvel\u00e9."},{emoji:"\ud83c\uddf5\ud83c\uddf9",name:"Portugal \u2014 r\u00e9gime NHR",sub:"R\u00e9gime sp\u00e9cial pour nouveaux arrivants pendant 10 ans. Avantages fiscaux importants. Tr\u00e8s appr\u00e9ci\u00e9 des entrepreneurs europ\u00e9ens."},{emoji:"\ud83c\uddf2\ud83c\udde6",name:"Maroc / Tunisie",sub:"Conventions fiscales avec la France qui \u00e9vitent la double imposition. Proche culturellement, populaire chez les entrepreneurs francophones."}]},
{t:'warning',emoji:"\u26a0\ufe0f",title:"La r\u00e8gle d'or avant de partir \ud83d\udea8",body:"Avant tout d\u00e9part, consulte un sp\u00e9cialiste.",warn:"<strong>Pas un comptable classique.</strong> Un avocat fiscaliste sp\u00e9cialis\u00e9 en expatriation.<br><br>Les erreurs ici se paient tr\u00e8s cher et tr\u00e8s longtemps :<br>\u2022 Redressement fiscal sur plusieurs ann\u00e9es<br>\u2022 Double imposition si mal structur\u00e9<br>\u2022 P\u00e9nalit\u00e9s importantes<br><br><strong>\ud83d\udca1 Pour les structures internationales</strong> : notre cabinet partenaire accompagne ce type de projets. Toutes les infos dans les ressources de la formation.",vo:"La r\u00e8gle d'or. Avant de partir, tu parles \u00e0 un sp\u00e9cialiste. Pas un comptable classique, un avocat fiscaliste sp\u00e9cialis\u00e9 en expatriation. Parce que les erreurs ici se paient tr\u00e8s cher et tr\u00e8s longtemps. Un redressement fiscal sur plusieurs ann\u00e9es, une double imposition si c'est mal structur\u00e9, des p\u00e9nalit\u00e9s importantes. Pour les structures internationales, combiner une soci\u00e9t\u00e9 fran\u00e7aise avec une structure \u00e0 Hong Kong par exemple, notre cabinet partenaire accompagne exactement ce type de projets. Les informations de contact sont dans les ressources de la formation."},
{t:'recap',emoji:"\ud83c\udf0d",title:"G\u00e9rer depuis l'\u00e9tranger \u2014 l'essentiel",vo:"Ce qu'il faut retenir. La r\u00e9sidence fiscale c'est pas juste l\u00e0 o\u00f9 t'habites. Trois crit\u00e8res en France : foyer principal, 183 jours ou activit\u00e9 professionnelle principale. Ta soci\u00e9t\u00e9 et toi c'est deux fiscalit\u00e9s s\u00e9par\u00e9es. Duba\u00ef \u00e0 0% d'IR, le Portugal avec le r\u00e9gime NHR, et les pays avec conventions fiscales avec la France. Couper la r\u00e9sidence fiscale fran\u00e7aise c'est vraiment partir, pas juste renouveler un visa. Et avant tout d\u00e9part, un avocat fiscaliste sp\u00e9cialis\u00e9 en expatriation est indispensable. Derni\u00e8re le\u00e7on de cette formation, les 7 erreurs fiscales que font les d\u00e9butants.",points:["R\u00e9sidence fiscale \u2260 o\u00f9 t'habites \u2014 3 crit\u00e8res : foyer, 183 jours, activit\u00e9 principale","Ta soci\u00e9t\u00e9 et toi c'est s\u00e9par\u00e9 \u2014 deux fiscalit\u00e9s distinctes","Duba\u00ef 0% IR, Portugal NHR 10 ans, Maroc/Tunisie conventions fiscales","Couper la r\u00e9sidence fiscale fran\u00e7aise = vraiment partir, pas juste un visa","Avocat fiscaliste sp\u00e9cialis\u00e9 expatriation avant tout d\u00e9part \u2014 obligatoire","Cabinet partenaire pour structures internationales et Hong Kong"]}]},
{id:16,title:"\ud83d\udea8 Les 7 erreurs fiscales des d\u00e9butants",slides:[
{t:'intro',emoji:"\ud83d\udea8",num:"16",title:"Les 7 erreurs fiscales\\n<em>que font les d\u00e9butants</em>",sub:"T'as tout regard\u00e9. Normalement tu vas pas les faire. Mais je veux les nommer clairement pour que tu les gardes en t\u00eate.",vo:"Le\u00e7on seize. La derni\u00e8re le\u00e7on de cette formation. Et je voulais la terminer avec quelque chose de tr\u00e8s concret. Les sept erreurs fiscales que font quasiment tous les d\u00e9butants. Des erreurs qui co\u00fbtent de l'argent, qui cr\u00e9ent du stress, et qui sont toutes \u00e9vitables quand on sait. Toi maintenant t'as regard\u00e9 toutes les le\u00e7ons. T'as les bases. T'as les r\u00e8gles du jeu. Donc normalement tu vas pas les faire. Mais je veux quand m\u00eame les nommer clairement."},
{t:'cards',emoji:"\ud83d\udd00",title:"\u274c Erreurs 1, 2 et 3",sub:"D\u00e9penses pro sur compte perso, virements clients sur compte perso. Comptabilit\u00e9 chaos, justification impossible en cas de contr\u00f4le.",vo:"Les trois premi\u00e8res erreurs. Erreur num\u00e9ro un : m\u00e9langer le compte perso et le compte pro. C'est l'erreur la plus courante. Tu paies une d\u00e9pense pro avec ton compte perso, tu re\u00e7ois un virement client sur ton compte perso. R\u00e9sultat, ta comptabilit\u00e9 est un chaos, et en cas de contr\u00f4le tu peux pas justifier clairement tes mouvements. Erreur num\u00e9ro deux : ne pas garder ses factures. Tu ach\u00e8tes quelque chose pour ton business, tu jettes le re\u00e7u ou tu le perds. Et \u00e0 la fin de l'ann\u00e9e tu peux pas d\u00e9duire cette d\u00e9pense parce que t'as aucune preuve. Erreur num\u00e9ro trois : ne pas anticiper les \u00e9ch\u00e9ances fiscales. TVA \u00e0 reverser, IS \u00e0 payer en acomptes, charges sociales. Sans argent mis de c\u00f4t\u00e9, tu puises dans ta tr\u00e9sorerie ou tu paies en retard avec des p\u00e9nalit\u00e9s.",items:[{emoji:"\ud83d\udd00",name:"Erreur 1 : M\u00e9langer perso et pro",sub:"D\u00e9penses pro sur compte perso, virements clients sur compte perso. Comptabilit\u00e9 chaos, justification impossible en cas de contr\u00f4le."},{emoji:"\ud83d\uddd1\ufe0f",name:"Erreur 2 : Ne pas garder ses factures",sub:"Tu ach\u00e8tes pour le business, tu jettes le re\u00e7u. \u00c0 la fin de l'ann\u00e9e tu peux pas d\u00e9duire. Tu paies des imp\u00f4ts que t'aurais \u00e9vit\u00e9s."},{emoji:"\ud83d\udcc5",name:"Erreur 3 : Pas anticiper les \u00e9ch\u00e9ances",sub:"TVA, IS en acomptes, charges sociales \u2014 tout arrive \u00e0 des dates pr\u00e9cises. Sans argent mis de c\u00f4t\u00e9, p\u00e9nalit\u00e9s et stress garantis."}]},
{t:'cards',emoji:"\ud83d\udcb8",title:"\u274c Erreurs 4, 5 et 6",sub:"Au d\u00e9marrage si tu te verses un gros salaire sur une bo\u00eete qui fait peu, tu vides ta tr\u00e9sorerie. Plus de cash pour r\u00e9investir.",vo:"Erreurs 4, 5 et 6. Erreur num\u00e9ro quatre : se verser trop de salaire trop t\u00f4t. Au d\u00e9marrage si ta soci\u00e9t\u00e9 fait peu de b\u00e9n\u00e9fice et que tu te verses un gros salaire, tu paies \u00e9norm\u00e9ment de charges sociales, tu vides ta tr\u00e9sorerie. Verse-toi le minimum au d\u00e9part et r\u00e9investis. Erreur num\u00e9ro cinq : ne pas d\u00e9clarer tous ses revenus. Depuis 2020 les banques transmettent automatiquement toutes les informations \u00e0 l'administration fiscale. Tout est trac\u00e9. D\u00e9clare tout. Toujours. Erreur num\u00e9ro six : passer des d\u00e9penses personnelles en charges professionnelles. Les vacances en famille pass\u00e9es en voyage d'affaires, les restaurants perso en repas professionnels. C'est de la fraude fiscale. Majorations de 40% sur les sommes redress\u00e9es en cas de contr\u00f4le.",items:[{emoji:"\ud83d\udcb8",name:"Erreur 4 : Trop de salaire trop t\u00f4t",sub:"Au d\u00e9marrage si tu te verses un gros salaire sur une bo\u00eete qui fait peu, tu vides ta tr\u00e9sorerie. Plus de cash pour r\u00e9investir."},{emoji:"\ud83d\ude48",name:"Erreur 5 : Ne pas d\u00e9clarer tous ses revenus",sub:"Depuis 2020 les banques transmettent automatiquement les infos \u00e0 l'administration. Tout est trac\u00e9. D\u00e9clare tout. Toujours."},{emoji:"\ud83c\udfad",name:"Erreur 6 : D\u00e9penses perso en charges pro",sub:"Vacances en voyage d'affaires, resto perso en repas pro. C'est de la fraude fiscale. Majorations de 40% sur le redressement."}]},
{t:'warning',emoji:"\ud83d\udea8",title:"Erreur 7 \u2014 La plus co\u00fbteuse \ud83d\udea8",body:"Ne pas prendre de comptable pour \u00e9conomiser et finir par payer bien plus cher.",warn:"<strong>Beaucoup de d\u00e9butants pensent qu'un comptable c'est une d\u00e9pense inutile.</strong><br><br>Ils g\u00e8rent seuls. Ils font des erreurs. Des charges mal d\u00e9duites, des d\u00e9clarations incorrectes, des optimisations manqu\u00e9es.<br><br><strong>Quand ils finissent par prendre un comptable pour r\u00e9parer les d\u00e9g\u00e2ts</strong> \u2014 c'est beaucoup plus long et cher que si ils en avaient pris un d\u00e8s le d\u00e9part.<br><br><em>Un bon comptable c'est un investissement. Pas une d\u00e9pense.</em>",vo:"Erreur num\u00e9ro sept. La plus co\u00fbteuse. Ne pas prendre de comptable pour \u00e9conomiser et finir par payer bien plus cher. Beaucoup de d\u00e9butants pensent qu'un comptable c'est une d\u00e9pense inutile. Ils g\u00e8rent seuls. Ils font des erreurs. Des charges mal d\u00e9duites, des d\u00e9clarations incorrectes, des optimisations manqu\u00e9es. Et quand ils finissent par prendre un comptable pour r\u00e9parer les d\u00e9g\u00e2ts, c'est beaucoup plus long et beaucoup plus cher que si ils en avaient pris un d\u00e8s le d\u00e9part. Un bon comptable c'est un investissement. Pas une d\u00e9pense. On l'a dit et je le r\u00e9p\u00e8te."},
{t:'recap',emoji:"\u2705",title:"Les 7 erreurs \u00e0 \u00e9viter",vo:"Les sept erreurs. Un, m\u00e9langer perso et pro. Deux, perdre ses factures. Trois, pas anticiper les \u00e9ch\u00e9ances fiscales. Quatre, se verser trop de salaire trop t\u00f4t. Cinq, ne pas tout d\u00e9clarer. Six, passer des d\u00e9penses perso en charges pro. Sept, pas prendre de comptable par \u00e9conomie. T'as maintenant toutes les bases pour cr\u00e9er et g\u00e9rer ta soci\u00e9t\u00e9 en France de fa\u00e7on optimale. La suite c'est la section deux avec les holdings et les structures avanc\u00e9es. Et le module Hong Kong pour ceux qui veulent aller encore plus loin. Merci d'avoir suivi cette formation. On se retrouve dans la suite.",points:["1. M\u00e9langer perso et pro \u2014 compte pro s\u00e9par\u00e9, toujours","2. Perdre ses factures \u2014 photo num\u00e9rique d\u00e8s r\u00e9ception","3. Pas anticiper les \u00e9ch\u00e9ances \u2014 15-20% de c\u00f4t\u00e9 d\u00e8s que l'argent rentre","4. Trop de salaire trop t\u00f4t \u2014 r\u00e9investis d'abord","5. Ne pas tout d\u00e9clarer \u2014 tout est trac\u00e9 depuis 2020","6. D\u00e9penses perso en charges pro \u2014 fraude, majoration 40%","7. Pas de comptable par \u00e9conomie \u2014 le plus cher des choix"]},
{t:'quote',vo:"Pour terminer cette formation sur une note fondamentale. Il y a une distinction essentielle entre l'optimisation fiscale, qui consiste \u00e0 utiliser les m\u00e9canismes l\u00e9gaux pr\u00e9vus par la loi pour r\u00e9duire son imp\u00f4t, et la fraude fiscale, qui consiste \u00e0 dissimuler des revenus ou inventer des charges. Tout ce qu'on a vu dans cette formation, la SASU, les dividendes \u00e0 30%, les charges d\u00e9ductibles, la franchise TVA, tout \u00e7a c'est parfaitement l\u00e9gal. C'est le l\u00e9gislateur lui-m\u00eame qui a cr\u00e9\u00e9 ces dispositifs. Les utiliser c'est jouer selon les r\u00e8gles du jeu. La formation est termin\u00e9e. Bravo d'\u00eatre all\u00e9 jusqu'au bout.",text:"Payer ses imp\u00f4ts c'est normal. Payer plus que ce que la loi te demande c'est de la g\u00e9n\u00e9rosit\u00e9 involontaire envers l'\u00c9tat."}]},
];




// ══ TRACKER NATIF ══
const TRACKER_KEY='sbw_tracker__sbw_formation_creation_entreprise_1';
function loadProg(){try{return JSON.parse(localStorage.getItem(TRACKER_KEY)||'{}')}catch(e){return{}}}
function saveProg(d){try{localStorage.setItem(TRACKER_KEY,JSON.stringify(d))}catch(e){}}
function markDone(idx){var d=loadProg();if(!d[idx]){d[idx]=true;d._total=LESSONS.length;d._updated=Date.now();saveProg(d);refreshUI()}}
function globalPct(){var d=loadProg();var n=LESSONS.filter(function(_,i){return!!d[i]}).length;return Math.round(n/LESSONS.length*100)}

// ══ STATE ══
var curL=0,curS=0,seen={};
function markSeen(l,s){if(!seen[l])seen[l]=new Set();seen[l].add(s);var tot=LESSONS[l].slides.length;var pct=Math.round(seen[l].size/tot*100);if(pct>=80)markDone(l);updatePbars()}

// ══ RENDER ══
function render(){
  var L=LESSONS[curL],sl=L.slides[curS];
  markSeen(curL,curS);
  // Lancer la voix off si activée
  var sl_vo = LESSONS[curL].slides[curS];
  if (voixOn && sl_vo && sl_vo.vo) {
    if (synth) synth.cancel();
    setTimeout(function(){ playVoix(sl_vo.vo); }, 150);
  } else if (autoPlay) {
    // Slide sans VO : avancer après 2s
    setTimeout(autoAdvance, 2000);
  }
  var a=document.getElementById('slideArea');
  var t=sl.t,h='';
  if(t==='intro'){
    h='<div class="slide-intro"><div class="slide-num">Leçon '+L.id+' / '+LESSONS.length+'</div><span class="slide-emoji-big">'+(sl.emoji||'')+'</span><div class="slide-intro-title">'+sl.title.replace(/\\n|\n/g,'<br>')+'</div>'+(sl.sub?'<div class="slide-intro-sub">'+sl.sub+'</div>':'')+'</div>';
  } else if(t==='concept'){
    // Extraire les lignes fortes du body pour les mettre en valeur
    var bodyFmt = (sl.body||'').replace(/<br><br>/g,'</p><p>');
    // Détecter les éléments ✅ ❌ ⚠️ 🔴 etc pour les transformer en key-points
    var hasKeyPoints = /^[✅❌⚠️🔴🟢•▪]/.test(sl.body||'');
    var bodyHtml;
    if(hasKeyPoints){
      var klines = (sl.body||'').split('<br>').filter(Boolean);
      var kpts = klines.map(function(l){
        var icon = l.match(/^(\S+)\s*/);
        var txt = icon ? l.replace(icon[0],'') : l;
        return '<div class="key-point"><div class="key-point-icon">'+(icon?icon[1]:'▸')+'</div><div class="key-point-text">'+txt+'</div></div>';
      }).join('');
      bodyHtml = '<div class="concept-card">'+kpts+'</div>';
    } else {
      // Mettre les parties <strong>...</strong> en highlight
      var highlighted = (sl.body||'').replace(/<strong>(.*?)<\/strong>/g,'</p><div class="concept-highlight">$1</div><p>');
      bodyHtml = '<div class="slide-body">'+highlighted+'</div>';
    }
    var eyebrow = sl.emoji ? '<div class="slide-eyebrow"><span class="slide-eyebrow-icon">'+sl.emoji+'</span>'+(sl.tag?'<span class="slide-eyebrow-tag">'+sl.tag+'</span>':'')+'</div>' : (sl.tag?'<div class="slide-tag">'+sl.tag+'</div>':'');
    h='<div class="slide-block">'+eyebrow+'<div class="slide-title">'+sl.title+'</div>'+bodyHtml+'</div>';
  } else if(t==='cards'){
    var items=sl.items.map(function(it){return'<div class="card-item"><div class="card-emoji">'+it.emoji+'</div><div><div class="card-name">'+it.name+'</div><div class="card-sub">'+it.sub+'</div></div></div>';}).join('');
    h='<div class="slide-block"><div class="slide-title">'+sl.title+'</div><div class="cards-grid">'+items+'</div></div>';
  } else if(t==='compare'){
    var lc=sl.left,rc=sl.right;
    h='<div class="slide-block"><div class="slide-title">'+sl.title+'</div><div class="compare-grid"><div class="compare-col"><div class="compare-header"><span class="compare-emoji">'+lc.emoji+'</span><span class="compare-label">'+lc.label+'</span></div><div class="compare-num">'+lc.num+'</div>'+(lc.unit?'<div class="compare-unit">'+lc.unit+'</div>':'')+'<div class="compare-desc">'+lc.desc+'</div></div><div class="compare-col '+(rc.color||'')+'"><div class="compare-header"><span class="compare-emoji">'+rc.emoji+'</span><span class="compare-label">'+rc.label+'</span></div><div class="compare-num '+(rc.color==='good'?'green':'')+'">'+rc.num+'</div>'+(rc.unit?'<div class="compare-unit">'+rc.unit+'</div>':'')+'<div class="compare-desc">'+rc.desc+'</div></div></div>'+(sl.note?'<div class="compare-note">'+sl.note+'</div>':'')+'</div>';
  } else if(t==='calc'){
    var premise=sl.premise?'<div style="font-size:.78rem;color:var(--muted);margin-bottom:10px;font-style:italic">'+sl.premise+'</div>':'';
    var lines=(sl.lines||[]).map(function(r){
      var isEq=r.type==='equals',isMinus=r.type==='minus';
      var col=isEq?'color:var(--gold);font-weight:700':isMinus?'color:var(--red)':'';
      var bg=isEq?'background:rgba(59,130,246,.08);border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border);':'';
      return'<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;'+bg+'"><span style="font-size:.83rem;color:var(--muted)">'+r.label+'</span><span style="font-size:.95rem;'+col+'">'+r.val+'</span></div>';
    }).join('');
    h='<div class="slide-block">'+(sl.tag?'<div class="slide-tag">'+sl.tag+'</div>':'')+'<div class="slide-title">'+(sl.title||'')+'</div>'+premise+'<div style="background:var(--faint);border:0.5px solid var(--border);border-radius:10px;overflow:hidden;margin-top:8px">'+lines+'</div>'+(sl.body?'<div class="slide-body" style="margin-top:12px">'+sl.body+'</div>':'')+'</div>';
  } else if(t==='stat'){
    h='<div class="slide-block"><div class="stat-block"><div class="stat-val">'+sl.val+'</div><div class="stat-unit">'+sl.unit+'</div><div class="stat-body">'+sl.body+'</div></div></div>';
  } else if(t==='warning'){
    h='<div class="slide-block"><div class="warning-block"><div class="warning-icon">'+(sl.emoji||'⚠️')+'</div><div class="warning-title">'+sl.title+'</div><div class="warning-body">'+(sl.body||sl.warn||'')+'</div></div></div>';
  } else if(t==='action'){
    var steps=sl.steps.map(function(s,i){return'<div class="action-step"><div class="action-step-num">'+(i+1)+'</div><span>'+s+'</span></div>';}).join('');
    var ctaHtml=sl.cta&&sl.url?'<a href="'+sl.url+'" target="_blank" rel="noopener" class="action-cta">'+sl.cta+' →</a>':'';
    h='<div class="slide-block"><div class="action-block">'+(sl.badge?'<div class="action-badge">'+sl.badge+'</div>':'')+(sl.title?'<div class="action-title">'+sl.title+'</div>':'')+'<div class="action-steps">'+steps+'</div>'+ctaHtml+'</div></div>';
  } else if(t==='quote'){
    h='<div class="slide-block"><div class="quote-block"><div class="quote-text">"'+sl.text+'"</div><div class="quote-bar"></div></div></div>';
  } else if(t==='recap'){
    var pts=sl.points.map(function(p){return'<div class="recap-item"><span class="recap-dot">◆</span><span>'+p+'</span></div>';}).join('');
    h='<div class="slide-block"><div class="recap-title">'+sl.title+'</div><div class="recap-list">'+pts+'</div></div>';
  }
  a.classList.remove('slide-enter','slide-enter-back');
  a.innerHTML=h;
  void a.offsetWidth; // force reflow
  a.classList.add(window._slideDir==='prev'?'slide-enter-back':'slide-enter');
  window._slideDir='next';
  a.scrollTop=0;
  updateNav();updatePbars();updateSidebar();
}

function updateNav(){
  var L=LESSONS[curL];
  document.getElementById('navInfo').textContent='Leçon '+L.id+' · Slide '+(curS+1)+'/'+L.slides.length;
  document.getElementById('btnPrev').disabled=curL===0&&curS===0;
  var last=curL===LESSONS.length-1&&curS===L.slides.length-1;
  var nb=document.getElementById('btnNext');
  nb.textContent=last?'Terminer ✓':'Suivant →';
  nb.className=last?'btn-nav done-btn':'btn-nav primary';
}

function updatePbars(){
  var s=seen[curL]?seen[curL].size:1;
  var tot=LESSONS[curL].slides.length;
  var pct=Math.max(Math.round(s/tot*100),Math.round((curS+1)/tot*100));
  document.getElementById('slidePbar').style.width=pct+'%';
  var gp=globalPct();
  document.getElementById('hPbarFill').style.width=gp+'%';
  document.getElementById('hPct').textContent=gp+'%';
}

function updateSidebar(){
  var d=loadProg();
  document.getElementById('sbLessons').innerHTML=LESSONS.map(function(l,i){
    var done=!!d[i];
    var s=seen[i]?seen[i].size:0;
    var pct=done?100:Math.round(s/l.slides.length*100);
    return'<div class="sb-item'+(i===curL?' active':'')+(done?' done':'')+'" onclick="goTo('+i+')">'+'<span class="sb-num">'+l.id+'</span><div class="sb-info"><div class="sb-name">'+l.title+'</div><div class="sb-bar"><div class="sb-bar-fill" style="width:'+pct+'%"></div></div></div><span class="sb-check">✓</span></div>';
  }).join('');
}

function refreshUI(){updatePbars();updateSidebar();renderLessonsPanel();}

function toggleLessonsPanel() {
  var panel = document.getElementById('lessonsPanel');
  var tab = document.getElementById('lessonsTab');
  var isOpen = panel.classList.contains('open');
  if (isOpen) {
    panel.classList.remove('open');
    tab.classList.remove('active');
  } else {
    renderLessonsPanel();
    panel.classList.add('open');
    tab.classList.add('active');
  }
}

function renderLessonsPanel() {
  var d = loadProg();
  var el = document.getElementById('lpScroll');
  el.innerHTML = LESSONS.map(function(l, li) {
    var isDone = !!d[li];
    var isActivL = li === curL;
    var slides = l.slides.map(function(s, si) {
      var label = s.t === 'intro' ? '▶ Intro' :
                  s.t === 'recap' ? '✓ Recap' :
                  s.t === 'action' ? '🚀' :
                  s.t === 'stat' ? '📊' :
                  s.t === 'warning' ? '⚠️' :
                  s.t === 'quote' ? '"' :
                  s.t === 'compare' ? '⚖️' :
                  s.t === 'cards' ? '📋' : '💡';
      var isActS = isActivL && si === curS;
      return '<button class="lp-slide-btn' + (isActS?' active':'') + '" onclick="goToSlide(' + li + ',' + si + ')">' + label + ' ' + (si+1) + '</button>';
    }).join('');
    return '<div class="lp-lesson' + (isActivL?' open':'') + '">' +
      '<button class="lp-lesson-btn' + (isActivL?' active':'') + (isDone?' done':'') + '" onclick="toggleLpLesson(this,' + li + ')">' +
        '<span class="lp-lesson-num">' + l.id + '</span>' +
        '<span class="lp-lesson-name">' + l.title + '</span>' +
        '<span class="lp-lesson-check">✓</span>' +
      '</button>' +
      '<div class="lp-slides">' + slides + '</div>' +
    '</div>';
  }).join('');
}

function toggleLpLesson(btn, idx) {
  var lessonEl = btn.parentElement;
  var wasOpen = lessonEl.classList.contains('open');
  document.querySelectorAll('.lp-lesson').forEach(function(el){ el.classList.remove('open'); });
  if (!wasOpen) lessonEl.classList.add('open');
}

function goToSlide(li, si) {
  autoPlay = false; stopVoix();
  document.getElementById('playIcon').style.display='block';
  document.getElementById('pauseIcon').style.display='none';
  document.getElementById('playBtn').classList.remove('playing');
  curL = li; curS = si;
  render();
  renderLessonsPanel();
}

// ══ NAVIGATION ══
function next(){autoPlay=false;stopVoix();
  document.getElementById('playIcon').style.display='block';
  document.getElementById('pauseIcon').style.display='none';
  document.getElementById('playBtn').classList.remove('playing');
  window._slideDir='next';
  var L=LESSONS[curL];
  if(curS<L.slides.length-1){curS++;render();}
  else if(curL<LESSONS.length-1){markDone(curL);curL++;curS=0;render();}
  else{markDone(curL);}
}
function prev(){autoPlay=false;stopVoix();
  document.getElementById('playIcon').style.display='block';
  document.getElementById('pauseIcon').style.display='none';
  document.getElementById('playBtn').classList.remove('playing');
  window._slideDir='prev';
  if(curS>0){curS--;render();}
  else if(curL>0){curL--;curS=LESSONS[curL].slides.length-1;render();}
}
function goTo(idx){
  autoPlay=false;stopVoix();
  document.getElementById('playIcon').style.display='block';
  document.getElementById('pauseIcon').style.display='none';
  document.getElementById('playBtn').classList.remove('playing');
  curL=idx;curS=0;render();}

// ══ TTS ══
var voixOn = false;
var synth = window.speechSynthesis;
var utterance = null;

var autoPlay = false;

function stopVoix() {
  autoPlay = false;
  if (synth) synth.cancel();
  var subs = document.getElementById('subtitlesText');
  if (subs) { subs.classList.add('hidden'); subs.textContent = ''; }
}

function togglePlay() {
  if (autoPlay) {
    // Pause
    autoPlay = false;
    voixOn = false;
    stopVoix();
    document.getElementById('playIcon').style.display = 'block';
    document.getElementById('pauseIcon').style.display = 'none';
    document.getElementById('playBtn').classList.remove('playing');
    document.getElementById('btnVoix').classList.remove('active');
    document.getElementById('btnVoix').textContent = '🔊 Voix';
  } else {
    // Play
    voixOn = true;
    autoPlay = true;
    document.getElementById('playIcon').style.display = 'none';
    document.getElementById('pauseIcon').style.display = 'block';
    document.getElementById('playBtn').classList.add('playing');
    document.getElementById('btnVoix').classList.add('active');
    document.getElementById('btnVoix').textContent = '🔊 Voix ON';
    var sl = LESSONS[curL].slides[curS];
    if (sl && sl.vo) playVoix(sl.vo);
    else autoAdvance();
  }
}

function autoAdvance() {
  if (!autoPlay) return;
  window._slideDir='next';
  // Avancer au slide suivant
  var L = LESSONS[curL];
  if (curS < L.slides.length - 1) {
    curS++; render();
  } else if (curL < LESSONS.length - 1) {
    markDone(curL); curL++; curS = 0; render();
  } else {
    markDone(curL); autoPlay = false;
  }
}

function playVoix(text) {
  if (!voixOn || !text || !synth) return;
  synth.cancel();
  utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'fr-FR';
  utterance.rate = 1.05;
  utterance.pitch = 1;
  utterance.volume = 1;
  var voices = synth.getVoices();
  var frVoice = voices.find(function(v) { return v.lang === 'fr-FR' && v.name.indexOf('Google') > -1; })
    || voices.find(function(v) { return v.lang === 'fr-FR'; })
    || voices.find(function(v) { return v.lang.startsWith('fr'); });
  if (frVoice) utterance.voice = frVoice;

  // Sous-titres synchronisés via boundary event
  var subs = document.getElementById('subtitlesText');
  var sentences = text.match(/[^.!?…]+[.!?…]+\s*/g) || [text];
  // Précalculer les positions de début de chaque phrase
  var positions = [];
  var pos = 0;
  sentences.forEach(function(s) {
    positions.push(pos);
    pos += s.length;
  });

  utterance.onboundary = function(e) {
    if (e.name !== 'word' && e.name !== 'sentence') return;
    var ci = e.charIndex;
    // Trouver la phrase qui contient cet index
    var phraseIdx = 0;
    for (var i = positions.length - 1; i >= 0; i--) {
      if (ci >= positions[i]) { phraseIdx = i; break; }
    }
    subs.classList.remove('hidden');
    subs.textContent = sentences[phraseIdx].trim();
  };

  utterance.onend = function() {
    subs.classList.add('hidden');
    subs.textContent = '';
    if (autoPlay) setTimeout(autoAdvance, 400);
  };
  utterance.onerror = function() {
    subs.classList.add('hidden');
    subs.textContent = '';
  };

  synth.speak(utterance);
}

function playVoixAuto(text) {
  // Comme playVoix mais déclenche autoAdvance à la fin
  playVoix(text);
}

function toggleVoix() {
  voixOn = !voixOn;
  var btn = document.getElementById('btnVoix');
  if (voixOn) {
    btn.classList.add('active');
    btn.textContent = '🔊 Voix ON';
    // Lire le slide actuel
    var sl = LESSONS[curL].slides[curS];
    if (sl.vo) playVoix(sl.vo);
  } else {
    btn.classList.remove('active');
    btn.textContent = '🔊 Voix';
    stopVoix();
  }
}

// ══ INIT ══
(function(){
  var d=loadProg();
  LESSONS.forEach(function(l,i){if(d[i])seen[i]=new Set(Array.from({length:l.slides.length},function(_,j){return j;}));});
  var start=0;
  for(var i=0;i<LESSONS.length;i++){if(!d[i]){start=i;break;}if(i===LESSONS.length-1)start=i;}
  curL=start;curS=0;
  voixOn = false;
  render();
})();

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  if(e.key==='ArrowLeft'){e.preventDefault();prev();}
});
</script>
