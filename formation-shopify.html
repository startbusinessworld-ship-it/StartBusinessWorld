<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopify de A à Z 🛒 | SBW</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0C0C0A;--surface:#141412;--border:rgba(255,255,255,.08);
  --white:#F0ECE4;--muted:rgba(240,236,228,.45);--faint:rgba(240,236,228,.07);
  --gold:#16A34A;--gold-rgb:22,163,74;--gold-light:#22C55E;--green:#4ECB71;--red:#E05252;--site-gold:#A67C3A;--site-gold-light:#C49A4E;
  --sidebar:240px;--header:52px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);display:flex;flex-direction:column}
header{height:var(--header);background:var(--surface);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.h-left{display:flex;align-items:center;gap:14px}
.h-logo{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--site-gold);letter-spacing:.04em}
.h-sep{width:0.5px;height:18px;background:var(--border)}
.h-title{font-size:.82rem;color:var(--muted)}
.h-right{display:flex;align-items:center;gap:12px}
.h-pbar-wrap{width:120px;height:4px;background:var(--faint);border-radius:2px;overflow:hidden}
.h-pbar-fill{height:100%;background:var(--site-gold);border-radius:2px;transition:width .4s}
.h-pct{font-size:.72rem;color:var(--muted)}
.btn-close{background:none;border:0.5px solid var(--border);color:var(--muted);padding:5px 14px;border-radius:5px;font-size:.75rem;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-close:hover{border-color:var(--white);color:var(--white)}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar);background:var(--surface);border-right:0.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-head{padding:14px 14px 10px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.sb-head-label{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.sb-lessons{flex:1;overflow-y:auto;padding:6px}
.sb-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:7px;cursor:pointer;transition:background .1s}
.sb-item:hover{background:var(--faint)}
.sb-item.active{background:rgba(22,163,74,.15)}
.sb-item.active .sb-num{color:var(--gold)}
.sb-num{font-size:.65rem;color:var(--muted);width:16px;flex-shrink:0;text-align:right;font-weight:500}
.sb-info{flex:1;min-width:0}
.sb-name{font-size:.78rem;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-bar{height:2px;background:var(--faint);border-radius:1px;margin-top:4px;overflow:hidden}
.sb-bar-fill{height:100%;background:var(--site-gold);border-radius:1px;transition:width .3s}
.sb-check{font-size:.7rem;color:var(--green);opacity:0;flex-shrink:0;transition:opacity .2s}
.sb-item.done .sb-check{opacity:1}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.slide-progress{height:3px;background:var(--faint);flex-shrink:0}
.slide-progress-fill{height:100%;background:var(--site-gold);transition:width .3s}
.slide-area{flex:1;overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;padding:16px 16px 100px}
.slide-wrap{width:100%;max-width:900px}
.slide-intro{text-align:center;padding:40px 20px 32px}
.slide-num{font-size:.7rem;letter-spacing:.15em;color:var(--gold);margin-bottom:12px;text-transform:uppercase}
.slide-emoji-big{font-size:3.5rem;margin-bottom:20px;display:block}
.slide-intro-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:600;line-height:1.1;margin-bottom:18px}
.slide-intro-title em{color:var(--gold);font-style:italic}
.slide-intro-sub{font-size:.92rem;color:var(--muted);max-width:540px;margin:0 auto;line-height:1.7}
.slide-block{padding:8px 0}
.slide-tag{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);margin-bottom:10px}
.slide-title{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:600;line-height:1.2;margin-bottom:16px}
.slide-body{font-size:.9rem;color:rgba(240,236,228,.85);line-height:1.75}
.slide-body strong{color:var(--white);font-weight:600}
.slide-body em{color:var(--gold);font-style:italic}
.cards-grid{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.card-item{background:var(--faint);border:0.5px solid var(--border);border-radius:9px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.card-emoji{font-size:1.4rem;flex-shrink:0;margin-top:1px}
.card-name{font-size:.88rem;font-weight:600;margin-bottom:3px}
.card-sub{font-size:.78rem;color:var(--muted);line-height:1.55}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
.compare-col{background:var(--faint);border:0.5px solid var(--border);border-radius:9px;padding:16px}
.compare-col.good{border-color:rgba(78,203,113,.3);background:rgba(78,203,113,.06)}
.compare-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.compare-emoji{font-size:1.3rem}
.compare-label{font-size:.78rem;font-weight:600}
.compare-num{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:700;color:var(--gold);line-height:1;margin-bottom:4px}
.compare-num.green{color:var(--green)}
.compare-unit{font-size:.7rem;color:var(--muted);margin-bottom:10px}
.compare-desc{font-size:.78rem;color:var(--muted);line-height:1.55}
.compare-note{margin-top:12px;padding:10px 14px;background:rgba(22,163,74,.08);border-left:2px solid var(--gold);border-radius:0 6px 6px 0;font-size:.78rem;color:rgba(240,236,228,.7);line-height:1.6}
.stat-block{text-align:center;padding:32px 20px}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,10vw,5.5rem);font-weight:700;color:var(--gold);line-height:1}
.stat-unit{font-size:1rem;color:var(--muted);margin-top:4px;margin-bottom:20px}
.stat-body{font-size:.88rem;color:var(--muted);line-height:1.7;max-width:500px;margin:0 auto}
.warning-block{background:rgba(224,82,82,.08);border:0.5px solid rgba(224,82,82,.25);border-radius:10px;padding:20px 22px}
.warning-icon{font-size:1.6rem;margin-bottom:10px}
.warning-title{font-size:1rem;font-weight:600;margin-bottom:10px;color:#F08080}
.warning-body{font-size:.86rem;color:rgba(240,236,228,.8);line-height:1.7}
.action-block{background:linear-gradient(135deg,rgba(22,163,74,.12),rgba(22,163,74,.06));border:0.5px solid rgba(22,163,74,.3);border-radius:12px;padding:24px}
.action-badge{display:inline-flex;align-items:center;gap:6px;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);background:rgba(22,163,74,.15);padding:4px 10px;border-radius:20px;margin-bottom:14px}
.action-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;margin-bottom:16px}
.action-steps{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.action-step{display:flex;align-items:flex-start;gap:10px;font-size:.85rem;color:rgba(240,236,228,.85);line-height:1.5}
.action-step-num{width:20px;height:20px;border-radius:50%;background:var(--gold);color:#000;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.action-cta{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:#fff;padding:12px 24px;border-radius:8px;font-size:.88rem;font-weight:600;text-decoration:none;border:none;cursor:pointer;font-family:inherit;transition:background .15s}
.action-cta:hover{background:var(--gold-light)}
.recap-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;margin-bottom:14px;color:var(--gold)}
.recap-list{display:flex;flex-direction:column;gap:7px}
.recap-item{display:flex;align-items:flex-start;gap:10px;font-size:.86rem;color:rgba(240,236,228,.85);line-height:1.55}
.recap-dot{color:var(--gold);font-size:.7rem;flex-shrink:0;margin-top:3px}
.quote-block{text-align:center;padding:32px 20px}
.quote-text{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,3vw,1.8rem);font-style:italic;line-height:1.5;color:var(--white);margin-bottom:16px;max-width:580px;margin-left:auto;margin-right:auto}
.quote-bar{width:40px;height:2px;background:var(--gold);margin:0 auto}
.nav-bar{height:60px;background:var(--surface);border-top:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;gap:8px;position:fixed;bottom:0;left:var(--sidebar);right:0;z-index:50}
.nav-info{font-size:.75rem;color:var(--muted);flex:1;text-align:center}
.nav-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.nav-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn-nav{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:7px;font-size:.82rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;border:0.5px solid var(--border);background:var(--faint);color:var(--white)}
.btn-nav:hover{border-color:rgba(255,255,255,.3)}
.btn-nav:disabled{opacity:.3;cursor:not-allowed}
.btn-nav.primary{background:var(--site-gold);border-color:var(--site-gold);color:#fff}
.btn-nav.primary:hover{background:var(--site-gold-light)}
.btn-nav.done-btn{background:rgba(78,203,113,.12);border-color:rgba(78,203,113,.3);color:var(--green)}
/* Bouton hamburger */
.btn-menu{display:flex;flex-direction:column;justify-content:center;gap:4px;padding:8px 10px;border-radius:7px;border:0.5px solid var(--border);background:var(--faint);cursor:pointer;transition:all .15s}
.btn-menu:hover{border-color:rgba(255,255,255,.3)}
.btn-menu.active{border-color:var(--gold)}
.btn-menu span{display:block;width:16px;height:1.5px;background:var(--muted);border-radius:2px;transition:background .15s}
.btn-menu.active span{background:var(--gold)}
/* Bouton Play/Pause */
.btn-play{width:38px;height:38px;border-radius:50%;background:var(--site-gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;animation:pulse 2.5s infinite}
.btn-play:hover{background:var(--site-gold-light);transform:scale(1.08)}
.btn-play svg{fill:#fff}
.btn-play.playing{animation:none;background:var(--gold)}
#btnVoix.active{background:rgba(22,163,74,.15);border-color:var(--gold);color:var(--gold)}
.subtitles{position:fixed;bottom:130px;left:calc(var(--sidebar) + (100% - var(--sidebar)) / 2);transform:translateX(-50%);z-index:100;max-width:700px;width:90%;text-align:center;pointer-events:none}
.subtitles-text{display:inline-block;background:rgba(0,0,0,.75);color:#fff;font-size:.92rem;line-height:1.6;padding:8px 18px;border-radius:8px;backdrop-filter:blur(4px);transition:opacity .3s}
.subtitles-text.hidden{opacity:0}
.cta-fixed{position:fixed;bottom:72px;left:calc(var(--sidebar) + (100% - var(--sidebar)) / 2);transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:8px;background:var(--gold);color:#fff;padding:11px 28px;border-radius:30px;font-size:.85rem;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(27,94,32,.4);transition:background .15s,transform .15s;white-space:nowrap}
.cta-fixed:hover{background:var(--gold-light);transform:translateX(-50%) translateY(-2px)}

/* Play/pause dans la nav bar */
@keyframes pulse{0%,100%{box-shadow:0 0 0 6px rgba(22,163,74,.2)}50%{box-shadow:0 0 0 10px rgba(22,163,74,.06)}}

/* Panneau leçons */
.lessons-panel{position:fixed;bottom:0;left:0;width:320px;background:var(--surface);border-top:0.5px solid var(--border);border-right:0.5px solid var(--border);border-radius:0 12px 0 0;z-index:300;transform:translateY(100%);transition:transform .3s;max-height:70vh;display:flex;flex-direction:column}
.lessons-panel.open{transform:translateY(0)}
.lp-head{padding:14px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.lp-head-title{font-size:.8rem;font-weight:600;color:var(--white)}
.lp-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:2px 6px}
.lp-scroll{overflow-y:auto;flex:1;padding:8px}
.lp-lesson{margin-bottom:4px}
.lp-lesson-btn{width:100%;display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:6px;cursor:pointer;background:none;border:none;font-family:inherit;color:var(--white);text-align:left;transition:background .1s}
.lp-lesson-btn:hover{background:var(--faint)}
.lp-lesson-btn.active{color:var(--gold)}
.lp-lesson-num{font-size:.65rem;color:var(--muted);width:16px;flex-shrink:0}
.lp-lesson-name{font-size:.78rem;flex:1}
.lp-lesson-check{font-size:.68rem;color:var(--green);opacity:0}
.lp-lesson-btn.done .lp-lesson-check{opacity:1}
.lp-slides{padding:0 0 0 34px;display:none}
.lp-lesson.open .lp-slides{display:flex;flex-wrap:wrap;gap:4px;padding-bottom:6px}
.lp-slide-btn{font-size:.68rem;padding:3px 10px;border-radius:4px;border:0.5px solid var(--border);background:var(--faint);color:var(--muted);cursor:pointer;font-family:inherit;transition:all .1s}
.lp-slide-btn:hover{border-color:var(--gold);color:var(--gold)}
.lp-slide-btn.active{background:rgba(22,163,74,.2);border-color:var(--gold);color:var(--gold)}


/* ═══ SHOPIFY SLIDES ═══ */
.shopify-slide{width:100%;display:flex;flex-direction:column;gap:16px}

/* Tag & titre */
.sp-slide-tag{display:inline-flex;align-items:center;gap:6px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);background:rgba(22,163,74,.08);border:0.5px solid rgba(22,163,74,.22);padding:4px 12px;border-radius:20px;margin-bottom:2px;width:fit-content}
.sp-slide-title{font-size:1.05rem;font-weight:700;color:var(--white);font-family:'Cormorant Garamond',Georgia,serif;letter-spacing:.01em}

/* Conteneur 16:9 */
.sp-dash-wrap{position:relative;width:100%;border-radius:10px;overflow:hidden;border:0.5px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.4)}
.sp-dash-inner{position:relative;width:1000px;height:562.5px;transform-origin:top left;overflow:hidden}

/* Explication */
.sp-expl{background:rgba(240,236,228,.03);border:0.5px solid var(--border);border-radius:10px;padding:18px 20px;display:flex;flex-direction:column;gap:12px}
.sp-expl-summary{font-size:.88rem;font-weight:600;color:var(--white);line-height:1.55;padding-bottom:10px;border-bottom:0.5px solid var(--border)}
.sp-expl-steps{display:flex;flex-direction:column;gap:8px}
.sp-expl-step{display:flex;align-items:flex-start;gap:10px}
.sp-expl-step-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:7px}
.sp-expl-step-txt{font-size:.82rem;line-height:1.65;color:rgba(240,236,228,.72)}
.sp-expl-step-txt strong{color:var(--white);font-weight:600}

/* Responsive scale */
@media(max-width:600px){
  .sp-dash-wrap{border-radius:8px}
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px}

/* Animations slides */
@keyframes fadeSlideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeSlideInLeft{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
.slide-enter{animation:fadeSlideIn .28s cubic-bezier(.22,1,.36,1)}
.slide-enter-back{animation:fadeSlideInLeft .28s cubic-bezier(.22,1,.36,1)}

/* Concept enrichi */
.concept-card{background:var(--faint);border:0.5px solid var(--border);border-radius:12px;padding:22px 24px;margin-bottom:12px}
.concept-highlight{background:linear-gradient(135deg,rgba(var(--gold-rgb),.12),transparent);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:12px 16px;margin:14px 0;font-size:.9rem;line-height:1.7;color:var(--white)}
.key-point{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:0.5px solid var(--border)}
.key-point:last-child{border-bottom:none}
.key-point-icon{font-size:1.3rem;flex-shrink:0;margin-top:2px}
.key-point-text{font-size:.87rem;color:rgba(240,236,228,.85);line-height:1.6}
.slide-eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.slide-eyebrow-icon{font-size:1.8rem}
.slide-eyebrow-tag{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--gold)}
@media(max-width:600px){
  .sidebar{display:none}
  .nav-bar{left:0}
  .slide-area{padding:20px}
  .compare-grid{grid-template-columns:1fr}
  .h-title{display:none}
  .cta-fixed{left:50%}
  .subtitles{left:50%}
}

/* ═══ SHOPIFY DASHBOARD CSS ═══ */

:root{
  --sbw-bg:#0C0C0A;
  --sbw-gold:#A67C3A;
  --sbw-gl:#C9A05A;
  --sbw-white:#F0ECE4;
  --sbw-muted:#5A564E;
  --sbw-dim:#1C1A16;
  --sbw-line:rgba(166,124,58,.18);
  --sp:#008060;
  --sp-dk:#004c3f;
  --sp-lt:#e3f1ed;
  --sp-bar:#1a1a1a;
  --sp-side:#ffffff;
  --sp-side-b:#e1e3e5;
  --sp-nav:#202223;
  --sp-nav2:#6d7175;
  --sp-act-bg:rgba(93,93,234,.09);
  --sp-act-txt:#2c6ecb;
  --sp-bg:#f1f2f4;
  --sp-card:#ffffff;
  --sp-bd:#e1e3e5;
  --sp-txt:#202223;
  --sp-txt2:#6d7175;
  --sp-blue:#2c6ecb;
  --cel-dk:#1C1A14;
  --cel-gold:#C9A96E;
  --cel-cream:#F5F0E8;
  --cel-mid:#2E2A20;
  --bg:#0C0C0A;
  --gold:#A67C3A;
  --gl:#C9A05A;
  --white:#F0ECE4;
  --muted:#5A564E;
  --dim:#1C1A16;
  --line:rgba(166,124,58,.18);
  --red:#d82c0d;
  --orange:#b98900;
}
*{box-sizing:border-box;margin:0;padding:0}

html,body{height:100%;overflow:hidden;background:#080806;font-family:'DM Sans',sans-serif}

/* ══ LANDING ══ */
#land{position:fixed;inset:0;background:var(--sbw-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .6s;padding:20px}
#land.out{opacity:0;pointer-events:none}
.l-section{font-family:'Cormorant Garamond',serif;font-size:11px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:var(--sbw-gold);opacity:.65;margin-bottom:6px}
.l-formation{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--sbw-muted);margin-bottom:16px}
.l-num{font-family:'Cormorant Garamond',serif;font-size:clamp(80px,14vw,140px);font-weight:700;line-height:1;color:rgba(166,124,58,.07);position:absolute;pointer-events:none}
.l-title{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,4.2vw,50px);font-weight:700;color:var(--sbw-white);text-align:center;line-height:1.08;margin-bottom:10px;position:relative;z-index:1}
.l-title em{color:#95bf47;font-style:normal}
.l-sub{font-size:12px;color:var(--sbw-muted);text-align:center;max-width:400px;line-height:1.7;margin-bottom:22px;position:relative;z-index:1}
.l-pills{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;justify-content:center}
.l-pill{background:rgba(22,163,74,.08);border:1px solid rgba(166,124,58,.22);border-radius:20px;padding:4px 12px;font-size:9px;color:var(--sbw-gl);letter-spacing:.06em}
.l-actions{display:flex;gap:10px;align-items:center;position:relative;z-index:1;flex-wrap:wrap;justify-content:center}
.l-btn{padding:13px 36px;background:var(--sp);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:0 0 36px rgba(0,128,96,.22)}
.l-btn:hover{background:var(--sp-dk);transform:translateY(-2px)}

.sl.on .fi{opacity:1;transition:opacity .52s ease}.sl.on .fb{opacity:1;transform:none}
.sl.on .fs{opacity:1;transform:none}.sl.on .fl{opacity:1;transform:none}.sl.on .fr{opacity:1;transform:none}
.d1{transition-delay:.1s!important}.d2{transition-delay:.24s!important}.d3{transition-delay:.38s!important}

.tb-v{padding:3px 10px;background:rgba(0,128,96,.09);border:1px solid rgba(0,128,96,.28);border-radius:14px;color:#4ECBA0;font-size:9px;cursor:pointer;font-family:'DM Sans',sans-serif}
.view{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;background:#080806;overflow:hidden}
.stage{position:relative;width:100%;max-width:calc((100vh - 104px)*16/9);aspect-ratio:16/9;background:var(--sbw-bg);border-radius:10px;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.9)}
.pbar{position:absolute;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--cel-gold),#E8C882);z-index:50;transition:width .1s linear}
.slides{position:absolute;inset:0}
.sl{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .42s ease}
.sl.on{opacity:1;pointer-events:all}
.aff-float{position:absolute;bottom:43px;left:50%;transform:translateX(-50%);background:var(--sp);color:#fff;border:none;border-radius:8px;padding:7px 20px;font-size:11px;font-weight:700;cursor:pointer;z-index:40;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:7px;text-decoration:none;letter-spacing:.05em;text-transform:uppercase;box-shadow:0 3px 16px rgba(0,128,96,.5);transition:all .2s;white-space:nowrap}
.aff-float:hover{background:var(--sp-dk);transform:translateX(-50%) translateY(-2px)}
.cap-wrap{position:absolute;bottom:0;left:0;right:0;z-index:30}
.cap{font-size:12px;font-weight:500;color:#fff;line-height:1.5;width:100%;text-align:center;background:rgba(0,0,0,.72);padding:7px 18px;min-height:36px;transition:opacity .3s}
.cap.off{opacity:0}
.ctrls{height:44px;background:#0A0A08;border-top:1px solid var(--sbw-line);display:flex;align-items:center;padding:0 12px;gap:7px;flex-shrink:0}
.btn-c{width:30px;height:30px;border-radius:50%;background:rgba(201,169,110,.06);border:1px solid rgba(201,169,110,.2);color:var(--cel-gold);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s}
.btn-c:hover{background:rgba(201,169,110,.16)}
.btn-play{width:36px;height:36px;background:var(--sp);color:#fff;font-size:14px}
.btn-play:hover{background:var(--sp-dk)}
.c-sl{font-size:9px;color:var(--sbw-muted);min-width:28px}
.c-info{font-size:9px;color:var(--sbw-muted);flex:1;text-align:right}

/* ══ ANIMS ══ */
.fi{opacity:0}.fb{opacity:0;transform:translateY(12px)}.fs{opacity:0;transform:scale(.9)}
.fl{opacity:0;transform:translateX(-10px)}.fr{opacity:0;transform:translateX(10px)}
.sl.on .fi,.sl.on .fb,.sl.on .fs,.sl.on .fl,.sl.on .fr{transition:all .52s cubic-bezier(.34,1.3,.64,1)}
.sl.on .fi{opacity:1;transition:opacity .52s ease}.sl.on .fb{opacity:1;transform:none}
.sl.on .fs{opacity:1;transform:none}.sl.on .fl{opacity:1;transform:none}.sl.on .fr{opacity:1;transform:none}
.d1{transition-delay:.1s!important}.d2{transition-delay:.24s!important}.d3{transition-delay:.38s!important}
.d4{transition-delay:.52s!important}.d5{transition-delay:.66s!important}.d6{transition-delay:.8s!important}

/* ══ SLIDE TYPES ══ */
.ty-intro{display:flex;width:100%;height:100%}
.intro-l{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 22px 28px 38px}

.intro-r::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--sbw-bg),transparent 55%);z-index:1}
.intro-big{font-family:'Cormorant Garamond',serif;font-size:130px;font-weight:700;color:rgba(201,169,110,.07);line-height:1;position:absolute;bottom:-5px;right:2px}
.intro-emoji{font-size:clamp(52px,8vw,88px);position:relative;z-index:2;filter:drop-shadow(0 0 18px rgba(201,169,110,.3))}

.ih{font-family:'Cormorant Garamond',serif;font-size:clamp(17px,2.6vw,32px);font-weight:700;color:var(--sbw-white);line-height:1.1;margin-bottom:9px}

.ip{font-size:11px;color:#9A9690;line-height:1.7;max-width:310px}

/* ── SPLIT : Comment faire | CÉLESTE ── */
.ty-split{width:100%;height:100%;display:flex}
.split-how{flex:1;display:flex;flex-direction:column;border-right:2px solid rgba(201,169,110,.2);overflow:hidden}

.sp-chrome{height:20px;background:#2d2d2d;display:flex;align-items:center;padding:0 8px;gap:4px;flex-shrink:0}
.sp-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sp-addr{flex:1;background:#1c1c1c;border-radius:3px;height:12px;margin:0 6px;display:flex;align-items:center;padding:0 6px}

.btn-sp{background:var(--sp);color:#fff;border:none;border-radius:5px;padding:4px 9px;font-size:9.5px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer}

.btn-sp.dark{background:#1a1a1a;color:#fff;border:none}
.sp-main{flex:1;padding:8px 10px;overflow:hidden;display:flex;flex-direction:column;gap:6px}
.card{background:#fff;border:1px solid var(--sp-bd);border-radius:6px;padding:8px 10px}
.card-h{font-size:10.5px;font-weight:700;color:var(--sp-txt);margin-bottom:7px;font-family:'DM Sans',sans-serif}
.row{display:flex;gap:7px}
.col{flex:1}
.field{margin-bottom:6px}
.lbl{display:block;font-size:9px;font-weight:600;color:var(--sp-txt2);margin-bottom:2px;font-family:'DM Sans',sans-serif}
.inp{width:100%;background:#fff;border:1px solid #babfc3;border-radius:5px;padding:5px 7px;font-size:10px;color:var(--sp-txt);font-family:'DM Sans',sans-serif;outline:none}

/* ── ÉDITEUR DE THÈME COMPACT ── */

/* CÉLESTE styles */
.cel-topbar{background:var(--cel-dk);height:6px}
.cel-nav{background:var(--cel-dk);height:28px;display:flex;align-items:center;padding:0 10px;gap:8px}

/* RÉCAP */
.ty-recap{width:100%;height:100%;display:flex}

.recap-ic{font-size:22px;margin-bottom:8px}
.recap-tg{font-size:7.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--cel-gold);margin-bottom:7px}
.recap-h{font-family:'Cormorant Garamond',serif;font-size:clamp(13px,2vw,20px);font-weight:700;color:var(--sbw-white);line-height:1.2}

.rpt-t{font-size:10.5px;color:var(--sbw-white);line-height:1.4}

/* ══ MOBILE ══ */
@media (max-width:700px){
  .menu-toggle{display:flex}
  .sbw-rail{position:fixed;left:-200px;top:0;height:100vh;z-index:100;transition:left .3s ease}
  .sbw-rail.open{left:0}
  .sb-overlay{display:block}
  .sb-overlay.hidden{display:none}
  .main-col{width:100%}
  .view{padding:5px}
  .ctrls{padding:0 8px;gap:4px;height:50px}
  .btn-c{width:38px;height:38px;font-size:13px}
  .btn-play{width:46px;height:46px;font-size:16px}
  .c-info{display:none}
  .topbar{padding:0 8px;gap:6px;height:42px}
  .tb-title{font-size:9px}
  .tb-scr{display:none}
  .cap{font-size:10px;padding:6px 10px}
  .aff-float{font-size:10px;padding:6px 14px;bottom:40px}
  .l-actions{flex-direction:column;width:90%;max-width:320px}
  .l-btn,.l-aff{width:100%;justify-content:center;text-align:center}
}
*{box-sizing:border-box;margin:0;padding:0}

html,body{height:100%;overflow:hidden;background:#080806;font-family:'DM Sans',sans-serif}

/* ── LANDING ── */
#land{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .6s;padding:20px;text-align:center}
#land.out{opacity:0;pointer-events:none}
.l-kicker{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.l-mod{font-family:'Cormorant Garamond',serif;font-size:11px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);opacity:.7;margin-bottom:14px}
.l-title{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,4.5vw,52px);font-weight:700;color:var(--white);line-height:1.08;margin-bottom:10px}
.l-title em{color:#95bf47;font-style:normal}
.l-sub{font-size:12px;color:var(--muted);max-width:440px;line-height:1.75;margin-bottom:22px}
.l-pills{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;justify-content:center}
.l-pill{background:rgba(22,163,74,.08);border:1px solid rgba(166,124,58,.22);border-radius:20px;padding:4px 13px;font-size:9px;color:var(--gl);letter-spacing:.06em}
.l-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.l-btn{padding:13px 38px;background:var(--sp);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:0 0 36px rgba(0,128,96,.24)}
.l-btn:hover{background:var(--sp-dk);transform:translateY(-2px)}
.l-aff{padding:12px 26px;background:transparent;color:var(--gl);border:1.5px solid rgba(166,124,58,.35);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
.l-aff:hover{background:rgba(22,163,74,.08)}

/* ── APP ── */
#app{display:flex;height:100vh;opacity:0;transition:opacity .6s}
#app.in{opacity:1}
.menu-toggle{display:none;width:32px;height:32px;background:rgba(166,124,58,.1);border:1px solid rgba(166,124,58,.22);border-radius:7px;color:var(--gl);font-size:15px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99}
.sbw-rail{width:188px;background:#0A0A08;border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0}
.sbw-rail-head{padding:11px 13px;border-bottom:1px solid var(--line)}
.sbw-brand{font-family:'Cormorant Garamond',serif;font-size:12px;font-weight:700;letter-spacing:.18em;color:var(--gold)}
.sbw-ctx{font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:2px;line-height:1.5}
.sbw-list{flex:1;overflow-y:auto;padding:5px}
.sbw-list::-webkit-scrollbar{width:2px}
.sbw-list::-webkit-scrollbar-thumb{background:var(--line)}
.sbw-item{padding:7px 9px;border-radius:6px;cursor:pointer;transition:all .14s;border:1px solid transparent;margin-bottom:2px}
.sbw-item:hover{background:rgba(255,255,255,.02);border-color:var(--line)}
.sbw-item.active{background:rgba(0,128,96,.09);border-color:rgba(0,128,96,.28)}
.sbw-item.done .sbw-sn::after{content:' ✓';color:#5DBE7A}
.sbw-sn{font-size:7px;color:var(--muted);letter-spacing:.1em;margin-bottom:1px}
.sbw-st{font-size:9px;color:var(--white);font-weight:500;line-height:1.3}
.sbw-item.active .sbw-st{color:#4ECBA0}
.sbw-pg{margin-top:4px;height:2px;background:var(--dim);border-radius:2px;overflow:hidden}
.sbw-pgb{height:100%;background:var(--sp);border-radius:2px;transition:width .4s}
.main-col{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:40px;background:#080806;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.tb-title{font-size:10px;color:#4ECBA0;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-scr{font-size:8px;color:var(--muted);background:rgba(0,128,96,.07);border:1px solid rgba(0,128,96,.18);padding:2px 8px;border-radius:10px}
.tb-v{padding:3px 10px;background:rgba(0,128,96,.09);border:1px solid rgba(0,128,96,.28);border-radius:14px;color:#4ECBA0;font-size:9px;cursor:pointer;font-family:'DM Sans',sans-serif}
.view{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;background:#080806;overflow:hidden}
.stage{position:relative;width:100%;max-width:calc((100vh - 104px)*16/9);aspect-ratio:16/9;background:var(--bg);border-radius:10px;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.9)}
.pbar{position:absolute;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--sp),#4ECBA0);z-index:50;transition:width .1s linear}
.slides{position:absolute;inset:0}
.sl{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .42s ease}
.sl.on{opacity:1;pointer-events:all}
.aff-float{position:absolute;bottom:43px;left:50%;transform:translateX(-50%);background:var(--sp);color:#fff;border:none;border-radius:8px;padding:7px 20px;font-size:11px;font-weight:700;cursor:pointer;z-index:40;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:7px;text-decoration:none;letter-spacing:.05em;text-transform:uppercase;box-shadow:0 3px 16px rgba(0,128,96,.5);transition:all .2s;white-space:nowrap}
.aff-float:hover{background:var(--sp-dk);transform:translateX(-50%) translateY(-2px)}
.cap-wrap{position:absolute;bottom:0;left:0;right:0;z-index:30}
.cap{font-size:12px;font-weight:500;color:#fff;line-height:1.5;width:100%;text-align:center;background:rgba(0,0,0,.75);padding:7px 18px;min-height:36px;transition:opacity .3s}
.cap.off{opacity:0}
.ctrls{height:44px;background:#0A0A08;border-top:1px solid var(--line);display:flex;align-items:center;padding:0 12px;gap:7px;flex-shrink:0}
.btn-c{width:30px;height:30px;border-radius:50%;background:rgba(0,128,96,.05);border:1px solid rgba(0,128,96,.18);color:#4ECBA0;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s}
.btn-c:hover{background:rgba(0,128,96,.16)}
.btn-play{width:36px;height:36px;background:var(--sp);color:#fff;font-size:14px}
.btn-play:hover{background:var(--sp-dk)}
.c-sl{font-size:9px;color:var(--muted);min-width:28px}
.c-info{font-size:9px;color:var(--muted);flex:1;text-align:right}

/* ── ANIMS ── */
.fi{opacity:0}.fb{opacity:0;transform:translateY(12px)}.fr{opacity:0;transform:translateX(12px)}.fl{opacity:0;transform:translateX(-12px)}
.sl.on .fi{opacity:1;transition:opacity .5s ease}
.sl.on .fb{opacity:1;transform:none;transition:all .52s cubic-bezier(.34,1.3,.64,1)}
.sl.on .fr,.sl.on .fl{opacity:1;transform:none;transition:all .5s ease}
.d1{transition-delay:.08s!important}.d2{transition-delay:.2s!important}.d3{transition-delay:.34s!important}
.d4{transition-delay:.48s!important}.d5{transition-delay:.62s!important}.d6{transition-delay:.76s!important}
.d7{transition-delay:.9s!important}.d8{transition-delay:1.04s!important}

/* ── SPLIT LAYOUT ── */
.ty-split{width:100%;height:100%;display:flex}
.split-how{flex:1;display:flex;flex-direction:column;border-right:2px solid rgba(201,169,110,.2);overflow:hidden}
.split-cel{flex:1;display:flex;flex-direction:column;background:rgba(201,169,110,.02);overflow:hidden}
.split-hd{padding:5px 11px 4px;display:flex;align-items:center;gap:6px;flex-shrink:0;border-bottom:1px solid var(--line)}
.split-hd-label{font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase}
.split-hd-how .split-hd-label{color:#5B9BD5}
.split-hd-cel .split-hd-label{color:var(--cel-gold)}
.split-hd-ic{font-size:13px}
.split-body{flex:1;overflow:hidden}

/* ── SHOPIFY ADMIN ── */
.sp-wrap{width:100%;height:100%;display:flex;flex-direction:column}
.sp-chrome{height:20px;background:#2d2d2d;display:flex;align-items:center;padding:0 8px;gap:4px;flex-shrink:0}
.sp-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sp-addr{flex:1;background:#1c1c1c;border-radius:3px;height:12px;margin:0 6px;display:flex;align-items:center;padding:0 6px}
.sp-url{font-size:7px;color:#888;font-family:'DM Sans',sans-serif}
.sp-topnav{background:#1a1a1a;height:34px;display:flex;align-items:center;padding:0 8px;gap:6px;flex-shrink:0;border-bottom:1px solid #2a2a2a}
.sp-logo-bag{width:17px;height:17px;background:#95bf47;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.sp-logo-word{font-size:10px;font-weight:600;color:#fff;font-family:'DM Sans',sans-serif}
.sp-store-nm{font-size:9.5px;color:#e0e0e0;font-family:'DM Sans',sans-serif;font-weight:500;margin-left:auto}
.sp-body{display:flex;flex:1;overflow:hidden}
.sp-sb{width:130px;background:#fff;border-right:1px solid var(--sp-bd);display:flex;flex-direction:column;flex-shrink:0}
.sp-sb-scroll{flex:1;overflow-y:auto;padding:3px 0}
.sp-sb-scroll::-webkit-scrollbar{width:0}
.sp-ni{display:flex;align-items:center;gap:6px;padding:5px 6px 5px 8px;margin:1px 4px;border-radius:5px;cursor:pointer;font-size:10px;color:var(--sp-txt);font-family:'DM Sans',sans-serif;font-weight:450;white-space:nowrap}
.sp-ni:hover{background:rgba(0,0,0,.04)}
.sp-ni.on{background:var(--sp-act-bg);color:var(--sp-blue);font-weight:600}
.sp-ni-ic{width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;opacity:.7}
.sp-ni.on .sp-ni-ic{opacity:1}
.sp-ni-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;font-size:10px}
.sp-cnt{flex:1;display:flex;flex-direction:column;background:var(--sp-bg);overflow:hidden}
.sp-page-hd{background:#fff;border-bottom:1px solid var(--sp-bd);padding:0 10px;height:34px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.sp-ph{font-size:12px;font-weight:700;color:var(--sp-txt);font-family:'DM Sans',sans-serif;flex:1}
.sp-bc{font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif}
.sp-bc a{color:var(--sp-blue);text-decoration:none}
.sp-actions{display:flex;gap:4px}
.btn-sp{background:var(--sp);color:#fff;border:none;border-radius:5px;padding:4px 9px;font-size:9.5px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer}
.btn-sp.sec{background:#fff;color:var(--sp-txt);border:1px solid var(--sp-bd)}
.btn-sp.dark{background:#1a1a1a;color:#fff;border:none}
.sp-main{flex:1;padding:8px 10px;overflow:hidden;display:flex;gap:8px}
.sp-col-main{flex:1;display:flex;flex-direction:column;gap:6px;overflow:hidden}
.sp-col-side{width:150px;flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.card{background:#fff;border:1px solid var(--sp-bd);border-radius:6px;padding:8px 10px}
.card-h{font-size:10.5px;font-weight:700;color:var(--sp-txt);margin-bottom:7px;font-family:'DM Sans',sans-serif}
.field{margin-bottom:6px}
.lbl{display:block;font-size:9px;font-weight:600;color:var(--sp-txt2);margin-bottom:2px;font-family:'DM Sans',sans-serif}
.inp{width:100%;background:#fff;border:1px solid #babfc3;border-radius:5px;padding:5px 7px;font-size:10px;color:var(--sp-txt);font-family:'DM Sans',sans-serif;outline:none}
.inp.focus{border-color:var(--sp-blue);box-shadow:0 0 0 2px rgba(44,110,203,.12)}
.textarea{width:100%;background:#fff;border:1px solid #babfc3;border-radius:5px;padding:5px 7px;font-size:9.5px;color:var(--sp-txt);font-family:'DM Sans',sans-serif;resize:none;height:60px}
.textarea.focus{border-color:var(--sp-blue)}
.inp-price{display:flex;align-items:center;background:#fff;border:1px solid #babfc3;border-radius:5px;overflow:hidden}
.inp-price-sym{padding:0 6px;font-size:10px;color:var(--sp-txt2);background:#f6f6f7;border-right:1px solid #babfc3;height:100%;display:flex;align-items:center;font-family:'DM Sans',sans-serif}
.inp-price input{border:none;outline:none;padding:5px 6px;font-size:10px;font-family:'DM Sans',sans-serif;width:100%}
.badge-sp{display:inline-flex;align-items:center;border-radius:9px;padding:1px 6px;font-size:8px;font-weight:600;font-family:'DM Sans',sans-serif}
.badge-sp.gr{background:var(--sp-lt);color:var(--sp)}
.badge-sp.ye{background:#fef3cd;color:#b98900}

/* ── INTRO ── */
.ty-intro{display:flex;width:100%;height:100%}
.intro-l{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 22px 28px 40px}
.intro-r{width:44%;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#050503}
.intro-r::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--bg),transparent 55%);z-index:1}
.intro-big-n{font-family:'Cormorant Garamond',serif;font-size:160px;font-weight:700;color:rgba(0,128,96,.06);line-height:1;position:absolute;bottom:-10px;right:-4px}
.intro-ic{font-size:clamp(56px,9vw,96px);position:relative;z-index:2;filter:drop-shadow(0 0 24px rgba(0,128,96,.3))}
.s-tag{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--sp);background:rgba(0,128,96,.1);border:1px solid rgba(0,128,96,.22);padding:3px 11px;border-radius:14px;display:inline-block;margin-bottom:11px}
.s-h{font-family:'Cormorant Garamond',serif;font-size:clamp(17px,2.7vw,33px);font-weight:700;color:var(--white);line-height:1.1;margin-bottom:10px}
.s-h em{color:#95bf47;font-style:normal}
.s-p{font-size:11px;color:#9A9690;line-height:1.75;max-width:320px}

/* ── RECAP ── */
.ty-recap{width:100%;height:100%;display:flex}
.recap-l{width:220px;display:flex;flex-direction:column;justify-content:center;padding:28px;border-right:1px solid var(--line);flex-shrink:0}
.recap-ic{font-size:24px;margin-bottom:9px}
.recap-tg{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--sp);margin-bottom:8px}
.recap-h{font-family:'Cormorant Garamond',serif;font-size:clamp(14px,2vw,22px);font-weight:700;color:var(--white);line-height:1.2}
.recap-r{flex:1;display:flex;flex-direction:column;justify-content:center;padding:26px;gap:7px}
.rpt{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;border-radius:6px;background:rgba(0,128,96,.05);border-left:2px solid var(--sp)}
.rpt-e{font-size:13px;flex-shrink:0;margin-top:1px}
.rpt-t{font-size:10.5px;color:var(--white);line-height:1.45}

/* ── MOBILE ── */
@media(max-width:700px){
  .menu-toggle{display:flex}
  .sbw-rail{position:fixed;left:-200px;top:0;height:100vh;z-index:100;transition:left .3s ease}
  .sbw-rail.open{left:0}
  .sb-overlay{display:block}.sb-overlay.hidden{display:none}
  .main-col{width:100%}
  .topbar{padding:0 8px;gap:6px;height:42px}
  .tb-scr{display:none}.c-info{display:none}
  .view{padding:4px;align-items:stretch;overflow:hidden}
  .stage{max-width:100%!important;aspect-ratio:unset!important;height:100%;border-radius:8px;overflow:hidden}
  .slides{position:absolute;inset:0;overflow:hidden}
  .sl{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
  .ty-split{flex-direction:column;height:auto;min-height:100%}
  .split-how,.split-cel{flex:none;min-height:300px}
  .split-how{border-right:none;border-bottom:2px solid rgba(201,169,110,.2)}
  .split-body{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:none;height:auto;min-height:280px;max-height:50vh}
  .ty-intro{flex-direction:column;height:auto;min-height:100%}
  .intro-r{width:100%;height:110px;flex-shrink:0}
  .intro-l{padding:16px 16px 100px}
  .s-h{font-size:clamp(18px,5vw,26px)}
  .s-p{font-size:11px;max-width:100%}
  .ty-recap{flex-direction:column;height:auto;min-height:100%}
  .recap-l{width:100%;padding:16px 18px 12px;border-right:none;border-bottom:1px solid var(--line)}
  .recap-r{padding:14px 18px 120px;gap:5px}
  .rpt{padding:7px 9px}.rpt-t{font-size:10px}
  .cap-wrap{position:sticky;bottom:0;z-index:30}
  .cap{font-size:11px;padding:7px 12px}
  .ctrls{padding:0 8px;gap:5px;height:52px}
  .btn-c{width:40px;height:40px;font-size:14px}
  .btn-play{width:48px;height:48px;font-size:16px}
  .c-sl{font-size:10px;min-width:32px}
  .aff-float{font-size:10px;padding:6px 14px;bottom:40px}
  .sp-col-side{width:120px}
  .sp-sb{width:100px}
  .l-title{font-size:clamp(22px,7vw,38px)}
  .l-sub{font-size:11px;max-width:92vw}
  .l-actions{flex-direction:column;width:90%;max-width:320px}
  .l-btn,.l-aff{width:100%;justify-content:center;text-align:center}
  .l-pills{gap:6px}
}
@media(max-width:380px){
  .btn-c{width:36px;height:36px}.btn-play{width:42px;height:42px}
  .intro-l{padding:12px 12px 95px}
  .recap-r{padding:12px 14px 115px}
}

/* Shopify admin */
.sp-wrap{width:100%;height:100%;display:flex;flex-direction:column}

.sp-body{display:flex;flex:1;overflow:hidden}

.btn-sp.dk{background:#1a1a1a;color:#fff;border:none}
.sp-main{flex:1;padding:7px 9px;overflow:hidden;display:flex;gap:7px}
.sp-cm{flex:1;display:flex;flex-direction:column;gap:5px;overflow:hidden}
.sp-cs{width:140px;flex-shrink:0;display:flex;flex-direction:column;gap:5px}
.card{background:#fff;border:1px solid var(--sp-bd);border-radius:5px;padding:7px 9px}
.card-h{font-size:10px;font-weight:700;color:var(--sp-txt);margin-bottom:6px;font-family:'DM Sans',sans-serif}
.lbl{display:block;font-size:8.5px;font-weight:600;color:var(--sp-txt2);margin-bottom:2px;font-family:'DM Sans',sans-serif}

.ta{width:100%;background:#fff;border:1px solid #babfc3;border-radius:4px;padding:4px 6px;font-size:9px;color:var(--sp-txt);font-family:'DM Sans',sans-serif;resize:none;height:45px}
.field{margin-bottom:5px}
/* Intro / Recap */
.ty-intro{display:flex;width:100%;height:100%}
.intro-l{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 22px 28px 40px}
.intro-r{width:44%;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#050503}
.intro-r::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--bg),transparent 55%);z-index:1}
.intro-big-n{font-family:'Cormorant Garamond',serif;font-size:160px;font-weight:700;color:rgba(0,128,96,.06);line-height:1;position:absolute;bottom:-10px;right:-4px}
.intro-ic{font-size:clamp(56px,9vw,96px);position:relative;z-index:2;filter:drop-shadow(0 0 24px rgba(0,128,96,.3))}
.s-tag{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--sp);background:rgba(0,128,96,.1);border:1px solid rgba(0,128,96,.22);padding:3px 11px;border-radius:14px;display:inline-block;margin-bottom:11px}
.s-h{font-family:'Cormorant Garamond',serif;font-size:clamp(17px,2.7vw,33px);font-weight:700;color:var(--white);line-height:1.1;margin-bottom:10px}
.s-h em{color:#95bf47;font-style:normal}
.s-p{font-size:11px;color:#9A9690;line-height:1.75;max-width:320px}
.ty-recap{width:100%;height:100%;display:flex}
.recap-l{width:220px;display:flex;flex-direction:column;justify-content:center;padding:28px;border-right:1px solid var(--line);flex-shrink:0}
.recap-ic{font-size:24px;margin-bottom:9px}
.recap-tg{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--sp);margin-bottom:8px}
.recap-h{font-family:'Cormorant Garamond',serif;font-size:clamp(14px,2vw,22px);font-weight:700;color:var(--white);line-height:1.2}
.recap-r{flex:1;display:flex;flex-direction:column;justify-content:center;padding:26px;gap:7px}
.rpt{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;border-radius:6px;background:rgba(0,128,96,.05);border-left:2px solid var(--sp)}
.rpt-e{font-size:13px;flex-shrink:0;margin-top:1px}
.rpt-t{font-size:10.5px;color:var(--white);line-height:1.45}
/* Mobile */
@media(max-width:700px){
  .menu-toggle{display:flex}
  .sbw-rail{position:fixed;left:-200px;top:0;height:100vh;z-index:100;transition:left .3s ease}
  .sbw-rail.open{left:0}
  .sb-overlay{display:block}.sb-overlay.hidden{display:none}
  .main-col{width:100%}
  .topbar{padding:0 8px;gap:6px;height:42px}
  .tb-scr{display:none}.c-info{display:none}
  .view{padding:4px;align-items:stretch;overflow:hidden}
  .stage{max-width:100%!important;aspect-ratio:unset!important;height:100%;border-radius:8px;overflow:hidden}
  .slides{position:absolute;inset:0;overflow:hidden}
  .sl{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
  .ty-split{flex-direction:column;height:auto;min-height:100%}
  .split-how,.split-cel{flex:none}
  .split-how{border-right:none;border-bottom:2px solid rgba(201,169,110,.2)}
  .split-body{flex:none;height:auto;max-height:50vh;overflow-y:auto}
  .ty-intro{flex-direction:column;height:auto;min-height:100%}
  .intro-r{width:100%;height:110px;flex-shrink:0}
  .intro-l{padding:16px 16px 100px}
  .s-h{font-size:clamp(18px,5vw,26px)}
  .ty-recap{flex-direction:column;height:auto;min-height:100%}
  .recap-l{width:100%;padding:16px 18px 12px;border-right:none;border-bottom:1px solid var(--line)}
  .recap-r{padding:14px 18px 120px;gap:5px}
  .rpt{padding:7px 9px}.rpt-t{font-size:10px}
  .cap-wrap{position:sticky;bottom:0;z-index:30}
  .cap{font-size:11px;padding:7px 12px}
  .ctrls{padding:0 8px;gap:5px;height:52px}
  .btn-c{width:40px;height:40px;font-size:14px}
  .btn-play{width:48px;height:48px;font-size:16px}
  .c-sl{font-size:10px;min-width:32px}
  .aff-float{font-size:10px;padding:6px 14px;bottom:40px}
  .sp-cs{width:110px}
  .sp-sb{width:90px}
  .l-title{font-size:clamp(22px,7vw,38px)}
  .l-sub{font-size:11px;max-width:92vw}
  .l-actions{flex-direction:column;width:90%;max-width:320px}
  .l-btn,.l-aff{width:100%;justify-content:center;text-align:center}
  .l-pills{gap:6px}
}
@media(max-width:380px){
  .btn-c{width:36px;height:36px}.btn-play{width:42px;height:42px}
  .intro-l{padding:12px 12px 95px}
  .recap-r{padding:12px 14px 115px}
}
*{box-sizing:border-box;margin:0;padding:0}

html,body{height:100%;overflow:hidden;background:#080806;font-family:'DM Sans',sans-serif}
#land{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .6s;padding:20px;text-align:center}
#land.out{opacity:0;pointer-events:none}
.l-kicker{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.l-mod{font-family:'Cormorant Garamond',serif;font-size:11px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);opacity:.7;margin-bottom:14px}
.l-title{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,4.5vw,52px);font-weight:700;color:var(--white);line-height:1.08;margin-bottom:10px}
.l-title em{color:#95bf47;font-style:normal}

.l-btn{padding:13px 38px;background:var(--sp);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:0 0 36px rgba(0,128,96,.24)}
.l-btn:hover{background:var(--sp-dk);transform:translateY(-2px)}
.l-aff{padding:12px 26px;background:transparent;color:var(--gl);border:1.5px solid rgba(166,124,58,.35);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:7px}

.sp-ni.on{background:var(--sp-act-bg);color:var(--sp-blue);font-weight:600}

.sp-hd{background:#fff;border-bottom:1px solid var(--sp-bd);padding:0 9px;height:30px;display:flex;align-items:center;gap:5px;flex-shrink:0}
.sp-ph{font-size:11px;font-weight:700;color:var(--sp-txt);font-family:'DM Sans',sans-serif;flex:1}

.sp-main{flex:1;padding:7px 9px;overflow:hidden;display:flex;gap:7px}

.nav-drag{color:#babfc3;font-size:10px;cursor:move}
.nav-lbl{font-size:10px;font-weight:600;color:var(--sp-txt);font-family:'DM Sans',sans-serif;flex:1}
.nav-type{font-size:8px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif}

.intro-r{width:44%;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#050503}

.intro-big-n{font-family:'Cormorant Garamond',serif;font-size:160px;font-weight:700;color:rgba(0,128,96,.06);line-height:1;position:absolute;bottom:-10px;right:-4px}
.intro-ic{font-size:clamp(56px,9vw,96px);position:relative;z-index:2;filter:drop-shadow(0 0 24px rgba(0,128,96,.3))}

.s-h{font-family:'Cormorant Garamond',serif;font-size:clamp(17px,2.7vw,33px);font-weight:700;color:var(--white);line-height:1.1;margin-bottom:10px}
.s-h em{color:#95bf47;font-style:normal}
.s-p{font-size:11px;color:#9A9690;line-height:1.75;max-width:320px}
.ty-recap{width:100%;height:100%;display:flex}
.recap-l{width:220px;display:flex;flex-direction:column;justify-content:center;padding:28px;border-right:1px solid var(--line);flex-shrink:0}
.recap-ic{font-size:24px;margin-bottom:9px}
.recap-tg{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--sp);margin-bottom:8px}
.recap-h{font-family:'Cormorant Garamond',serif;font-size:clamp(14px,2vw,22px);font-weight:700;color:var(--white);line-height:1.2}
.recap-r{flex:1;display:flex;flex-direction:column;justify-content:center;padding:26px;gap:7px}
.rpt{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;border-radius:6px;background:rgba(0,128,96,.05);border-left:2px solid var(--sp)}
.rpt-e{font-size:13px;flex-shrink:0;margin-top:1px}
.rpt-t{font-size:10.5px;color:var(--white);line-height:1.45}
@media(max-width:700px){
  .menu-toggle{display:flex}
  .sbw-rail{position:fixed;left:-200px;top:0;height:100vh;z-index:100;transition:left .3s ease}
  .sbw-rail.open{left:0}
  .sb-overlay{display:block}.sb-overlay.hidden{display:none}
  .main-col{width:100%}
  .topbar{padding:0 8px;gap:6px;height:42px}
  .tb-scr{display:none}.c-info{display:none}
  .view{padding:4px;align-items:stretch;overflow:hidden}
  .stage{max-width:100%!important;aspect-ratio:unset!important;height:100%;border-radius:8px;overflow:hidden}
  .slides{position:absolute;inset:0;overflow:hidden}
  .sl{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
  .ty-split{flex-direction:column;height:auto;min-height:100%}
  .split-how,.split-cel{flex:none}
  .split-how{border-right:none;border-bottom:2px solid rgba(201,169,110,.2)}
  .split-body{flex:none;height:auto;max-height:50vh;overflow-y:auto}
  .ty-intro{flex-direction:column;height:auto;min-height:100%}
  .intro-r{width:100%;height:110px;flex-shrink:0}
  .intro-l{padding:16px 16px 100px}
  .ty-recap{flex-direction:column;height:auto;min-height:100%}
  .recap-l{width:100%;padding:16px 18px 12px;border-right:none;border-bottom:1px solid var(--line)}
  .recap-r{padding:14px 18px 120px;gap:5px}
  .rpt{padding:7px 9px}.rpt-t{font-size:10px}
  .cap-wrap{position:sticky;bottom:0;z-index:30}
  .ctrls{padding:0 8px;gap:5px;height:52px}
  .btn-c{width:40px;height:40px;font-size:14px}
  .btn-play{width:48px;height:48px;font-size:16px}
  .c-sl{font-size:10px;min-width:32px}
  .aff-float{font-size:10px;padding:6px 14px;bottom:40px}
  .l-title{font-size:clamp(22px,7vw,38px)}
  .l-actions{flex-direction:column;width:90%;max-width:320px}
  .l-btn,.l-aff{width:100%;justify-content:center;text-align:center}
}
@media(max-width:380px){
  .btn-c{width:36px;height:36px}.btn-play{width:42px;height:42px}
  .intro-l{padding:12px 12px 95px}
  .recap-r{padding:12px 14px 115px}
}

.cap{font-size:12px;font-weight:500;color:#fff;line-height:1.5;width:100%;text-align:center;background:rgba(0,0,0,.75);padding:7px 18px;min-height:36px;transition:opacity .3s}

.ctrls{height:44px;background:#0A0A08;border-top:1px solid var(--line);display:flex;align-items:center;padding:0 12px;gap:7px;flex-shrink:0}

.btn-play{width:36px;height:36px;background:var(--sp);color:#fff;font-size:14px}
.c-sl{font-size:9px;color:var(--muted);min-width:28px}

.fi{opacity:0}.fb{opacity:0;transform:translateY(12px)}.fr{opacity:0;transform:translateX(12px)}
.sl.on .fi{opacity:1;transition:opacity .5s ease}
.sl.on .fb{opacity:1;transform:none;transition:all .52s cubic-bezier(.34,1.3,.64,1)}
.sl.on .fr{opacity:1;transform:none;transition:all .5s ease}
.d1{transition-delay:.08s!important}.d2{transition-delay:.2s!important}.d3{transition-delay:.34s!important}
.d4{transition-delay:.48s!important}.d5{transition-delay:.62s!important}.d6{transition-delay:.76s!important}
.ty-split{width:100%;height:100%;display:flex}
.split-l{flex:1;display:flex;flex-direction:column;border-right:2px solid rgba(201,169,110,.2);overflow:hidden}
.split-r{flex:1;display:flex;flex-direction:column;background:rgba(201,169,110,.02);overflow:hidden}

.split-hd-l .split-hd-label{color:#5B9BD5}
.split-hd-r .split-hd-label{color:var(--cel-gold)}
.split-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px}
.dk{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;margin-bottom:8px}

.dk.blue{border-color:var(--sp-blue);background:rgba(44,110,203,.07)}
.dk.gold{border-color:rgba(201,169,110,.35);background:rgba(201,169,110,.06)}
.dk.kl{border-color:rgba(31,31,212,.4);background:rgba(31,31,212,.07)}
.dk-h{font-size:10px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif;margin-bottom:6px}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.stat-l{font-size:9px;color:#B0ACA6;font-family:'DM Sans',sans-serif}
.stat-v{font-size:9.5px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif}
.stat-v.g{color:#4ECBA0}.stat-v.y{color:#D4A820}
/* Flow card */
.flow{border-radius:8px;padding:10px 12px;margin-bottom:7px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03)}
.flow.on{border-color:var(--sp);background:rgba(0,128,96,.07)}
.flow-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.flow-ic{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.flow-name{font-size:10.5px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif;flex:1}
.flow-stat{font-size:8px;font-weight:700;font-family:'DM Sans',sans-serif}
.flow-desc{font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.5}
.flow-steps{display:flex;gap:4px;margin-top:6px;align-items:center;flex-wrap:wrap}
.fstep{font-size:8px;padding:2px 8px;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:600}
/* Email preview */
.email-prev{background:var(--cel-dk);border-radius:8px;overflow:hidden;border:1px solid rgba(201,169,110,.2)}
.ep-head{background:rgba(201,169,110,.08);padding:8px 12px;border-bottom:1px solid rgba(201,169,110,.15)}

.ep-body{padding:10px 12px}

.ep-h{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:700;color:var(--white);margin-bottom:6px;line-height:1.2}
.ep-p{font-size:9px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.6;margin-bottom:8px}
.ep-btn{display:inline-block;background:var(--cel-gold);color:var(--cel-dk);font-size:9px;font-weight:700;padding:7px 16px;border-radius:5px;font-family:'DM Sans',sans-serif;letter-spacing:.06em}

.intro-big-n{font-family:'Cormorant Garamond',serif;font-size:160px;font-weight:700;color:rgba(0,128,96,.06);line-height:1;position:absolute;bottom:-10px;right:-4px}
.intro-ic{font-size:clamp(56px,9vw,96px);position:relative;z-index:2}

.s-h em{color:#95bf47;font-style:normal}
.s-p{font-size:11px;color:#9A9690;line-height:1.75;max-width:320px}
.ty-recap{width:100%;height:100%;display:flex}

.recap-tg{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--sp);margin-bottom:8px}
.recap-h{font-family:'Cormorant Garamond',serif;font-size:clamp(14px,2vw,22px);font-weight:700;color:var(--white);line-height:1.2}
.recap-r{flex:1;display:flex;flex-direction:column;justify-content:center;padding:26px;gap:7px}
.rpt{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;border-radius:6px;background:rgba(0,128,96,.05);border-left:2px solid var(--sp)}
.rpt-e{font-size:13px;flex-shrink:0;margin-top:1px}
.rpt-t{font-size:10.5px;color:var(--white);line-height:1.45}
@media(max-width:700px){

  .intro-r{width:100%;height:110px;flex-shrink:0}

  .recap-l{width:100%;padding:16px 18px 12px;border-right:none;border-bottom:1px solid var(--line)}
  .recap-r{padding:14px 18px 120px;gap:5px}
  .rpt{padding:7px 9px}.rpt-t{font-size:10px}
  .cap-wrap{position:sticky;bottom:0;z-index:30}
  .ctrls{padding:0 8px;gap:5px;height:52px}
  .btn-c{width:40px;height:40px;font-size:14px}

  .c-sl{font-size:10px;min-width:32px}
  .aff-float{font-size:10px;padding:6px 14px;bottom:40px}
  .l-title{font-size:clamp(22px,7vw,38px)}

  .l-btn,.l-aff{width:100%;justify-content:center;text-align:center}
}

{t:'shopify',title:"L'offre Shopify \u2014 Ce qu'il faut savoir",vo:"Avant de te montrer les \u00e9tapes d'inscription, voil\u00e0 l'offre Shopify en d\u00e9tail. C'est gratuit pendant trois jours. Tu explores la plateforme, tu commences \u00e0 configurer. Apr\u00e8s ces trois jours, tu passes \u00e0 un euro par mois pendant trois mois. Amplement le temps de tout mettre en place et lancer ta boutique. Ensuite, vingt-neuf euros par mois pour le plan Basic. Sans engagement. Maintenant clique sur le bouton vert pour cr\u00e9er ton compte Shopify et suis les prochaines le\u00e7ons en m\u00eame temps.",html:"<div class=\"sp-wrap\">\n    <div class=\"sp-label\">\ud83d\udccd LE\u00c7ON 1.1 \u2014 shopify.com \u00b7 Clique sur le bouton vert pour cr\u00e9er ton compte</div>\n\n    <div class=\"sp-win\">\n      <div class=\"sp-chrome\">\n        <div class=\"sp-dot\" style=\"background:#ff5f57\"></div>\n        <div class=\"sp-dot\" style=\"background:#febc2e\"></div>\n        <div class=\"sp-dot\" style=\"background:#28c840\"></div>\n        <div class=\"sp-addr\"><span class=\"sp-url\">shopify.com/fr</span></div>\n      </div>\n      <div style=\"width:100%;flex:1;overflow:hidden;display:flex;flex-direction:column\">\n    <div style=\"flex:1;display:flex;gap:0;font-family:'DM Sans',sans-serif;background:#f6f6f7\">\n      <!-- Gauche : explication de l'offre -->\n      <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 28px\">\n        <div style=\"font-size:11px;font-weight:700;color:var(--sp);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px\">Ce que tu dois savoir avant de t'inscrire</div>\n        <div style=\"font-size:22px;font-weight:800;color:#1a1a1a;line-height:1.2;margin-bottom:16px\">Shopify est gratuit<br>pendant 3 jours \ud83c\udf89</div>\n        <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:18px\">\n          \n            <div style=\"display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:#fff;border:1px solid #e1e3e5;border-radius:8px\">\n              <span style=\"font-size:16px;flex-shrink:0\">\ud83c\udf81</span>\n              <div><div style=\"font-size:11px;font-weight:700;color:#1a1a1a\">3 jours gratuits</div><div style=\"font-size:10px;color:#6d7175;margin-top:1px\">Tu explores toute la plateforme sans rien payer pendant 3 jours.</div></div>\n            </div>\n            <div style=\"display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:#fff;border:1px solid #e1e3e5;border-radius:8px\">\n              <span style=\"font-size:16px;flex-shrink:0\">\ud83d\udcb0</span>\n              <div><div style=\"font-size:11px;font-weight:700;color:#1a1a1a\">1 \u20ac/mois pendant 3 mois</div><div style=\"font-size:10px;color:#6d7175;margin-top:1px\">Apr\u00e8s les 3 jours, 1\u20ac/mois seulement. Largement de quoi tout configurer.</div></div>\n            </div>\n            <div style=\"display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:#fff;border:1px solid #e1e3e5;border-radius:8px\">\n              <span style=\"font-size:16px;flex-shrink:0\">\ud83d\udcc5</span>\n              <div><div style=\"font-size:11px;font-weight:700;color:#1a1a1a\">Puis 29 \u20ac/mois</div><div style=\"font-size:10px;color:#6d7175;margin-top:1px\">Le plan Basic. Tout ce qu'il faut pour vendre en ligne. Annulable \u00e0 tout moment.</div></div>\n            </div>\n        </div>\n      </div>\n      <!-- Droite : gros bouton CTA -->\n      <div style=\"width:250px;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px 18px;gap:12px;flex-shrink:0;border-left:1px solid #2a2a2a\">\n        <div style=\"font-size:32px\">\ud83d\uded2</div>\n        <div style=\"font-size:15px;font-weight:800;color:#fff;text-align:center;line-height:1.35\">Lance ta boutique<br>maintenant !</div>\n        <div style=\"font-size:11px;color:rgba(255,255,255,.55);text-align:center;line-height:1.6\">\ud83d\udc47 Clique sur ce bouton<br>pour cr\u00e9er ton compte Shopify</div>\n\n        <a href=\"#\" target=\"_blank\" rel=\"noopener\"\n          style=\"display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:#95bf47;color:#fff;border-radius:10px;padding:16px 10px;font-size:14px;font-weight:900;text-align:center;cursor:pointer;text-decoration:none;letter-spacing:.02em;box-shadow:0 4px 20px rgba(149,191,71,.55),0 0 0 3px rgba(149,191,71,.2);animation:pulse 2s infinite;transition:all .2s\"\n          onmouseover=\"this.style.transform='scale(1.04)';this.style.boxShadow='0 6px 28px rgba(149,191,71,.7),0 0 0 4px rgba(149,191,71,.3)'\"\n          onmouseout=\"this.style.transform='scale(1)';this.style.boxShadow='0 4px 20px rgba(149,191,71,.55),0 0 0 3px rgba(149,191,71,.2)'\">\n          <span style=\"font-size:20px\">\ud83d\uded2</span>\n          <span>Cr\u00e9er mon compte<br>Shopify</span>\n        </a>\n\n        <div style=\"width:100%;background:rgba(149,191,71,.1);border:1px solid rgba(149,191,71,.25);border-radius:8px;padding:9px;text-align:center\">\n          <div style=\"font-size:11px;font-weight:700;color:#95bf47\">Offre sp\u00e9ciale</div>\n          <div style=\"font-size:10px;color:rgba(255,255,255,.6);margin-top:3px;line-height:1.5\">Gratuit 3 jours<br>puis <strong style=\"color:#fff\">1\u20ac/mois \u00d7 3 mois</strong><br>puis 29\u20ac/mois</div>\n        </div>\n      </div>\n    </div></div>\n    </div>\n  </div>"},
{t:'shopify',title:"Comparer les plans Shopify",vo:"La page des tarifs Shopify. Trois plans. Basic \u00e0 vingt-neuf euros par mois, Shopify \u00e0 soixante-dix-neuf, Advanced \u00e0 deux cent quatre-vingt-dix-neuf. Pour d\u00e9marrer, le plan Basic est tout ce dont tu as besoin. Il inclut Shopify Payments, les rapports de base, et deux comptes staff. Les plans sup\u00e9rieurs sont utiles quand tu as du volume et que les \u00e9conomies sur les frais de transaction compensent le co\u00fbt suppl\u00e9mentaire. Pour l'instant, Basic.",html:"<div class=\"sp-wrap\">\n    <div class=\"sp-label\">\ud83d\udccd LE\u00c7ON 1.2 \u2014 shopify.com/fr/prix \u00b7 Comparer les 3 plans</div>\n\n    <div class=\"sp-win\">\n      <div class=\"sp-chrome\">\n        <div class=\"sp-dot\" style=\"background:#ff5f57\"></div>\n        <div class=\"sp-dot\" style=\"background:#febc2e\"></div>\n        <div class=\"sp-dot\" style=\"background:#28c840\"></div>\n        <div class=\"sp-addr\"><span class=\"sp-url\">shopify.com/fr/prix</span></div>\n      </div>\n      <div style=\"width:100%;flex:1;overflow:hidden;display:flex;flex-direction:column\">\n    <div style=\"flex:1;background:#f6f6f7;display:flex;flex-direction:column;font-family:'DM Sans',sans-serif\">\n      <!-- Nav -->\n      <div style=\"background:#fff;border-bottom:1px solid #e1e3e5;height:50px;display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0\">\n        <div style=\"display:flex;align-items:center;gap:6px\"><div style=\"width:20px;height:20px;background:#95bf47;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px\">\ud83d\uded2</div><span style=\"font-size:13px;font-weight:700;color:#1a1a1a\">shopify</span></div>\n        <div style=\"display:flex;gap:12px;font-size:11px;color:#6d7175;flex:1\"><span>Solutions</span><span>Tarifs</span><span>Ressources</span></div>\n        <button style=\"background:var(--sp);color:#fff;border:none;border-radius:5px;padding:6px 14px;fo
