{t:'intro',emoji:"\ud83d\udd0c",num:"09",title:"Apps essentielles",sub:"Shopify seul, c'est une base. Ces 4 apps gratuites ajoutent ce qui manque : la preuve sociale, la capture email, l'automatisation, et le canal TikTok. Toutes install\u00e9es en 10 minutes.",vo:"Section neuf. Les apps essentielles. Shopify seul c'est une base solide mais il manque plusieurs fonctionnalit\u00e9s critiques pour vendre. Ces quatre apps gratuites comblent les lacunes : Judge.me pour les avis clients, Klaviyo pour l'email marketing, Privy pour capturer les emails avec des pop-ups, et TikTok pour cr\u00e9er un canal de vente direct depuis l'app. Toutes sont gratuites au d\u00e9marrage et s'installent en moins de dix minutes."},
{t:'shopify',title:"Judge.me et Klaviyo",vo:"Judge.me et Klaviyo. Judge.me est la meilleure app d'avis clients gratuite sur Shopify. Les avis augmentent le taux de conversion entre quinze et vingt-cinq pourcent. L'app affiche les \u00e9toiles sur les fiches produit, envoie automatiquement un email de demande d'avis sept jours apr\u00e8s la livraison, et remonte les \u00e9toiles dans les r\u00e9sultats Google. Au lancement de C\u00c9LESTE, on cr\u00e9e cinq premiers avis via l'import CSV \u2014 famille, amis \u2014 pour ne pas d\u00e9marrer \u00e0 z\u00e9ro. Klaviyo est le standard de l'industrie pour l'email marketing Shopify. Gratuit jusqu'\u00e0 cinq cents contacts. On active trois flows automatiques : l'email de bienvenue, l'email d'abandon panier une heure apr\u00e8s, et l'email post-achat sept jours apr\u00e8s pour demander un avis.",html:"<div class=\"ty-split\">\n    <div class=\"split-l\"><div class=\"split-hd split-hd-l\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">AVIS & EMAIL MARKETING</span></div><div class=\"split-body\"><div class=\"app-card priority\">\n    <div class=\"ac-top\">\n      <div class=\"ac-icon\" style=\"background:#FFB800\">\u2b50</div>\n      <div style=\"flex:1\"><div class=\"ac-name\">Judge.me \u2014 Avis produits</div></div>\n      <span class=\"ac-price free\">Gratuit</span>\n    </div>\n    <div class=\"ac-desc\">La preuve sociale la plus puissante en e-commerce. Les avis augmentent le taux de conversion de 15 \u00e0 25%. Judge.me est la meilleure app avis gratuite sur Shopify.</div>\n    <div class=\"ac-tags\"><span class=\"ac-tag gold\">\u2b50 5000+ avis</span><span class=\"ac-tag green\">\u2705 Gratuit illimit\u00e9</span><span class=\"ac-tag blue\">Import avis CSV</span><span class=\"ac-tag green\">\u00c9toiles dans Google</span></div>\n  </div>\n  <div style=\"margin:6px 0;border-top:1px solid rgba(255,255,255,.07)\"></div>\n  <div class=\"app-card priority\">\n    <div class=\"ac-top\">\n      <div class=\"ac-icon\" style=\"background:#1F1FD4\">\ud83d\udce7</div>\n      <div style=\"flex:1\"><div class=\"ac-name\">Klaviyo \u2014 Email marketing</div></div>\n      <span class=\"ac-price free\">Gratuit < 500 contacts</span>\n    </div>\n    <div class=\"ac-desc\">L'outil email le plus puissant pour Shopify. Flows automatiques, segmentation avanc\u00e9e, pop-up email int\u00e9gr\u00e9. Le standard de l'industrie pour les boutiques e-commerce s\u00e9rieuses.</div>\n    <div class=\"ac-tags\"><span class=\"ac-tag green\">500 contacts gratuit</span><span class=\"ac-tag blue\">Flows automatiques</span><span class=\"ac-tag blue\">A/B testing</span><span class=\"ac-tag gold\">SMS inclus</span></div>\n  </div>\n  <div style=\"background:rgba(0,128,96,.08);border:1px solid rgba(0,128,96,.2);border-radius:7px;padding:9px;margin-top:6px\">\n    <div style=\"font-size:9px;font-weight:700;color:#4ECBA0;font-family:'DM Sans',sans-serif;margin-bottom:4px\">\ud83d\udce6 Comment installer une app</div>\n    <div style=\"font-size:9px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.6\">\n      Apps \u2192 Boutique d'apps Shopify \u2192 Rechercher \u2192 Installer \u2192 Autoriser l'acc\u00e8s.<br>\n      Chaque app te demandera des permissions \u2014 lis-les rapidement avant d'accepter.\n    </div>\n  </div></div></div>\n    <div class=\"split-r\"><div class=\"split-hd split-hd-r\"><span style=\"font-size:13px\">\ud83d\udd6f\ufe0f</span><span class=\"split-hd-label\">SUR C\u00c9LESTE \u2014 Installation et config</span></div><div class=\"split-body\"><div style=\"background:rgba(255,180,0,.06);border:1px solid rgba(255,180,0,.2);border-radius:8px;padding:10px;margin-bottom:8px\">\n    <div style=\"font-size:10px;font-weight:700;color:#FFD700;font-family:'DM Sans',sans-serif;margin-bottom:7px\">\u2b50 Judge.me \u2014 Config C\u00c9LESTE</div>\n    <div class=\"stat-row\"><span class=\"stat-l\">Widget affich\u00e9</span><span class=\"stat-v green\">\u00c9toiles sur fiches produit \u2705</span></div><div class=\"stat-row\"><span class=\"stat-l\">Demande d'avis auto</span><span class=\"stat-v green\">Email J+7 apr\u00e8s livraison</span></div><div class=\"stat-row\"><span class=\"stat-l\">Avis import\u00e9s</span><span class=\"stat-v green\">0 au lancement \u2014 on en cr\u00e9e 5</span></div><div class=\"stat-row\"><span class=\"stat-l\">Affichage homepage</span><span class=\"stat-v green\">Section \"Ils nous font confiance\"</span></div>\n    <div style=\"margin-top:7px;font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.5\">\ud83d\udca1 Au lancement, cr\u00e9e 5 faux avis de test (famille, amis) pour ne pas d\u00e9marrer \u00e0 z\u00e9ro. Judge.me permet l'import CSV.</div>\n  </div>\n  <div style=\"background:rgba(31,31,212,.08);border:1px solid rgba(31,31,212,.3);border-radius:8px;padding:10px\">\n    <div style=\"font-size:10px;font-weight:700;color:#7EB3FF;font-family:'DM Sans',sans-serif;margin-bottom:7px\">\ud83d\udce7 Klaviyo \u2014 Config C\u00c9LESTE</div>\n    <div class=\"stat-row\"><span class=\"stat-l\">Plan</span><span class=\"stat-v green\">Free (0-500 contacts)</span></div><div class=\"stat-row\"><span class=\"stat-l\">Flow Bienvenue</span><span class=\"stat-v green\">Email J+0 \u00b7 Activ\u00e9 \u2705</span></div><div class=\"stat-row\"><span class=\"stat-l\">Flow Abandon panier</span><span class=\"stat-v green\">Email J+1h \u00b7 Activ\u00e9 \u2705</span></div><div class=\"stat-row\"><span class=\"stat-l\">Flow Post-achat</span><span class=\"stat-v green\">Email J+7 \u2192 demande avis</span></div><div class=\"stat-row\"><span class=\"stat-l\">Sender email</span><span class=\"stat-v green\">hello@celeste-bougies.fr</span></div>\n  </div></div></div>\n  </div>"},
{t:'shopify',title:"Privy et TikTok",vo:"Privy et TikTok. Privy cr\u00e9e des pop-ups exit-intent \u2014 quand le visiteur est sur le point de quitter la page, un pop-up appara\u00eet avec une offre. Dix pourcent de r\u00e9duction sur la premi\u00e8re commande en \u00e9change de l'email. Ce type de pop-up convertit entre trois et huit pourcent des visiteurs. Les emails captur\u00e9s vont directement dans Klaviyo. Pour C\u00c9LESTE, le pop-up propose moins dix pourcent avec le code BIENVENUE. L'app TikTok connecte ton catalogue Shopify \u00e0 TikTok Shop. Tes produits apparaissent directement dans tes vid\u00e9os et dans l'onglet Shop de ton profil. Le pixel TikTok est inclus \u2014 il trackera les conversions d\u00e8s tes premi\u00e8res pubs. Pour C\u00c9LESTE, le catalogue de huit produits est synchronis\u00e9 et le premier contenu TikTok sera le making-of de la bougie Rose de Mai.",html:"<div class=\"ty-split\">\n    <div class=\"split-l\"><div class=\"split-hd split-hd-l\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">POP-UP & CANAL TIKTOK</span></div><div class=\"split-body\"><div class=\"app-card priority\">\n    <div class=\"ac-top\">\n      <div class=\"ac-icon\" style=\"background:#008060\">\ud83d\udcac</div>\n      <div style=\"flex:1\"><div class=\"ac-name\">Privy \u2014 Pop-up email capture</div></div>\n      <span class=\"ac-price free\">Gratuit < 10 000 visites</span>\n    </div>\n    <div class=\"ac-desc\">Capture les emails des visiteurs avant qu'ils repartent. Un pop-up exit-intent avec une offre (-10% sur la premi\u00e8re commande) peut convertir 3 \u00e0 8% des visiteurs en contacts email.</div>\n    <div class=\"ac-tags\"><span class=\"ac-tag green\">Exit-intent</span><span class=\"ac-tag gold\">R\u00e9duction offerte</span><span class=\"ac-tag blue\">A/B testing</span><span class=\"ac-tag blue\">Klaviyo sync</span></div>\n  </div>\n  <div style=\"margin:6px 0;border-top:1px solid rgba(255,255,255,.07)\"></div>\n  <div class=\"app-card\">\n    <div class=\"ac-top\">\n      <div class=\"ac-icon\" style=\"background:#010101\">\ud83c\udfb5</div>\n      <div style=\"flex:1\"><div class=\"ac-name\">TikTok \u2014 Canal de vente</div></div>\n      <span class=\"ac-price free\">Gratuit</span>\n    </div>\n    <div class=\"ac-desc\">Connecte ton catalogue Shopify \u00e0 TikTok Shop. Tes produits apparaissent directement dans tes vid\u00e9os et dans l'onglet Shop de ton profil. L'achat se fait sans quitter TikTok.</div>\n    <div class=\"ac-tags\"><span class=\"ac-tag green\">Catalogue sync auto</span><span class=\"ac-tag red\">Lien produit en vid\u00e9o</span><span class=\"ac-tag blue\">TikTok Pixel inclus</span><span class=\"ac-tag green\">Paiement in-app</span></div>\n  </div>\n  <div style=\"background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:9px;margin-top:6px\">\n    <div style=\"font-size:9px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif;margin-bottom:5px\">\u26a0\ufe0f Apps \u00e0 \u00e9viter au d\u00e9marrage</div>\n    \n      <div style=\"display:flex;gap:7px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n        <span style=\"color:#FF7B6B;font-size:10px;flex-shrink:0\">\u2717</span>\n        <div>\n          <div style=\"font-size:9px;font-weight:600;color:var(--white);font-family:'DM Sans',sans-serif\">Upsell / Cross-sell payants</div>\n          <div style=\"font-size:8px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Attends 50 ventes avant d'optimiser</div>\n        </div>\n      </div>\n      <div style=\"display:flex;gap:7px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n        <span style=\"color:#FF7B6B;font-size:10px;flex-shrink:0\">\u2717</span>\n        <div>\n          <div style=\"font-size:9px;font-weight:600;color:var(--white);font-family:'DM Sans',sans-serif\">Apps de loyaut\u00e9 (points)</div>\n          <div style=\"font-size:8px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Inutile sans base clients existante</div>\n        </div>\n      </div>\n      <div style=\"display:flex;gap:7px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n        <span style=\"color:#FF7B6B;font-size:10px;flex-shrink:0\">\u2717</span>\n        <div>\n          <div style=\"font-size:9px;font-weight:600;color:var(--white);font-family:'DM Sans',sans-serif\">Apps de comparaison prix</div>\n          <div style=\"font-size:8px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Contre-productif pour le premium</div>\n        </div>\n      </div>\n  </div></div></div>\n    <div class=\"split-r\"><div class=\"split-hd split-hd-r\"><span style=\"font-size:13px\">\ud83d\udd6f\ufe0f</span><span class=\"split-hd-label\">SUR C\u00c9LESTE \u2014 Privy + TikTok actifs</span></div><div class=\"split-body\"><div style=\"background:rgba(0,128,96,.06);border:1px solid rgba(0,128,96,.2);border-radius:8px;padding:10px;margin-bottom:8px\">\n    <div style=\"font-size:10px;font-weight:700;color:#4ECBA0;font-family:'DM Sans',sans-serif;margin-bottom:7px\">\ud83d\udcac Privy \u2014 Pop-up C\u00c9LESTE</div>\n    <div style=\"background:rgba(201,169,110,.08);border:1px solid rgba(201,169,110,.2);border-radius:6px;padding:8px;margin-bottom:7px;text-align:center\">\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:12px;font-weight:700;color:var(--cel-gold);margin-bottom:3px\">\ud83d\udd6f\ufe0f Avant de partir...</div>\n      <div style=\"font-size:9px;color:var(--white);font-family:'DM Sans',sans-serif;margin-bottom:5px\">B\u00e9n\u00e9ficiez de <strong>-10% sur votre premi\u00e8re commande</strong></div>\n      <div style=\"font-size:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);border-radius:4px;padding:3px 8px;color:#B0ACA6;display:inline-block;font-family:'DM Sans',sans-serif\">Votre email...</div>\n      <div style=\"font-size:8px;background:var(--cel-gold);color:var(--cel-dk);padding:4px 12px;border-radius:4px;margin-top:5px;display:inline-block;font-weight:700;font-family:'DM Sans',sans-serif\">J'en profite</div>\n    </div>\n    <div class=\"stat-row\"><span class=\"stat-l\">D\u00e9clencheur</span><span class=\"stat-v green\">Exit-intent (souris vers haut)</span></div><div class=\"stat-row\"><span class=\"stat-l\">Offre</span><span class=\"stat-v green\">-10% code BIENVENUE</span></div><div class=\"stat-row\"><span class=\"stat-l\">Sync Klaviyo</span><span class=\"stat-v green\">Contacts ajout\u00e9s auto \u2705</span></div>\n  </div>\n  <div style=\"background:rgba(255,0,80,.05);border:1px solid rgba(255,0,80,.2);border-radius:8px;padding:10px\">\n    <div style=\"font-size:10px;font-weight:700;color:#FF6B9D;font-family:'DM Sans',sans-serif;margin-bottom:7px\">\ud83c\udfb5 TikTok \u2014 Config C\u00c9LESTE</div>\n    <div class=\"stat-row\"><span class=\"stat-l\">Catalogue</span><span class=\"stat-v green\">8 produits synchronis\u00e9s</span></div><div class=\"stat-row\"><span class=\"stat-l\">Pixel TikTok</span><span class=\"stat-v green\">Install\u00e9 \u2014 tracking actif \u2705</span></div><div class=\"stat-row\"><span class=\"stat-l\">TikTok Shop</span><span class=\"stat-v green\">Actif \u2014 achat in-app</span></div><div class=\"stat-row\"><span class=\"stat-l\">Premier contenu</span><span class=\"stat-v green\">Making-of bougie Rose de Mai</span></div>\n  </div></div></div>\n  </div>"},
{t:'recap',title:"Ce qu'il faut retenir",vo:"R\u00e9capitulatif section neuf. Quatre apps install\u00e9es et configur\u00e9es. Judge.me pour les avis automatiques sept jours apr\u00e8s livraison, avec les \u00e9toiles qui remontent dans Google. Klaviyo avec trois flows actifs \u2014 bienvenue, abandon panier, et demande d'avis post-achat. Privy avec le pop-up exit-intent moins dix pourcent qui capte trois \u00e0 huit pourcent des visiteurs. Et TikTok avec le catalogue synchronis\u00e9 et le pixel install\u00e9. On \u00e9vite les apps payantes comme les upsells ou la loyaut\u00e9 \u2014 trop t\u00f4t, pas encore de base clients. Dans la prochaine section, on optimise le SEO de la boutique.",points:["Module 2 \u00b7 Section 9 \u00b7 R\u00e9capitulatif"]}]},

{t:'intro',emoji:"\ud83d\udd0d",num:"10",title:"SEO Shopify",sub:"Le SEO c'est du trafic gratuit et durable. Une bonne optimisation au lancement g\u00e9n\u00e8re des visiteurs pendant des mois sans d\u00e9penser un centime en pub. Shopify fait d\u00e9j\u00e0 80% du travail \u2014 voici les 20% restants.",vo:"Section dix. Le SEO Shopify. Le SEO c'est du trafic gratuit et durable. Une heure de bonne configuration au lancement peut g\u00e9n\u00e9rer des visiteurs pendant des mois sans pub payante. Shopify int\u00e8gre d\u00e9j\u00e0 quatre-vingts pourcent du travail technique \u2014 sitemap automatique, URLs propres, HTTPS, responsive. Il reste vingt pourcent \u00e0 configurer manuellement : les mots-cl\u00e9s, les balises on-page, la vitesse, et Google Search Console."},
{t:'shopify',title:"Mots-cl\u00e9s et SEO on-page",vo:"Les mots-cl\u00e9s et le SEO on-page. Pour une boutique au lancement, cible des mots-cl\u00e9s longue tra\u00eene. Pas de bougie seul \u2014 trop de concurrence, impossible. Plut\u00f4t bougie soja rose artisanale france \u2014 cinq cents recherches par mois, faible concurrence, atteignable en quelques semaines. Cinq \u00e9l\u00e9ments on-page \u00e0 optimiser sur chaque page : le title tag, la m\u00e9ta description, l'URL, le H1, et l'alt text des images. Pour C\u00c9LESTE, l'aper\u00e7u Google est parfait. Le title tag de soixante-deux caract\u00e8res avec le mot-cl\u00e9 en premier, la m\u00e9ta description de cent cinquante-trois caract\u00e8res avec les arguments cl\u00e9s, et les \u00e9toiles Judge.me qui remontent en tant que rich snippet.",html:"<div class=\"ty-split\">\n    <div class=\"split-l\"><div class=\"split-hd split-hd-l\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">MOTS-CL\u00c9S ET ON-PAGE SEO</span></div><div class=\"split-body\"><div class=\"dk sp\">\n    <div class=\"dk-h\">\ud83d\udd11 Trouver les bons mots-cl\u00e9s</div>\n    <div style=\"font-size:9px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.55;margin-bottom:8px\">\n      Pour une boutique e-commerce au lancement, cible des <strong style=\"color:var(--white)\">mots-cl\u00e9s longue tra\u00eene</strong> \u2014 moins de volume mais moins de concurrence. Tu te positionneras plus vite.\n    </div>\n    \n      <div style=\"padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06)\">\n        <div style=\"font-size:9.5px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif\">Courte tra\u00eene (\u00e9viter)</div>\n        <div style=\"font-size:8.5px;color:#FF7B6B;font-family:'DM Sans',sans-serif;margin-top:1px\">\"bougie\" \u2014 1M recherches/mois \u00b7 concurrence impossible</div>\n      </div>\n      <div style=\"padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06)\">\n        <div style=\"font-size:9.5px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif\">Moyenne tra\u00eene</div>\n        <div style=\"font-size:8.5px;color:#D4A820;font-family:'DM Sans',sans-serif;margin-top:1px\">\"bougie artisanale\" \u2014 40K/mois \u00b7 difficile mais faisable</div>\n      </div>\n      <div style=\"padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06)\">\n        <div style=\"font-size:9.5px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif\">Longue tra\u00eene \u2705</div>\n        <div style=\"font-size:8.5px;color:#4ECBA0;font-family:'DM Sans',sans-serif;margin-top:1px\">\"bougie soja rose artisanale france\" \u2014 500/mois \u00b7 atteignable</div>\n      </div>\n    <div style=\"margin-top:7px;font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.5\">\n      <strong style=\"color:var(--white)\">Outils gratuits :</strong> Google Autocomplete \u00b7 Google Trends \u00b7 Semrush Free \u00b7 Ubersuggest\n    </div>\n  </div>\n  <div class=\"dk blue\">\n    <div class=\"dk-h\">\ud83d\udcc4 Les 5 \u00e9l\u00e9ments on-page \u00e0 optimiser</div>\n    \n      <div class=\"seo-row\">\n        <div class=\"seo-n\">1</div>\n        <div><div class=\"seo-t\">Title tag (balise titre)</div><div class=\"seo-d\">70 chars max \u00b7 mot-cl\u00e9 principal en premier \u00b7 marque \u00e0 la fin</div></div>\n      </div>\n      <div class=\"seo-row\">\n        <div class=\"seo-n\">2</div>\n        <div><div class=\"seo-t\">Meta description</div><div class=\"seo-d\">160 chars \u00b7 r\u00e9sum\u00e9 accrocheur \u00b7 mot-cl\u00e9 naturellement int\u00e9gr\u00e9</div></div>\n      </div>\n      <div class=\"seo-row\">\n        <div class=\"seo-n\">3</div>\n        <div><div class=\"seo-t\">URL</div><div class=\"seo-d\">Courte \u00b7 mots-cl\u00e9s s\u00e9par\u00e9s par tirets \u00b7 pas de stop words</div></div>\n      </div>\n      <div class=\"seo-row\">\n        <div class=\"seo-n\">4</div>\n        <div><div class=\"seo-t\">H1 (titre principal)</div><div class=\"seo-d\">Un seul H1 par page \u00b7 contient le mot-cl\u00e9 \u00b7 \u2260 du title tag</div></div>\n      </div>\n      <div class=\"seo-row\">\n        <div class=\"seo-n\">5</div>\n        <div><div class=\"seo-t\">Alt text des images</div><div class=\"seo-d\">D\u00e9crit l'image avec le mot-cl\u00e9 \u00b7 max 125 chars</div></div>\n      </div>\n  </div></div></div>\n    <div class=\"split-r\"><div class=\"split-hd split-hd-r\"><span style=\"font-size:13px\">\ud83d\udd6f\ufe0f</span><span class=\"split-hd-label\">SUR C\u00c9LESTE \u2014 Audit SEO on-page</span></div><div class=\"split-body\"><div class=\"dk gold\">\n    <div class=\"dk-h\">Aper\u00e7u Google \u2014 Rose de Mai</div>\n    <div class=\"serp\">\n      <div class=\"serp-url\">celeste-bougies.fr \u203a produits \u203a bougie-soja-rose-de-mai</div>\n      <div class=\"serp-title\">Bougie Soja Rose de Mai 220g \u2014 Artisanale Made in France | C\u00c9LESTE</div>\n      <div class=\"serp-desc\">Bougie artisanale cire de soja 100% naturelle, parfum Rose de Mai. 55h garanties, sans paraffine, fabriqu\u00e9e \u00e0 la main en France. Livraison offerte d\u00e8s 60\u20ac.</div>\n      <div class=\"serp-stars\">\n        <span style=\"font-size:10px\">\u2b50\u2b50\u2b50\u2b50\u2b50</span>\n        <span style=\"font-size:9px;color:#4d5156;font-family:'DM Sans',sans-serif\">4,9 (24 avis) \u00b7 34,90 \u20ac</span>\n      </div>\n    </div>\n    <div style=\"font-size:8px;color:#B0ACA6;font-family:'DM Sans',sans-serif;margin-top:6px\">\n      \u2705 Title : 62 chars \u00b7 Mot-cl\u00e9 en premier \u00b7 Marque \u00e0 la fin<br>\n      \u2705 Meta : 153 chars \u00b7 Arguments cl\u00e9s \u00b7 CTA livraison<br>\n      \u2705 \u00c9toiles Judge.me remontent dans Google (rich snippet)\n    </div>\n  </div>\n  <div class=\"dk\">\n    <div class=\"dk-h\">Mots-cl\u00e9s cibles C\u00c9LESTE</div>\n    \n      <div class=\"stat-row\">\n        <span style=\"font-size:8.5px;color:var(--white);font-family:'DM Sans',sans-serif\">\"bougie soja artisanale france\"</span>\n        <span class=\"stat-v g\" style=\"font-size:8px\">~900/mois</span>\n      </div>\n      <div class=\"stat-row\">\n        <span style=\"font-size:8.5px;color:var(--white);font-family:'DM Sans',sans-serif\">\"bougie parfum\u00e9e made in france\"</span>\n        <span class=\"stat-v g\" style=\"font-size:8px\">~600/mois</span>\n      </div>\n      <div class=\"stat-row\">\n        <span style=\"font-size:8.5px;color:var(--white);font-family:'DM Sans',sans-serif\">\"bougie rose de mai\"</span>\n        <span class=\"stat-v g\" style=\"font-size:8px\">~350/mois</span>\n      </div>\n      <div class=\"stat-row\">\n        <span style=\"font-size:8.5px;color:var(--white);font-family:'DM Sans',sans-serif\">\"cadeau bougie naturelle femme\"</span>\n        <span class=\"stat-v g\" style=\"font-size:8px\">~800/mois</span>\n      </div>\n  </div></div></div>\n  </div>"},
{t:'shopify',title:"SEO technique et vitesse",vo:"Le SEO technique. La bonne nouvelle : Shopify g\u00e8re automatiquement l'essentiel. HTTPS activ\u00e9, responsive mobile, sitemap XML g\u00e9n\u00e9r\u00e9 et soumis \u00e0 Google, URLs canoniques pour \u00e9viter le contenu dupliqu\u00e9, CDN global pour la vitesse. Ce qu'il reste \u00e0 faire : compresser les images avant de les uploader avec Squoosh.app \u2014 objectif moins de deux cents kilo-octets par image. Limiter les apps \u00e0 huit maximum \u2014 chaque app ajoute du JavaScript qui ralentit la page. Et utiliser le th\u00e8me Dawn qui est le plus rapide des th\u00e8mes Shopify. Pour C\u00c9LESTE, on vise un score PageSpeed de soixante-dix-huit sur mobile et quatre-vingt-quatorze sur desktop. Ce sont des scores excellents pour une boutique e-commerce.",html:"<div class=\"ty-split\">\n    <div class=\"split-l\"><div class=\"split-hd split-hd-l\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">SEO TECHNIQUE \u2014 Ce que Shopify fait d\u00e9j\u00e0</span></div><div class=\"split-body\"><div class=\"dk sp\">\n    <div class=\"dk-h\">\u2705 Ce que Shopify g\u00e8re automatiquement</div>\n    \n      <div style=\"display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n        <span style=\"font-size:13px;flex-shrink:0\">\ud83d\udd12</span>\n        <div><div style=\"font-size:9.5px;font-weight:600;color:var(--white);font-family:'DM Sans',sans-serif\">HTTPS / SSL</div><div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Activ\u00e9 automatiquement sur tous les domaines Shopify</div></div>\n      </div>\n      <div style=\"display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n        <span style=\"font-size:13px;flex-shrink:0\">\ud83d\udcf1</span>\n        <div><div style=\"font-size:9.5px;font-weight:600;color:var(--white);font-family:'DM Sans',sans-serif\">Responsive mobile</div><div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Tous les th\u00e8mes officiels sont responsive \u2014 Google Mobile-First</div></div>\n      </div>\n      <div style=\"display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n        <span style=\"font-size:13px;flex-shrink:0\">\ud83d\uddfa\ufe0f</span>\n        <div><div style=\"font-size:9.5px;font-weight:600;color:var(--white);font-family:'DM Sans',sans-serif\">Sitemap XML</div><div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">G\u00e9n\u00e9r\u00e9 automatiquement sur /sitemap.xml \u2014 soumis \u00e0 Google</div></div>\n      </div>\n      <div style=\"display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n        <span style=\"font-size:13px;flex-shrink:0\">\ud83d\udd17</span>\n        <div><div style=\"font-size:9.5px;font-weight:600;color:var(--white);font-family:'DM Sans',sans-serif\">URLs canoniques</div><div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">\u00c9vite le contenu dupliqu\u00e9 automatiquement</div></div>\n      </div>\n      <div style=\"display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n        <span style=\"font-size:13px;flex-shrink:0\">\u26a1</span>\n        <div><div style=\"font-size:9.5px;font-weight:600;color:var(--white);font-family:'DM Sans',sans-serif\">CDN global</div><div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Images et assets servis depuis le CDN Shopify \u2014 vitesse mondiale</div></div>\n      </div>\n      <div style=\"display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n        <span style=\"font-size:13px;flex-shrink:0\">\ud83e\udd16</span>\n        <div><div style=\"font-size:9.5px;font-weight:600;color:var(--white);font-family:'DM Sans',sans-serif\">robots.txt</div><div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Fichier robots.txt optimis\u00e9 par d\u00e9faut</div></div>\n      </div>\n  </div>\n  <div class=\"dk blue\">\n    <div class=\"dk-h\">\u26a1 Vitesse \u2014 ce que tu dois faire</div>\n    \n      <div class=\"seo-row\">\n        <div class=\"seo-n\">1</div>\n        <div><div class=\"seo-t\">Compresser les images</div><div class=\"seo-d\">WebP ou JPG optimis\u00e9. Utilise Squoosh.app avant d'uploader. Objectif < 200KB par image.</div></div>\n      </div>\n      <div class=\"seo-row\">\n        <div class=\"seo-n\">2</div>\n        <div><div class=\"seo-t\">Limiter les apps</div><div class=\"seo-d\">Chaque app ajoute du JavaScript. Plus de 8 apps = ralentissement notable.</div></div>\n      </div>\n      <div class=\"seo-row\">\n        <div class=\"seo-n\">3</div>\n        <div><div class=\"seo-t\">Th\u00e8me l\u00e9ger</div><div class=\"seo-d\">Dawn (th\u00e8me officiel Shopify) est le plus rapide. \u00c9vite les th\u00e8mes premium lourds.</div></div>\n      </div>\n  </div></div></div>\n    <div class=\"split-r\"><div class=\"split-hd split-hd-r\"><span style=\"font-size:13px\">\ud83d\udd6f\ufe0f</span><span class=\"split-hd-label\">SUR C\u00c9LESTE \u2014 Optimisations restantes</span></div><div class=\"split-body\"><div class=\"dk\">\n    <div class=\"dk-h\">Score PageSpeed C\u00c9LESTE (objectif)</div>\n    <div style=\"display:flex;gap:8px;margin-bottom:10px\">\n      \n        <div style=\"flex:1;text-align:center;padding:10px;background:rgba(255,255,255,.03);border-radius:7px;border:1px solid rgba(255,255,255,.08)\">\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:#D4A820\">78</div>\n          <div style=\"font-size:9px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Mobile</div>\n        </div>\n        <div style=\"flex:1;text-align:center;padding:10px;background:rgba(255,255,255,.03);border-radius:7px;border:1px solid rgba(255,255,255,.08)\">\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:#4ECBA0\">94</div>\n          <div style=\"font-size:9px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Desktop</div>\n        </div>\n    </div>\n    <div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.6\">\n      <strong style=\"color:var(--white)\">Comment checker :</strong> pagespeed.web.dev \u2192 entrer l'URL<br>\n      Score vert > 90 \u00b7 Orange 50-89 \u00b7 Rouge < 50<br><br>\n      <strong style=\"color:var(--white)\">Optimisations faites sur C\u00c9LESTE :</strong>\n    </div>\n    <div class=\"stat-row\"><span class=\"stat-l\">Images compress\u00e9es</span><span class=\"stat-v g\">< 150KB \u00b7 WebP \u2705</span></div><div class=\"stat-row\"><span class=\"stat-l\">Th\u00e8me Dawn</span><span class=\"stat-v g\">L\u00e9ger par d\u00e9faut \u2705</span></div><div class=\"stat-row\"><span class=\"stat-l\">4 apps seulement</span><span class=\"stat-v g\">Pas de surcharge \u2705</span></div><div class=\"stat-row\"><span class=\"stat-l\">Lazy loading images</span><span class=\"stat-v g\">Activ\u00e9 auto Shopify \u2705</span></div>\n  </div></div></div>\n  </div>"},
{t:'shopify',title:"Google Search Console",vo:"Google Search Console. C'est l'outil gratuit de Google pour surveiller comment ta boutique est index\u00e9e et quelles recherches g\u00e9n\u00e8rent du trafic. Tu vois les mots-cl\u00e9s qui am\u00e8nent des visiteurs, les pages index\u00e9es, les erreurs \u00e0 corriger, et ta position moyenne sur Google. La configuration prend cinq minutes. Tu vas sur search.google.com/search-console, tu ajoutes ton domaine, tu v\u00e9rifies la propri\u00e9t\u00e9 via une balise HTML dans le fichier theme.liquid de Shopify, et tu soumets le sitemap. Pour C\u00c9LESTE, un mois apr\u00e8s le lancement on s'attend \u00e0 dix-huit pages index\u00e9es, quarante-cinq clics organiques par mois, et une position moyenne autour de vingt-huit. Ce sont des chiffres modestes mais normaux \u2014 le SEO prend trois \u00e0 six mois.",html:"<div class=\"ty-split\">\n    <div class=\"split-l\"><div class=\"split-hd split-hd-l\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">GOOGLE SEARCH CONSOLE \u2014 Setup</span></div><div class=\"split-body\"><div class=\"dk blue\">\n    <div class=\"dk-h\">Qu'est-ce que Google Search Console ?</div>\n    <div style=\"font-size:9px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.55;margin-bottom:8px\">\n      C'est l'outil gratuit de Google pour surveiller comment ta boutique est vue et index\u00e9e par Google. Indispensable pour comprendre quel trafic organique tu g\u00e9n\u00e8res.\n    </div>\n    \n      <div style=\"display:flex;gap:7px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);align-items:center\">\n        <span style=\"font-size:13px\">\ud83d\udcca</span>\n        <span style=\"font-size:9.5px;color:var(--white);font-family:'DM Sans',sans-serif\">Voir tes mots-cl\u00e9s qui g\u00e9n\u00e8rent des clics</span>\n      </div>\n      <div style=\"display:flex;gap:7px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);align-items:center\">\n        <span style=\"font-size:13px\">\ud83d\udd0d</span>\n        <span style=\"font-size:9.5px;color:var(--white);font-family:'DM Sans',sans-serif\">V\u00e9rifier quelles pages sont index\u00e9es</span>\n      </div>\n      <div style=\"display:flex;gap:7px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);align-items:center\">\n        <span style=\"font-size:13px\">\u26a0\ufe0f</span>\n        <span style=\"font-size:9.5px;color:var(--white);font-family:'DM Sans',sans-serif\">Identifier et corriger les erreurs d'exploration</span>\n      </div>\n      <div style=\"display:flex;gap:7px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);align-items:center\">\n        <span style=\"font-size:13px\">\ud83d\udcc8</span>\n        <span style=\"font-size:9.5px;color:var(--white);font-family:'DM Sans',sans-serif\">Suivre ta position moyenne sur Google</span>\n      </div>\n      <div style=\"display:flex;gap:7px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);align-items:center\">\n        <span style=\"font-size:13px\">\ud83d\udcf1</span>\n        <span style=\"font-size:9.5px;color:var(--white);font-family:'DM Sans',sans-serif\">V\u00e9rifier les probl\u00e8mes mobile</span>\n      </div>\n  </div>\n  <div class=\"dk\">\n    <div class=\"dk-h\">Comment configurer (5 \u00e9tapes)</div>\n    \n      <div class=\"seo-row\">\n        <div class=\"seo-n\">1</div>\n        <div><div class=\"seo-t\">Aller sur search.google.com/search-console</div></div>\n      </div>\n      <div class=\"seo-row\">\n        <div class=\"seo-n\">2</div>\n        <div><div class=\"seo-t\">Ajouter ta propri\u00e9t\u00e9 \u2014 choisir \"Pr\u00e9fixe d'URL\"</div></div>\n      </div>\n      <div class=\"seo-row\">\n        <div class=\"seo-n\">3</div>\n        <div><div class=\"seo-t\">V\u00e9rification via HTML tag \u2192 coller dans Shopify (th\u00e8me \u2192 edit code \u2192 theme.liquid)</div></div>\n      </div>\n      <div class=\"seo-row\">\n        <div class=\"seo-n\">4</div>\n        <div><div class=\"seo-t\">Soumettre le sitemap : celeste-bougies.fr/sitemap.xml</div></div>\n      </div>\n      <div class=\"seo-row\">\n        <div class=\"seo-n\">5</div>\n        <div><div class=\"seo-t\">Attendre 48-72h pour les premi\u00e8res donn\u00e9es</div></div>\n      </div>\n    <div class=\"code\" style=\"margin-top:6px\">celeste-bougies.fr/sitemap.xml</div>\n  </div></div></div>\n    <div class=\"split-r\"><div class=\"split-hd split-hd-r\"><span style=\"font-size:13px\">\ud83d\udd6f\ufe0f</span><span class=\"split-hd-label\">SUR C\u00c9LESTE \u2014 Soumission et suivi</span></div><div class=\"split-body\"><div class=\"dk gold\">\n    <div class=\"dk-h\">\ud83d\udd6f\ufe0f Search Console C\u00c9LESTE \u2014 J+30</div>\n    <div style=\"font-size:9px;color:#B0ACA6;font-family:'DM Sans',sans-serif;margin-bottom:8px\">Donn\u00e9es estim\u00e9es un mois apr\u00e8s le lancement :</div>\n    <div class=\"stat-row\"><span class=\"stat-l\">Pages index\u00e9es</span><span class=\"stat-v g\">18 / 18 \u2705</span></div><div class=\"stat-row\"><span class=\"stat-l\">Sitemap soumis</span><span class=\"stat-v g\">\u2705 Accept\u00e9</span></div><div class=\"stat-row\"><span class=\"stat-l\">Clics organiques</span><span class=\"stat-v g\">~45 / mois</span></div><div class=\"stat-row\"><span class=\"stat-l\">Impressions</span><span class=\"stat-v g\">~1 200 / mois</span></div><div class=\"stat-row\"><span class=\"stat-l\">Position moyenne</span><span class=\"stat-v y\">28 (objectif < 20)</span></div><div class=\"stat-row\"><span class=\"stat-l\">Erreurs 404</span><span class=\"stat-v g\">0 \u2705</span></div>\n    <div style=\"margin-top:8px;padding:7px;background:rgba(201,169,110,.08);border-radius:5px\">\n      <div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.5\">\n        \ud83d\udca1 Le SEO prend 3 \u00e0 6 mois pour donner des r\u00e9sultats significatifs. Sois patient \u2014 mais configure-le d\u00e8s le lancement pour ne pas perdre du temps.\n      </div>\n    </div>\n  </div></div></div>\n  </div>"},
{t:'recap',title:"Ce qu'il faut retenir",vo:"R\u00e9capitulatif section dix. On cible la longue tra\u00eene \u2014 bougie soja rose artisanale france, cinq cents recherches par mois, faible concurrence. Cinq \u00e9l\u00e9ments on-page optimis\u00e9s sur toutes les pages C\u00c9LESTE. Shopify g\u00e8re l'essentiel du technique \u2014 il reste \u00e0 compresser les images et \u00e0 limiter les apps. Google Search Console configur\u00e9e avec le sitemap soumis et dix-huit pages index\u00e9es. Et une r\u00e8gle d'or : configure le SEO maintenant et sois patient \u2014 les r\u00e9sultats arrivent dans trois \u00e0 six mois. Dans la prochaine section, on configure les emails et les automatisations pour convertir les visiteurs en clients fid\u00e8les.",points:["Module 2 \u00b7 Section 10 \u00b7 R\u00e9capitulatif"]}]},
{id:12,title:"\ud83d\udce7 Emails & Automatisations",slides:[
{t:'intro',emoji:"\ud83d\udce7",num:"11",title:"Emails & Automatisations",sub:"L'email marketing g\u00e9n\u00e8re 42\u20ac pour chaque euro investi \u2014 c'est le canal avec le meilleur ROI du e-commerce. Avec 3 flows bien configur\u00e9s dans Klaviyo, ta boutique relance, convainc et fid\u00e9lise automatiquement.",vo:"Section onze. Emails et automatisations. L'email marketing g\u00e9n\u00e8re quarante-deux euros pour chaque euro investi \u2014 c'est de loin le meilleur canal en e-commerce. Trois flows Klaviyo bien configur\u00e9s suffisent pour d\u00e9marrer : le flow de bienvenue qui pr\u00e9sente la marque d\u00e8s l'inscription, le flow abandon panier qui r\u00e9cup\u00e8re en moyenne quinze pourcent des paniers perdus, et le flow post-achat qui fid\u00e9lise et demande un avis."},
{t:'shopify',title:"Les 3 flows essentiels",vo:"Les trois flows Klaviyo. Premier flow : la bienvenue. D\u00e9clench\u00e9 d\u00e8s l'inscription, il envoie trois emails. L'email imm\u00e9diat avec le code r\u00e9duction moins dix pourcent, l'email \u00e0 jour plus trois avec l'histoire de la marque, et l'email \u00e0 jour plus sept avec les produits phares. Deuxi\u00e8me flow : l'abandon panier. C'est le plus rentable \u2014 il r\u00e9cup\u00e8re entre dix et vingt pourcent des paniers abandonn\u00e9s. Trois emails : le rappel une heure apr\u00e8s avec le produit oubli\u00e9, le rappel vingt-quatre heures apr\u00e8s avec les avis clients, et la derni\u00e8re chance \u00e0 jour plus trois avec une r\u00e9duction. Troisi\u00e8me flow : le post-achat. Remercie le client, anticipe la livraison, et demande un avis sept jours apr\u00e8s. Pour C\u00c9LESTE, ces trois flows g\u00e9n\u00e8rent six cent dix-sept euros de revenus automatiques par mois \u00e0 jour trente.",html:"<div class=\"ty-split\">\n    <div class=\"split-l\"><div class=\"split-hd split-hd-l\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">LES 3 FLOWS KLAVIYO</span></div><div class=\"split-body\"><div class=\"flow on\">\n    <div class=\"flow-top\">\n      <div class=\"flow-ic\" style=\"background:rgba(0,128,96,.5)\">\ud83d\udc4b</div>\n      <div class=\"flow-name\">Flow Bienvenue</div>\n      <span class=\"flow-stat\" style=\"color:#4ECBA0\">ROI: \u00d76</span>\n    </div>\n    <div class=\"flow-desc\">D\u00e9clench\u00e9 quand quelqu'un s'inscrit \u00e0 ta liste (pop-up Privy ou checkout). C'est ta premi\u00e8re impression \u2014 pr\u00e9sente la marque et offre une r\u00e9duction.</div>\n    <div class=\"flow-steps\"><span class=\"fstep\" style=\"background:rgba(255,255,255,.06);color:#B0ACA6\">Email J+0 : Bienvenue + -10%</span><span style=\"color:var(--muted);font-size:10px\">\u2192</span><span class=\"fstep\" style=\"background:rgba(255,255,255,.06);color:#B0ACA6\">Email J+3 : Notre histoire</span><span style=\"color:var(--muted);font-size:10px\">\u2192</span><span class=\"fstep\" style=\"background:rgba(255,255,255,.06);color:#B0ACA6\">Email J+7 : Produits phares</span></div>\n  </div>\n  <div class=\"flow on\">\n    <div class=\"flow-top\">\n      <div class=\"flow-ic\" style=\"background:rgba(216,44,13,.5)\">\ud83d\uded2</div>\n      <div class=\"flow-name\">Flow Abandon Panier</div>\n      <span class=\"flow-stat\" style=\"color:#4ECBA0\">ROI: \u00d718</span>\n    </div>\n    <div class=\"flow-desc\">D\u00e9clench\u00e9 quand quelqu'un ajoute au panier mais ne finalise pas l'achat. Le flow le plus rentable en e-commerce \u2014 r\u00e9cup\u00e8re 10 \u00e0 20% des paniers abandonn\u00e9s.</div>\n    <div class=\"flow-steps\"><span class=\"fstep\" style=\"background:rgba(255,255,255,.06);color:#B0ACA6\">Email J+1h : \"Tu as oubli\u00e9 quelque chose\"</span><span style=\"color:var(--muted);font-size:10px\">\u2192</span><span class=\"fstep\" style=\"background:rgba(255,255,255,.06);color:#B0ACA6\">Email J+24h : Rappel + avis produit</span><span style=\"color:var(--muted);font-size:10px\">\u2192</span><span class=\"fstep\" style=\"background:rgba(255,255,255,.06);color:#B0ACA6\">Email J+3j : Derni\u00e8re chance -10%</span></div>\n  </div>\n  <div class=\"flow on\">\n    <div class=\"flow-top\">\n      <div class=\"flow-ic\" style=\"background:rgba(44,110,203,.5)\">\ud83d\udc8c</div>\n      <div class=\"flow-name\">Flow Post-Achat</div>\n      <span class=\"flow-stat\" style=\"color:#4ECBA0\">ROI: \u00d74</span>\n    </div>\n    <div class=\"flow-desc\">D\u00e9clench\u00e9 apr\u00e8s une commande confirm\u00e9e. Remercie, cr\u00e9e l'anticipation de la livraison, et demande un avis. Transforme un acheteur en client fid\u00e8le.</div>\n    <div class=\"flow-steps\"><span class=\"fstep\" style=\"background:rgba(255,255,255,.06);color:#B0ACA6\">Email J+0 : Confirmation + making-of</span><span style=\"color:var(--muted);font-size:10px\">\u2192</span><span class=\"fstep\" style=\"background:rgba(255,255,255,.06);color:#B0ACA6\">Email J+7 : \"Votre commande est arriv\u00e9e ?\"</span><span style=\"color:var(--muted);font-size:10px\">\u2192</span><span class=\"fstep\" style=\"background:rgba(255,255,255,.06);color:#B0ACA6\">Email J+7 : Demande d'avis Judge.me</span></div>\n  </div>\n  <div class=\"dk blue\" style=\"margin-top:4px\">\n    <div class=\"dk-h\" style=\"font-size:9px\">\ud83d\udca1 Comment cr\u00e9er un flow dans Klaviyo</div>\n    <div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.6\">\n      Flows \u2192 Create Flow \u2192 Browse Templates \u2192 Choisir le template \u2192 Personnaliser les emails \u2192 Activer.<br>\n      Klaviyo propose des templates pr\u00e9-construits pour les 3 flows \u2014 modifie juste le contenu et les couleurs.\n    </div>\n  </div></div></div>\n    <div class=\"split-r\"><div class=\"split-hd split-hd-r\"><span style=\"font-size:13px\">\ud83d\udd6f\ufe0f</span><span class=\"split-hd-label\">SUR C\u00c9LESTE \u2014 Flows activ\u00e9s</span></div><div class=\"split-body\"><div class=\"dk kl\">\n    <div class=\"dk-h\">\ud83d\udce7 Statistiques flows C\u00c9LESTE (J+30)</div>\n    \n      <div style=\"padding:6px 0;border-bottom:1px solid rgba(31,31,212,.15)\">\n        <div style=\"font-size:10px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif;margin-bottom:3px\">Bienvenue</div>\n        <div style=\"display:flex;gap:8px\">\n          \n            <div style=\"flex:1;background:rgba(255,255,255,.04);border-radius:4px;padding:4px 6px;text-align:center\">\n              <div style=\"font-size:9.5px;font-weight:700;color:#4ECBA0;font-family:'DM Sans',sans-serif\">58%</div>\n              <div style=\"font-size:7.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Ouverture</div>\n            </div>\n            <div style=\"flex:1;background:rgba(255,255,255,.04);border-radius:4px;padding:4px 6px;t y:'DM Sans',sans-serif\">Revenus</div>\n            </div>\n        </div>\n      </div>\n      <div style=\"padding:6px 0;border-bottom:1px solid rgba(31,31,212,.15)\">\n        <div style=\"font-size:10px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif;margin-bottom:3px\">Post-achat</div>\n        <div style=\"display:flex;gap:8px\">\n          \n            <div style=\"flex:1;background:rgba(255,255,255,.04);border-radius:4px;padding:4px 6px;text-align:center\">\n              <div style=\"font-size:9.5px;font-weight:700;color:#4ECBA0;font-family:'DM Sans',sans-serif\">71%</div>\n              <div style=\"font-size:7.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Ouverture</div>\n            </div>\n            <div style=\"flex:1;background:rgba(255,255,255,.04);border-radius:4px;padding:4px 6px;text-align:center\">\n              <div style=\"font-size:9.5px;font-weight:700;color:#4ECBA0;font-family:'DM Sans',sans-serif\">8%</div>\n              <div style=\"font-size:7.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Clics</div>\n            </div>\n            <div style=\"flex:1;background:rgba(255,255,255,.04);border-radius:4px;padding:4px 6px;text-align:center\">\n              <div style=\"font-size:9.5px;font-weight:700;color:#4ECBA0;font-family:'DM Sans',sans-serif\">95\u20ac</div>\n              <div style=\"font-size:7.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Revenus</div>\n            </div>\n        </div>\n      </div>\n    <div style=\"margin-top:7px;text-align:right;font-size:9px;color:#4ECBA0;font-family:'DM Sans',sans-serif;font-weight:700\">Total flows: 617\u20ac/mois automatiques \ud83c\udf89</div>\n  </div></div></div>\n  </div>"},
{t:'shopify',tag:"Exemple \u2014 C\u00c9LESTE",title:"Template email C\u00c9LESTE",vo:"Le template email C\u00c9LESTE. Un bon email e-commerce a six \u00e9l\u00e9ments. L'objet de maximum cinquante caract\u00e8res, personnalis\u00e9 avec le pr\u00e9nom \u2014 les emails personnalis\u00e9s ont vingt-six pourcent d'ouvertures en plus. Le pr\u00e9header de quatre-vingt-cinq caract\u00e8res qui compl\u00e8te l'objet. L'en-t\u00eate de marque avec les couleurs C\u00c9LESTE. Le corps en trois blocs maximum \u2014 pas de mur de texte. Un seul bouton CTA clair et contrast\u00e9. Et le footer l\u00e9gal avec le lien de d\u00e9sinscription obligatoire RGPD. Pour C\u00c9LESTE, l'email de bienvenue pr\u00e9sente la marque, offre le code BIENVENUE moins dix pourcent, et invite \u00e0 d\u00e9couvrir la collection. L'objet avec le pr\u00e9nom et l'emoji bougie d\u00e9passe les cinquante pourcent de taux d'ouverture.",html:"<div class=\"ty-split\">\n    <div class=\"split-l\"><div class=\"split-hd split-hd-l\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">STRUCTURE EMAIL QUI CONVERTIT</span></div><div class=\"split-body\"><div class=\"dk sp\">\n    <div class=\"dk-h\">Les 6 \u00e9l\u00e9ments d'un email e-commerce efficace</div>\n    \n      <div style=\"display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n        <span style=\"font-size:9px;font-weight:700;color:var(--sp);min-width:18px;font-family:'DM Sans',sans-serif\">01</span>\n        <div><div style=\"font-size:9.5px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif\">Objet accrocheur</div><div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.4\">Max 50 chars \u00b7 Personnalis\u00e9 avec le pr\u00e9nom \u00b7 Curiosit\u00e9 ou b\u00e9n\u00e9fice direct \u00b7 Emoji optionnel</div></div>\n      </div>\n      <div style=\"display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n        <span style=\"font-size:9px;font-weight:700;color:var(--sp);min-width:18px;font-family:'DM Sans',sans-serif\">02</span>\n        <div><div style=\"font-size:9.5px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif\">Pr\u00e9header</div><div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.4\">Le texte gris apr\u00e8s l'objet dans la bo\u00eete mail. 85 chars max. Compl\u00e8te l'objet sans le r\u00e9p\u00e9ter.</div></div>\n      </div>\n      <div style=\"display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n        <span style=\"font-size:9px;font-weight:700;color:var(--sp);min-width:18px;font-family:'DM Sans',sans-serif\">03</span>\n        <div><div style=\"font-size:9.5px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif\">En-t\u00eate de marque</div><div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.4\">Logo ou nom de marque + couleurs identitaires. Rappel visuel imm\u00e9diat de qui tu es.</div></div>\n      </div>\n      <div style=\"display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n        <span style=\"font-size:9px;font-weight:700;color:var(--sp);min-width:18px;font-family:'DM Sans',sans-serif\">04</span>\n        <div><div style=\"font-size:9.5px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif\">Corps \u2014 3 blocs max</div><div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.4\">Accroche (1 phrase) \u00b7 Message principal \u00b7 Preuve sociale ou argument cl\u00e9. Pas de mur de texte.</div></div>\n      </div>\n      <div style=\"display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n        <span style=\"font-size:9px;font-weight:700;color:var(--sp);min-width:18px;font-family:'DM Sans',sans-serif\">05</span>\n        <div><div style=\"font-size:9.5px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif\">CTA principal</div><div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.4\">Un seul bouton d'appel \u00e0 l'action. Clair, contrast\u00e9. \"D\u00e9couvrir\" ou \"J'en profite\" \u2014 pas \"Cliquer ici\".</div></div>\n      </div>\n      <div style=\"display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n        <span style=\"font-size:9px;font-weight:700;color:var(--sp);min-width:18px;font-family:'DM Sans',sans-serif\">06</span>\n        <div><div style=\"font-size:9.5px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif\">Footer l\u00e9gal</div><div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.4\">Lien de d\u00e9sinscription obligatoire (RGPD). Adresse physique. Lien vers la boutique.</div></div>\n      </div>\n  </div>\n  <div class=\"dk\">\n    <div class=\"dk-h\" style=\"font-size:9px\">\ud83d\udca1 Taux d'ouverture moyen e-commerce</div>\n    \n      <div class=\"stat-row\"><span class=\"stat-l\">Email de bienvenue</span><span class=\"stat-v g\">50-60%</span></div>\n      <div class=\"stat-row\"><span class=\"stat-l\">Abandon panier</span><span class=\"stat-v g\">40-50%</span></div>\n      <div class=\"stat-row\"><span class=\"stat-l\">Newsletter</span><span class=\"stat-v g\">18-25%</span></div>\n      <div class=\"stat-row\"><span class=\"stat-l\">Promo</span><span class=\"stat-v g\">20-30%</span></div>\n  </div></div></div>\n    <div class=\"split-r\"><div class=\"split-hd split-hd-r\"><span style=\"font-size:13px\">\ud83d\udd6f\ufe0f</span><span class=\"split-hd-label\">EMAIL BIENVENUE C\u00c9LESTE</span></div><div class=\"split-body\"><div class=\"email-prev\">\n    <div class=\"ep-head\">\n      <div class=\"ep-from\">De : hello@celeste-bougies.fr \u00b7 Pour : {prenom}</div>\n      <div class=\"ep-subject\">\ud83d\udd6f\ufe0f {Pr\u00e9nom}, voici votre -10% de bienvenue</div>\n    </div>\n    <div class=\"ep-body\">\n      <div class=\"ep-logo\">C\u00c9LESTE</div>\n      <div class=\"ep-h\">Bienvenue dans<br>l'univers C\u00c9LESTE \u2728</div>\n      <div class=\"ep-p\">\n        Merci de nous rejoindre, {Pr\u00e9nom}.<br><br>\n        C\u00c9LESTE, c'est l'art de transformer votre int\u00e9rieur avec des bougies artisanales 100% naturelles, fabriqu\u00e9es \u00e0 la main en France.<br><br>\n        Pour vous souhaiter la bienvenue, voici <strong style=\"color:var(--cel-gold)\">-10% sur votre premi\u00e8re commande</strong> :\n      </div>\n      <div style=\"text-align:center;margin-bottom:10px\">\n        <div style=\"background:rgba(201,169,110,.12);border:1.5px dashed rgba(201,169,110,.5);border-radius:6px;padding:8px 16px;display:inline-block;margin-bottom:8px\">\n          <div style=\"font-size:8px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Votre code :</div>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--cel-gold);letter-spacing:.1em\">BIENVENUE</div>\n        </div><br>\n        <span class=\"ep-btn\">D\u00c9COUVRIR LA COLLECTION \u2192</span>\n      </div>\n      <div style=\"font-size:8px;color:rgba(255,255,255,.3);font-family:'DM Sans',sans-serif;text-align:center;border-top:1px solid rgba(255,255,255,.07);padding-top:8px\">\n        C\u00c9LESTE \u00b7 celeste-bougies.fr<br>\n        <span style=\"text-decoration:underline;cursor:pointer\">Se d\u00e9sinscrire</span>\n      </div>\n    </div>\n  </div></div></div>\n  </div>"},
{t:'recap',title:"Ce qu'il faut retenir",vo:"R\u00e9capitulatif section onze. Le ROI de l'email est de quarante-deux euros pour un euro investi. Trois flows activ\u00e9s sur C\u00c9LESTE. Le flow bienvenue en trois emails g\u00e9n\u00e8re cent quarante-deux euros par mois. Le flow abandon panier en trois emails g\u00e9n\u00e8re trois cent quatre-vingts euros. Et le post-achat quatre-vingt-quinze euros. Total : six cent dix-sept euros de revenus automatiques par mois. C'est la base de la fid\u00e9lisation. Dans la prochaine et derni\u00e8re section du Module 2, on pr\u00e9pare le lancement de la boutique avec la checklist compl\u00e8te.",points:["Module 2 \u00b7 Section 11 \u00b7 R\u00e9capitulatif"]}]},

// ══ TRACKER NATIF ══
const TRACKER_KEY='sbw_tracker__formation-shopify';
function loadProg(){try{return JSON.parse(localStorage.getItem(TRACKER_KEY)||'{}')}catch(e){return{}}}
function saveProg(d){try{localStorage.setItem(TRACKER_KEY,JSON.stringify(d))}catch(e){}}
function markDone(idx){var d=loadProg();if(!d[idx]){d[idx]=true;d._total=LESSONS.length;d._updated=Date.now();saveProg(d);refreshUI()}}
function globalPct(){var d=loadProg();var n=LESSONS.filter(function(_,i){return!!d[i]}).length;return Math.round(n/LESSONS.length*100)}

// ══ STATE ══
var curL=0,curS=0,seen={};
function markSeen(l,s){if(!seen[l])seen[l]=new Set();seen[l].add(s);var tot=LESSONS[l].slides.length;var pct=Math.round(seen[l].size/tot*100);if(pct>=80)markDone(l);updatePbars()}

// ══ RENDER ══
function applySpScale(){
  document.querySelectorAll('.sp-dash-wrap').forEach(function(wrap){
    var inner = wrap.querySelector('.sp-dash-inner');
    if(!inner) return;
    var w = wrap.offsetWidth;
    var scale = w / 1000;
    inner.style.transform = 'scale('+scale+')';
    wrap.style.height = Math.round(562.5 * scale) + 'px';
  });
}
var _spResizeTimer;
window.addEventListener('resize', function(){
  clearTimeout(_spResizeTimer);
  _spResizeTimer = setTimeout(applySpScale, 60);
});

function render(){
  var L=LESSONS[curL],sl=L.slides[curS];
  markSeen(curL,curS);
  // Lancer la voix off si activée
  var sl_vo = LESSONS[curL].slides[curS];
  if (voixOn && sl_vo && sl_vo.vo) {
    if (synth) synth.cancel();
    setTimeout(function(){ playVoix(sl_vo.vo); }, 150);
  } else if (autoPlay) {
    // Slide sans VO : avancer après 2s
    setTimeout(autoAdvance, 2000);
  }
  var a=document.getElementById('slideArea');
  var t=sl.t,h='';
  if(t==='intro'){
    h='<div class="slide-intro"><div class="slide-num">Leçon '+L.id+' / '+LESSONS.length+'</div><span class="slide-emoji-big">'+(sl.emoji||'')+'</span><div class="slide-intro-title">'+sl.title.replace(/\\n|\n/g,'<br>')+'</div>'+(sl.sub?'<div class="slide-intro-sub">'+sl.sub+'</div>':'')+'</div>';
  } else if(t==='concept'){
    // Extraire les lignes fortes du body pour les mettre en valeur
    var bodyFmt = (sl.body||'').replace(/<br><br>/g,'</p><p>');
    // Détecter les éléments ✅ ❌ ⚠️ 🔴 etc pour les transformer en key-points
    var hasKeyPoints = /^[✅❌⚠️🔴🟢•▪]/.test(sl.body||'');
    var bodyHtml;
    if(hasKeyPoints){
      var klines = (sl.body||'').split('<br>').filter(Boolean);
      var kpts = klines.map(function(l){
        var icon = l.match(/^(\S+)\s*/);
        var txt = icon ? l.replace(icon[0],'') : l;
        return '<div class="key-point"><div class="key-point-icon">'+(icon?icon[1]:'▸')+'</div><div class="key-point-text">'+txt+'</div></div>';
      }).join('');
      bodyHtml = '<div class="concept-card">'+kpts+'</div>';
    } else {
      // Mettre les parties <strong>...</strong> en highlight
      var highlighted = (sl.body||'').replace(/<strong>(.*?)<\/strong>/g,'</p><div class="concept-highlight">$1</div><p>');
      bodyHtml = '<div class="slide-body">'+highlighted+'</div>';
    }
    var eyebrow = sl.emoji ? '<div class="slide-eyebrow"><span class="slide-eyebrow-icon">'+sl.emoji+'</span>'+(sl.tag?'<span class="slide-eyebrow-tag">'+sl.tag+'</span>':'')+'</div>' : (sl.tag?'<div class="slide-tag">'+sl.tag+'</div>':'');
    h='<div class="slide-block">'+eyebrow+'<div class="slide-title">'+sl.title+'</div>'+bodyHtml+'</div>';
  } else if(t==='cards'){
    var items=sl.items.map(function(it){return'<div class="card-item"><div class="card-emoji">'+it.emoji+'</div><div><div class="card-name">'+it.name+'</div><div class="card-sub">'+it.sub+'</div></div></div>';}).join('');
    h='<div class="slide-block"><div class="slide-title">'+sl.title+'</div><div class="cards-grid">'+items+'</div></div>';
  } else if(t==='compare'){
    var lc=sl.left,rc=sl.right;
    h='<div class="slide-block"><div class="slide-title">'+sl.title+'</div><div class="compare-grid"><div class="compare-col"><div class="compare-header"><span class="compare-emoji">'+lc.emoji+'</span><span class="compare-label">'+lc.label+'</span></div><div class="compare-num">'+lc.num+'</div>'+(lc.unit?'<div class="compare-unit">'+lc.unit+'</div>':'')+'<div class="compare-desc">'+lc.desc+'</div></div><div class="compare-col '+(rc.color||'')+'"><div class="compare-header"><span class="compare-emoji">'+rc.emoji+'</span><span class="compare-label">'+rc.label+'</span></div><div class="compare-num '+(rc.color==='good'?'green':'')+'">'+rc.num+'</div>'+(rc.unit?'<div class="compare-unit">'+rc.unit+'</div>':'')+'<div class="compare-desc">'+rc.desc+'</div></div></div>'+(sl.note?'<div class="compare-note">'+sl.note+'</div>':'')+'</div>';
  } else if(t==='stat'){
    h='<div class="slide-block"><div class="stat-block"><div class="stat-val">'+sl.val+'</div><div class="stat-unit">'+sl.unit+'</div><div class="stat-body">'+sl.body+'</div></div></div>';
  } else if(t==='shopify'){
    // Préparer l'explication depuis le VO
    var vo = sl.vo || '';
    var sents = vo.split(/(?<=[.!?])\s+/).map(function(s){return s.trim();}).filter(function(s){return s.length>12;});
    var summary = sents[0] || '';
    var steps = sents.slice(1,5);
    var stepsHtml = steps.map(function(s){
      return '<div class="sp-expl-step"><div class="sp-expl-step-dot"></div><div class="sp-expl-step-txt">'+s+'</div></div>';
    }).join('');
    var explHtml = '<div class="sp-expl">'+(summary?'<div class="sp-expl-summary">'+summary+'</div>':'')+(stepsHtml?'<div class="sp-expl-steps">'+stepsHtml+'</div>':'')+'</div>';
    var dashHtml = '<div class="sp-dash-wrap"><div class="sp-dash-inner">'+sl.html+'</div></div>';
    h = '<div class="shopify-slide">'
      + (sl.tag ? '<div class="sp-slide-tag">'+sl.tag+'</div>' : '')
      + '<div class="sp-slide-title">'+sl.title+'</div>'
      + dashHtml
      + explHtml
      + '</div>';
  } else if(t==='warning'){
    h='<div class="slide-block"><div class="warning-block"><div class="warning-icon">'+(sl.emoji||'⚠️')+'</div><div class="warning-title">'+sl.title+'</div><div class="warning-body">'+(sl.body||sl.warn||'')+'</div></div></div>';
  } else if(t==='action'){
    var steps=sl.steps.map(function(s,i){return'<div class="action-step"><div class="action-step-num">'+(i+1)+'</div><span>'+s+'</span></div>';}).join('');
    h='<div class="slide-block"><div class="action-block"><div class="action-badge">'+sl.badge+'</div><div class="action-title">'+sl.title+'</div><div class="action-steps">'+steps+'</div><a href="'+sl.url+'" target="_blank" rel="noopener" class="action-cta">'+sl.cta+' →</a></div></div>';
  } else if(t==='quote'){
    h='<div class="slide-block"><div class="quote-block"><div class="quote-text">"'+sl.text+'"</div><div class="quote-bar"></div></div></div>';
  } else if(t==='recap'){
    var pts=sl.points.map(function(p){return'<div class="recap-item"><span class="recap-dot">◆</span><span>'+p+'</span></div>';}).join('');
    h='<div class="slide-block"><div class="recap-title">'+sl.title+'</div><div class="recap-list">'+pts+'</div></div>';
  }
  a.classList.remove('slide-enter','slide-enter-back');
  a.innerHTML=h;
  void a.offsetWidth; // force reflow
  a.classList.add(window._slideDir==='prev'?'slide-enter-back':'slide-enter');
  window._slideDir='next';
  a.scrollTop=0;
  updateNav();updatePbars();updateSidebar();
}

function updateNav(){
  var L=LESSONS[curL];
  document.getElementById('navInfo').textContent='Leçon '+L.id+' · Slide '+(curS+1)+'/'+L.slides.length;
  document.getElementById('btnPrev').disabled=curL===0&&curS===0;
  var last=curL===LESSONS.length-1&&curS===L.slides.length-1;
  var nb=document.getElementById('btnNext');
  nb.textContent=last?'Terminer ✓':'Suivant →';
  nb.className=last?'btn-nav done-btn':'btn-nav primary';
}

function updatePbars(){
  var s=seen[curL]?seen[curL].size:1;
  var tot=LESSONS[curL].slides.length;
  var pct=Math.max(Math.round(s/tot*100),Math.round((curS+1)/tot*100));
  document.getElementById('slidePbar').style.width=pct+'%';
  var gp=globalPct();
  document.getElementById('hPbarFill').style.width=gp+'%';
  document.getElementById('hPct').textContent=gp+'%';
}

function updateSidebar(){
  var d=loadProg();
  document.getElementById('sbLessons').innerHTML=LESSONS.map(function(l,i){
    var done=!!d[i];
    var s=seen[i]?seen[i].size:0;
    var pct=done?100:Math.round(s/l.slides.length*100);
    return'<div class="sb-item'+(i===curL?' active':'')+(done?' done':'')+'" onclick="goTo('+i+')">'+'<span class="sb-num">'+l.id+'</span><div class="sb-info"><div class="sb-name">'+l.title+'</div><div class="sb-bar"><div class="sb-bar-fill" style="width:'+pct+'%"></div></div></div><span class="sb-check">✓</span></div>';
  }).join('');
}

function refreshUI(){updatePbars();updateSidebar();renderLessonsPanel();}

function toggleLessonsPanel() {
  var panel = document.getElementById('lessonsPanel');
  var tab = document.getElementById('lessonsTab');
  var isOpen = panel.classList.contains('open');
  if (isOpen) {
    panel.classList.remove('open');
    tab.classList.remove('active');
  } else {
    renderLessonsPanel();
    panel.classList.add('open');
    tab.classList.add('active');
  }
}

function renderLessonsPanel() {
  var d = loadProg();
  var el = document.getElementById('lpScroll');
  el.innerHTML = LESSONS.map(function(l, li) {
    var isDone = !!d[li];
    var isActivL = li === curL;
    var slides = l.slides.map(function(s, si) {
      var label = s.t === 'intro' ? '▶ Intro' :
                  s.t === 'recap' ? '✓ Recap' :
                  s.t === 'action' ? '🚀' :
                  s.t === 'stat' ? '📊' :
                  s.t === 'warning' ? '⚠️' :
                  s.t === 'quote' ? '"' :
                  s.t === 'compare' ? '⚖️' :
                  s.t === 'cards' ? '📋' : '💡';
      var isActS = isActivL && si === curS;
      return '<button class="lp-slide-btn' + (isActS?' active':'') + '" onclick="goToSlide(' + li + ',' + si + ')">' + label + ' ' + (si+1) + '</button>';
    }).join('');
    return '<div class="lp-lesson' + (isActivL?' open':'') + '">' +
      '<button class="lp-lesson-btn' + (isActivL?' active':'') + (isDone?' done':'') + '" onclick="toggleLpLesson(this,' + li + ')">' +
        '<span class="lp-lesson-num">' + l.id + '</span>' +
        '<span class="lp-lesson-name">' + l.title + '</span>' +
        '<span class="lp-lesson-check">✓</span>' +
      '</button>' +
      '<div class="lp-slides">' + slides + '</div>' +
    '</div>';
  }).join('');
}

function toggleLpLesson(btn, idx) {
  var lessonEl = btn.parentElement;
  var wasOpen = lessonEl.classList.contains('open');
  document.querySelectorAll('.lp-lesson').forEach(function(el){ el.classList.remove('open'); });
  if (!wasOpen) lessonEl.classList.add('open');
}

function goToSlide(li, si) {
  autoPlay = false; stopVoix();
  document.getElementById('playIcon').style.display='block';
  document.getElementById('pauseIcon').style.display='none';
  document.getElementById('playBtn').classList.remove('playing');
  curL = li; curS = si;
  render();
  renderLessonsPanel();
}

// ══ NAVIGATION ══
function next(){autoPlay=false;stopVoix();
  document.getElementById('playIcon').style.display='block';
  document.getElementById('pauseIcon').style.display='none';
  document.getElementById('playBtn').classList.remove('playing');
  window._slideDir='next';
  var L=LESSONS[curL];
  if(curS<L.slides.length-1){curS++;render();}
  else if(curL<LESSONS.length-1){markDone(curL);curL++;curS=0;render();}
  else{markDone(curL);}
}
function prev(){autoPlay=false;stopVoix();
  document.getElementById('playIcon').style.display='block';
  document.getElementById('pauseIcon').style.display='none';
  document.getElementById('playBtn').classList.remove('playing');
  window._slideDir='prev';
  if(curS>0){curS--;render();}
  else if(curL>0){curL--;curS=LESSONS[curL].slides.length-1;render();}
}
function goTo(idx){
  autoPlay=false;stopVoix();
  document.getElementById('playIcon').style.display='block';
  document.getElementById('pauseIcon').style.display='none';
  document.getElementById('playBtn').classList.remove('playing');
  curL=idx;curS=0;render();}

// ══ TTS ══
var voixOn = false;
var synth = window.speechSynthesis;
var utterance = null;

var autoPlay = false;

function stopVoix() {
  autoPlay = false;
  if (synth) synth.cancel();
  var subs = document.getElementById('subtitlesText');
  if (subs) { subs.classList.add('hidden'); subs.textContent = ''; }
}

function togglePlay() {
  if (autoPlay) {
    // Pause
    autoPlay = false;
    voixOn = false;
    stopVoix();
    document.getElementById('playIcon').style.display = 'block';
    document.getElementById('pauseIcon').style.display = 'none';
    document.getElementById('playBtn').classList.remove('playing');
    document.getElementById('btnVoix').classList.remove('active');
    document.getElementById('btnVoix').textContent = '🔊 Voix';
  } else {
    // Play
    voixOn = true;
    autoPlay = true;
    document.getElementById('playIcon').style.display = 'none';
    document.getElementById('pauseIcon').style.display = 'block';
    document.getElementById('playBtn').classList.add('playing');
    document.getElementById('btnVoix').classList.add('active');
    document.getElementById('btnVoix').textContent = '🔊 Voix ON';
    var sl = LESSONS[curL].slides[curS];
    if (sl && sl.vo) playVoix(sl.vo);
    else autoAdvance();
  }
}

function autoAdvance() {
  if (!autoPlay) return;
  window._slideDir='next';
  // Avancer au slide suivant
  var L = LESSONS[curL];
  if (curS < L.slides.length - 1) {
    curS++; render();
  } else if (curL < LESSONS.length - 1) {
    markDone(curL); curL++; curS = 0; render();
  } else {
    markDone(curL); autoPlay = false;
  }
}

function playVoix(text) {
  if (!voixOn || !text || !synth) return;
  synth.cancel();
  // Supprimer le préfixe "Leçon X." en début de VO
  text = text.replace(/^Le[çc]on\s+\w+\.?\s*/i, '');
  utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'fr-FR';
  utterance.rate = 1.05;
  utterance.pitch = 1;
  utterance.volume = 1;
  var voices = synth.getVoices();
  var frVoice = voices.find(function(v) { return v.lang === 'fr-FR' && v.name.indexOf('Google') > -1; })
    || voices.find(function(v) { return v.lang === 'fr-FR'; })
    || voices.find(function(v) { return v.lang.startsWith('fr'); });
  if (frVoice) utterance.voice = frVoice;

  // Sous-titres synchronisés via boundary event
  var subs = document.getElementById('subtitlesText');
  var sentences = text.match(/[^.!?…]+[.!?…]+\s*/g) || [text];
  // Précalculer les positions de début de chaque phrase
  var positions = [];
  var pos = 0;
  sentences.forEach(function(s) {
    positions.push(pos);
    pos += s.length;
  });

  utterance.onboundary = function(e) {
    if (e.name !== 'word' && e.name !== 'sentence') return;
    var ci = e.charIndex;
    // Trouver la phrase qui contient cet index
    var phraseIdx = 0;
    for (var i = positions.length - 1; i >= 0; i--) {
      if (ci >= positions[i]) { phraseIdx = i; break; }
    }
    subs.classList.remove('hidden');
    subs.textContent = sentences[phraseIdx].trim();
  };

  utterance.onend = function() {
    subs.classList.add('hidden');
    subs.textContent = '';
    if (autoPlay) setTimeout(autoAdvance, 400);
  };
  utterance.onerror = function() {
    subs.classList.add('hidden');
    subs.textContent = '';
  };

  synth.speak(utterance);
}

function playVoixAuto(text) {
  // Comme playVoix mais déclenche autoAdvance à la fin
  playVoix(text);
}

function toggleVoix() {
  voixOn = !voixOn;
  var btn = document.getElementById('btnVoix');
  if (voixOn) {
    btn.classList.add('active');
    btn.textContent = '🔊 Voix ON';
    // Lire le slide actuel
    var sl = LESSONS[curL].slides[curS];
    if (sl.vo) playVoix(sl.vo);
  } else {
    btn.classList.remove('active');
    btn.textContent = '🔊 Voix';
    stopVoix();
  }
}

// ══ INIT ══
(function(){
  var d=loadProg();
  LESSONS.forEach(function(l,i){if(d[i])seen[i]=new Set(Array.from({length:l.slides.length},function(_,j){return j;}));});
  var start=0;
  for(var i=0;i<LESSONS.length;i++){if(!d[i]){start=i;break;}if(i===LESSONS.length-1)start=i;}
  curL=start;curS=0;
  voixOn = false;
  render();
  setTimeout(applySpScale, 100);
})();

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  if(e.key==='ArrowLeft'){e.preventDefault();prev();}
});
