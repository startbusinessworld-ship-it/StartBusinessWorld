{t:'intro',emoji:"\ud83d\ude9a",num:"06",title:"Livraison",sub:"69% des paniers abandonn\u00e9s le sont \u00e0 cause des frais de port. Une bonne strat\u00e9gie livraison, c'est offrir la livraison gratuite au bon seuil pour augmenter le panier moyen sans sacrifier tes marges.",vo:"Section six. Configurer la livraison. Soixante-neuf pourcent des abandons de panier sont caus\u00e9s par les frais de port. C'est la stat la plus importante du e-commerce. Une strat\u00e9gie livraison bien pens\u00e9e peut doubler ton taux de conversion. Dans cette section, on cr\u00e9e les zones, on configure les tarifs, et on met en place la livraison gratuite au bon seuil pour C\u00c9LESTE."},
{t:'shopify',title:"Zones et profils de livraison",vo:"Les zones de livraison. Dans Param\u00e8tres, Livraison et exp\u00e9dition, tu trouves les profils de livraison. Le profil g\u00e9n\u00e9ral contient tous tes produits par d\u00e9faut. Pour chaque profil, tu cr\u00e9es des zones \u2014 une zone regroupe des pays avec les m\u00eames tarifs. Pour C\u00c9LESTE, on cr\u00e9e trois zones : France m\u00e9tropolitaine, Europe, et International. On commence par activer uniquement la France au lancement. L'Europe s'active apr\u00e8s les cinquante premi\u00e8res ventes pour ne pas complexifier la logistique trop t\u00f4t.",html:"<div class=\"ty-split\">\n    <div class=\"split-how\"><div class=\"split-hd split-hd-how\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">COMMENT FAIRE \u2014 Zones de livraison</span></div><div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div><div class=\"sp-dot\" style=\"background:#febc2e\"></div><div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com/settings/shipping</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\"><div class=\"sp-logo-bag\">\ud83d\uded2</div><span class=\"sp-logo-w\">shopify</span><span class=\"sp-snm\">Ma boutique</span></div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\"><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2302</span>Accueil</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\ud83d\udce6</span>Commandes</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\ud83c\udff7\ufe0f</span>Produits</div><div class=\"sp-ni on\"><span class=\"sp-ni-ic\">\u2699\ufe0f</span>Param\u00e8tres</div></div></div>\n        <div class=\"sp-cnt\">\n          <div class=\"sp-hd\"><span class=\"sp-bc\"><a>Param\u00e8tres</a> \u203a Livraison</span><div class=\"sp-ph\">Livraison et exp\u00e9dition</div><div class=\"sp-acts\"><button class=\"btn-sp dk\">+ Cr\u00e9er un profil</button></div></div>\n          <div class=\"sp-main\"><div class=\"sp-cm\">\n      <div class=\"card\">\n        <div class=\"card-h\">Acc\u00e9der \u00e0 la configuration livraison</div>\n        <div style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;line-height:1.6;margin-bottom:8px\">\n          Param\u00e8tres \u2192 <strong>Livraison et exp\u00e9dition</strong> \u2192 Section \"Profils de livraison\"\n        </div>\n        <div style=\"background:#f6f6f7;border-radius:5px;padding:8px;margin-bottom:6px\">\n          <div style=\"font-size:9.5px;font-weight:700;color:var(--sp-txt);font-family:'DM Sans',sans-serif;margin-bottom:4px\">Profil g\u00e9n\u00e9ral (par d\u00e9faut)</div>\n          <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;line-height:1.5\">Tous tes produits sont dans ce profil par d\u00e9faut. Tu peux cr\u00e9er des profils s\u00e9par\u00e9s pour des produits avec des r\u00e8gles sp\u00e9ciales (ex: produits tr\u00e8s lourds).</div>\n        </div>\n        <div class=\"card-h\">Les zones de livraison</div>\n        <div style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;line-height:1.6\">\n          Une zone = un ou plusieurs pays avec les <strong>m\u00eames tarifs de livraison</strong>.<br>\n          Ex: \"France m\u00e9tropolitaine\" \u00b7 \"Europe\" \u00b7 \"Reste du monde\"<br><br>\n          Pour ajouter une zone : cliquer sur <strong>\"Ajouter une zone\"</strong> dans le profil \u2192 nommer la zone \u2192 s\u00e9lectionner les pays.\n        </div>\n      </div></div></div>\n        </div>\n      </div>\n    </div>\n  </div></div></div>\n    <div class=\"split-cel\"><div class=\"split-hd split-hd-cel\"><span style=\"font-size:13px\">\ud83d\udd6f\ufe0f</span><span class=\"split-hd-label\">SUR C\u00c9LESTE \u2014 Zones France + Europe</span></div><div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div><div class=\"sp-dot\" style=\"background:#febc2e\"></div><div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com/settings/shipping</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\"><div class=\"sp-logo-bag\">\ud83d\uded2</div><span class=\"sp-logo-w\">shopify</span><span class=\"sp-snm\">C\u00c9LESTE Bougies</span></div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\"><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2302</span>Accueil</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\ud83d\udce6</span>Commandes</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\ud83c\udff7\ufe0f</span>Produits</div><div class=\"sp-ni on\"><span class=\"sp-ni-ic\">\u2699\ufe0f</span>Param\u00e8tres</div></div></div>\n        <div class=\"sp-cnt\">\n          <div class=\"sp-hd\"><span class=\"sp-bc\"><a>Param\u00e8tres</a> \u203a Livraison</span><div class=\"sp-ph\">Livraison et exp\u00e9dition</div><div class=\"sp-acts\"></div></div>\n          <div class=\"sp-main\"><div class=\"sp-cm\">\n      <div class=\"card\" style=\"border-color:rgba(201,169,110,.3)\">\n        <div class=\"card-h\">Zones de livraison C\u00c9LESTE</div>\n        \n          <div style=\"padding:6px 0;border-bottom:1px solid rgba(201,169,110,.1)\">\n            <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:3px\">\n              <span style=\"font-size:14px\">\ud83c\uddeb\ud83c\uddf7</span>\n              <div style=\"font-size:10px;font-weight:700;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">France m\u00e9tropolitaine</div>\n              <span style=\"margin-left:auto;font-size:8px;background:rgba(0,128,96,.1);color:var(--sp);padding:1px 6px;border-radius:8px;font-family:'DM Sans',sans-serif\">3 tarifs</span>\n            </div>\n            <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;padding-left:20px\">France</div>\n          </div>\n          <div style=\"padding:6px 0;border-bottom:1px solid rgba(201,169,110,.1)\">\n            <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:3px\">\n              <span style=\"font-size:14px\">\ud83c\uddea\ud83c\uddfa</span>\n              <div style=\"font-size:10px;font-weight:700;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Europe</div>\n              <span style=\"margin-left:auto;font-size:8px;background:rgba(0,128,96,.1);color:var(--sp);padding:1px 6px;border-radius:8px;font-family:'DM Sans',sans-serif\">2 tarifs</span>\n            </div>\n            <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;padding-left:20px\">Belgique \u00b7 Suisse \u00b7 Luxembourg \u00b7 Allemagne \u00b7 Espagne \u00b7 Italie</div>\n          </div>\n          <div style=\"padding:6px 0;border-bottom:1px solid rgba(201,169,110,.1)\">\n            <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:3px\">\n              <span style=\"font-size:14px\">\ud83c\udf0d</span>\n              <div style=\"font-size:10px;font-weight:700;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">International</div>\n              <span style=\"margin-left:auto;font-size:8px;background:rgba(0,128,96,.1);color:var(--sp);padding:1px 6px;border-radius:8px;font-family:'DM Sans',sans-serif\">1 tarif</span>\n            </div>\n            <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;padding-left:20px\">Reste du monde</div>\n          </div>\n        <div style=\"margin-top:7px;font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">\n          \ud83d\udca1 On commence par la France uniquement au lancement. L'Europe s'active apr\u00e8s les premi\u00e8res 50 ventes.\n        </div>\n      </div></div></div>\n        </div>\n      </div>\n    </div>\n  </div></div></div>\n  </div>"},
{t:'shopify',title:"Tarifs et livraison gratuite",vo:"Les tarifs de livraison. Dans chaque zone, tu cliques sur Ajouter un tarif. Quatre types existent : tarif fixe, tarif bas\u00e9 sur le poids, tarif bas\u00e9 sur le montant de commande, et livraison gratuite conditionnelle. La r\u00e8gle d'or pour le seuil de livraison gratuite : panier moyen multipli\u00e9 par un virgule trois. Si ton panier moyen est quarante-six euros, tu mets la livraison gratuite \u00e0 soixante euros. Pour C\u00c9LESTE, on configure trois tarifs pour la France : Colissimo domicile \u00e0 quatre euros quatre-vingt-dix, Mondial Relay \u00e0 trois euros cinquante, et livraison gratuite d\u00e8s soixante euros. Ce seuil \u00e0 soixante euros pousse les clients \u00e0 prendre deux bougies au lieu d'une.",html:"<div class=\"ty-split\">\n    <div class=\"split-how\"><div class=\"split-hd split-hd-how\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">COMMENT FAIRE \u2014 Configurer les tarifs</span></div><div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div><div class=\"sp-dot\" style=\"background:#febc2e\"></div><div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com/settings/shipping</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\"><div class=\"sp-logo-bag\">\ud83d\uded2</div><span class=\"sp-logo-w\">shopify</span><span class=\"sp-snm\">Ma boutique</span></div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\"><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2302</span>Accueil</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\ud83d\udce6</span>Commandes</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\ud83c\udff7\ufe0f</span>Produits</div><div class=\"sp-ni on\"><span class=\"sp-ni-ic\">\u2699\ufe0f</span>Param\u00e8tres</div></div></div>\n        <div class=\"sp-cnt\">\n          <div class=\"sp-hd\"><span class=\"sp-bc\"><a>Livraison</a> \u203a France</span><div class=\"sp-ph\">France m\u00e9tropolitaine</div><div class=\"sp-acts\"><button class=\"btn-sp\">Enregistrer</button></div></div>\n          <div class=\"sp-main\"><div class=\"sp-cm\">\n      <div class=\"card\">\n        <div class=\"card-h\">Ajouter des tarifs \u00e0 une zone</div>\n        <div style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;margin-bottom:7px\">Dans la zone, clique sur <strong>\"Ajouter un tarif\"</strong>. Tu peux cr\u00e9er autant de tarifs que tu veux avec des conditions diff\u00e9rentes.</div>\n        <div class=\"zone-hd\">Types de tarifs disponibles</div>\n        \n          <div style=\"display:flex;gap:7px;padding:4px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n            <span style=\"font-size:13px\">\ud83d\udcb0</span>\n            <div>\n              <div style=\"font-size:9.5px;font-weight:600;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Tarif fixe</div>\n              <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Ex: 4,90\u20ac quelle que soit la commande</div>\n            </div>\n          </div>\n          <div style=\"display:flex;gap:7px;padding:4px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n            <span style=\"font-size:13px\">\ud83d\udce6</span>\n            <div>\n              <div style=\"font-size:9.5px;font-weight:600;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Tarif bas\u00e9 sur le poids</div>\n              <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Ex: 0-500g \u2192 4,90\u20ac \u00b7 500g-2kg \u2192 6,90\u20ac</div>\n            </div>\n          </div>\n          <div style=\"display:flex;gap:7px;padding:4px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n            <span style=\"font-size:13px\">\ud83d\udcb3</span>\n            <div>\n              <div style=\"font-size:9.5px;font-weight:600;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Tarif bas\u00e9 sur le prix commande</div>\n              <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Ex: 0-40\u20ac \u2192 4,90\u20ac \u00b7 +40\u20ac \u2192 Gratuit</div>\n            </div>\n          </div>\n          <div style=\"display:flex;gap:7px;padding:4px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n            <span style=\"font-size:13px\">\ud83c\udf81</span>\n            <div>\n              <div style=\"font-size:9.5px;font-weight:600;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Livraison gratuite conditionnelle</div>\n              <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Seulement si montant commande > X\u20ac</div>\n            </div>\n          </div>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-h\" style=\"color:var(--sp)\">\ud83d\udca1 La r\u00e8gle d'or du seuil livraison gratuite</div>\n        <div style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;line-height:1.5\">\n          Seuil = <strong style=\"color:var(--sp-txt)\">panier moyen actuel \u00d7 1,3</strong><br>\n          Si ton panier moyen est 35\u20ac, mets la livraison gratuite \u00e0 45\u20ac. Tu incites \u00e0 rajouter un produit sans \u00eatre agressif.\n        </div>\n      </div></div></div>\n        </div>\n      </div>\n    </div>\n  </div></div></div>\n    <div class=\"split-cel\"><div class=\"split-hd split-hd-cel\"><span style=\"font-size:13px\">\ud83d\udd6f\ufe0f</span><span class=\"split-hd-label\">SUR C\u00c9LESTE \u2014 Strat\u00e9gie tarifaire</span></div><div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div><div class=\"sp-dot\" style=\"background:#febc2e\"></div><div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com/settings/shipping</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\"><div class=\"sp-logo-bag\">\ud83d\uded2</div><span class=\"sp-logo-w\">shopify</span><span class=\"sp-snm\">C\u00c9LESTE Bougies</span></div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\"><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2302</span>Accueil</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\ud83d\udce6</span>Commandes</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\ud83c\udff7\ufe0f</span>Produits</div><div class=\"sp-ni on\"><span class=\"sp-ni-ic\">\u2699\ufe0f</span>Param\u00e8tres</div></div></div>\n        <div class=\"sp-cnt\">\n          <div class=\"sp-hd\"><span class=\"sp-bc\"><a>Livraison</a> \u203a France</span><div class=\"sp-ph\">France m\u00e9tropolitaine</div><div class=\"sp-acts\"><button class=\"btn-sp\">Enregistrer</button></div></div>\n          <div class=\"sp-main\"><div class=\"sp-cm\">\n      <div class=\"card\" style=\"border-color:rgba(201,169,110,.3)\">\n        <div class=\"card-h\">Tarifs France \u2014 C\u00c9LESTE</div>\n        <div class=\"rate-row\">\n          <div style=\"width:22px;height:22px;background:var(--sp);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0\">\ud83d\udcee</div>\n          <div style=\"flex:1\">\n            <div class=\"rate-name\">Colissimo domicile</div>\n            <div class=\"rate-cond\">Commandes entre 0\u20ac et 59,99\u20ac</div>\n          </div>\n          <span class=\"rate-price paid\">4,90\u20ac</span>\n        </div>\n        <div class=\"rate-row\">\n          <div style=\"width:22px;height:22px;background:#0070ba;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0\">\ud83d\udccd</div>\n          <div style=\"flex:1\">\n            <div class=\"rate-name\">Mondial Relay (point relais)</div>\n            <div class=\"rate-cond\">Commandes entre 0\u20ac et 59,99\u20ac</div>\n          </div>\n          <span class=\"rate-price paid\">3,50\u20ac</span>\n        </div>\n        <div class=\"rate-row\" style=\"border:1.5px solid rgba(0,128,96,.3);background:rgba(0,128,96,.04)\">\n          <div style=\"width:22px;height:22px;background:var(--sp);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0\">\ud83c\udf81</div>\n          <div style=\"flex:1\">\n            <div class=\"rate-name\" style=\"color:var(--sp)\">Livraison GRATUITE \ud83c\udf89</div>\n            <div class=\"rate-cond\" style=\"color:var(--sp)\">Commandes d\u00e8s 60\u20ac</div>\n          </div>\n          <span class=\"rate-price free\">0,00\u20ac</span>\n        </div>\n        <div style=\"margin-top:7px;padding:6px;background:rgba(201,169,110,.06);border-radius:5px\">\n          <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;line-height:1.5\">\n            Panier moyen vis\u00e9 : <strong style=\"color:var(--sp-txt)\">46\u20ac</strong> (Bougie Rose de Mai + 1 bougie)<br>\n            Seuil livraison gratuite : <strong style=\"color:var(--sp)\">60\u20ac</strong> = 46 \u00d7 1,3<br>\n            \u2192 Incite \u00e0 prendre 2 bougies au lieu d'une \u2705\n          </div>\n        </div>\n      </div></div></div>\n        </div>\n      </div>\n    </div>\n  </div></div></div>\n  </div>"},
{t:'shopify',title:"D\u00e9lais et message de livraison",vo:"Les d\u00e9lais et la communication. Pour chaque tarif dans Shopify, tu peux renseigner un d\u00e9lai estim\u00e9 qui s'affiche au client pendant le checkout. Pour C\u00c9LESTE, le d\u00e9lai de traitement est de un \u00e0 deux jours ouvr\u00e9s \u2014 c'est le temps de pr\u00e9parer les bougies \u00e0 la main. Ensuite Colissimo prend deux \u00e0 trois jours ouvr\u00e9s, et Mondial Relay trois \u00e0 cinq jours. Le num\u00e9ro de suivi est envoy\u00e9 automatiquement par Shopify d\u00e8s qu'on marque la commande comme exp\u00e9di\u00e9e. Cette transparence sur les d\u00e9lais rassure le client et r\u00e9duit les demandes de support.",html:"<div class=\"ty-split\">\n    <div class=\"split-how\"><div class=\"split-hd split-hd-how\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">COMMENT FAIRE \u2014 D\u00e9lais et communication</span></div><div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div><div class=\"sp-dot\" style=\"background:#febc2e\"></div><div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com/settings/shipping</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\"><div class=\"sp-logo-bag\">\ud83d\uded2</div><span class=\"sp-logo-w\">shopify</span><span class=\"sp-snm\">Ma boutique</span></div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\"><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2302</span>Accueil</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\ud83d\udce6</span>Commandes</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\ud83c\udff7\ufe0f</span>Produits</div><div class=\"sp-ni on\"><span class=\"sp-ni-ic\">\u2699\ufe0f</span>Param\u00e8tres</div></div></div>\n        <div class=\"sp-cnt\">\n          <div class=\"sp-hd\"><span class=\"sp-bc\"><a>Param\u00e8tres</a> \u203a Livraison</span><div class=\"sp-ph\">Livraison et exp\u00e9dition</div><div class=\"sp-acts\"></div></div>\n          <div class=\"sp-main\"><div class=\"sp-cm\">\n      <div class=\"card\">\n        <div class=\"card-h\">D\u00e9lais d'exp\u00e9dition estim\u00e9s</div>\n        <div style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;line-height:1.6;margin-bottom:7px\">\n          Pour chaque tarif, tu peux ajouter un d\u00e9lai estim\u00e9 affich\u00e9 au client au moment du checkout.\n        </div>\n        \n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:5px 7px;background:#f9fafb;border-radius:4px;margin-bottom:3px\">\n            <span style=\"font-size:9.5px;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Standard / Colissimo</span>\n            <span style=\"font-size:9px;font-weight:700;color:var(--sp-blue);font-family:'DM Sans',sans-serif\">2-3 jours ouvr\u00e9s</span>\n          </div>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:5px 7px;background:#f9fafb;border-radius:4px;margin-bottom:3px\">\n            <span style=\"font-size:9.5px;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Point relais</span>\n            <span style=\"font-size:9px;font-weight:700;color:var(--sp-blue);font-family:'DM Sans',sans-serif\">3-5 jours ouvr\u00e9s</span>\n          </div>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:5px 7px;background:#f9fafb;border-radius:4px;margin-bottom:3px\">\n            <span style=\"font-size:9.5px;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Europe</span>\n            <span style=\"font-size:9px;font-weight:700;color:var(--sp-blue);font-family:'DM Sans',sans-serif\">5-7 jours ouvr\u00e9s</span>\n          </div>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-h\">Adresse d'exp\u00e9dition</div>\n        <div style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;line-height:1.6;margin-bottom:6px\">\n          Configure ton adresse d'exp\u00e9dition dans <strong>Param\u00e8tres \u2192 Infos boutique</strong>. Shopify l'utilise pour calculer les frais de port en temps r\u00e9el avec les transporteurs.\n        </div>\n        <div class=\"card-h\" style=\"font-size:9px;color:var(--sp)\">\ud83d\udca1 D\u00e9lai de traitement</div>\n        <div style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;line-height:1.5\">\n          Distingue le <strong style=\"color:var(--sp-txt)\">d\u00e9lai de traitement</strong> (temps pour pr\u00e9parer et exp\u00e9dier) du d\u00e9lai de livraison (transport). Pour une boutique artisanale, pr\u00e9vois 1-2 jours de traitement.\n        </div>\n      </div></div></div>\n        </div>\n      </div>\n    </div>\n  </div></div></div>\n    <div class=\"split-cel\"><div class=\"split-hd split-hd-cel\"><span style=\"font-size:13px\">\ud83d\udd6f\ufe0f</span><span class=\"split-hd-label\">SUR C\u00c9LESTE \u2014 Promesse de livraison</span></div><div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div><div class=\"sp-dot\" style=\"background:#febc2e\"></div><div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com/settings/shipping</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\"><div class=\"sp-logo-bag\">\ud83d\uded2</div><span class=\"sp-logo-w\">shopify</span><span class=\"sp-snm\">C\u00c9LESTE Bougies</span></div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\"><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2302</span>Accueil</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\ud83d\udce6</span>Commandes</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\ud83c\udff7\ufe0f</span>Produits</div><div class=\"sp-ni on\"><span class=\"sp-ni-ic\">\u2699\ufe0f</span>Param\u00e8tres</div></div></div>\n        <div class=\"sp-cnt\">\n          <div class=\"sp-hd\"><div class=\"sp-ph\">Livraison C\u00c9LESTE</div><div class=\"sp-acts\"></div></div>\n          <div class=\"sp-main\"><div class=\"sp-cm\">\n      <div class=\"card\" style=\"border-color:rgba(201,169,110,.3)\">\n        <div class=\"card-h\">Promesse de livraison C\u00c9LESTE</div>\n        <div style=\"background:rgba(201,169,110,.08);border-radius:6px;padding:10px;margin-bottom:8px\">\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:12px;font-weight:700;color:var(--cel-dk);margin-bottom:6px\">Livraison C\u00c9LESTE</div>\n          \n            <div style=\"display:flex;gap:7px;padding:4px 0;border-bottom:1px solid rgba(201,169,110,.15);align-items:flex-start\">\n              <span style=\"font-size:13px;flex-shrink:0\">\ud83d\udce6</span>\n              <div>\n                <div style=\"font-size:9.5px;font-weight:600;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Pr\u00e9paration artisanale</div>\n                <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">1-2 jours ouvr\u00e9s \u00b7 chaque commande pr\u00e9par\u00e9e \u00e0 la main</div>\n              </div>\n            </div>\n            <div style=\"display:flex;gap:7px;padding:4px 0;border-bottom:1px solid rgba(201,169,110,.15);align-items:flex-start\">\n              <span style=\"font-size:13px;flex-shrink:0\">\ud83d\udcee</span>\n              <div>\n                <div style=\"font-size:9.5px;font-weight:600;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Colissimo domicile</div>\n                <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">2-3 jours ouvr\u00e9s \u00b7 4,90\u20ac (gratuit d\u00e8s 60\u20ac)</div>\n              </div>\n            </div>\n            <div style=\"display:flex;gap:7px;padding:4px 0;border-bottom:1px solid rgba(201,169,110,.15);align-items:flex-start\">\n              <span style=\"font-size:13px;flex-shrink:0\">\ud83d\udccd</span>\n              <div>\n                <div style=\"font-size:9.5px;font-weight:600;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Point relais Mondial Relay</div>\n                <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">3-5 jours ouvr\u00e9s \u00b7 3,50\u20ac (gratuit d\u00e8s 60\u20ac)</div>\n              </div>\n            </div>\n            <div style=\"display:flex;gap:7px;padding:4px 0;border-bottom:1px solid rgba(201,169,110,.15);align-items:flex-start\">\n              <span style=\"font-size:13px;flex-shrink:0\">\u2709\ufe0f</span>\n              <div>\n                <div style=\"font-size:9.5px;font-weight:600;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Num\u00e9ro de suivi</div>\n                <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Envoy\u00e9 par email d\u00e8s exp\u00e9dition</div>\n              </div>\n            </div>\n        </div>\n        <div style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;line-height:1.5\">\n          \ud83d\udca1 Ce message appara\u00eetra dans la page Livraison (Section 7) et dans les emails de confirmation automatiques.\n        </div>\n      </div></div></div>\n        </div>\n      </div>\n    </div>\n  </div></div></div>\n  </div>"},
{t:'recap',title:"Ce qu'il faut retenir",vo:"R\u00e9capitulatif section six. Trois zones de livraison cr\u00e9\u00e9es, on commence par la France uniquement. Le seuil livraison gratuite est \u00e0 soixante euros \u2014 exactement un virgule trois fois le panier moyen vis\u00e9 de quarante-six euros. Colissimo domicile \u00e0 quatre euros quatre-vingt-dix et Mondial Relay \u00e0 trois euros cinquante pour les moins press\u00e9s. D\u00e9lai de traitement un \u00e0 deux jours ouvr\u00e9s, suivi envoy\u00e9 automatiquement. Dans la prochaine section, on cr\u00e9e les pages essentielles et on configure la navigation de la boutique.",points:["Module 2 \u00b7 Section 6 \u00b7 R\u00e9capitulatif"]}]},

{t:'intro',emoji:"\ud83d\udcc4",num:"07",title:"Pages & Navigation",sub:"Les pages de ta boutique ne sont pas juste du contenu l\u00e9gal. Elles construisent la confiance. Un client qui ne trouve pas de CGV ni de page \u00c0 propos ne sort pas son portefeuille.",vo:"Section sept. Pages essentielles et navigation. Les pages de ta boutique construisent la confiance avant m\u00eame que le client ne regarde tes produits. Une boutique sans page \u00c0 propos ni mentions l\u00e9gales fait fuir les clients m\u00e9fiants. Dans cette section on cr\u00e9e toutes les pages indispensables et on configure les deux menus de C\u00c9LESTE \u2014 le menu principal en haut et le menu pied de page en bas."},
{t:'shopify',title:"Pages essentielles",vo:"Cr\u00e9er les pages. Dans Shopify, tu vas dans Boutique en ligne, puis Pages, et tu cliques sur Ajouter une page. Six pages sont indispensables : \u00c0 propos, Contact, CGV, Politique de confidentialit\u00e9, Politique de livraison, et Politique de retour. Les quatre premi\u00e8res sont obligatoires l\u00e9galement en France. Pour C\u00c9LESTE, on a renomm\u00e9 la page \u00c0 propos en Notre histoire \u2014 c'est plus storytelling et plus fid\u00e8le \u00e0 l'identit\u00e9 de la marque. Shopify g\u00e9n\u00e8re automatiquement les pages CGV et politique de confidentialit\u00e9 depuis les param\u00e8tres l\u00e9gaux \u2014 profites-en pour les personnaliser.",html:"<div class=\"ty-split\">\n    <div class=\"split-how\"><div class=\"split-hd split-hd-how\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">COMMENT FAIRE \u2014 Cr\u00e9er les pages</span></div><div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div><div class=\"sp-dot\" style=\"background:#febc2e\"></div><div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com/pages</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\"><div class=\"sp-logo-bag\">\ud83d\uded2</div><span class=\"sp-logo-w\">shopify</span><span class=\"sp-snm\">Ma boutique</span></div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\"><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2302</span>Accueil</div><div class=\"sp-ni on\"><span class=\"sp-ni-ic\">\ud83d\udcc4</span>Pages</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2630</span>Navigation</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2699\ufe0f</span>Param\u00e8tres</div></div></div>\n        <div class=\"sp-cnt\">\n          <div class=\"sp-hd\"><div class=\"sp-ph\">Pages</div><div class=\"sp-acts\"><button class=\"btn-sp dk\">+ Ajouter une page</button></div></div>\n          <div class=\"sp-main\"><div class=\"sp-cm\">\n      <div class=\"card\">\n        <div class=\"card-h\">Comment cr\u00e9er une page</div>\n        <div style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;line-height:1.6;margin-bottom:7px\">\n          Boutique en ligne \u2192 Pages \u2192 Ajouter une page<br>\n          Tu as un \u00e9diteur texte enrichi. Titre + contenu + SEO.\n        </div>\n        <div class=\"card-h\">Les 6 pages indispensables</div>\n        \n          <div class=\"page-row\">\n            <span class=\"page-ic\">\ud83d\udcac</span>\n            <div style=\"flex:1\">\n              <div class=\"page-name\">\u00c0 propos</div>\n              <div class=\"page-url\">/pages/a-propos</div>\n            </div>\n            <span class=\"page-badge req\">Obligatoire</span>\n          </div>\n          <div class=\"page-row\">\n            <span class=\"page-ic\">\ud83d\udcde</span>\n            <div style=\"flex:1\">\n              <div class=\"page-name\">Contact</div>\n              <div class=\"page-url\">/pages/contact</div>\n            </div>\n            <span class=\"page-badge req\">Obligatoire</span>\n          </div>\n          <div class=\"page-row\">\n            <span class=\"page-ic\">\u2696\ufe0f</span>\n            <div style=\"flex:1\">\n              <div class=\"page-name\">CGV</div>\n              <div class=\"page-url\">/pages/cgv</div>\n            </div>\n            <span class=\"page-badge req\">L\u00e9gal FR</span>\n          </div>\n          <div class=\"page-row\">\n            <span class=\"page-ic\">\ud83d\udd12</span>\n            <div style=\"flex:1\">\n              <div class=\"page-name\">Politique de confidentialit\u00e9</div>\n              <div class=\"page-url\">/pages/confidentialite</div>\n            </div>\n            <span class=\"page-badge req\">RGPD</span>\n          </div>\n          <div class=\"page-row\">\n            <span class=\"page-ic\">\ud83d\ude9a</span>\n            <div style=\"flex:1\">\n              <div class=\"page-name\">Politique de livraison</div>\n              <div class=\"page-url\">/pages/livraison</div>\n            </div>\n            <span class=\"page-badge req\">L\u00e9gal FR</span>\n          </div>\n          <div class=\"page-row\">\n            <span class=\"page-ic\">\u21a9\ufe0f</span>\n            <div style=\"flex:1\">\n              <div class=\"page-name\">Politique de retour</div>\n              <div class=\"page-url\">/pages/retours</div>\n            </div>\n            <span class=\"page-badge opt\">Recommand\u00e9</span>\n          </div>\n      </div></div></div>\n        </div>\n      </div>\n    </div>\n  </div></div></div>\n    <div class=\"split-cel\"><div class=\"split-hd split-hd-cel\"><span style=\"font-size:13px\">\ud83d\udd6f\ufe0f</span><span class=\"split-hd-label\">SUR C\u00c9LESTE \u2014 Les pages de la boutique</span></div><div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div><div class=\"sp-dot\" style=\"background:#febc2e\"></div><div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com/pages</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\"><div class=\"sp-logo-bag\">\ud83d\uded2</div><span class=\"sp-logo-w\">shopify</span><span class=\"sp-snm\">C\u00c9LESTE Bougies</span></div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\"><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2302</span>Accueil</div><div class=\"sp-ni on\"><span class=\"sp-ni-ic\">\ud83d\udcc4</span>Pages</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2630</span>Navigation</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2699\ufe0f</span>Param\u00e8tres</div></div></div>\n        <div class=\"sp-cnt\">\n          <div class=\"sp-hd\"><div class=\"sp-ph\">Pages</div><div class=\"sp-acts\"><button class=\"btn-sp dk\">+ Ajouter une page</button></div></div>\n          <div class=\"sp-main\"><div class=\"sp-cm\">\n      <div class=\"card\" style=\"border-color:rgba(201,169,110,.3)\">\n        <div class=\"card-h\">Pages C\u00c9LESTE \u2014 toutes cr\u00e9\u00e9es \u2705</div>\n        \n          <div class=\"page-row\" style=\"border-color:rgba(201,169,110,.2);background:rgba(201,169,110,.02)\">\n            <span class=\"page-ic\">\ud83d\udd6f\ufe0f</span>\n            <div style=\"flex:1\">\n              <div class=\"page-name\">Notre histoire</div>\n              <div class=\"page-url\">/pages/notre-histoire</div>\n            </div>\n            <span style=\"font-size:8px;color:var(--sp);font-family:'DM Sans',sans-serif;font-weight:600\">\u2705 Publi\u00e9e</span>\n          </div>\n          <div class=\"page-row\" style=\"border-color:rgba(201,169,110,.2);background:rgba(201,169,110,.02)\">\n            <span class=\"page-ic\">\ud83d\udcde</span>\n            <div style=\"flex:1\">\n              <div class=\"page-name\">Contact</div>\n              <div class=\"page-url\">/pages/contact</div>\n            </div>\n            <span style=\"font-size:8px;color:var(--sp);font-family:'DM Sans',sans-serif;font-weight:600\">\u2705 Publi\u00e9e</span>\n          </div>\n          <div class=\"page-row\" style=\"border-color:rgba(201,169,110,.2);background:rgba(201,169,110,.02)\">\n            <span class=\"page-ic\">\u2696\ufe0f</span>\n            <div style=\"flex:1\">\n              <div class=\"page-name\">CGV</div>\n              <div class=\"page-url\">/pages/cgv</div>\n            </div>\n            <span style=\"font-size:8px;color:var(--sp);font-family:'DM Sans',sans-serif;font-weight:600\">\u2705 Publi\u00e9e</span>\n          </div>\n          <div class=\"page-row\" style=\"border-color:rgba(201,169,110,.2);background:rgba(201,169,110,.02)\">\n            <span class=\"page-ic\">\ud83d\udd12</span>\n            <div style=\"flex:1\">\n              <div class=\"page-name\">Politique de confidentialit\u00e9</div>\n              <div class=\"page-url\">/pages/confidentialite</div>\n            </div>\n            <span style=\"font-size:8px;color:var(--sp);font-family:'DM Sans',sans-serif;font-weight:600\">\u2705 Publi\u00e9e</span>\n          </div>\n          <div class=\"page-row\" style=\"border-color:rgba(201,169,110,.2);background:rgba(201,169,110,.02)\">\n            <span class=\"page-ic\">\ud83d\ude9a</span>\n            <div style=\"flex:1\">\n              <div class=\"page-name\">Livraison & d\u00e9lais</div>\n              <div class=\"page-url\">/pages/livraison</div>\n            </div>\n            <span style=\"font-size:8px;color:var(--sp);font-family:'DM Sans',sans-serif;font-weight:600\">\u2705 Publi\u00e9e</span>\n          </div>\n          <div class=\"page-row\" style=\"border-color:rgba(201,169,110,.2);background:rgba(201,169,110,.02)\">\n            <span class=\"page-ic\">\u21a9\ufe0f</span>\n            <div style=\"flex:1\">\n              <div class=\"page-name\">Retours & \u00e9changes</div>\n              <div class=\"page-url\">/pages/retours</div>\n            </div>\n            <span style=\"font-size:8px;color:var(--sp);font-family:'DM Sans',sans-serif;font-weight:600\">\u2705 Publi\u00e9e</span>\n          </div>\n        <div style=\"margin-top:7px;font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">\n          \ud83d\udca1 On a renomm\u00e9 \"\u00c0 propos\" en \"Notre histoire\" \u2014 plus storytelling, plus fid\u00e8le \u00e0 l'identit\u00e9 C\u00c9LESTE.\n        </div>\n      </div></div></div>\n        </div>\n      </div>\n    </div>\n  </div></div></div>\n  </div>"},
{t:'shopify',title:"Page \"\u00c0 propos\" qui convertit",vo:"La page \u00c0 propos. C'est la deuxi\u00e8me page la plus visit\u00e9e d'une boutique e-commerce apr\u00e8s la page produit. La structure en cinq parties : l'accroche avec le pourquoi \u2014 pourquoi cette marque existe. L'histoire avec le comment \u2014 personnel, imparfait, humain. Les valeurs \u2014 trois maximum illustr\u00e9es par des faits concrets. Une photo et un pr\u00e9nom \u2014 le client ach\u00e8te \u00e0 quelqu'un, pas \u00e0 une marque abstraite. Et un appel \u00e0 l'action vers les collections. Pour C\u00c9LESTE, l'accroche plante le d\u00e9cor imm\u00e9diatement. L'histoire commence dans la cuisine \u2014 c'est humain et cr\u00e9dible. Les trois valeurs sont concr\u00e8tes et v\u00e9rifiables. Et on finit par un lien vers les collections.",html:"<div class=\"ty-split\">\n    <div class=\"split-how\"><div class=\"split-hd split-hd-how\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">COMMENT FAIRE \u2014 \u00c9crire un \u00c0 propos efficace</span></div><div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div><div class=\"sp-dot\" style=\"background:#febc2e\"></div><div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com/pages/edit</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\"><div class=\"sp-logo-bag\">\ud83d\uded2</div><span class=\"sp-logo-w\">shopify</span><span class=\"sp-snm\">Ma boutique</span></div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\"><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2302</span>Accueil</div><div class=\"sp-ni on\"><span class=\"sp-ni-ic\">\ud83d\udcc4</span>Pages</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2630</span>Navigation</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2699\ufe0f</span>Param\u00e8tres</div></div></div>\n        <div class=\"sp-cnt\">\n          <div class=\"sp-hd\"><span class=\"sp-bc\"><a>Pages</a> \u203a \u00c0 propos</span><div class=\"sp-ph\">\u00c0 propos \u2014 \u00c9dition</div><div class=\"sp-acts\"><button class=\"btn-sp\">Enregistrer</button></div></div>\n          <div class=\"sp-main\"><div class=\"sp-cm\">\n      <div class=\"card\">\n        <div class=\"card-h\">Structure d'un \u00c0 propos qui convertit</div>\n        \n          <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n            <span style=\"font-size:9px;font-weight:700;color:var(--sp-blue);min-width:16px;font-family:'DM Sans',sans-serif\">01</span>\n            <div>\n              <div style=\"font-size:9.5px;font-weight:700;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">L'accroche \u2014 le pourquoi</div>\n              <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Pourquoi cette marque existe. Quelle frustration ou passion t'a pouss\u00e9 \u00e0 cr\u00e9er.</div>\n            </div>\n          </div>\n          <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n            <span style=\"font-size:9px;font-weight:700;color:var(--sp-blue);min-width:16px;font-family:'DM Sans',sans-serif\">02</span>\n            <div>\n              <div style=\"font-size:9.5px;font-weight:700;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">L'histoire \u2014 le comment</div>\n              <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Comment tu as commenc\u00e9. Rends-le personnel, imparfait, humain.</div>\n            </div>\n          </div>\n          <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n            <span style=\"font-size:9px;font-weight:700;color:var(--sp-blue);min-width:16px;font-family:'DM Sans',sans-serif\">03</span>\n            <div>\n              <div style=\"font-size:9.5px;font-weight:700;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Les valeurs \u2014 le quoi</div>\n              <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Ce qui te diff\u00e9rencie concr\u00e8tement. 3 valeurs max, illustr\u00e9es par des faits.</div>\n            </div>\n          </div>\n          <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n            <span style=\"font-size:9px;font-weight:700;color:var(--sp-blue);min-width:16px;font-family:'DM Sans',sans-serif\">04</span>\n            <div>\n              <div style=\"font-size:9.5px;font-weight:700;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">L'\u00e9quipe ou la personne</div>\n              <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Une photo et un pr\u00e9nom font plus que cent mots. Le client ach\u00e8te \u00e0 quelqu'un.</div>\n            </div>\n          </div>\n          <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n            <span style=\"font-size:9px;font-weight:700;color:var(--sp-blue);min-width:16px;font-family:'DM Sans',sans-serif\">05</span>\n            <div>\n              <div style=\"font-size:9.5px;font-weight:700;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">L'appel \u00e0 l'action</div>\n              <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Vers la boutique ou vers une collection. Ne laisse pas le client sur la page.</div>\n            </div>\n          </div>\n        <div style=\"margin-top:6px;padding:6px;background:rgba(0,128,96,.05);border-radius:5px\">\n          <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;line-height:1.5\">\n            \ud83d\udca1 <strong style=\"color:var(--sp-txt)\">Longueur :</strong> 250 \u00e0 400 mots. Assez pour cr\u00e9er de la confiance, pas assez pour ennuyer.\n          </div>\n        </div>\n      </div></div></div>\n        </div>\n      </div>\n    </div>\n  </div></div></div>\n    <div class=\"split-cel\"><div class=\"split-hd split-hd-cel\"><span style=\"font-size:13px\">\ud83d\udd6f\ufe0f</span><span class=\"split-hd-label\">SUR C\u00c9LESTE \u2014 Notre histoire</span></div><div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div><div class=\"sp-dot\" style=\"background:#febc2e\"></div><div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com/pages/edit</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\"><div class=\"sp-logo-bag\">\ud83d\uded2</div><span class=\"sp-logo-w\">shopify</span><span class=\"sp-snm\">C\u00c9LESTE Bougies</span></div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\"><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2302</span>Accueil</div><div class=\"sp-ni on\"><span class=\"sp-ni-ic\">\ud83d\udcc4</span>Pages</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2630</span>Navigation</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2699\ufe0f</span>Param\u00e8tres</div></div></div>\n        <div class=\"sp-cnt\">\n          <div class=\"sp-hd\"><span class=\"sp-bc\"><a>Pages</a> \u203a Notre histoire</span><div class=\"sp-ph\">Notre histoire \u2014 C\u00c9LESTE</div><div class=\"sp-acts\"><button class=\"btn-sp\">Enregistrer</button></div></div>\n          <div class=\"sp-main\"><div class=\"sp-cm\">\n      <div class=\"card\" style=\"border-color:rgba(201,169,110,.3)\">\n        <div class=\"card-h\">Notre histoire \u2014 C\u00c9LESTE</div>\n        <div style=\"background:rgba(201,169,110,.06);border-radius:6px;padding:10px;font-family:'DM Sans',sans-serif\">\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:700;color:var(--cel-dk);margin-bottom:8px\">\ud83d\udd6f\ufe0f L'art du parfum, l'\u00e2me de votre int\u00e9rieur</div>\n          <div style=\"font-size:9px;color:var(--sp-txt);line-height:1.7\">\n            <span style=\"color:var(--sp-blue);font-weight:600\">\u2014 L'accroche :</span><br>\n            \"C\u00c9LESTE est n\u00e9e d'une conviction simple : une bougie peut transformer une pi\u00e8ce ordinaire en sanctuaire.\"<br><br>\n            <span style=\"color:var(--sp-blue);font-weight:600\">\u2014 L'histoire :</span><br>\n            \"Tout a commenc\u00e9 dans ma cuisine, avec un pot de cire de soja, trois parfums de Grasse, et l'obstination de cr\u00e9er quelque chose de beau.\"<br><br>\n            <span style=\"color:var(--sp-blue);font-weight:600\">\u2014 Les valeurs :</span><br>\n            Cire 100% naturelle \u00b7 Parfums de Grasse \u00b7 Fabriqu\u00e9 \u00e0 la main en France<br><br>\n            <span style=\"color:var(--sp-blue);font-weight:600\">\u2014 Le CTA :</span><br>\n            \"\u2192 D\u00e9couvrir nos collections\"\n          </div>\n        </div>\n      </div></div></div>\n        </div>\n      </div>\n    </div>\n  </div></div></div>\n  </div>"},
{t:'shopify',title:"Configurer la navigation",vo:"La navigation. Shopify a deux menus : le menu principal en haut de chaque page, et le pied de page en bas. Pour les configurer, tu vas dans Boutique en ligne, Navigation. Pour chaque menu tu cliques sur Ajouter un \u00e9l\u00e9ment et tu choisis le type \u2014 page, collection, produit ou lien personnalis\u00e9. Tu r\u00e9ordonnes en glissant-d\u00e9posant. Pour cr\u00e9er un sous-menu comme Collections d\u00e9roulant, tu glisses les \u00e9l\u00e9ments enfants en retrait sous l'\u00e9l\u00e9ment parent. Pour C\u00c9LESTE, le menu principal contient Accueil, le sous-menu Collections avec les trois collections, Best-sellers, et Notre histoire. Le pied de page contient tous les liens l\u00e9gaux et le contact.",html:"<div class=\"ty-split\">\n    <div class=\"split-how\"><div class=\"split-hd split-hd-how\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">COMMENT FAIRE \u2014 Menus de navigation</span></div><div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div><div class=\"sp-dot\" style=\"background:#febc2e\"></div><div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com/menus</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\"><div class=\"sp-logo-bag\">\ud83d\uded2</div><span class=\"sp-logo-w\">shopify</span><span class=\"sp-snm\">Ma boutique</span></div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\"><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2302</span>Accueil</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\ud83d\udcc4</span>Pages</div><div class=\"sp-ni on\"><span class=\"sp-ni-ic\">\u2630</span>Navigation</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2699\ufe0f</span>Param\u00e8tres</div></div></div>\n        <div class=\"sp-cnt\">\n          <div class=\"sp-hd\"><span class=\"sp-bc\">Boutique en ligne \u203a Navigation</span><div class=\"sp-ph\">Navigation</div><div class=\"sp-acts\"><button class=\"btn-sp dk\">+ Cr\u00e9er un menu</button></div></div>\n          <div class=\"sp-main\"><div class=\"sp-cm\">\n      <div class=\"card\">\n        <div class=\"card-h\">Les 2 menus essentiels</div>\n        <div style=\"display:flex;gap:6px;margin-bottom:8px\">\n          <div style=\"flex:1;padding:7px;background:rgba(44,110,203,.05);border:1px solid rgba(44,110,203,.2);border-radius:5px\">\n            <div style=\"font-size:9.5px;font-weight:700;color:var(--sp-blue);font-family:'DM Sans',sans-serif;margin-bottom:3px\">\u2630 Menu principal</div>\n            <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;line-height:1.4\">En haut de toutes les pages. Navigation principale vers les collections et pages cl\u00e9s.</div>\n          </div>\n          <div style=\"flex:1;padding:7px;background:rgba(0,0,0,.03);border:1px solid var(--sp-bd);border-radius:5px\">\n            <div style=\"font-size:9.5px;font-weight:700;color:var(--sp-txt);font-family:'DM Sans',sans-serif;margin-bottom:3px\">\u2b07\ufe0f Pied de page</div>\n            <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;line-height:1.4\">En bas de toutes les pages. Liens l\u00e9gaux, contact, infos pratiques.</div>\n          </div>\n        </div>\n        <div class=\"card-h\">Ajouter un \u00e9l\u00e9ment au menu</div>\n        <div style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;line-height:1.6\">\n          Dans le menu \u2192 <strong>Ajouter un \u00e9l\u00e9ment de menu</strong> \u2192 Choisir le type :<br>\n          \u2192 <strong>Page</strong> (\u00c0 propos, Contact...)<br>\n          \u2192 <strong>Collection</strong> (Florale, Bois\u00e9e...)<br>\n          \u2192 <strong>Lien personnalis\u00e9</strong> (URL externe ou interne)<br>\n          \u2192 <strong>Produit</strong> (lien direct vers un produit)<br><br>\n          Tu peux r\u00e9ordonner par <strong>glisser-d\u00e9poser</strong> et cr\u00e9er des sous-menus en glissant un \u00e9l\u00e9ment en retrait.\n        </div>\n      </div></div></div>\n        </div>\n      </div>\n    </div>\n  </div></div></div>\n    <div class=\"split-cel\"><div class=\"split-hd split-hd-cel\"><span style=\"font-size:13px\">\ud83d\udd6f\ufe0f</span><span class=\"split-hd-label\">SUR C\u00c9LESTE \u2014 Menu principal + pied de page</span></div><div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div><div class=\"sp-dot\" style=\"background:#febc2e\"></div><div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com/menus</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\"><div class=\"sp-logo-bag\">\ud83d\uded2</div><span class=\"sp-logo-w\">shopify</span><span class=\"sp-snm\">C\u00c9LESTE Bougies</span></div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\"><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2302</span>Accueil</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\ud83d\udcc4</span>Pages</div><div class=\"sp-ni on\"><span class=\"sp-ni-ic\">\u2630</span>Navigation</div><div class=\"sp-ni\"><span class=\"sp-ni-ic\">\u2699\ufe0f</span>Param\u00e8tres</div></div></div>\n        <div class=\"sp-cnt\">\n          <div class=\"sp-hd\"><span class=\"sp-bc\">Boutique en ligne \u203a Navigation</span><div class=\"sp-ph\">Navigation</div><div class=\"sp-acts\"></div></div>\n          <div class=\"sp-main\"><div class=\"sp-cm\">\n      <div class=\"card\" style=\"border-color:rgba(201,169,110,.3)\">\n        <div class=\"card-h\">Menu principal C\u00c9LESTE</div>\n        \n          <div class=\"nav-item\">\n            <span class=\"nav-drag\">\u283f</span>\n            <span style=\"font-size:12px\">\ud83c\udfe0</span>\n            <span class=\"nav-lbl\">Accueil</span>\n            <span class=\"nav-type\">Page d'accueil</span>\n          </div>\n          <div class=\"nav-item\">\n            <span class=\"nav-drag\">\u283f</span>\n            <span style=\"font-size:12px\">\ud83d\udcc2</span>\n            <span class=\"nav-lbl\">Collections</span>\n            <span class=\"nav-type\">Sous-menu d\u00e9roulant</span>\n          </div>\n          <div class=\"nav-item sub\">\n            <span class=\"nav-drag\">\u283f</span>\n            <span style=\"font-size:12px\">\ud83c\udf39</span>\n            <span class=\"nav-lbl\">\u2192 Florale</span>\n            <span class=\"nav-type\">Collection</span>\n          </div>\n          <div class=\"nav-item sub\">\n            <span class=\"nav-drag\">\u283f</span>\n            <span style=\"font-size:12px\">\ud83c\udf32</span>\n            <span class=\"nav-lbl\">\u2192 Bois\u00e9e</span>\n            <span class=\"nav-type\">Collection</span>\n          </div>\n          <div class=\"nav-item sub\">\n            <span class=\"nav-drag\">\u283f</span>\n            <span style=\"font-size:12px\">\ud83c\udf4b</span>\n            <span class=\"nav-lbl\">\u2192 Fra\u00eeche</span>\n            <span class=\"nav-type\">Collection</span>\n          </div>\n          <div class=\"nav-item\">\n            <span class=\"nav-drag\">\u283f</span>\n            <span style=\"font-size:12px\">\u2b50</span>\n            <span class=\"nav-lbl\">Best-sellers</span>\n            <span class=\"nav-type\">Collection</span>\n          </div>\n          <div class=\"nav-item\">\n            <span class=\"nav-drag\">\u283f</span>\n            <span style=\"font-size:12px\">\ud83d\udd6f\ufe0f</span>\n            <span class=\"nav-lbl\">Notre histoire</span>\n            <span class=\"nav-type\">Page</span>\n          </div>\n      </div>\n      <div class=\"card\" style=\"margin-top:5px\">\n        <div class=\"card-h\">Pied de page C\u00c9LESTE</div>\n        <div style=\"display:flex;flex-wrap:wrap;gap:4px\">\n          \n            <span style=\"font-size:8.5px;background:#f1f2f4;border:1px solid var(--sp-bd);border-radius:4px;padding:2px 8px;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">\u00c0 propos</span>\n            <span style=\"font-size:8.5px;background:#f1f2f4;border:1px solid var(--sp-bd);border-radius:4px;padding:2px 8px;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Contact</span>\n            <span style=\"font-size:8.5px;background:#f1f2f4;border:1px solid var(--sp-bd);border-radius:4px;padding:2px 8px;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">CGV</span>\n            <span style=\"font-size:8.5px;background:#f1f2f4;border:1px solid var(--sp-bd);border-radius:4px;padding:2px 8px;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Confidentialit\u00e9</span>\n            <span style=\"font-size:8.5px;background:#f1f2f4;border:1px solid var(--sp-bd);border-radius:4px;padding:2px 8px;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Livraison</span>\n            <span style=\"font-size:8.5px;background:#f1f2f4;border:1px solid var(--sp-bd);border-radius:4px;padding:2px 8px;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Retours</span>\n        </div>\n      </div></div></div>\n        </div>\n      </div>\n    </div>\n  </div></div></div>\n  </div>"},
{t:'recap',title:"Ce qu'il faut retenir",vo:"R\u00e9capitulatif section sept. Six pages cr\u00e9\u00e9es : Notre histoire, Contact, CGV, Confidentialit\u00e9, Livraison, et Retours. La page Notre histoire suit la structure en cinq parties qui convertit. Le menu principal de C\u00c9LESTE : Accueil, sous-menu Collections d\u00e9roulant avec les trois collections, Best-sellers, et Notre histoire. Le pied de page contient tous les liens l\u00e9gaux. Dans la prochaine section, on connecte le nom de domaine personnalis\u00e9 \u00e0 la boutique.",points:["Module 2 \u00b7 Section 7 \u00b7 R\u00e9capitulatif"]}]},

{t:'intro',emoji:"\ud83c\udf10",num:"08",title:"Nom de domaine",sub:"celeste-bougies.myshopify.com, \u00e7a fait test. celeste-bougies.fr, \u00e7a fait marque. Un domaine co\u00fbte entre 7 et 14\u20ac par an. C'est l'un des meilleurs investissements que tu feras pour ta boutique.",vo:"Section huit. Le nom de domaine. Ton URL par d\u00e9faut sur Shopify c'est tonsite point myshopify point com. \u00c7a fait test, \u00e7a fait amateur. Un vrai domaine comme celeste-bougies point fr co\u00fbte entre sept et quatorze euros par an, c'est moins d'un caf\u00e9 par mois. Dans cette section, on compare les quatre fa\u00e7ons d'acheter un domaine, on choisit la meilleure option selon ton profil, et on connecte le domaine \u00e0 la boutique Shopify."},
{t:'shopify',title:"Choisir o\u00f9 acheter son domaine",vo:"Quatre options pour acheter ton domaine. Premi\u00e8re option : via Shopify directement. C'est le plus simple \u2014 deux clics depuis Param\u00e8tres Domaines, connexion automatique, pas de manipulation DNS. Environ quatorze euros par an. Recommand\u00e9 si tu veux avancer vite sans te prendre la t\u00eate. Deuxi\u00e8me option : Ionos. Interface claire, support t\u00e9l\u00e9phonique en fran\u00e7ais, environ six euros par an. C'est l'option recommand\u00e9e pour un bon \u00e9quilibre simplicit\u00e9 et prix. Troisi\u00e8me option : OVHcloud. R\u00e9f\u00e9rence fran\u00e7aise, tr\u00e8s fiable, sept euros par an. Interface moins intuitive mais bien document\u00e9e. Quatri\u00e8me option : Namecheap. Le moins cher, en anglais, pour les profils plus techniques. Pour C\u00c9LESTE on choisit le domaine celeste-bougies.fr via Ionos.",html:"<div class=\"ty-split\">\n    <div class=\"split-how\"><div class=\"split-hd split-hd-how\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">LES 4 OPTIONS \u2014 Comparatif registraires</span></div><div class=\"split-body\" style=\"padding:10px\"><div style=\"background:var(--bg);height:100%\">\n\n    <div class=\"registrar-card simple\">\n      <div class=\"rc-top\">\n        <div class=\"rc-logo\" style=\"background:#004499;color:#fff\">\ud83d\uded2</div>\n        <div style=\"flex:1\">\n          <div class=\"rc-name\">Via Shopify directement</div>\n          <span class=\"rc-badge easy\">\u26a1 Z\u00e9ro config</span>\n        </div>\n        <span class=\"rc-price\" style=\"color:var(--sp-blue)\">~14\u20ac/an</span>\n      </div>\n      <div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.5\">Achat et connexion automatique en 2 clics depuis Param\u00e8tres \u2192 Domaines. Pas de manipulation DNS, pas de risque d'erreur. La meilleure option si tu veux avancer vite.</div>\n      <div class=\"rc-pros\">\n        <span class=\"rc-pro\">\u2705 Connexion auto</span><span class=\"rc-pro\">\u2705 Renouvellement auto</span><span class=\"rc-pro\">\u26a0\ufe0f Plus cher</span><span class=\"rc-pro\">\u26a0\ufe0f Moins flexible</span>\n      </div>\n    </div>\n\n    <div class=\"registrar-card best\">\n      <div class=\"rc-top\">\n        <div class=\"rc-logo\" style=\"background:#004899;color:#fff;font-size:10px;font-weight:700;font-family:'DM Sans',sans-serif\">io</div>\n        <div style=\"flex:1\">\n          <div class=\"rc-name\">Ionos</div>\n          <span class=\"rc-badge easy\">\ud83d\udc4d Simple</span>\n        </div>\n        <span class=\"rc-price\" style=\"color:var(--sp)\">~6\u20ac/an</span>\n      </div>\n      <div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.5\">Interface claire, support t\u00e9l\u00e9phonique FR, prix comp\u00e9titifs. Bonne option pour les d\u00e9butants qui veulent un registraire externe sans se compliquer la vie.</div>\n      <div class=\"rc-pros\">\n        <span class=\"rc-pro\">\u2705 Interface claire</span><span class=\"rc-pro\">\u2705 Support FR</span><span class=\"rc-pro\">\u2705 Prix comp\u00e9titif</span><span class=\"rc-pro\">\u2705 DNS simple</span>\n      </div>\n    </div>\n\n    <div class=\"registrar-card\">\n      <div class=\"rc-top\">\n        <div class=\"rc-logo\" style=\"background:#123F6D;color:#fff;font-size:10px;font-weight:700;font-family:'DM Sans',sans-serif\">OVH</div>\n        <div style=\"flex:1\">\n          <div class=\"rc-name\">OVHcloud</div>\n          <span class=\"rc-badge cheap\">\ud83c\uddeb\ud83c\uddf7 Populaire FR</span>\n        </div>\n        <span class=\"rc-price\" style=\"color:var(--sp-blue)\">~7\u20ac/an</span>\n      </div>\n      <div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.5\">R\u00e9f\u00e9rence fran\u00e7aise, tr\u00e8s fiable. Interface moins intuitive qu'Ionos mais bien document\u00e9e. Bonne option si tu pr\u00e9vois d'utiliser d'autres services OVH (h\u00e9bergement, email pro...).</div>\n      <div class=\"rc-pros\">\n        <span class=\"rc-pro\">\u2705 Tr\u00e8s fiable</span><span class=\"rc-pro\">\u2705 Made in FR</span><span class=\"rc-pro\">\u26a0\ufe0f Interface dat\u00e9e</span>\n      </div>\n    </div>\n\n    <div class=\"registrar-card\">\n      <div class=\"rc-top\">\n        <div class=\"rc-logo\" style=\"background:#de3723;color:#fff;font-size:9px;font-weight:700;font-family:'DM Sans',sans-serif\">NC</div>\n        <div style=\"flex:1\">\n          <div class=\"rc-name\">Namecheap</div>\n          <span class=\"rc-badge cheap\">\ud83d\udcb0 Moins cher</span>\n        </div>\n        <span class=\"rc-price\" style=\"color:var(--sp-blue)\">~8\u20ac/an</span>\n      </div>\n      <div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.5\">Tr\u00e8s populaire internationalement, interface en anglais. DNS avanc\u00e9, WHOIS privacy inclus. Pour les plus \u00e0 l'aise techniquement.</div>\n      <div class=\"rc-pros\">\n        <span class=\"rc-pro\">\u2705 WHOIS gratuit</span><span class=\"rc-pro\">\u2705 DNS avanc\u00e9</span><span class=\"rc-pro\">\u26a0\ufe0f En anglais</span>\n      </div>\n    </div>\n  </div></div></div>\n    <div class=\"split-cel\"><div class=\"split-hd split-hd-cel\"><span style=\"font-size:13px\">\ud83d\udd6f\ufe0f</span><span class=\"split-hd-label\">SUR C\u00c9LESTE \u2014 Notre choix</span></div><div class=\"split-body\" style=\"padding:10px\"><div style=\"background:var(--bg);height:100%;padding:4px\">\n    <div style=\"background:rgba(201,169,110,.05);border:1px solid rgba(201,169,110,.25);border-radius:8px;padding:10px;margin-bottom:8px\">\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:700;color:var(--cel-gold);margin-bottom:6px\">\ud83d\udd6f\ufe0f Le domaine C\u00c9LESTE</div>\n      <div style=\"font-size:18px;font-weight:700;font-family:'Cormorant Garamond',serif;color:var(--white);text-align:center;padding:10px;background:rgba(0,0,0,.3);border-radius:6px;margin-bottom:8px\">\n        celeste-bougies.fr\n      </div>\n      <div style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.5;margin-bottom:6px\">\n        Extension <strong style=\"color:var(--white)\">.fr</strong> recommand\u00e9e pour une marque fran\u00e7aise \u2014 \u00e7a renforce le positionnement Made in France et rassure les clients fran\u00e7ais.<br><br>\n        Achet\u00e9 via <strong style=\"color:var(--cel-gold)\">Ionos</strong> \u2014 interface simple, support FR, 6\u20ac/an.\n      </div>\n    </div>\n\n    <div style=\"background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:10px\">\n      <div style=\"font-size:9.5px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif;margin-bottom:7px\">\ud83e\udded Comment choisir ton registraire</div>\n      \n        <div style=\"padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n          <div style=\"font-size:9px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Tu veux aller vite, z\u00e9ro prise de t\u00eate</div>\n          <div style=\"font-size:9.5px;font-weight:700;color:var(--cel-gold);font-family:'DM Sans',sans-serif\">\u2192 Shopify Domains</div>\n        </div>\n        <div style=\"padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n          <div style=\"font-size:9px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Tu veux simple + \u00e9conomique + support FR</div>\n          <div style=\"font-size:9.5px;font-weight:700;color:var(--cel-gold);font-family:'DM Sans',sans-serif\">\u2192 Ionos \u2705 Recommand\u00e9</div>\n        </div>\n        <div style=\"padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n          <div style=\"font-size:9px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Tu veux 100% fran\u00e7ais + fiable</div>\n          <div style=\"font-size:9.5px;font-weight:700;color:var(--cel-gold);font-family:'DM Sans',sans-serif\">\u2192 OVHcloud</div>\n        </div>\n        <div style=\"padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n          <div style=\"font-size:9px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Tu es \u00e0 l'aise avec la technique</div>\n          <div style=\"font-size:9.5px;font-weight:700;color:var(--cel-gold);font-family:'DM Sans',sans-serif\">\u2192 Namecheap</div>\n        </div>\n    </div>\n  </div></div></div>\n  </div>"},
{t:'shopify',title:"Connecter un domaine externe \u00e0 Shopify",vo:"Connecter un domaine externe \u00e0 Shopify. Il y a deux \u00e9tapes. Premi\u00e8re \u00e9tape dans Shopify : Param\u00e8tres, Domaines, Connecter un domaine existant. Tu saisis ton domaine et Shopify t'affiche les param\u00e8tres DNS \u00e0 configurer \u2014 un enregistrement A et un CNAME. Deuxi\u00e8me \u00e9tape chez ton registraire, dans la zone DNS du domaine. Tu modifies l'enregistrement A pour pointer vers l'adresse IP de Shopify, vingt-trois point deux cent vingt-sept point trente-huit point soixante-cinq, et tu ajoutes le CNAME www vers ton adresse myshopify. Tu sauvegardes et tu attends la propagation DNS \u2014 souvent moins d'une heure. Pour C\u00c9LESTE on fait \u00e7a sur Ionos en trois minutes. Shopify active le HTTPS automatiquement une fois le domaine connect\u00e9.",html:"<div class=\"ty-split\">\n    <div class=\"split-how\"><div class=\"split-hd split-hd-how\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">COMMENT FAIRE \u2014 Connexion DNS</span></div><div class=\"split-body\" style=\"padding:10px\"><div style=\"background:var(--bg);height:100%\">\n    <div style=\"background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:10px;margin-bottom:8px\">\n      <div style=\"font-size:10px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif;margin-bottom:8px\">\u00c9tape 1 \u2014 Dans Shopify</div>\n      \n        <div class=\"dns-step\">\n          <div class=\"dns-n\">1</div>\n          <div>\n            <div class=\"dns-t\">Param\u00e8tres \u2192 Domaines</div>\n            <div class=\"dns-d\">Cliquer sur \"Connecter un domaine existant\"</div>\n          </div>\n        </div>\n        <div class=\"dns-step\">\n          <div class=\"dns-n\">2</div>\n          <div>\n            <div class=\"dns-t\">Saisir ton domaine</div>\n            <div class=\"dns-d\">Ex: celeste-bougies.fr \u2192 Shopify affiche les param\u00e8tres DNS \u00e0 configurer</div>\n          </div>\n        </div>\n        <div class=\"dns-step\">\n          <div class=\"dns-n\">3</div>\n          <div>\n            <div class=\"dns-t\">Copier les valeurs DNS</div>\n            <div class=\"dns-d\">Shopify te donne un enregistrement A et un CNAME \u00e0 copier</div>\n          </div>\n        </div>\n    </div>\n\n    <div style=\"background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:10px\">\n      <div style=\"font-size:10px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif;margin-bottom:8px\">\u00c9tape 2 \u2014 Dans ton registraire (Ionos/OVH/Namecheap)</div>\n      \n        <div class=\"dns-step\">\n          <div class=\"dns-n\">4</div>\n          <div>\n            <div class=\"dns-t\">Aller dans la gestion DNS du domaine</div>\n            <div class=\"dns-d\">Chercher \"Zone DNS\", \"Enregistrements DNS\" ou \"Gestion DNS\"</div>\n            \n            \n          </div>\n        </div>\n        <div class=\"dns-step\">\n          <div class=\"dns-n\">5</div>\n          <div>\n            <div class=\"dns-t\">Modifier l'enregistrement A</div>\n            <div class=\"dns-d\">Pointer l'IP vers Shopify</div>\n            <div class=\"dns-code\">A @ \u2192 23.227.38.65</div>\n            \n          </div>\n        </div>\n        <div class=\"dns-step\">\n          <div class=\"dns-n\">6</div>\n          <div>\n            <div class=\"dns-t\">Ajouter le CNAME www</div>\n            <div class=\"dns-d\">\"www\" \u2192 shops.myshopify.com</div>\n            \n            <div class=\"dns-code\">CNAME www \u2192 shops.myshopify.com</div>\n          </div>\n        </div>\n        <div class=\"dns-step\">\n          <div class=\"dns-n\">7</div>\n          <div>\n            <div class=\"dns-t\">Sauvegarder et attendre</div>\n            <div class=\"dns-d\">Propagation DNS : 15 min \u00e0 48h (souvent < 1h)</div>\n            \n            \n          </div>\n        </div>\n      <div style=\"margin-top:7px;padding:6px;background:rgba(185,137,0,.08);border:1px solid rgba(185,137,0,.25);border-radius:5px\">\n        <div style=\"font-size:8.5px;color:#D4A820;font-family:'DM Sans',sans-serif;line-height:1.5\">\n          \u23f1\ufe0f <strong>Propagation DNS :</strong> une fois les changements sauvegard\u00e9s, attends entre 15 minutes et 48 heures. En pratique, \u00e7a prend rarement plus d'une heure.\n        </div>\n      </div>\n    </div>\n  </div></div></div>\n    <div class=\"split-cel\"><div class=\"split-hd split-hd-cel\"><span style=\"font-size:13px\">\ud83d\udd6f\ufe0f</span><span class=\"split-hd-label\">SUR C\u00c9LESTE \u2014 Connexion Ionos \u2192 Shopify</span></div><div class=\"split-body\" style=\"padding:10px\"><div style=\"background:var(--bg);height:100%\">\n    <div style=\"background:rgba(201,169,110,.05);border:1px solid rgba(201,169,110,.25);border-radius:8px;padding:10px;margin-bottom:8px\">\n      <div style=\"font-size:10px;font-weight:700;color:var(--cel-gold);font-family:'DM Sans',sans-serif;margin-bottom:8px\">\ud83d\udd6f\ufe0f Connexion Ionos \u2192 Shopify</div>\n      \n        <div style=\"margin-bottom:8px\">\n          <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:4px\">\n            <span style=\"font-size:12px\">\ud83d\udd35</span>\n            <span style=\"font-size:9.5px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif\">Chez Ionos</span>\n          </div>\n          <div style=\"display:flex;align-items:flex-start;gap:5px;padding:3px 0;border-bottom:1px solid rgba(201,169,110,.08)\">\n            <span style=\"color:var(--cel-gold);font-size:10px;flex-shrink:0\">\u2192</span>\n            <span style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Connexion sur ionos.fr \u2192 Mes domaines</span>\n          </div><div style=\"display:flex;align-items:flex-start;gap:5px;padding:3px 0;border-bottom:1px solid rgba(201,169,110,.08)\">\n            <span style=\"color:var(--cel-gold);font-size:10px;flex-shrink:0\">\u2192</span>\n            <span style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">S\u00e9lectionner celeste-bougies.fr \u2192 DNS</span>\n          </div><div style=\"display:flex;align-items:flex-start;gap:5px;padding:3px 0;border-bottom:1px solid rgba(201,169,110,.08)\">\n            <span style=\"color:var(--cel-gold);font-size:10px;flex-shrink:0\">\u2192</span>\n            <span style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Modifier enregistrement A existant</span>\n          </div>\n        </div>\n        <div style=\"margin-bottom:8px\">\n          <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:4px\">\n            <span style=\"font-size:12px\">\ud83d\udcbb</span>\n            <span style=\"font-size:9.5px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif\">Valeurs DNS C\u00c9LESTE</span>\n          </div>\n          <div style=\"display:flex;align-items:flex-start;gap:5px;padding:3px 0;border-bottom:1px solid rgba(201,169,110,.08)\">\n            <span style=\"color:var(--cel-gold);font-size:10px;flex-shrink:0\">\u2192</span>\n            <span style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">A: @ \u2192 23.227.38.65</span>\n          </div><div style=\"display:flex;align-items:flex-start;gap:5px;padding:3px 0;border-bottom:1px solid rgba(201,169,110,.08)\">\n            <span style=\"color:var(--cel-gold);font-size:10px;flex-shrink:0\">\u2192</span>\n            <span style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">CNAME: www \u2192 celeste-bougies.myshopify.com</span>\n          </div><div style=\"display:flex;align-items:flex-start;gap:5px;padding:3px 0;border-bottom:1px solid rgba(201,169,110,.08)\">\n            <span style=\"color:var(--cel-gold);font-size:10px;flex-shrink:0\">\u2192</span>\n            <span style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Supprimer les anciens enregistrements A</span>\n          </div>\n        </div>\n        <div style=\"margin-bottom:8px\">\n          <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:4px\">\n            <span style=\"font-size:12px\">\ud83d\uded2</span>\n            <span style=\"font-size:9.5px;font-weight:700;color:var(--white);font-family:'DM Sans',sans-serif\">Chez Shopify</span>\n          </div>\n          <div style=\"display:flex;align-items:flex-start;gap:5px;padding:3px 0;border-bottom:1px solid rgba(201,169,110,.08)\">\n            <span style=\"color:var(--cel-gold);font-size:10px;flex-shrink:0\">\u2192</span>\n            <span style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Param\u00e8tres \u2192 Domaines \u2192 V\u00e9rifier</span>\n          </div><div style=\"display:flex;align-items:flex-start;gap:5px;padding:3px 0;border-bottom:1px solid rgba(201,169,110,.08)\">\n            <span style=\"color:var(--cel-gold);font-size:10px;flex-shrink:0\">\u2192</span>\n            <span style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">D\u00e9finir comme domaine principal</span>\n          </div><div style=\"display:flex;align-items:flex-start;gap:5px;padding:3px 0;border-bottom:1px solid rgba(201,169,110,.08)\">\n            <span style=\"color:var(--cel-gold);font-size:10px;flex-shrink:0\">\u2192</span>\n            <span style=\"font-size:8.5px;color:#B0ACA6;font-family:'DM Sans',sans-serif\">Activer la redirection myshopify.com</span>\n          </div>\n        </div>\n    </div>\n    <div style=\"background:rgba(0,128,96,.07);border:1px solid rgba(0,128,96,.2);border-radius:7px;padding:8px\">\n      <div style=\"font-size:9px;color:var(--white);font-family:'DM Sans',sans-serif;font-weight:700;margin-bottom:3px\">\u2705 R\u00e9sultat final</div>\n      <div style=\"font-size:9px;color:#B0ACA6;font-family:'DM Sans',sans-serif;line-height:1.5\">\n        celeste-bougies.fr \u2192 boutique C\u00c9LESTE<br>\n        www.celeste-bougies.fr \u2192 m\u00eame boutique<br>\n        celeste-bougies.myshopify.com \u2192 redirige vers .fr<br>\n        SSL/HTTPS automatique activ\u00e9 par Shopify \u2705\n      </div>\n    </div>\n  </div></div></div>\n  </div>"},
{t:'recap',title:"Ce qu'il faut retenir",vo:"R\u00e9capitulatif section huit. Quatre options pour le domaine : Shopify pour la simplicit\u00e9 totale, Ionos pour le meilleur rapport simplicit\u00e9 prix avec le support fran\u00e7ais, OVH pour rester cent pourcent fran\u00e7ais, Namecheap pour les profils techniques. La connexion DNS se fait en deux \u00e9tapes \u2014 un enregistrement A et un CNAME \u2014 et prend moins d'une heure en pratique. HTTPS activ\u00e9 automatiquement. C\u00c9LESTE utilise celeste-bougies.fr via Ionos pour six euros par an. Dans la prochaine section, on installe les applications essentielles pour booster les ventes.",points:["Module 2 \u00b7 Section 8 \u00b7 R\u00e9capitulatif"]}]},
