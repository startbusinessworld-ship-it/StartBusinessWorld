button>\n              </div>\n            </div>\n            <div style=\"flex:1;background:#fff;border:2.5px solid var(--sp);border-radius:10px;padding:13px;position:relative;overflow:hidden\">\n              <div style=\"position:absolute;top:0;left:0;right:0;background:var(--sp);color:#fff;text-align:center;font-size:9px;font-weight:700;padding:3px\">LE PLUS POPULAIRE</div>\n              <div style=\"margin-top:16px\">\n                <div style=\"font-size:12px;font-weight:700;color:#1a1a1a;margin-bottom:3px\">Shopify</div>\n                <div style=\"font-size:20px;font-weight:800;color:#1a1a1a;margin-bottom:3px\">79 \u20ac<span style=\"font-size:10px;font-weight:400;color:#6d7175\">/mois</span></div>\n                <div style=\"font-size:9px;color:var(--sp);margin-bottom:8px\">\u2192 1 \u20ac/mois \u00d7 3 mois</div>\n                <div style=\"font-size:10px;color:#202223;padding:2px 0;display:flex;gap:5px\"><span style=\"color:var(--sp)\">\u2713</span>5 comptes staff</div><div style=\"font-size:10px;color:#202223;padding:2px 0;display:flex;gap:5px\"><span style=\"color:var(--sp)\">\u2713</span>Shopify Payments</div><div style=\"font-size:10px;color:#202223;padding:2px 0;display:flex;gap:5px\"><span style=\"color:var(--sp)\">\u2713</span>Rapports professionnels</div><div style=\"font-size:10px;color:#202223;padding:2px 0;display:flex;gap:5px\"><span style=\"color:var(--sp)\">\u2713</span>Frais : 1% sans SP</div>\n                <button style=\"width:100%;margin-top:9px;background:var(--sp);color:#fff;border:none;border-radius:6px;padding:7px;font-size:10px;font-weight:700;cursor:pointer\">Essayer \u00e0 1 \u20ac/mois</button>\n              </div>\n            </div>\n            <div style=\"flex:1;background:#fff;border:1px solid #e1e3e5;border-radius:10px;padding:13px;position:relative;overflow:hidden\">\n              \n              <div style=\"margin-top:0px\">\n                <div style=\"font-size:12px;font-weight:700;color:#1a1a1a;margin-bottom:3px\">Advanced</div>\n                <div style=\"font-size:20px;font-weight:800;color:#1a1a1a;margin-bottom:3px\">299 \u20ac<span style=\"font-size:10px;font-weight:400;color:#6d7175\">/mois</span></div>\n                <div style=\"font-size:9px;color:var(--sp);margin-bottom:8px\">\u2192 1 \u20ac/mois \u00d7 3 mois</div>\n                <div style=\"font-size:10px;color:#202223;padding:2px 0;display:flex;gap:5px\"><span style=\"color:var(--sp)\">\u2713</span>15 comptes staff</div><div style=\"font-size:10px;color:#202223;padding:2px 0;display:flex;gap:5px\"><span style=\"color:var(--sp)\">\u2713</span>Shopify Payments</div><div style=\"font-size:10px;color:#202223;padding:2px 0;display:flex;gap:5px\"><span style=\"color:var(--sp)\">\u2713</span>Rapports avanc\u00e9s</div><div style=\"font-size:10px;color:#202223;padding:2px 0;display:flex;gap:5px\"><span style=\"color:var(--sp)\">\u2713</span>Frais : 0,5% sans SP</div>\n                <button style=\"width:100%;margin-top:9px;background:#1a1a1a;color:#fff;border:none;border-radius:6px;padding:7px;font-size:10px;font-weight:700;cursor:pointer\">Essayer \u00e0 1 \u20ac/mois</button>\n              </div>\n            </div>\n        </div>\n        <div style=\"background:#e3f1ed;border:1px solid rgba(0,128,96,.3);border-radius:7px;padding:9px 12px;margin-top:10px;font-size:10px;color:#2d6a4f;text-align:center\">\n          \ud83d\udca1 <strong>Recommandation SBW :</strong> Commence avec le plan <strong>Basic \u00e0 29 \u20ac/mois</strong>. Il suffit pour lancer ta boutique et faire tes premi\u00e8res ventes.\n        </div>\n      </div>\n    </div></div>\n    </div>\n  </div>"},
{t:'shopify',title:"Saisir son e-mail pour s'inscrire",vo:"Le formulaire d'inscription. Saisis l'adresse email de ta boutique. Conseil : utilise une adresse email d\u00e9di\u00e9e, pas ton email perso. Par exemple contact arobase maboutique point com. \u00c7a professionnalise tout depuis le d\u00e9part. Tu peux aussi te connecter directement avec Google si tu veux aller plus vite. Une fois l'email saisi, tu cliques sur Continuer.",html:"<div class=\"sp-wrap\">\n    <div class=\"sp-label\">\ud83d\udccd LE\u00c7ON 1.3 \u2014 Inscription \u00b7 \u00c9tape 1 \u2014 Adresse e-mail</div>\n\n    <div class=\"sp-win\">\n      <div class=\"sp-chrome\">\n        <div class=\"sp-dot\" style=\"background:#ff5f57\"></div>\n        <div class=\"sp-dot\" style=\"background:#febc2e\"></div>\n        <div class=\"sp-dot\" style=\"background:#28c840\"></div>\n        <div class=\"sp-addr\"><span class=\"sp-url\">shopify.com/fr/signup</span></div>\n      </div>\n      <div style=\"width:100%;flex:1;overflow:hidden;display:flex;flex-direction:column\">\n    <div style=\"flex:1;display:flex;align-items:center;justify-content:center;background:#f6f6f7;font-family:'DM Sans',sans-serif\">\n      <div style=\"background:#fff;border:1px solid #e1e3e5;border-radius:14px;padding:28px 30px;width:350px;box-shadow:0 4px 20px rgba(0,0,0,.07)\">\n        <div style=\"text-align:center;margin-bottom:18px\">\n          <div style=\"width:32px;height:32px;background:#95bf47;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto 8px\">\ud83d\uded2</div>\n          <div style=\"font-size:18px;font-weight:800;color:#1a1a1a\">Commence ton essai gratuit</div>\n          <div style=\"font-size:10px;color:#6d7175;margin-top:4px\">Lance ta boutique en quelques minutes</div>\n        </div>\n        <div style=\"margin-bottom:11px\">\n          <label style=\"display:block;font-size:10px;font-weight:700;color:#202223;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em\">Ton adresse e-mail</label>\n          <input style=\"width:100%;padding:10px 12px;border:2px solid var(--sp-blue);border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;color:#202223;outline:none;box-shadow:0 0 0 3px rgba(44,110,203,.1)\" value=\"contact@maboutique.com\">\n          <div style=\"margin-top:4px;font-size:9px;color:#6d7175\">\ud83d\udca1 Utilise une adresse d\u00e9di\u00e9e \u00e0 ta boutique, pas ton email perso</div>\n        </div>\n        <button style=\"width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:7px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:10px\">Continuer \u2192</button>\n        <div style=\"text-align:center;font-size:10px;color:#6d7175;margin-bottom:12px\">\n          Ou continuer avec <span style=\"color:var(--sp-blue);cursor:pointer;font-weight:600\">Google</span>\n        </div>\n        <div style=\"background:#e3f1ed;border:1px solid rgba(0,128,96,.25);border-radius:8px;padding:9px 11px;text-align:center\">\n          <div style=\"font-size:11px;font-weight:700;color:var(--sp)\">\ud83c\udf81 Offre active : 1 \u20ac/mois \u00d7 3 mois</div>\n          <div style=\"font-size:9px;color:#2d6a4f;margin-top:2px\">Puis 29 \u20ac/mois \u00b7 Annulez quand vous voulez</div>\n        </div>\n      </div>\n    </div></div>\n    </div>\n  </div>"},
{t:'shopify',title:"Questionnaire : type d'activit\u00e9",vo:"Le questionnaire d'onboarding Shopify. Ils te demandent ce qui d\u00e9crit le mieux ton activit\u00e9. S\u00e9lectionne l'option qui correspond. Produits physiques si tu vends du tangible. Dropshipping si tu revends sans stock. Ces r\u00e9ponses permettent \u00e0 Shopify de personnaliser les suggestions dans ton dashboard. Pas de mauvaise r\u00e9ponse ici. Choisis et clique sur Suivant.",html:"<div class=\"sp-wrap\">\n    <div class=\"sp-label\">\ud83d\udccd LE\u00c7ON 1.4 \u2014 Inscription \u00b7 \u00c9tape 2 \u2014 Type d'activit\u00e9</div>\n\n    <div class=\"sp-win\">\n      <div class=\"sp-chrome\">\n        <div class=\"sp-dot\" style=\"background:#ff5f57\"></div>\n        <div class=\"sp-dot\" style=\"background:#febc2e\"></div>\n        <div class=\"sp-dot\" style=\"background:#28c840\"></div>\n        <div class=\"sp-addr\"><span class=\"sp-url\">shopify.com/fr/signup/questions</span></div>\n      </div>\n      <div style=\"width:100%;flex:1;overflow:hidden;display:flex;flex-direction:column\">\n    <div style=\"flex:1;display:flex;align-items:center;justify-content:center;background:#f6f6f7;font-family:'DM Sans',sans-serif\">\n      <div style=\"background:#fff;border:1px solid #e1e3e5;border-radius:14px;padding:24px 28px;width:400px;box-shadow:0 4px 20px rgba(0,0,0,.07)\">\n        <div style=\"display:flex;gap:5px;margin-bottom:4px\">\n          <div style=\"flex:1;height:4px;background:var(--sp);border-radius:4px\"></div><div style=\"flex:1;height:4px;background:#e1e3e5;border-radius:4px\"></div><div style=\"flex:1;height:4px;background:#e1e3e5;border-radius:4px\"></div>\n        </div>\n        <div style=\"font-size:9px;color:#6d7175;margin-bottom:12px\">\u00c9tape 1 sur 3</div>\n        <div style=\"font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:13px\">Qu'est-ce qui d\u00e9crit le mieux ton activit\u00e9 ?</div>\n        \n          <div style=\"display:flex;align-items:center;gap:9px;padding:9px 11px;border:2px solid var(--sp);border-radius:8px;margin-bottom:6px;cursor:pointer;background:rgba(0,128,96,.04)\">\n            <div style=\"font-size:20px\">\ud83d\udce6</div>\n            <div style=\"flex:1\"><div style=\"font-size:11px;font-weight:700;color:#202223\">Je vends des produits physiques</div><div style=\"font-size:9px;color:#6d7175\">V\u00eatements, accessoires, d\u00e9coration...</div></div>\n            <div style=\"width:17px;height:17px;border-radius:50%;flex-shrink:0;background:var(--sp);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;\">\u2713</div>\n          </div>\n          <div style=\"display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid #e1e3e5;border-radius:8px;margin-bottom:6px;cursor:pointer;background:#fff\">\n            <div style=\"font-size:20px\">\ud83d\udcbb</div>\n            <div style=\"flex:1\"><div style=\"font-size:11px;font-weight:500;color:#202223\">Je vends des produits num\u00e9riques</div><div style=\"font-size:9px;color:#6d7175\">Formations, ebooks, templates...</div></div>\n            <div style=\"width:17px;height:17px;border-radius:50%;flex-shrink:0;border:1.5px solid #babfc3;\"></div>\n          </div>\n          <div style=\"display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid #e1e3e5;border-radius:8px;margin-bottom:6px;cursor:pointer;background:#fff\">\n            <div style=\"font-size:20px\">\ud83d\udd04</div>\n            <div style=\"flex:1\"><div style=\"font-size:11px;font-weight:500;color:#202223\">Je fais du dropshipping</div><div style=\"font-size:9px;color:#6d7175\">Vente sans stock, exp\u00e9di\u00e9 par le fournisseur</div></div>\n            <div style=\"width:17px;height:17px;border-radius:50%;flex-shrink:0;border:1.5px solid #babfc3;\"></div>\n          </div>\n          <div style=\"display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid #e1e3e5;border-radius:8px;margin-bottom:6px;cursor:pointer;background:#fff\">\n            <div style=\"font-size:20px\">\ud83c\udfa8</div>\n            <div style=\"flex:1\"><div style=\"font-size:11px;font-weight:500;color:#202223\">Je propose des services</div><div style=\"font-size:9px;color:#6d7175\">Consulting, coaching, design...</div></div>\n            <div style=\"width:17px;height:17px;border-radius:50%;flex-shrink:0;border:1.5px solid #babfc3;\"></div>\n          </div>\n        <button style=\"width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:7px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px\">Suivant \u2192</button>\n      </div>\n    </div></div>\n    </div>\n  </div>"},
{t:'shopify',title:"Questionnaire : revenus actuels",vo:"La question sur les revenus actuels. Si tu d\u00e9marres de z\u00e9ro, s\u00e9lectionne Je n'ai pas encore de revenus. C'est parfaitement normal et c'est le point de d\u00e9part de la grande majorit\u00e9 des entrepreneurs qui lancent leur boutique Shopify. Aucun jugement ici. Shopify adapte simplement ses recommandations et ressources en fonction de ta r\u00e9ponse.",html:"<div class=\"sp-wrap\">\n    <div class=\"sp-label\">\ud83d\udccd LE\u00c7ON 1.5 \u2014 Inscription \u00b7 \u00c9tape 3 \u2014 Revenus actuels</div>\n\n    <div class=\"sp-win\">\n      <div class=\"sp-chrome\">\n        <div class=\"sp-dot\" style=\"background:#ff5f57\"></div>\n        <div class=\"sp-dot\" style=\"background:#febc2e\"></div>\n        <div class=\"sp-dot\" style=\"background:#28c840\"></div>\n        <div class=\"sp-addr\"><span class=\"sp-url\">shopify.com/fr/signup/questions</span></div>\n      </div>\n      <div style=\"width:100%;flex:1;overflow:hidden;display:flex;flex-direction:column\">\n    <div style=\"flex:1;display:flex;align-items:center;justify-content:center;background:#f6f6f7;font-family:'DM Sans',sans-serif\">\n      <div style=\"background:#fff;border:1px solid #e1e3e5;border-radius:14px;padding:24px 28px;width:400px;box-shadow:0 4px 20px rgba(0,0,0,.07)\">\n        <div style=\"display:flex;gap:5px;margin-bottom:4px\">\n          <div style=\"flex:1;height:4px;background:var(--sp);border-radius:4px\"></div><div style=\"flex:1;height:4px;background:var(--sp);border-radius:4px\"></div><div style=\"flex:1;height:4px;background:#e1e3e5;border-radius:4px\"></div>\n        </div>\n        <div style=\"font-size:9px;color:#6d7175;margin-bottom:12px\">\u00c9tape 2 sur 3</div>\n        <div style=\"font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:13px\">Quels sont tes revenus en ligne actuels ?</div>\n        \n          <div style=\"display:flex;align-items:center;gap:9px;padding:9px 11px;border:2px solid var(--sp);border-radius:8px;margin-bottom:6px;cursor:pointer;background:rgba(0,128,96,.04)\">\n            <div style=\"width:15px;height:15px;border-radius:50%;flex-shrink:0;background:var(--sp);display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;\">\u2713</div>\n            <div style=\"font-size:11px;font-weight:700;color:#202223\">Je n'ai pas encore de revenus</div>\n          </div>\n          <div style=\"display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid #e1e3e5;border-radius:8px;margin-bottom:6px;cursor:pointer;background:#fff\">\n            <div style=\"width:15px;height:15px;border-radius:50%;flex-shrink:0;border:1.5px solid #babfc3;\"></div>\n            <div style=\"font-size:11px;font-weight:400;color:#202223\">Moins de 1 000 \u20ac / mois</div>\n          </div>\n          <div style=\"display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid #e1e3e5;border-radius:8px;margin-bottom:6px;cursor:pointer;background:#fff\">\n            <div style=\"width:15px;height:15px;border-radius:50%;flex-shrink:0;border:1.5px solid #babfc3;\"></div>\n            <div style=\"font-size:11px;font-weight:400;color:#202223\">Entre 1 000 \u20ac et 10 000 \u20ac / mois</div>\n          </div>\n          <div style=\"display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid #e1e3e5;border-radius:8px;margin-bottom:6px;cursor:pointer;background:#fff\">\n            <div style=\"width:15px;height:15px;border-radius:50%;flex-shrink:0;border:1.5px solid #babfc3;\"></div>\n            <div style=\"font-size:11px;font-weight:400;color:#202223\">Entre 10 000 \u20ac et 50 000 \u20ac / mois</div>\n          </div>\n          <div style=\"display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid #e1e3e5;border-radius:8px;margin-bottom:6px;cursor:pointer;background:#fff\">\n            <div style=\"width:15px;height:15px;border-radius:50%;flex-shrink:0;border:1.5px solid #babfc3;\"></div>\n            <div style=\"font-size:11px;font-weight:400;color:#202223\">Plus de 50 000 \u20ac / mois</div>\n          </div>\n        <div style=\"background:#f0faf5;border:1px solid rgba(0,128,96,.2);border-radius:7px;padding:8px 10px;margin:8px 0 12px;font-size:10px;color:#2d6a4f\">\n          \ud83d\udca1 Si tu d\u00e9marres, s\u00e9lectionne \"Je n'ai pas encore de revenus\". C'est pour \u00e7a que tu suis cette formation.\n        </div>\n        <button style=\"width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:7px;padding:11px;font-size:13px;font-weight:700;cursor:pointer\">Suivant \u2192</button>\n      </div>\n    </div></div>\n    </div>\n  </div>"},
{t:'shopify',title:"Choisir le nom de sa boutique",vo:"Le nom de la boutique. Attention, c'est ici qu'il faut \u00eatre rigoureux. L'URL myshopify.com est permanente et d\u00e9finitive. Si tu mets ma-super-boutique, ton adresse Shopify sera toujours ma-super-boutique.myshopify.com m\u00eame si tu renommes ta boutique plus tard dans les param\u00e8tres. Choisis quelque chose de court, m\u00e9morable, et coh\u00e9rent avec le nom de domaine que tu vas acheter. Prends trente secondes pour bien choisir avant de cliquer.",html:"<div class=\"sp-wrap\">\n    <div class=\"sp-label\">\ud83d\udccd LE\u00c7ON 1.6 \u2014 Inscription \u00b7 \u00c9tape 4 \u2014 Nom de la boutique (\u26a0\ufe0f URL permanente)</div>\n\n    <div class=\"sp-win\">\n      <div class=\"sp-chrome\">\n        <div class=\"sp-dot\" style=\"background:#ff5f57\"></div>\n        <div class=\"sp-dot\" style=\"background:#febc2e\"></div>\n        <div class=\"sp-dot\" style=\"background:#28c840\"></div>\n        <div class=\"sp-addr\"><span class=\"sp-url\">shopify.com/fr/signup/store</span></div>\n      </div>\n      <div style=\"width:100%;flex:1;overflow:hidden;display:flex;flex-direction:column\">\n    <div style=\"flex:1;display:flex;align-items:center;justify-content:center;background:#f6f6f7;font-family:'DM Sans',sans-serif\">\n      <div style=\"background:#fff;border:1px solid #e1e3e5;border-radius:14px;padding:24px 28px;width:400px;box-shadow:0 4px 20px rgba(0,0,0,.07)\">\n        <div style=\"display:flex;gap:5px;margin-bottom:4px\">\n          <div style=\"flex:1;height:4px;background:var(--sp);border-radius:4px\"></div><div style=\"flex:1;height:4px;background:var(--sp);border-radius:4px\"></div><div style=\"flex:1;height:4px;background:var(--sp);border-radius:4px\"></div>\n        </div>\n        <div style=\"font-size:9px;color:var(--sp);margin-bottom:12px;font-weight:600\">\u2705 Derni\u00e8re \u00e9tape !</div>\n        <div style=\"font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:4px\">Comment s'appelle ta boutique ?</div>\n        <div style=\"font-size:10px;color:#6d7175;margin-bottom:14px\">Tu peux modifier le nom affich\u00e9 plus tard, mais <strong style=\"color:#d82c0d\">pas l'URL</strong>.</div>\n        <div style=\"margin-bottom:10px\">\n          <label style=\"display:block;font-size:10px;font-weight:700;color:#202223;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em\">Nom de la boutique</label>\n          <input style=\"width:100%;padding:10px 12px;border:2px solid var(--sp-blue);border-radius:7px;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;color:#202223;outline:none;box-shadow:0 0 0 3px rgba(44,110,203,.1)\" value=\"Ma Super Boutique\">\n        </div>\n        <div style=\"background:#f8f8f8;border-radius:7px;padding:8px 10px;margin-bottom:10px;display:flex;align-items:center;gap:8px\">\n          <span style=\"font-size:10px;color:#6d7175\">\ud83d\udd17 URL :</span>\n          <span style=\"font-size:12px;font-weight:700;color:var(--sp-blue)\">ma-super-boutique.myshopify.com</span>\n        </div>\n        <div style=\"background:#fff8e1;border:1.5px solid #ffc107;border-radius:8px;padding:10px 12px;margin-bottom:14px\">\n          <div style=\"font-size:11px;font-weight:700;color:#856404;margin-bottom:3px\">\u26a0\ufe0f L'URL myshopify.com est d\u00e9finitive</div>\n          <div style=\"font-size:10px;color:#856404;line-height:1.5\">Le nom affich\u00e9 de la boutique peut \u00eatre modifi\u00e9 \u00e0 tout moment dans les param\u00e8tres. L'URL <strong>ma-super-boutique.myshopify.com</strong> est permanente et ne peut jamais \u00eatre chang\u00e9e.</div>\n        </div>\n        <button style=\"width:100%;background:var(--sp);color:#fff;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:700;cursor:pointer\">\ud83c\udf89 Cr\u00e9er ma boutique Shopify</button>\n      </div>\n    </div></div>\n    </div>\n  </div>"},
{t:'shopify',title:"Ton premier dashboard Shopify",vo:"Ton premier dashboard Shopify. C'est la vue d'accueil que tu vas voir juste apr\u00e8s la cr\u00e9ation du compte. En haut, le message de bienvenue avec les quatre \u00e9tapes \u00e0 compl\u00e9ter pour ouvrir ta boutique. En bas, les statistiques toutes \u00e0 z\u00e9ro, c'est normal. Ta boutique existe mais elle est encore cach\u00e9e derri\u00e8re un mot de passe. Dans la barre de navigation \u00e0 gauche, tu acc\u00e8des \u00e0 toutes les sections. C'est depuis ici qu'on va tout configurer dans les prochaines le\u00e7ons.",html:"<div class=\"sp-wrap\">\n    <div class=\"sp-label\">\ud83d\udccd LE\u00c7ON 1.7 \u2014 Accueil \u00b7 Premier dashboard apr\u00e8s inscription</div>\n\n    <div class=\"sp-win\">\n      <div class=\"sp-chrome\">\n        <div class=\"sp-dot\" style=\"background:#ff5f57\"></div>\n        <div class=\"sp-dot\" style=\"background:#febc2e\"></div>\n        <div class=\"sp-dot\" style=\"background:#28c840\"></div>\n        <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com / ma-boutique.myshopify.com</span></div>\n      </div>\n      <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n        <div class=\"sp-topnav\">\n          <div class=\"sp-logo\"><div class=\"sp-logo-bag\">\ud83d\uded2</div><div class=\"sp-logo-word\">shopify</div></div>\n          <div class=\"sp-search\">\n            <span style=\"font-size:10px;color:#777\">\ud83d\udd0d</span>\n            <span class=\"sp-search-ph\">Rechercher</span>\n            <span class=\"sp-kbd\">\u2318K</span>\n          </div>\n          <div class=\"sp-topnav-r\">\n            <div class=\"sp-bell\">\ud83d\udd14</div>\n            <div class=\"sp-store\"><span class=\"sp-store-nm\">Ma Boutique</span><span style=\"font-size:8px;color:#777\">\u25bc</span></div>\n            <div class=\"sp-av\">MB</div>\n          </div>\n        </div>\n        <div class=\"sp-body\">\n          <div class=\"sp-sb\">\n    <div class=\"sp-sb-scroll\">\n      <div class=\"sp-ni on\">\n        <div class=\"sp-ni-ic\">\u2302</div>\n        <span class=\"sp-ni-lbl\">Accueil</span>\n        \n      </div><div class=\"sp-ni\">\n        <div class=\"sp-ni-ic\">\ud83d\udce6</div>\n        <span class=\"sp-ni-lbl\">Commandes</span>\n        <span class=\"sp-bdg\">3</span>\n      </div><div class=\"sp-ni\">\n        <div class=\"sp-ni-ic\">\ud83c\udff7\ufe0f</div>\n        <span class=\"sp-ni-lbl\">Produits</span>\n        \n      </div><div class=\"sp-ni\">\n        <div class=\"sp-ni-ic\">\ud83d\udc64</div>\n        <span class=\"sp-ni-lbl\">Clients</span>\n        \n      </div><div class=\"sp-ni\">\n        <div class=\"sp-ni-ic\">\ud83d\udcdd</div>\n        <span class=\"sp-ni-lbl\">Contenu</span>\n        \n      </div><div class=\"sp-ni\">\n        <div class=\"sp-ni-ic\">\ud83d\udcca</div>\n        <span class=\"sp-ni-lbl\">Analyses</span>\n        \n      </div><div class=\"sp-ni\">\n        <div class=\"sp-ni-ic\">\ud83d\udce3</div>\n        <span class=\"sp-ni-lbl\">Marketing</span>\n        \n      </div><div class=\"sp-ni\">\n        <div class=\"sp-ni-ic\">\ud83c\udff7\ufe0f</div>\n        <span class=\"sp-ni-lbl\">R\u00e9ductions</span>\n        \n      </div>\n      <div class=\"sp-sec-hd\">Canaux de vente</div>\n      <div class=\"sp-ni\">\n        <div class=\"sp-ni-ic\">\ud83c\udf10</div>\n        <span class=\"sp-ni-lbl\">Boutique en ligne</span>\n        <span class=\"sp-arr\">\u25b8</span>\n      </div>\n      \n      <div class=\"sp-ni\">\n        <div class=\"sp-ni-ic\">\ud83d\udd0c</div>\n        <span class=\"sp-ni-lbl\">Apps</span>\n        <span class=\"sp-arr\">\u25b8</span>\n      </div>\n    </div>\n    <div class=\"sp-sb-foot\">\n      <div class=\"sp-ni\">\n        <div class=\"sp-ni-ic\" style=\"opacity:.7\">\u2699\ufe0f</div>\n        <span class=\"sp-ni-lbl\">Param\u00e8tres</span>\n      </div>\n    </div>\n  </div>\n          <div class=\"sp-cnt\">\n {t:'shopify',title:"Param\u00e8tres G\u00e9n\u00e9raux",vo:"Les param\u00e8tres g\u00e9n\u00e9raux. C'est la premi\u00e8re chose \u00e0 faire apr\u00e8s la cr\u00e9ation du compte. Va dans Param\u00e8tres en bas de la sidebar gauche. Remplis le nom de ta boutique, ton email de contact, ton num\u00e9ro de t\u00e9l\u00e9phone. Puis l'adresse physique de ta boutique : elle appara\u00eet dans tous les emails transactionnels envoy\u00e9s \u00e0 tes clients. Fuseau horaire Paris, kilogrammes pour le poids. Clique sur Enregistrer en haut \u00e0 droite.",html:"<div class=\"sp-wrap\">\n    <div class=\"sp-label\">\ud83d\udccd LE\u00c7ON 1.8 \u2014 Param\u00e8tres \u00b7 G\u00e9n\u00e9ral \u2014 Premi\u00e8res infos \u00e0 remplir</div>\n\n    <div class=\"sp-win\">\n      <div class=\"sp-chrome\">\n        <div class=\"sp-dot\" style=\"background:#ff5f57\"></div>\n        <div class=\"sp-dot\" style=\"background:#febc2e\"></div>\n        <div class=\"sp-dot\" style=\"background:#28c840\"></div>\n        <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com / ma-boutique.myshopify.com</span></div>\n      </div>\n      <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n        <div class=\"sp-topnav\">\n          <div class=\"sp-logo\"><div class=\"sp-logo-bag\">\ud83d\uded2</div><div class=\"sp-logo-word\">shopify</div></div>\n          <div class=\"sp-search\">\n            <span style=\"font-size:10px;color:#777\">\ud83d\udd0d</span>\n            <span class=\"sp-search-ph\">Rechercher</span>\n            <span class=\"sp-kbd\">\u2318K</span>\n          </div>\n          <div class=\"sp-topnav-r\">\n            <div class=\"sp-bell\">\ud83d\udd14</div>\n            <div class=\"sp-store\"><span class=\"sp-store-nm\">Ma Boutique</span><span style=\"font-size:8px;color:#777\">\u25bc</span></div>\n            <div class=\"sp-av\">MB</div>\n          </div>\n        </div>\n        <div class=\"sp-body\">\n          <div class=\"sp-sb\">\n    < {t:'shopify',title:"Choisir son plan Shopify",vo:"La page du plan. Tu vois l'offre active \u00e0 un euro par mois avec les quatre-vingt-neuf jours restants. Le plan Basic est s\u00e9lectionn\u00e9. Pour d\u00e9marrer, c'est tout ce qu'il faut. Tu peux \u00e0 tout moment passer \u00e0 un plan sup\u00e9rieur depuis cette page si tes besoins \u00e9voluent. Les \u00e9conomies sur les frais de transaction des plans sup\u00e9rieurs ne compensent leur co\u00fbt qu'\u00e0 partir d'un certain volume de ventes. Pour l'instant, reste sur Basic.",html:"<div class=\"sp-wrap\">\n    <div class=\"sp-label\">\ud83d\udccd LE\u00c7ON 1.9 \u2014 Param\u00e8tres \u00b7 Plan \u2014 L'offre \u00e0 1\u20ac/mois</div>\n\n    <div class=\"sp-win\">\n      <div class=\"sp-chrome\">\n        <div class=\"sp-dot\" style=\"background:#ff5f57\"></div>\n        <div class=\"sp-dot\" style=\"background:#febc2e\"></div>\n        <div class=\"sp-dot\" style=\"background:#28c840\"></div>\n        <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com / ma-boutique.myshopify.com</span></div>\n      </div>\n      <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n        <div class=\"sp-topnav\">\n          <div class=\"sp-logo\"><div class=\"sp-logo-bag\">\ud83d\uded2</div><div class=\"sp-logo-word\">shopify</div></div>\n          <div class=\"sp-search\">\n            <span style=\"font-size:10px;color:#777\">\ud83d\udd0d</span>\n            <span class=\"sp-search-ph\">Rechercher</span>\n            <span class=\"sp-kbd\">\u2318K</span>\n          </div>\n          <div class=\"sp-topnav-r\">\n            <div class=\"sp-bell\">\ud83d\udd14</div>\n            <div class=\"sp-store\"><span class=\"sp-store-nm\">Ma Boutique</span><span style=\"font-size:8px;color:#777\">\u25bc</span></div>\n            <div class=\"sp-av\">MB</div>\n          </div>\n        </div>\n        <div class=\"sp-body\">\n          <div class=\"sp-sb\">\n    <div class=\"sp-sb-scroll\">\n {t:'recap',title:"Ce qu'il faut retenir",vo:"R\u00e9capitulatif de la section un. Ton compte Shopify est cr\u00e9\u00e9 avec l'offre \u00e0 un euro. L'inscription passe par quatre \u00e9tapes : email, questionnaire, nom de boutique. L'URL myshopify.com est d\u00e9finitive. Plan Basic s\u00e9lectionn\u00e9. Param\u00e8tres g\u00e9n\u00e9raux remplis. Ta boutique existe et est prot\u00e9g\u00e9e par un mot de passe. Dans la section deux, on attaque la personnalisation du th\u00e8me.",points:["Section 1 \u00b7 R\u00e9capitulatif"]}]},

{t:'recap',title:"Ce qu'il faut retenir",vo:"R\u00e9capitulatif de la section deux. Ce qu'on a appris. Pour chaque le\u00e7on, on a d'abord vu comment la fonctionnalit\u00e9 marche dans Shopify, puis on l'a appliqu\u00e9 sur C\u00c9LESTE. Les couleurs or, noir et cr\u00e8me. La typographie Cormorant Garamond pour les titres. La barre d'annonce avec le code promo. La banni\u00e8re hero impactante. La r\u00e9assurance adapt\u00e9e aux bougies artisanales. Et la vue mobile toujours v\u00e9rifi\u00e9e. Dans la section trois, on cr\u00e9e les fiches produit de nos bougies C\u00c9LESTE.",points:["Section 2 \u00b7 R\u00e9capitulatif","Th\u00e8me C\u00c9LESTE"]}]},

{t:'shopify',tag:"Exemple \u2014 C\u00c9LESTE",title:"La fiche produit C\u00c9LESTE publi\u00e9e",vo:"La fiche produit finalis\u00e9e. Avant de passer au produit actif, v\u00e9rifie ta checklist. Titre optimis\u00e9, description en quatre blocs, cinq photos avec alt text, prix et prix barr\u00e9, SKU et stock, poids, variantes, collections, tags, SEO complet. Le produit reste en statut Brouillon pendant qu'on construit le reste de la boutique. On le passera en Actif le jour du lancement. Pour C\u00c9LESTE, la fiche Rose de Mai est pr\u00eate. On voit le rendu final c\u00f4t\u00e9 client : le titre avec les specs, les quatre variantes de parfum, le prix barr\u00e9 avec la r\u00e9duction vingt-deux pourcent, le bouton ajouter au panier en or, et les cinq arguments de r\u00e9assurance en bas.",html:"<div class=\"ty-split\">\n    <div class=\"split-how\">\n      <div class=\"split-hd split-hd-how\"><span class=\"split-hd-ic\">\ud83d\udd35</span><span class=\"split-hd-label\">R\u00c9CAPITULATIF \u2014 Fiche produit compl\u00e8te</span></div>\n      <div class=\"split-body\"><div style=\"width:100%;height:100%;background:var(--bg);padding:10px;overflow:auto\">\n    <div style=\"font-size:9px;font-weight:700;color:var(--gl);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px\">Checklist fiche produit</div>\n    \n      <div style=\"display:flex;align-items:flex-start;gap:7px;padding:4px 0;border-bottom:1px solid var(--line)\">\n        <span style=\"font-size:12px;margin-top:1px\">\u2705</span>\n        <span style=\"font-size:10px;color:var(--white);font-family:'DM Sans',sans-serif\">Titre optimis\u00e9 (mot-cl\u00e9 + specs)</span>\n      </div>\n      <div style=\"display:flex;align-items:flex-start;gap:7px;padding:4px 0;border-bottom:1px solid var(--line)\">\n        <span style=\"font-size:12px;margin-top:1px\">\u2705</span>\n        <span style=\"font-size:10px;color:var(--white);font-family:'DM Sans',sans-serif\">Description en 4 blocs (accroche, specs, b {t:'intro',emoji:"\ud83d\udcc2",num:"04",title:"Collections",sub:"Sans collections, ta boutique c'est un march\u00e9 en vrac. Avec des collections bien structur\u00e9es, tu guides le client, tu facilites la navigation, et tu augmentes naturellement le panier moyen.",vo:"Section quatre. Cr\u00e9er ses collections. Sans collections, ta boutique ressemble \u00e0 un march\u00e9 en vrac \u2014 le client ne sait pas par o\u00f9 commencer. Avec des collections bien structur\u00e9es, tu guides la navigation, tu facilites la d\u00e9couverte, et tu augmentes naturellement la dur\u00e9e de visite et le panier moyen. Dans cette section, on cr\u00e9e les trois collections de C\u00c9LESTE : Florale, Bois\u00e9e, et Fra\u00eeche."},
{t:'shopify',title:"Cr\u00e9er une collection dans Shopify",vo:"Cr\u00e9er une collection dans Shopify. Tu vas dans Produits puis Collections dans le menu gauche, et tu cliques sur Cr\u00e9er une collection. Deux types existent : la collection manuelle o\u00f9 tu ajoutes les produits toi-m\u00eame, et la collection automatique o\u00f9 Shopify se charge d'inclure les produits selon des conditions. On recommande le type automatique avec des tags. Tu tagges chaque produit avec son univers olfactif, et la collection se peuple automatiquement. Pour C\u00c9LESTE, trois collections : Florale avec le tag florale, Bois\u00e9e avec le tag bois\u00e9e, Fra\u00eeche avec le tag fra\u00eeche. Et une quatri\u00e8me Best-sellers pour mettre en avant les meilleures ventes.",html:"<div class=\"ty-split\">\n    <div class=\"split-how\">\n      <div class=\"split-hd split-hd-how\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">COMMENT FAIRE \u2014 Cr\u00e9er une collection</span></div>\n      <div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div>\n      <div class=\"sp-dot\" style=\"background:#febc2e\"></div>\n      <div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com/collections</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\">\n        <div class=\"sp-logo-bag\">\ud83d\uded2</div>\n        <span class=\"sp-logo-w\">shopify</span>\n        <span class=\"sp-snm\">Ma boutique</span>\n      </div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\">\n          <div class=\"sp-ni\">\n            <span class=\"sp-ni-ic\">\u2302</span>Accueil\n          </div>\n          <div class=\"sp-ni\">\n            <span class=\"sp-ni-ic\">\ud83d\udce6</span>Commandes\n          </div {t:'shopify',title:"Assigner les produits aux collections",vo:"Assigner les produits aux collections. La m\u00e9thode la plus efficace : les tags. Dans la fiche produit, tu ajoutes le tag correspondant \u00e0 la collection automatique \u2014 florale pour la Collection Florale, bois\u00e9e pour la Collection Bois\u00e9e, etc. Shopify met \u00e0 jour les collections instantan\u00e9ment. Pour C\u00c9LESTE, voil\u00e0 le mapping complet. Rose de Mai et C\u00e8dre Atlas sont en Best-sellers en plus de leur collection respective. Jasmin Pr\u00e9cieux, Pivoine, Santal, V\u00e9tiver, Bergamote et Citron sont dans leur seule collection olfactive. Huit produits bien organis\u00e9s dans quatre collections.",html:"<div class=\"ty-split\">\n    <div class=\"split-how\">\n      <div class=\"split-hd split-hd-how\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">COMMENT FAIRE \u2014 Assigner les produits</span></div>\n      <div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div>\n      <div class=\"sp-dot\" style=\"background:#febc2e\"></div>\n      <div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\">\n        <div class=\"sp-logo-bag\">\ud83d\uded2</div>\n        <span class=\"sp-logo-w\">shopify</span>\n        <span class=\"sp-snm\">Ma boutique</span>\n      </div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\">\n          <div class=\"sp-ni\">\n            <span class=\"sp-ni-ic\">\u2302</span>Accueil\n          </div>\n          <div class=\"sp-ni\">\n            <span class=\"sp-ni-ic\">\ud83d\udce6</span>Commandes\n          </div>\n          <div class=\"sp-ni on\">\n            <span class=\"sp-ni-ic\">\ud {t:'recap',title:"Ce qu'il faut retenir",vo:"R\u00e9capitulatif de la section quatre. Collections manuelles versus automatiques avec les tags. Les quatre collections de C\u00c9LESTE : Florale, Bois\u00e9e, Fra\u00eeche, Best-sellers. Chaque collection a son titre po\u00e9tique, sa description et son image banni\u00e8re. Les conditions automatiques par tag peuplent les collections instantan\u00e9ment. Le SEO de chaque collection est rempli. Et huit produits r\u00e9partis intelligemment. Dans la prochaine section, on configure les paiements pour encaisser les premi\u00e8res ventes.",points:["Module 2 \u00b7 Section 4 \u00b7 R\u00e9capitulatif","Collections"]}]},

{t:'intro',emoji:"\ud83d\udcb3",num:"05",title:"Paiements",sub:"Une boutique sans paiements configur\u00e9s, c'est une vitrine sans caisse. Tu dois \u00eatre pr\u00eat \u00e0 encaisser avant m\u00eame d'envoyer ton premier lien. \u00c7a prend vingt minutes, une seule fois.",vo:"Section cinq. Configurer ses paiements. Une boutique sans paiements configur\u00e9s, c'est une vitrine sans caisse. Tu dois \u00eatre pr\u00eat \u00e0 encaisser avant d'envoyer le premier lien \u00e0 tes premiers clients. Dans cette section, on active Shopify Payments, on ajoute PayPal, on configure les taxes, et on r\u00e8gle la fr\u00e9quence des virements sur ton compte bancaire. \u00c7a prend vingt minutes, une seule fois."},
{t:'shopify',title:"Shopify Payments",vo:"Shopify Payments. C'est le syst\u00e8me de paiement int\u00e9gr\u00e9 de Shopify, propuls\u00e9 par Stripe. Il accepte les cartes bancaires \u2014 Visa, Mastercard, Amex, CB \u2014 ainsi qu'Apple Pay et Google Pay automatiquement. Les frais sont de un virgule sept pourcent sur le plan Basic, sans commission Shopify suppl\u00e9mentaire. Les virements arrivent toutes les deux \u00e0 trois jours ouvr\u00e9s sur ton IBAN. Pour l'activer, tu vas dans Param\u00e8tres, puis Paiements, et tu cliques sur Activer Shopify Payments. Il faudra renseigner ton SIRET, ton IBAN, et une pi\u00e8ce d'identit\u00e9 pour la v\u00e9rification Stripe. Pr\u00e9voir vingt-quatre \u00e0 quarante-huit heures pour l'activation.",html:"<div class=\"ty-split\">\n    <div class=\"split-how\">\n      <div class=\"split-hd split-hd-how\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">COMMENT FAIRE \u2014 Shopify Payments</span></div>\n      <div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div>\n      <div class=\"sp-dot\" style=\"background:#febc2e\"></div>\n      <div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com/settings/payments</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\">\n        <div class=\"sp-logo-bag\">\ud83d\uded2</div>\n        <span class=\"sp-logo-w\">shopify</span>\n        <span class=\"sp-snm\">Ma boutique</span>\n      </div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\">\n          <div class=\"sp-ni\">\n            <span class=\"sp-ni-ic\">\u2302</span>Accueil\n          </div>\n          <div class=\"sp-ni\">\n            <span class=\"sp-ni-ic\">\ud83d\udce6</span>Commandes\n          </div>\n          <div class=\"sp-ni\">\n            <span class=\"sp-ni-ic\">\ud83c\udff7\ufe0f</span>Produits\n          </div>\n          <div class=\"sp-ni on\">\n            <span class=\"sp-ni-ic\">\u2699\ufe0f</span>Param\u00e8tres\n          </div></div></div>\n        <div class=\"sp-cnt\">\n          <div class=\"sp-hd\">\n            <span class=\"sp-bc\"><a>Param\u00e8tres</a> \u203a Paiements</span>\n            <div class=\"sp-ph\">Paiements</div>\n            <div class=\"sp-acts\"></div>\n          </div>\n          <div class=\"sp-main\"><div class=\"sp-cm\">\n      <div class=\"card\">\n        <div class=\"card-h\">Qu'est-ce que Shopify Payments ?</div>\n        <div style=\"font-size:9.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;line-height:1.6;margin-bottom:8px\">\n          C'est le <strong style=\"color:var(--sp-txt)\">syst\u00e8me de paiement int\u00e9gr\u00e9 de Shopify</strong>. Il accepte les cartes bancaires directement dans ta boutique, sans interm\u00e9diaire externe.\n        </div>\n        \n          <div style=\"display:flex;gap:7px;padding:4px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n            <span style=\"font-size:12px;flex-shrink:0\">\u2705</span>\n            <div>\n              <div style=\"font-size:9.5px;font-weight:600;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Aucune commission Shopify en plus</div>\n              <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Seulement les frais de la carte (1,5% \u00e0 2,9% selon le plan)</div>\n            </div>\n          </div>\n          <div style=\"display:flex;gap:7px;padding:4px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n            <span style=\"font-size:12px;flex-shrink:0\">\u2705</span>\n            <div>\n              <div style=\"font-size:9.5px;font-weight:600;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Accepte CB, Visa, Mastercard, Amex</div>\n              <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Et Apple Pay, Google Pay automatiquement</div>\n            </div>\n          </div>\n          <div style=\"display:flex;gap:7px;padding:4px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n            <span style=\"font-size:12px;flex-shrink:0\">\u2705</span>\n            <div>\n              <div style=\"font-size:9.5px;font-weight:600;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Paiements directs sur ton compte</div>\n              <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Virements toutes les 2-3 jours ouvr\u00e9s</div>\n            </div>\n          </div>\n          <div style=\"display:flex;gap:7px;padding:4px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n            <span style=\"font-size:12px;flex-shrink:0\">\u26a0\ufe0f</span>\n            <div>\n              <div style=\"font-size:9.5px;font-weight:600;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Disponible dans les pays \u00e9ligibles</div>\n              <div style=\"font-size:8.5px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">France \u2705 \u00b7 Belgique \u2705 \u00b7 Canada \u2705 \u00b7 USA \u2705</div>\n            </div>\n          </div>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-h\">Activer Shopify Payments</div>\n        <div style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;line-height:1.6\">\n          Param\u00e8tres \u2192 Paiements \u2192 <strong>\"Activer Shopify Payments\"</strong><br>\n          Il te faudra renseigner :<br>\n          \u2192 Num\u00e9ro SIRET / informations l\u00e9gales entreprise<br>\n          \u2192 IBAN de ton compte bancaire<br>\n          \u2192 Pi\u00e8ce d'identit\u00e9 (v\u00e9rification Stripe)\n        </div>\n      </div></div></div>\n        </div>\n      </div>\n    </div>\n  </div></div>\n    </div>\n    <div class=\"split-cel\">\n      <div class=\"split-hd split-hd-cel\"><span style=\"font-size:13px\">\ud83d\udd6f\ufe0f</span><span class=\"split-hd-label\">SUR C\u00c9LESTE \u2014 Activer Shopify Payments</span></div>\n      <div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div>\n      <div class=\"sp-dot\" style=\"background:#febc2e\"></div>\n      <div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com/settings/payments</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\">\n        <div class=\"sp-logo-bag\">\ud83d\uded2</div>\n        <span class=\"sp-logo-w\">shopify</span>\n        <span class=\"sp-snm\">C\u00c9LESTE Bougies</span>\n      </div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\">\n          <div class=\"sp-ni\">\n            <span class=\"sp-ni-ic\">\u2302</span>Accueil\n          </div>\n          <div class=\"sp-ni\">\n            <span class=\"sp-ni-ic\">\ud83d\udce6</span>Commandes\n          </div>\n          <div class=\"sp-ni\">\n            <span class=\"sp-ni-ic\">\ud83c\udff7\ufe0f</span>Produits\n          </div>\n          <div class=\"sp-ni on\">\n            <span class=\"sp-ni-ic\">\u2699\ufe0f</span>Param\u00e8tres\n          </div></div></div>\n        <div class=\"sp-cnt\">\n          <div class=\"sp-hd\">\n            <span class=\"sp-bc\"><a>Param\u00e8tres</a> \u203a Paiements</span>\n            <div class=\"sp-ph\">Paiements</div>\n            <div class=\"sp-acts\"></div>\n          </div>\n          <div class=\"sp-main\"><div class=\"sp-cm\">\n      <div class=\"card\" style=\"border-color:rgba(0,128,96,.3);background:rgba(0,128,96,.02)\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:8px\">\n          <div style=\"width:32px;height:32px;background:var(--sp);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px\">\ud83c\udfe6</div>\n          <div>\n            <div style=\"font-size:11px;font-weight:700;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Shopify Payments</div>\n            <span class=\"pay-badge active\">\u25cf Actif</span>\n          </div>\n        </div>\n        \n          <div style=\"display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(0,128,96,.1)\">\n            <span style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Visa / Mastercard / CB</span>\n            <span style=\"font-size:9px;font-weight:600;color:var(--sp);font-family:'DM Sans',sans-serif\">\u2705 Activ\u00e9</span>\n          </div>\n          <div style=\"display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(0,128,96,.1)\">\n            <span style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Apple Pay</span>\n            <span style=\"font-size:9px;font-weight:600;color:var(--sp);font-family:'DM Sans',sans-serif\">\u2705 Activ\u00e9 auto</span>\n          </div>\n          <div style=\"display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(0,128,96,.1)\">\n            <span style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Google Pay</span>\n            <span style=\"font-size:9px;font-weight:600;color:var(--sp);font-family:'DM Sans',sans-serif\">\u2705 Activ\u00e9 auto</span>\n          </div>\n          <div style=\"display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(0,128,96,.1)\">\n            <span style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Frais de transaction</span>\n            <span style=\"font-size:9px;font-weight:600;color:var(--sp);font-family:'DM Sans',sans-serif\">1,7% (plan Basic)</span>\n          </div>\n          <div style=\"display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(0,128,96,.1)\">\n            <span style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Devise</span>\n            <span style=\"font-size:9px;font-weight:600;color:var(--sp);font-family:'DM Sans',sans-serif\">EUR \u20ac</span>\n          </div>\n          <div style=\"display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(0,128,96,.1)\">\n            <span style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">Virement</span>\n            <span style=\"font-size:9px;font-weight:600;color:var(--sp);font-family:'DM Sans',sans-serif\">Tous les 2 jours ouvr\u00e9s</span>\n          </div>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-h\" style=\"font-size:9px;color:#b98900\">\u26a0\ufe0f V\u00e9rification requise</div>\n        <div style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;line-height:1.5\">\n          Shopify Payments requiert la v\u00e9rification de ton identit\u00e9 et de ton entreprise (via Stripe). Pr\u00e9vois 24-48h pour l'activation compl\u00e8te. En attendant, active PayPal pour ne pas bloquer les ventes.\n        </div>\n      </div></div></div>\n        </div>\n      </div>\n    </div>\n  </div></div>\n    </div>\n  </div>"},
{t:'shopify',title:"Ajouter PayPal",vo:"Ajouter PayPal. PayPal est utilis\u00e9 par trente-sept pourcent des acheteurs en ligne. Beaucoup de clients pr\u00e9f\u00e8rent ne pas saisir leur carte bancaire directement, surtout sur une nouvelle boutique qu'ils ne connaissent pas encore. Ajouter PayPal rassure ces clients et augmente tes conversions. Pour l'activer, tu vas dans Param\u00e8tres, Paiements, section Fournisseurs suppl\u00e9mentaires, tu cherches PayPal et tu te connectes \u00e0 ton compte PayPal Business. Attention, il faut un compte PayPal Business et pas un compte personnel. C'est gratuit \u00e0 cr\u00e9er. Pour C\u00c9LESTE, on a maintenant Shopify Payments et PayPal tous les deux actifs, avec les logos qui s'affichent automatiquement en pied de boutique.",html:"<div class=\"ty-split\">\n    <div class=\"split-how\">\n      <div class=\"split-hd split-hd-how\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">COMMENT FAIRE \u2014 Ajouter PayPal</span></div>\n      <div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div>\n      <div class=\"sp-dot\" style=\"background:#febc2e\"></div>\n      <div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com/settings/payments</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\">\n        <div class=\"sp-logo-bag\">\ud83d\uded2</div>\n        <span class=\"sp-logo-w\">shopify</span>\n        <span class=\"sp-snm\">Ma boutique</span>\n      </div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\">\n          <div class=\"sp-ni\">\n            <span class=\"sp-ni-ic\">\u2302</span>Accueil\n          </div>\n          <div class=\"sp-ni\">\n            <span class=\"sp-ni-ic\">\ud83d\udce6</span>Commandes\n >\n          1. Param\u00e8tres \u2192 Paiements<br>\n          2. Section \"Fournisseurs de paiement suppl\u00e9mentaires\"<br>\n          3. Chercher <strong>PayPal</strong> \u2192 Activer<br>\n          4. Se connecter \u00e0 ton compte PayPal Business<br>\n          5. Enregistrer\n        </div>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-h\" style=\"font-size:9px\">\ud83d\udca1 PayPal Business \u2014 obligatoire</div>\n        <div style=\"font-size:9px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif;line-height:1.5\">\n          Un compte PayPal personnel ne suffit pas pour recevoir des paiements e-commerce. Cr\u00e9e un compte <strong>PayPal Business</strong> gratuit sur paypal.com/fr avant de commencer.\n        </div>\n      </div></div></div>\n        </div>\n      </div>\n    </div>\n  </div></div>\n    </div>\n    <div class=\"split-cel\">\n      <div class=\"split-hd split-hd-cel\"><span style=\"font-size:13px\">\ud83d\udd6f\ufe0f</span><span class=\"split-hd-label\">SUR C\u00c9LESTE \u2014 PayPal configur\u00e9</span></div>\n      <div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div>\n      <div class=\"sp-dot\" style=\"background:#febc2e\"></div>\n      <div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com/settings/payments</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\">\n        <div class=\"sp-logo-bag\">\ud83d\uded2</div>\n        <span class=\"sp-logo-w\">shopify</span>\n        <span class=\"sp-snm\">C\u00c9LESTE Bougies</span>\n      </div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\">\n          <div class=\"sp-ni\">\n            <span class=\"sp-ni-ic\">\u2302</span>Accueil\n          </div>\n          <div class=\"sp-ni\">\n            <span class=\"sp-ni-ic\">\ud83d\udce6</span>Commandes\n          </div>\n          <div class=\"sp-ni\">\n            <span class=\"sp-ni-ic\">\ud83c\udff7\ufe0f</span>Produits\n          </div>\n          <div class=\"sp-ni on\">\n            <span class=\"sp-ni-ic\">\u2699\ufe0f</span>Param\u00e8tres\n          </div></div></div>\n        <div class=\"sp-cnt\">\n          <div class=\"sp-hd\">\n            <span class=\"sp-bc\"><a>Param\u00e8tres</a> \u203a Paiements</span>\n            <div class=\"sp-ph\">Paiements</div>\n            <div class=\"sp-acts\"></div>\n          </div>\n          <div class=\"sp-main\"><div class=\"sp-cm\">\n      <div class=\"card\">\n        <div class=\"card-h\">Moyens de paiement C\u00c9LESTE</div>\n        \n          <div style=\"display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f5f5f5\">\n            <div style=\"width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:16px;background:#f1f2f4\">\ud83c\udfe6</div>\n            <div style=\"flex:1\">\n              <div style=\"font-size:10px;font-weight:600;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">Shopify Payments</div>\n              <div style=\"font-size:8px;color:var(--sp-txt2);font-family:'DM Sans',sans-serif\">CB \u00b7 Visa \u00b7 Mastercard \u00b7 Apple Pay \u00b7 Google Pay</div>\n            </div>\n            <span class=\"pay-badge active\">\u25cf Actif</span>\n          </div>\n          <div style=\"display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f5f5f5\">\n            <div style=\"width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:16px;background:#f1f2f4\">\ud83c\udd7f\ufe0f</div>\n            <div style=\"flex:1\">\n              <div style=\"font-size:10px;font-weight:600;color:var(--sp-txt);font-family:'DM Sans',sans-serif\">PayPal</div>\n              <div style=\"font {t:'shopify',title:"Taxes et virements",vo:"Les taxes et les virements. En France, la TVA standard est de vingt pourcent. Dans les param\u00e8tres Taxes de Shopify, active le calcul automatique des taxes, coche que tes prix incluent la TVA \u2014 obligation l\u00e9gale pour les particuliers en France \u2014 et active l'affichage TVA incluse. Shopify g\u00e8re tout le reste automatiquement. Pour les virements, configure la fr\u00e9quence \u00e0 tous les deux jours ouvr\u00e9s dans Shopify Payments \u2014 c'est le meilleur compromis pour la tr\u00e9sorerie. Pour C\u00c9LESTE, la simulation donne vingt euros quarante-neuf de marge nette par bougie vendue apr\u00e8s TVA, co\u00fbt de production et frais bancaires.",html:"<div class=\"ty-split\">\n    <div class=\"split-how\">\n      <div class=\"split-hd split-hd-how\"><span style=\"font-size:13px\">\ud83d\udd35</span><span class=\"split-hd-label\">COMMENT FAIRE \u2014 Taxes et virements</span></div>\n      <div class=\"split-body\"><div class=\"sp-wrap\">\n    <div class=\"sp-chrome\">\n      <div class=\"sp-dot\" style=\"background:#ff5f57\"></div>\n      <div class=\"sp-dot\" style=\"background:#febc2e\"></div>\n      <div class=\"sp-dot\" style=\"background:#28c840\"></div>\n      <div class=\"sp-addr\"><span class=\"sp-url\">admin.shopify.com/settings/taxes</span></div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;flex:1;overflow:hidden\">\n      <div class=\"sp-topnav\">\n        <div class=\"sp-logo-bag\">\ud83d\uded2</div>\n        <span class=\"sp-logo-w\">shopify</span>\n        <span class=\"sp-snm\">Ma boutique</span>\n      </div>\n      <div class=\"sp-body\">\n        <div class=\"sp-sb\"><div class=\"sp-sb-s\">\n          <div class=\"sp-ni\">\n            <span class=\"sp-ni-ic\">\u2302</span>Accueil\n          </div>\n          <div class=\"sp-ni\">\n            <span class=\"sp-ni-ic\">\ud83d\udce6</span>Commandes\n          </div>\n          <div class=\"sp-ni\">\n            <spa {t:'recap',title:"Ce qu'il faut retenir",vo:"R\u00e9capitulatif de la section cinq. Shopify Payments actif avec CB, Apple Pay et Google Pay, frais de un virgule sept pourcent. PayPal Business activ\u00e9 comme filet de s\u00e9curit\u00e9 pendant la v\u00e9rification. TVA vingt pourcent configur\u00e9e automatiquement, prix TTC affich\u00e9s comme l'oblige la loi fran\u00e7aise. Virements toutes les quarante-huit heures sur ton IBAN. Et pour C\u00c9LESTE, chaque bougie vendue g\u00e9n\u00e8re environ vingt euros de marge nette. Dans la prochaine section, on configure la livraison.",points:["Module 2 \u00b7 Section 5 \u00b7 R\u00e9capitulatif"]}]},
