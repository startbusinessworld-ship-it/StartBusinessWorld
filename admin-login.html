<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBW Admin — Connexion</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--ink:#111110;--bg:#FAFAF8;--muted:#888884;--subtle:#DDDDD8;--surface:#F2F2EF;--gold:#A67C3A;--red:#C0392B}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-wrap{width:100%;max-width:400px;padding:2rem}
    .login-logo{font-family:'DM Serif Display',serif;font-size:1.4rem;text-align:center;margin-bottom:0.4rem}
    .login-sub{text-align:center;font-size:0.78rem;color:var(--muted);margin-bottom:2.5rem}
    .login-card{background:#fff;border:1px solid var(--subtle);border-radius:12px;padding:2rem}
    .field{margin-bottom:1.2rem}
    label{display:block;font-size:0.75rem;font-weight:500;color:var(--muted);margin-bottom:0.4rem;letter-spacing:0.04em;text-transform:uppercase}
    input{width:100%;padding:0.75rem 1rem;border:1px solid var(--subtle);border-radius:6px;font-size:0.9rem;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);transition:border-color 0.15s;outline:none}
    input:focus{border-color:var(--ink)}
    .btn-login{width:100%;padding:0.85rem;background:var(--ink);color:#fff;border:none;border-radius:6px;font-size:0.88rem;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity 0.15s;margin-top:0.5rem}
    .btn-login:hover{opacity:0.85}
    .btn-login:disabled{opacity:0.5;cursor:not-allowed}
    .error-msg{background:#FCEBEB;color:#791F1F;border:1px solid #F7C1C1;border-radius:6px;padding:0.75rem 1rem;font-size:0.82rem;margin-bottom:1rem;display:none}
    .login-footer{text-align:center;font-size:0.72rem;color:var(--muted);margin-top:1.5rem}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .top-bar{height:3px;background:var(--red);width:100%;position:fixed;top:0;left:0}
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="login-wrap">
    <div class="login-logo">Start Business World</div>
    <div class="login-sub">Espace administration</div>
    <div class="login-card">
      <div class="error-msg" id="errorMsg"></div>
      <div class="field">
        <label>Adresse email</label>
        <input type="email" id="email" placeholder="admin@startbusinessworld.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-login" id="loginBtn" onclick="handleLogin()">Se connecter</button>
    </div>
    <div class="login-footer">Start Business World © 2026 — Accès réservé</div>
  </div>

  <script>
    // ⚙️ CONFIGURATION SUPABASE
    // Remplace ces valeurs par celles de ton projet Supabase
    // Dashboard Supabase → Settings → API
    const SUPABASE_URL = 'https://grwimhqsthcmfwblwdwg.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyd2ltaHFzdGhjbWZ3Ymx3ZHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTA5NDIsImV4cCI6MjA5MDA2Njk0Mn0.faK7rX_1OElj5g28NJyAkhucvJIX1R8scopOZ8TRKXc'

    const { createClient } = supabase
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // Vérifie si déjà connecté
    async function checkSession() {
      const { data: { session } } = await sb.auth.getSession()
      if (session) redirectByRole(session.user)
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const btn = document.getElementById('loginBtn')
      const errEl = document.getElementById('errorMsg')

      if (!email || !password) {
        showError('Remplis tous les champs.')
        return
      }

      btn.disabled = true
      btn.innerHTML = '<span class="spinner"></span>Connexion...'
      errEl.style.display = 'none'

      const { data, error } = await sb.auth.signInWithPassword({ email, password })

      if (error) {
        showError('Email ou mot de passe incorrect.')
        btn.disabled = false
        btn.innerHTML = 'Se connecter'
        return
      }

      redirectByRole(data.user)
    }

    async function redirectByRole(user) {
      // Récupère le rôle depuis la table users
      const { data: profile } = await sb
        .from('users')
        .select('role')
        .eq('id', user.id)
        .single()

      const role = profile?.role || 'writer'

      if (role === 'admin') {
        window.location.href = 'admin-dashboard.html'
      } else if (role === 'writer') {
        window.location.href = 'admin-articles.html'
      } else if (role === 'editor') {
        window.location.href = 'admin-newsletter.html'
      } else {
        showError('Rôle non reconnu. Contacte l\'administrateur.')
        await sb.auth.signOut()
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg')
      el.textContent = msg
      el.style.display = 'block'
    }

    // Enter pour valider
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin()
    })

    checkSession()
  </script>
</body>
</html>
