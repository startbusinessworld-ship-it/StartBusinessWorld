<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes Formations — Club SBW</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#111110;--bg:#FAFAF8;--surface:#F2F0EC;--subtle:rgba(0,0,0,0.08);--muted:#888;--gold:#A67C3A;--red:#C0392B}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
nav{background:var(--ink);padding:0 2rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-logo{font-family:"DM Serif Display",serif;color:#fff;font-size:1.1rem;text-decoration:none}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-user{color:rgba(255,255,255,0.5);font-size:0.78rem}
.btn-logout{background:none;border:0.5px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);padding:4px 12px;border-radius:4px;font-size:0.72rem;cursor:pointer;transition:all .15s;font-family:"DM Sans",sans-serif}
.btn-logout:hover{border-color:rgba(255,255,255,.5);color:#fff}
.page{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 54px)}
.sidebar{border-right:1px solid var(--subtle);padding:20px 0;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto}
.sb-sect{padding:0 16px;margin:16px 0 4px;font-size:.62rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:.83rem;color:var(--muted);cursor:pointer;transition:all .12s;text-decoration:none;border-left:2px solid transparent}
.sb-item:hover{color:var(--ink);background:var(--surface)}
.sb-item.active{color:var(--ink);font-weight:500;border-left-color:var(--red);background:var(--surface)}
.main{padding:2rem}
/* LISTE */
.page-title{font-family:"DM Serif Display",serif;font-size:1.6rem;margin-bottom:4px}
.page-sub{color:var(--muted);font-size:.88rem;margin-bottom:28px}
.sect-label{font-size:.68rem;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:14px}
.f-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.f-card{background:var(--bg);border:.5px solid var(--subtle);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .15s}
.f-card:hover{border-color:var(--ink);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.06)}
.f-cover{width:100%;aspect-ratio:16/9;background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.f-body{padding:16px}
.f-card-title{font-size:.95rem;font-weight:500;margin-bottom:4px}
.f-meta{font-size:.72rem;color:var(--muted);margin-bottom:12px;display:flex;gap:8px}
.pbar{height:4px;background:var(--surface);border-radius:2px;overflow:hidden;margin-bottom:6px}
.pfill{height:100%;background:var(--red);border-radius:2px;transition:width .3s}
.plabel{font-size:.7rem;color:var(--muted);display:flex;justify-content:space-between}
.badge-prog{background:rgba(192,57,43,.1);color:var(--red);font-size:.62rem;font-weight:500;padding:2px 8px;border-radius:20px}
.badge-done{background:rgba(39,80,10,.1);color:#27500A;font-size:.62rem;font-weight:500;padding:2px 8px;border-radius:20px}
/* DÉTAIL */
.detail{display:none}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:.82rem;cursor:pointer;margin-bottom:20px;transition:color .15s;border:none;background:none;padding:0;font-family:inherit}
.back-btn:hover{color:var(--ink)}
.detail-title{font-family:"DM Serif Display",serif;font-size:1.8rem;margin-bottom:4px}
.detail-meta{font-size:.82rem;color:var(--muted);margin-bottom:24px}
.detail-layout{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start}
.video-zone{background:#1C1C1A;border-radius:12px;overflow:hidden;aspect-ratio:16/9;margin-bottom:16px;position:relative}
.video-zone iframe{width:100%;height:100%;border:none;display:block}
.vthumb{width:100%;height:100%;cursor:pointer;position:relative}
.vthumb img{width:100%;height:100%;object-fit:cover;display:block}
.voverlay{position:absolute;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center}
.vplay{width:60px;height:60px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center}
.vplay div{width:0;height:0;border-style:solid;border-width:11px 0 11px 19px;border-color:transparent transparent transparent #fff;margin-left:4px}
.lecon-title-big{font-size:1.1rem;font-weight:500;margin-bottom:10px}
.lecon-content{font-size:.88rem;line-height:1.78;color:#444}
.lecon-content h2{font-size:1rem;font-weight:600;margin:1rem 0 .4rem}
.lecon-content p{margin-bottom:.7rem}
.lecon-content ul{margin:.5rem 0 .7rem 1.2rem}
.action-row{display:flex;gap:10px;margin-top:16px}
.btn-done{flex:1;background:var(--ink);color:#fff;border:none;padding:10px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.85rem;transition:opacity .15s}
.btn-done:hover{opacity:.85}
.btn-next{flex:1;background:var(--surface);color:var(--ink);border:.5px solid var(--subtle);padding:10px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.85rem}
.btn-next:hover{background:var(--subtle)}
/* MODULES SIDEBAR */
.mods-box{background:var(--surface);border-radius:12px;overflow:hidden;position:sticky;top:74px;max-height:calc(100vh - 100px);overflow-y:auto}
.mods-head{padding:12px 16px;background:var(--ink);color:#fff;font-size:.82rem;font-weight:500}
.mod-sect{border-bottom:.5px solid var(--subtle)}
.mod-head{padding:10px 14px;font-size:.8rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.mod-head:hover{background:rgba(0,0,0,.04)}
.marr{font-size:.6rem;color:var(--muted);transition:transform .2s}
.marr.open{transform:rotate(90deg)}
.mod-list{display:none}
.mod-list.open{display:block}
.lbtn{display:flex;align-items:center;gap:8px;padding:8px 14px 8px 26px;font-size:.78rem;color:var(--muted);cursor:pointer;transition:all .1s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.lbtn:hover{background:rgba(0,0,0,.04);color:var(--ink)}
.lbtn.active{color:var(--red);font-weight:500;background:rgba(192,57,43,.06)}
.lbtn.done{color:#27500A}
.lcheck{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--subtle);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.5rem}
.lcheck.done{background:#27500A;border-color:#27500A;color:#fff}
.lcheck.active{border-color:var(--red)}
.ldur{font-size:.68rem;color:var(--muted);margin-left:auto}
.no-video-msg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3);font-size:.85rem}
@media(max-width:768px){
  .page{grid-template-columns:1fr}
  .sidebar{display:none}
  .detail-layout{grid-template-columns:1fr}
  .mods-box{position:static}
  .f-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Start Business World</a>
  <div class="nav-right">
    <span class="nav-user" id="userEmail"></span>
    <button class="btn-logout" id="logoutBtn">Déconnexion</button>
  </div>
</nav>

<div class="page">
  <div class="sidebar">
    <div class="sb-sect">Club SBW</div>
    <a class="sb-item active" href="client-dashboard.html"><span>🎓</span> Mes formations</a>
    <a class="sb-item" href="index.html"><span>📰</span> Blog</a>
    <a class="sb-item" href="club.html"><span>✦</span> Le Club</a>
  </div>

  <div class="main">
    <!-- VUE LISTE -->
    <div id="viewList">
      <div class="page-title">Mes formations 🎓</div>
      <div class="page-sub" id="welcomeSub">Bienvenue — toutes les formations sont accessibles.</div>
      <div class="sect-label">Formations disponibles</div>
      <div class="f-grid" id="fGrid"><div style="color:var(--muted);font-size:.85rem">Chargement...</div></div>
    </div>

    <!-- VUE DÉTAIL -->
    <div id="viewDetail" class="detail">
      <button class="back-btn" id="backBtn">← Toutes les formations</button>
      <div class="detail-title" id="dTitle"></div>
      <div class="detail-meta" id="dMeta"></div>
      <div class="detail-layout">
        <div>
          <div class="video-zone" id="vZone"><div class="no-video-msg">Sélectionne une leçon</div></div>
          <div class="lecon-title-big" id="lTitle">Sélectionne une leçon</div>
          <div class="lecon-content" id="lContent"></div>
          <div class="action-row">
            <button class="btn-done" id="btnDone" style="display:none">✓ Marquer comme terminée</button>
            <button class="btn-next" id="btnNext" style="display:none">Leçon suivante →</button>
          </div>
        </div>
        <div class="mods-box">
          <div class="mods-head" id="modsHead">Plan de la formation</div>
          <div id="modsList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var SB = supabase.createClient(
  "https://grwimhqsthcmfwblwdwg.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyd2ltaHFzdGhjbWZ3Ymx3ZHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTA5NDIsImV4cCI6MjA5MDA2Njk0Mn0.faK7rX_1OElj5g28NJyAkhucvJIX1R8scopOZ8TRKXc"
);

var user = null;
var curFormation = null;
var curModules = [];
var curLecon = null;
var prog = {};

async function init() {
  var s = await SB.auth.getSession();
  if (!s.data.session) { window.location.href = "client-login.html"; return; }
  user = s.data.session.user;
  document.getElementById("userEmail").textContent = user.email;
  document.getElementById("welcomeSub").textContent = "Bienvenue " + user.email.split("@")[0] + " — toutes les formations sont accessibles.";
  document.getElementById("logoutBtn").onclick = async function() { await SB.auth.signOut(); window.location.href = "client-login.html"; };
  document.getElementById("backBtn").onclick = showList;
  document.getElementById("btnDone").onclick = markDone;
  document.getElementById("btnNext").onclick = function() { var n = nextLecon(); if (n) playLecon(n); };
  try { prog = JSON.parse(localStorage.getItem("sbw_p_" + user.id) || "{}"); } catch(e) { prog = {}; }
  loadFormations();
}

async function loadFormations() {
  var res = await SB.from("formations").select("*").eq("status", "published").order("position");
  var list = res.data || [];
  var grid = document.getElementById("fGrid");
  if (!list.length) { grid.innerHTML = '<div style="color:var(--muted);font-size:.85rem;padding:2rem">Aucune formation disponible.</div>'; return; }
  grid.innerHTML = "";
  var emojis = ["🧠","🇨🇳","🏛️","📦","✈️","💰","🔗","💼"];
  for (var i = 0; i < list.length; i++) {
    var f = list[i];
    var mr = await SB.from("modules").select("id, lecons(id)").eq("formation_id", f.id);
    var mods = mr.data || [];
    var tot = mods.reduce(function(s,m){return s+(m.lecons||[]).length;},0);
    var done = 0; mods.forEach(function(m){(m.lecons||[]).forEach(function(l){if(prog[l.id])done++;});});
    var pct = tot > 0 ? Math.round(done/tot*100) : 0;
    var badge = pct===100 ? '<span class="badge-done">✓ Terminée</span>' : pct>0 ? '<span class="badge-prog">En cours</span>' : '';
    var card = document.createElement("div");
    card.className = "f-card";
    card.innerHTML = '<div class="f-cover">' + emojis[i%emojis.length] + '</div>' +
      '<div class="f-body">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><div class="f-card-title">' + f.title + '</div>' + badge + '</div>' +
      '<div class="f-meta"><span>' + mods.length + ' module' + (mods.length>1?'s':'') + '</span><span>·</span><span>' + tot + ' leçon' + (tot>1?'s':'') + '</span></div>' +
      '<div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div>' +
      '<div class="plabel"><span>'+pct+'% complété</span><span>'+done+'/'+tot+'</span></div>' +
      '</div>';
    card.onclick = (function(fm){return function(){openFormation(fm);};})(f);
    grid.appendChild(card);
  }
}

async function openFormation(f) {
  curFormation = f; curLecon = null;
  document.getElementById("viewList").style.display = "none";
  document.getElementById("viewDetail").style.display = "block";
  document.getElementById("dTitle").textContent = f.title;
  document.getElementById("modsHead").textContent = f.title;
  var res = await SB.from("modules").select("*, lecons(*)").eq("formation_id", f.id).order("position");
  curModules = (res.data || []).map(function(m){m.lecons=(m.lecons||[]).sort(function(a,b){return a.position-b.position;});return m;});
  var tot = curModules.reduce(function(s,m){return s+m.lecons.length;},0);
  document.getElementById("dMeta").textContent = curModules.length + " modules · " + tot + " leçons";
  renderSidebar();
  var first = null;
  for (var i=0;i<curModules.length;i++) for (var j=0;j<curModules[i].lecons.length;j++) { if (!prog[curModules[i].lecons[j].id]) { first=curModules[i].lecons[j]; break; } if (first) break; }
  if (!first && curModules[0] && curModules[0].lecons[0]) first = curModules[0].lecons[0];
  if (first) playLecon(first);
}

function renderSidebar() {
  var c = document.getElementById("modsList"); c.innerHTML = "";
  curModules.forEach(function(m, mi) {
    var d = m.lecons.filter(function(l){return prog[l.id];}).length;
    var s = document.createElement("div"); s.className = "mod-sect";
    var h = document.createElement("div"); h.className = "mod-head";
    h.innerHTML = '<span class="marr open" id="marr_'+m.id+'">▶</span><span style="flex:1">M'+String(mi+1).padStart(2,"0")+" — "+m.title+'</span><span style="font-size:.68rem;color:var(--muted)">'+d+"/"+m.lecons.length+'</span>';
    var l = document.createElement("div"); l.className = "mod-list open"; l.id = "ml_"+m.id;
    h.onclick = (function(id){return function(){var el=document.getElementById("ml_"+id);var ar=document.getElementById("marr_"+id);el.classList.toggle("open");ar.classList.toggle("open");};})(m.id);
    m.lecons.forEach(function(lc){
      var b = document.createElement("button"); b.className = "lbtn"+(curLecon&&curLecon.id===lc.id?" active":"")+(prog[lc.id]?" done":"");
      var cc = prog[lc.id]?"done":(curLecon&&curLecon.id===lc.id?"active":"");
      b.innerHTML = '<span class="lcheck '+cc+'">'+(prog[lc.id]?"✓":"")+'</span><span style="flex:1">'+lc.title+'</span>'+(lc.duration_min?'<span class="ldur">'+lc.duration_min+' min</span>':"");
      b.onclick = (function(lco){return function(){playLecon(lco);};})(lc);
      l.appendChild(b);
    });
    s.appendChild(h); s.appendChild(l); c.appendChild(s);
  });
}

function playLecon(l) {
  curLecon = l;
  var z = document.getElementById("vZone");
  if (l.youtube_id) {
    var id = l.youtube_id.split("?")[0];
    z.innerHTML = '<div class="vthumb" onclick="launchV(\''+id+'\',this)"><img src="https://i.ytimg.com/vi/'+id+'/hqdefault.jpg"><div class="voverlay"><div class="vplay"><div></div></div></div></div>';
  } else {
    z.innerHTML = '<div class="no-video-msg">Pas de vidéo pour cette leçon</div>';
  }
  document.getElementById("lTitle").textContent = l.title;
  var cc = document.getElementById("lContent");
  if (l.content) {
    var html = ""; var ps = l.content.split("\n\n");
    ps.forEach(function(p){p=p.trim();if(!p)return;
      if(p.startsWith("## "))html+="<h2>"+p.slice(3)+"</h2>";
      else if(p.startsWith("### "))html+="<h3>"+p.slice(4)+"</h3>";
      else if(p.startsWith("- "))html+="<ul>"+p.split("\n").filter(function(x){return x.startsWith("- ");}).map(function(x){return "<li>"+x.slice(2)+"</li>";}).join("")+"</ul>";
      else html+="<p>"+p.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/\*([^*]+)\*/g,"<em>$1</em>")+"</p>";
    });
    cc.innerHTML = html;
  } else cc.textContent = "";
  document.getElementById("btnDone").style.display = prog[l.id] ? "none" : "flex";
  document.getElementById("btnNext").style.display = nextLecon() ? "flex" : "none";
  renderSidebar();
}

function launchV(id, el) {
  el.outerHTML = '<iframe src="https://www.youtube.com/embed/'+id+'?autoplay=1&rel=0" style="width:100%;height:100%;border:none;display:block" allowfullscreen allow="autoplay; encrypted-media"></iframe>';
}

function markDone() {
  if (!curLecon) return;
  prog[curLecon.id] = true;
  try { localStorage.setItem("sbw_p_"+user.id, JSON.stringify(prog)); } catch(e) {}
  document.getElementById("btnDone").style.display = "none";
  renderSidebar();
  var n = nextLecon();
  if (n) setTimeout(function(){playLecon(n);}, 400);
}

function nextLecon() {
  if (!curLecon) return null;
  var found = false;
  for (var i=0;i<curModules.length;i++) for (var j=0;j<curModules[i].lecons.length;j++) {
    if (found) return curModules[i].lecons[j];
    if (curModules[i].lecons[j].id === curLecon.id) found = true;
  }
  return null;
}

function showList() {
  document.getElementById("viewList").style.display = "block";
  document.getElementById("viewDetail").style.display = "none";
  curFormation = null; curLecon = null;
  loadFormations();
}

init();
</script>
</body>
</html>
